body:
  text: 姚秦三藏法師鳩摩羅什譯明護國金剛寺住持如愚著妙法蓮華經隨喜功德品第十八隨喜者準華嚴行願品為十八願中之第五願謂凡見聖凡小大所作功德乃至一塵皆往詣其處而隨分歡喜也以見聞隨喜往古來今之事始能生如實智為衆生如實而説不錯謬故況隨喜此經功德甚大故與校量法師品佛滅度後一念隨喜者得記義也上品佛子住此地是則佛受用常在於其中經行及坐臥前二句法師功德品明也以六根清淨功德是同佛之受用故後二句此品明之以往詣僧坊勸人坐聽行則感上妙象馬車乘坐則感帝釋梵王等座是常在於中經行及坐臥故又從地涌出品上行等菩薩會言我等隨喜今校其功德使彼不唯隨喜且發心佛滅後受持得囑纍也爾時彌勒菩薩摩訶薩至得幾所福而説偈言世尊滅度後其有聞是經若能隨喜者為得幾所福爾時下躡上品而不毀訾起隨喜心為問以上品但校何況讀誦書寫廣持者之功德尚未校不毀隨喜略持者之功德故彌勒今申問之所許也謂隨喜之人得幾許福也爾時佛告彌勒菩薩至阿僧祇不可得比爾時下隨喜之人有僧俗長幼從法下隨喜之地有僧俗村市如其下隨喜之機有僧俗親識皆約最初一人而言是諸下即隨喜之機次第二三敘至第五十起校量案故曰阿逸多其第五十善男子等若四百下衆生無量有人求福下財施無邊是大施主下法施無盡財施即檀度法施具戒忍進禪四度於汝意下問當機以明其福多佛告彌勒下牒前多福校第五十人隨喜此經一偈者多福為少至不以譬喻知也阿逸多如是下以最後校最初其福不可得比也故曰何況最初等良由彼權乘小果此究竟大因必以自初沿至第五十人為校者字經三寫烏焉成馬法久訛傳不無差謬而功德尤勝者顯最初一念隨喜之人固當授成佛之記而不誤也大集經云衆生之業性是顛倒二乘之業有邊際故菩薩之業無邊無量是故菩薩勝於一切聲聞緣覺此財法并施之施主功德不可與一念隨喜之菩薩業相校量見矣又阿逸多若人為是經故至為人分別如説修行上節正隨喜者功德此節旁贊者功德又阿逸多下現生植四威儀功德之因緣是下來世報其往詣得安行之果若復有人下現生植分座之因是人功德下來世得坐天王人王寶位之果已上明一人所感依報之功德也阿逸多下自他現生植正報之因是人功德下來世依正得與總持菩薩共生一處之果後品藥王勇施等皆與持經者之陀羅尼呪故共生一處勸與勸者身根往請之所感利根智慧意根等受教之所感且約一生言百千下約千萬生得六根功德言有音不清曰瘖一向絶音曰啞瘖啞之人口氣多臭皆由前世謗法及阻人聽經所致今勸人往聽故聲不瘖啞又聽法華故口氣不臭此約聲臭論功德也舌常下約色相論齒不下口內之相無病垢黑黃疏缺落皆齒病也差向外之暴齒曲向內之耙齒唇不下口外之相無病下垂則長褰縮則短粗澀則苦瘡疹則穢缺壞則露咼斜則歪厚大則蠢黧黑則滯勸人聽經者皆無此口舌之嫌故曰無諸可惡惡嫌也匾㔸踏鼻也曲戾歪鼻也狹長窄面也窊曲凹面也勸人往聽元屬身口身口既往喜生於心而喜形於面故鼻面皆無此不可喜之相也唇舌下謂勸聽法者不唯無病惡且有相好也相好有七一唇嚴好則不垂縮粗疹缺斜厚黑二舌好無病三牙齒嚴好則不垢黑黃疏缺落差曲四鼻修美則不曲戾高直則不匾㔸五面圓則不狹長貌滿則不窊曲六眉高長七額平廣則無諸可惡此三十二相少分之好校佛則未足比之天人則其足矣世世下謂一世勸人往聽感多世見佛聞法之信受教誨也則一大事因緣果報何盛哉阿逸多汝且下繳其旁替者之功德校量正持説者則功德益難思議矣故曰何況一心聽説等此句伏下品談法師功德之案爾時世尊欲重宣此義而説偈言若人於法會得聞是經典至其福不可限若人於法會下九行頌初節若有勸一人下九行頌次節長行前者頌文後之妙法蓮華經法師功德品第十九上品一念隨喜不名法師者非本意顓業故此品既恆心顗業故眼等六根受持讀誦解説書寫為功而獲見聞三千大千世界色等六粗分別不錯不壞為德以法師保人天範維凡聖其功德等佛故曰法師功德品問法師品六種法師一念隨喜一種既已鳴德供養一種胡不言之答實論功德須受持讀誦解説書寫自他皆得開悟本有佛之知見若夫供養禮拜唯獲福田故不校也或有受持讀誦等為法供養亦攝盡也故藥王本事品有法供養之校量爾時佛告常精進至因緣果報生處悉見悉知爾時世尊欲重宣此義而説偈言若於大衆中以無所畏心至肉眼得如是爾時下總標持經者得六根功德千二百八百當如首楞嚴優劣必常精進菩薩當機者見功德由精進致也是善男子下別敘眼根功德必曰父母所生肉眼者見經功德殊勝持者不待修得天眼通即凡眼便為佛知見矣下五根同此見於下依報橫竪世界相續亦見下正報善惡衆生相續及業下業果相續偈五行初行頌總標次四行頌別敘彌樓云光明七金山也問持經者多功德未驗何也答不常精進故即常精進文字者尚少況如説修行乎苟如説而行勺水同江海撮土等大地舉目無非妙法矣復次常精進至如是分別種種音聲而不壞耳根復次下標功得千下具德以是下總敘象聲下別敘三種車聲啼哭愁歎象馬牛曳車之悲苦聲螺聲下四種樂聲笑語人聞樂之歡樂聲男聲下人間凡聖是非悲歡六對聲天聲下天上八部聲火聲下人天共有四大聲地獄下天人共有三途聲已上世間六凡聲比丘下出世間四聖聲以要下總結持經者之功德爾時世尊欲重宣此義而説偈言父母所生耳清淨無濁穢至功德已如是初四句頌總標次五十六句頌別敘後十二句頌總結橫遍十方竪窮三界六凡四聖之聲無遠邇小大持經者不移於此而遍聞於彼雜而不壞一而能別者良由圓通本根合乎法身功德固當如是迦陵頻伽云好聲鳥其鳥在㲉聲已壓於衆羽命命即共命一身二頭神識互別報命相同故曰命命勝天王經云生生光音二禪天遍淨三禪天有頂四禪色究竟天復次常精進至若欲分別為他人説憶念不謬復次下標功成就下具德受持讀誦解説書寫屬眼舌身意四根耳鼻似無干也亦敘功德者以初受時耳得音聲之先鼻出入息便於讀誦故以是清淨下聞人間無情香也須曼那解見五卷末暗提云金錢華末利云鬘其華可作鬘故波羅羅云重生多摩羅跋云性無垢多伽羅云根又復別知下聞人間有情香也持是經者下聞天上無情香也波利質多羅云員生樹其根莖枝葉能逆風香五十由旬拘陀羅云大遊戲地樹又聞諸天下聞天上有情香也勝殿娛樂淫欲香法堂説法智慧香諸園遊戲散亂香梵世有頂禪定香已上並六凡之香也及聲聞下四聖之香雖聞下結成持經者鼻根功德殊勝雖香有人間天上世出世別曾不因不合聞而壞根錯境忘其所在而謬其説者佛知見所具也爾時世尊欲重宣此義而説偈言是人鼻清淨於此世界中至先得此鼻相初四句頌總標長文唯香頌亦聞臭須曼那下六十四句頌人間情無情香諸天若行坐一行應譯置天女所著衣後天上諸華下二十八句頌天上情無情香諸比丘衆下二十句頌四聖香末四句頌總結也六凡四聖人物貴賤山林市朝隱顯樂苦持經者一聞香氣皆悉能知者一則經之功德殊勝一則持經者非巡行數墨乃神契乎法身根符乎佛知見也談耳鼻二根聲香之法文字如江海潮波一層壓一層繁而有趣問六根奚於聲香而廣衍也答聲是此方教體香為聖凡同樂故侈言之復次常精進至又能出於深妙法音復次下標功得千下具德舌根功德不出嘗味説法二種若好下釋嘗味之德好醜約飲食之質言美惡約飲食之味言苦澀物乃質與味醜惡不美之極者在其舌根下此經一相一味故持經者遇諸醜惡極不美之下物皆變成極美之上味如天之甘露也若以舌根下釋説法之德此經深妙衆經中寶故説者出深妙聲能入衆心令衆喜樂也又諸天子下申釋於大衆中之衆有天男天女欲色界之分聞是深妙下申釋入心令喜謂由説者言論次第分章折句合佛意而不紊亂故能致天之男女來聽也及諸龍下列餘七部男女亦如天部也天部但曰來聽餘七部則曰親近敬養互言之以上天龍外護也及比丘下人間內外護有四等一僧俗四衆二國王王子衆三羣臣衆四小大輪王衆乃一時雲集衆也故曰乘其宮殿等以是菩薩下長隨影響衆也故曰盡其形壽等又諸下謂不惟但得六凡衆且得四聖衆加護也是人下謂不唯但得四聖護念且得十方諸佛偏向説法致能受持傳講也爾時世尊欲重宣此義而説偈言是人舌根淨終不受惡味至或時為現身初行頌嘗味德餘七行半頌説法德是説法之人一行長行無文頌增廣之復次常精進至皆於身中現其色像復次下標功得八下序德身之功德不出清淨現相二者得清下得清淨德喻如琉璃見者歡喜其身下得現相德有通有別三千下通序依正升沉之廣多生時下通序依正果報之差別悉於中現者持經者色身合乎法身也及鐵下別以鐵圍彌樓山之小大申明上下好醜善惡之依正以鐵圍在下為醜惡處彌樓等在上為善好處故約欲界一界言下至下別敘阿鼻有頂申明三界上下好醜善惡之依正以阿鼻云無間在地獄最下為惡醜處有頂乃色究竟天與空無邊處鄰為最上善好處故悉於中現者持經者法身不外乎色身也若聲聞不謂不唯一身現六凡色相雖四聖人説法音聲相亦於身中現也是十法界無往而不成實相妙法矣爾時世尊欲重宣此義而説偈言若持法華者其身甚清淨至一切於中現若持下頌清淨德又如下頌現相德長行但譬琉離頌中復喻明鏡唯獨下謂法師身雖現十法界依正之相人所不知而己則獨知之也昔彌勒下兜率天為無著説瑜伽論唯無著見餘皆不見華嚴五十三參多於身中流出十法界像三千下頌通敘諸天下頌別申長文無水頌補現大海以上頌六凡諸佛下頌現四聖雖未下結顯經之功德殊勝謂法師雖未證佛無漏清淨法性身而父母所生尋常色身有類乎果覺現相也問蕞爾眇躬胡能若是答彈丸之鏡能持萬仞之山頃刻之夢能現百年之境然皆有為法生滅心也今經詮佛與衆生平等共有之佛知見持經者能常精進自然反常合道何疑為得其信論四種鏡者諳此復次常精進至亦是先佛經中所説復次下標功得千下敘德意以通達為德以是下通達一為無量自利利他德意根云聞者一則意待耳先聞而後通達一則前五根具同時意根故也諸所下通達無量為一即俗即真德以諸所説佛法及治世資生業皆從俗諦無量實相正法皆屬真諦唯一法故三千下凡心通也雖未下見經之功德勝也是人下聖性通也聖凡心性既皆得通故思惟籌量皆合先佛典誥爾時世尊欲重宣此義而説偈言是人意清淨明利無濁穢至持法華經故是人下頌通達一為無量等文是世界下頌通達凡心之文十方下頌通達聖性之文悉知下頌通達無量為一之文持法華下頌見經功德殊勝之文良由此經詮顯生佛等有虗寂之佛知見持誦者朝夕清淨熏習六根中無一法不靈且妙也此品影起下品常不輕迹以便現神力囑纍於上行等菩薩佛滅後在此娑婆世界廣其持説也妙法蓮華經常不輕菩薩品第二十常不輕者釋迦往劫常以六根禮拜四衆云我不敢輕慢汝等汝等皆當作佛致其罵辱恆不變志由是增上慢輩無如之何遂以常不輕名之後得威音王佛先所説經受持感六根清淨為大法師故曰常不輕也上品既言其法此以人證使知靈山一會許大果報皆由持經為因行而得又照壽量品諸佛威猛大勢之力一句故以得大勢菩薩為當機而點明之意不持經者以增上慢為勢持經者當以不輕增上慢人為大勢也爾時佛告得大勢菩薩至有二萬億佛皆同一號爾時下將欲舉人證法而結盡已前諸品也以獲大罪報如前所説是如譬品偈文所説為下增慢四衆獲罪之案其所得功德如向所説是如法師功德品所説為下常不輕獲益之案得大勢乃往下常不輕所師之佛具十號也威以形言音以聲言王者自在義兼形聲而王於威音那畔也故有威得劫名離衰有音得國名大成也其威下彼佛説法義該五乘一人二天三聲聞四辟佛五菩薩乘故敘為天人阿修羅等為説法之總敘為求聲聞乘等為説法之別小乘究竟云涅槃約斷德言大乘究竟云佛慧約果覺言為菩薩云因阿耨等者以凡為菩薩者必先發阿耨菩提心為因修六波羅蜜為緣故得大勢是威下敘彼佛之壽命長遠及正像法之永久也其佛饒益下敘二萬億佛初佛之終於此國土下敘二萬億佛第二佛之始如是下即初二兩佛敘滿二萬億佛名號皆同俾見我釋迦親近佛多盡行道廣其授受有所自也此完譬品為身子述成我昔曾於二萬億佛等之之案最初威音王如來既已滅度至號之為常不輕最初下謂二萬億之最初佛正像法滅後法末而人惡也增上慢意惡有大勢力身口惡以意惡有未得謂得之慢身惡有打擲之勢口惡有罵詈之力故曰有大勢力爾時下謂不輕當彼時欲衆生作佛人惡而己特善也以何下徵其得善之名是比丘下釋成其善之實禮拜讚歎身口二業善不敢輕慢意業善而是下謂不輕因三業善人作佛既不持經之實故不以文言為正務也乃至遠見對上凡有所見為近相知言故凡近相知雖見不輕禮讚尚不加罵詈此四衆既遠不相知故一見授記作佛即加罵詈也言是無智下述其罵辭如此下上遠見約地遐邇此多年則經時久故不唯罵詈則加杖石打擲乃人情厭煩不信則侮世常態也問此雖好心帶纍不信者墮苦豈不為多事乎答誠然第不如是諸增上慢人總無成佛之期此釋迦知其為纍亦是暇顧前誠身子無智人中莫説此事政為此耳避走下謂不輕雖避遠其害詬辱而退息其善行所謂得持經之實也以其下結答以何因緣等之徵辭因其實而成其名謂上慢輩見罵辱不止末如之何遂即以不輕口中之言增一常字詺其名也是比丘臨欲終時於虗空中至功德成就當得作佛上節敘由實得名此節敘由因得果是比丘下不輕地遠時長受罵辱而不退息者得諸法空為座也故將命終而於空中聞威音王佛在時所説之全部經也悉能受持六根之功即得下六根之德如上謂如上法師功德品所説此所謂改粗身為妙質也更增下謂易短壽而成長年也於時下先倨之人見其下復恭於法此又見不輕以妙法為大勢力故以三力言大神通力者即改形易壽之謂也樂説辨力者即廣為人説也大善寂力者即前直受詬辱而不懷于念不報于言也是菩薩復化下謂毀僧謗法者尚植成佛之因而上值下化者固當得成佛之果也故有三番值佛之敘命終下初值佛數名也以是下次值佛數名也得大勢是常下未值佛數而不置名得大勢於意云何至常應受持讀誦解説書寫是經得大下昔因今果一人也若我下因深果速皆屬此經也此完首節獲益之案得大勢彼時下昔之惡因也二百下昔之惡果也此完首節獲罪之案畢是下昔有善因也完上節皆信伏隨從之案爾時四衆下今有善果也完上節復化千萬億衆令住阿耨菩提之案此承上節校明彼此今昔功過而結證法師功德以勸持也得大勢當知下總結法會之始至此品之終而起下八品之流通分也然此數句義最重為流通源故爾時世尊欲重宣此義而説偈言過去有佛號威音王至天人龍神所共供養此頌初節過去下該盡二萬億佛始末神智無量法身也威也將導一切般若也音也天人下解脫也王也即名以頌其實是佛滅後法欲盡時至不輕菩薩能忍受之此頌第二節是佛下最初一佛末法時也有一下持經師也時諸下慢法衆也計著於法謂執著我法也不輕下頌所以具不輕之實也諸人下頌所以得不輕之名也其罪畢已臨命終時至漸具功德疾成佛道此頌第三節金剛經云是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提今於不輕云其罪畢已者可見佛在因地亦嘗造罪故受人辱但以持經重作而輕報也臨命下以經自覺自利也復為下以經覺他利他也不輕命終下正與金剛先世罪業即為消滅當得阿耨菩提之義同也功德云漸具者因行要積莊嚴劫國等始得圓也佛道云疾成者果海滿在初心見地略無一毫鈍滯也彼時不輕則我身是至世世值佛疾成佛道此頌第四節彼時下頌昔因今果之師見傳法之功德不虗也時四下頌昔因今果之衆見今佛前聽法非無故也我於下見佛前世由勸人聽經為因故得今日復開示教人令住涅槃為果也世世下謂佛豈止於威音王佛一世為然乃於二千億日月燈明佛及二千億雲自在王佛等諸佛法中世世皆受持如是經典也此應長行若我於宿世不受持讀誦此經等文初億億下謂佛於此經雖云前世勸人世世自持其言似容易而不知説一前世則經過億億萬劫至不可思議之許多世始一遇其時得開此經也次億億下謂説一世世又不知經過億億萬劫至不可思議之許多世始一遇其佛而説此經也是故行者下謂以是佛於此經若聞若説經劫之多易而難之故凡在佛前諸修行者於佛滅後得聞此經即與佛久遠劫海前所聞同也勿生疑惑云汝聞異於佛開也以佛知見一開佛聞衆生聞同一法身雖多劫直一念也應當下謂既知己聞同於佛聞多劫元直一念則佛滅後諸修行者應當一心學佛忍於增上慢輩於難説之經而廣説之即為報佛之恩也如是則聞者即同佛世世值佛雖遠劫即近劫也説者亦同佛疾成佛道雖漸修即頓證也經文讀之似平易而照前應後一句有無量義在中其涵畜之妙非具眼者莫知正宗分止此下八品為流通分流通其序正也然流通有二一本分流通神力囑纍兩品是也以是三分中之本分故二支別流通藥王本事以去六品是也宣師所謂支品別偈不無其流故妙法蓮華經如來神力品第二十一如來神力者初勸新得記者發願廣持説提婆品是教大會學佛求法為弟子之道上將囑纍其經於舊所化衆説常不輕品是教大會學佛説法為師保之道總照法師品為弟子者應視師如佛以如來供養而供養之為師保者弟子於禮有所未盡應以大慈悲為室柔和忍辱為衣等此教菩薩法因緣本末究竟可謂至矣故此本即現神力囑纍完塔中佛欲以此妙法華經付囑有在之案故曰如來神力品照壽量品諸佛師子奮迅之力一句以所現神力以師子奮迅狀故然如來二字該盡釋迦與分身諸佛以俱現神力故神力照經則有十種一廣長舌上至梵世二一切毛孔放無數光三一時攝百千歲四謦咳彈指聲遍三變淨土外之十方五十方地震六他方衆生遙見此方依正生喜七他方諸天虗空中唱此方三寶依正之名勸隨喜致禮八他方衆生遵其天命稱禮興供九供養之物變成寶帳覆諸佛上十他方此方通為一土凡此皆諸佛之神力也爾時千世界微塵等菩薩至解説書寫而供養之爾時千世下此諸菩薩初雖精進然不好在衆住於下界是心有所耽其靜趣者及聞佛音聲從地涌出修敬後但曰我等隨喜未嘗發願廣持及佛談久遠壽命屬此經分別大會功德屬此經一念隨喜六根清淨引常不輕之人而證法師之功德皆屬此經末後佛復痛加勸勉故始肯捨己所耽從佛所囑而發願廣説也故曰我等於佛滅後等究其願辭處之廣狹心之緩急有兩不同於持品諸發願者何則藥王等雖各發願此方他方周旋往返十方持經然奉佛命不得佛心故佛皆不放心瞑目而付囑也惟此千世界塵衆發願舉其處則曰於佛滅後世尊分身所在國土滅度之處是持經之處無量擴乎其不止於周旋往返一佛滅度後之十方世界也以佛分身無量世界亦無量故舉其心則曰我等亦自欲得是真淨大法是持經之心充乎其不同於八十萬億那由他諸菩薩言我等敬信佛悉忍是諸惡惟願世尊在於他方遙見守護以畏惡求護終是賴佛行事少不得意多見其抑損或生其退屈也惟此大衆自欲得是真淨大法則上不恃佛下不畏衆即佛不見護亦自無怨以自欲得是真淨大法故故得其佛命而愜其佛心即現神力而囑纍也恐法難會請以喻明譬世人之有諸子將受父之家業各陳其志於父有願但在家中管事而不費家中之物者此藥王等發願本土持經者是也有畏家緣瑣屑人情難浹願往外面經營者此諸新得記發願他方持經者是也有知家中外面悉是父事願內外總攝不畏嫌疑此八十萬億那由他衆發願周旋往返十方世界持經者是也然尤不得其父放心瞑目以交付囑纍者以此等雖不畏難往返十方可謂具足勤忍矣但尚推是父事於己則莫過代父行事耳如是則費有所不惜而利有所不增也若夫一子知父之家業悉是己有乃我為子者所當自欲得者有無倚賴全不恃父不問內外小大皆願管到則父必知此子既云家業是自己欲得必內不費本外增其息即有所出必有所入其父辛勤所得之産得其人有所交閣身雖歿而目始瞑矣此千世界從地涌出之衆發願欲自得真淨大法受持讀誦此經者是也前云六萬恆河沙等菩薩一一各領六萬五萬恆河等眷屬今云千世界微塵等菩薩者以彼師資沙數垓數單數會其塵數則有一小千世界之微塵多也故前後敘異爾時世尊於文殊師利等至通達無礙如一佛土此節經家敘置佛以十種神力囑纍也爾時下謂佛欲以此經付囑本土之衆故於文殊等舊住本土衆前現大神力也云舊住者顯上行等從地涌出六萬恆沙等衆皆是新住此界者何則如文殊在過去二萬日月燈明佛最初一佛法中為妙光法師教化八王子其第八子名然燈佛釋迦於然燈佛始發大心如是則知妙光之時釋迦尚未知名姓故稱文殊等為舊住娑婆世界之者宿也出廣下大神力現於舌相舌在佛口不過尺寸出之則廣長至於梵世豈止覆面哉凡人不妄語則感舌長舐鼻今佛出此見説此經授記聲聞成佛若因緣譬喻果報等言皆是真寶也一切毛孔下神力現於身相身有無量毛孔孔有無量光光有無量色皆遍照十方世界也舌相約竪言故云上至等身相約橫言故云遍照等其寶互現也以三變淨土廣大之世界舊住新集無邊之聖衆無前後左右佛一舌一身無不悉見其神力寧不大乎此所謂佛身充滿於法界普現一切羣生前也以上敘釋迦一佛之神力也衆寶下敘釋迦分身諸佛之神力也此為諸佛師子奮迅之力者師子獸中王性喜繡逑雌雄戲舞之時長出其舌舉身毛色皆現金光觀者無前後左右一時俱見首在己前此師子之奮迅狀也諸佛法中王性喜妙法今因付囑此經現其舌相身相奮迅之狀如之故取喻言而結證法師品我爾時為現清淨光明身之案釋迦牟尼佛下牒佛與分身諸佛正現二種神力時不唯橫竪界廣亦經歲久時長也故云滿百千歲問佛壽止得八十如何一時云滿百千歲答黃粱一夢生平事業悉完況佛神力攝長為短延促一際可思議乎然後下敘佛與分身諸分現身相神力也攝收也對上出廣長之出字言聲咳收舌相入口之聲俱共下佛與分身諸佛初舌相出時手各結印故今收舌則印解而左右手各彈指出聲也是二下謂聲相神力亦互遍十方界也以是觀之則三變淨土外尚有十方諸佛世界在蠢爾衆生執一己所有欲大於人何其隘哉故造字者以自大為臭也地皆下地震有二緣一見無情器界妄結今欲發真歸源故震一欲三變土外衆生見我娑婆主伴依正通為一界俾發願往他方世界持經者沒處去也故震其中衆生下謂彼十方有情初被我法二障所障雖同佛與分身諸佛一處有眼不見今得佛神力震開聾瞽見佛願力所成十方諸佛主伴之多身及見佛慧力所成三世諸佛過現之一身也此所謂隨緣赴感靡不周而恆處此菩提座以上敘彼見此一體三寶中依正分明之佛寶也以見下見一體三寶中不離佛左右之僧寶也既見下應知彼十方佛土之衆皆是前變土時所移置之天人及許説時五千退席之慢衆初因懷增上慢被障所障不得見此法會妙境壽量品所謂以諸神通力令顛倒衆生雖近而不見也至上品既敘佛因中為常不輕菩薩時尚不宿嫌於增上慢人況今成佛果上反有退席移置者終不令見耶故以神力加被令見也壽量品所謂令其生渴仰因其心變慕時我及衆僧俱出靈鷲山也是退席移置者無心希寶自然而至矣故曰皆大歡喜等即時諸天下敘彼十方佛土之衆又承諸天力得聞此土一體三寶中依正之名及法寶名也過此下教知此土依報之名是中下教知此土正報法主之名今為下教知此土法主為法臣所説之經名此與譬喻品身子授記時為諸聲聞説大乘經等五句相照應汝等下教隨喜其法亦當下教供養其佛皆諸天教者結證法師品我時廣遣天龍等為其集聽法衆之案彌勒所謂佛名聞十方廣饒益衆生是也彼諸下敘彼土衆生遵天命而禮念佛也以種種下遵天命而興供養以表深心信解也彌勒所謂一切具善根以助無上心是也所散諸物下心通法變乃佛與分身諸佛等大慈悲心為室柔和忍辱為衣之所感故散物皆合成寶帳覆蓋佛上也于時十方下初佛三變淨土猶多移置人天今既容退席移置者見聞禮敬則退者進而移置者元不曾動故十方世界通達無礙如一佛土吾佛多寶佛分身佛願心滿而法報化三身宛然一體也凡聖土方便土實報土同一寂光無彼此色相可見也華嚴經云若有欲識佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙杜順偈云若人欲會真空理身內真如還遍外情與無情共一體處處皆同真法界皆此義也妙法談至此佛神力現至此無針鋒處不是佛法身充滿無微塵孔不是佛淨土完全知此見此謂之開示悟入佛之知見也一大時教何有奇特如此吾信法華經真為諸經中之王矣爾時佛告上行等菩薩大衆至諸佛於此而般涅槃爾時等者上節神力云於文殊等者以文殊師利等八萬大士往劫各有本所事之佛各受過本佛之囑纍如文殊為日月燈明佛弟子藥王為日月淨明德佛弟子皆有囑纍之文皆非釋尊所化弟子乃舊住此界之耆宿故現神力非耆舊不足以證此節以智力囑纍而告上行菩薩等者上行等是釋尊所親化適嗣故經非親法嗣不足以纍也諸佛神力下牒上節神力之大也若我以是下謂此經功德智慧之力深也以要下謂上所現廣大神力既不能盡此經之囑纍當攝廣大以從要略明之也如來一切所有之法者指如是相性體力作因緣果報本末究竟等一大事因緣佛知見之心法言也如來一切自在神力者指眉間光照東方現塔變土出多寶集分身接衆住空涌衆於地六十小劫如半日乃至上品聲色二相使彼見此合界為一一大事因緣佛知見之心力是也如來一切祕要之藏者指為二乘授顯記説昔所得小果非真又説一切聲聞內祕外現提婆為師龍女成佛如來久已成道壽量無邊皆一大事因緣佛知見之心要也如來一切甚深之事者指大通佛時為十六王子威音王佛時作常不輕比丘皆一大事因緣佛知見之心事也皆於下謂以上所詮皆載此七卷能詮文中宣示顯説無毫忽隱覆也是故汝等下勸當機為六種法師如法修之於心也所在國土下勸當機為六種法師敬持法之人敬有法之地皆應起塔而表顯也經卷住處七項分別一園二林三樹四僧坊五俗舍六殿堂七山谷曠野所以下徵釋人及處皆起塔供養者以其處即菩提場其人即佛在菩提場成佛轉法輪般涅槃為大事也爾時世尊欲重宣此義而説偈言諸佛救世者住於大神通至不可得邊際長文三節此頌初二兩節諸佛下謂諸佛因救世而住神通因悅生而現神力也舌相下正明神力無量之相為求下正明悅生謂因悅求佛道之衆生而尺寸之舌上至梵世丈六之身放無數光皆世間希有事也以上頌色相之神力諸佛聲咳下頌聲相神力謂口指之聲聞于十方無量之地六種震動者是諸佛歡喜上行等菩薩諸佛滅後能持此經現此聲相無量之神力也囑纍下謂諸佛所以現無量神力者一則為囑纍其經一則為讚美持經之人雖無量劫以神力讚美持者功德皆不能盡也是人下申明所以許大神力多劫讚美不盡者以持經者功德無邊涯無窮盡如十方之虗空也能持是經者則為已見我至決定無有疑此頌第三節也初能持下六句謂持經者見經即見三世十方諸佛及佛所教化諸菩薩也次能持下八句謂持經者不唯見佛菩薩而已即令十方三世諸佛生歡喜又於十方三世佛前即見即供養已諸佛坐下十句謂持經者不唯見佛供佛令佛歡喜而已即諸佛於菩薩場中所得祕要之法自己亦不久而證得以成自覺也又於諸佛所説諸法與義名字言辭歡喜樂説以成四無礙辨成覺他無窮之益如風在空中無敢障礙也於如來下十句謂持經者因得四辨如風無礙故於滅後凡佛所説諸經因緣之來端次第之章句無不隨義而説皆如實相也又如日月之光明能滅衆生長夜之暗一動一靜皆教無量菩薩究竟住於一乘為自覺覺他覺行圓滿也是故有智下總上義以勸持此完寶塔品諸偈文案妙法蓮華經囑纍品第二十二古注以言叮嚀曰囑以事付託曰纍爾時釋迦牟尼佛從法座起至則為已報諸佛之恩爾時等者上品為進五千退席及三變淨土移置之衆故坐現神力此品為囑纍其經重其授受故從法座起身出塔外而立現神力也神力云大者良以三變淨土涌出多衆佛值以一手一時不遺一人而遍摩其頂信乎佛力之為大矣喻品為我身手有力是也以上經家敘置結證法師品則為如來手摩其頭之案而作下佛語叮嚀成智力囑纍結證法師品則為如來所遣行如來事之案謂佛經劫之多修行之苦得法之難今容易而付囑汝等者直欲汝等一心廣布增其法利不使末世衆生虗過時劫於阿耨菩提大事因緣妄自作難耳故曰汝等應當一心流布等如是三摩下初令流布增益義重利他第二第三囑纍義重自利兼利他也所以下徵明謂所以佛以多劫苦修極難得之法反不惜而令汝等廣布者何也以佛有大慈悲無少慳吝亦不畏世人同己之易成佛也能與下正明佛有慈無吝不畏人同于己故能與衆生三種成佛之智慧佛之智慧者佛者覺也但覺自心是佛此自覺也空觀慧也如來智慧者如謂本覺真如也來謂從本覺真如來度生也此覺他也假觀慧也自然智慧者自謂自在然謂天然此恐衆生不知本來是佛自在天然定執必從空涉假起愛見大悲而成我等四相故空假後明佛與衆生總是一心不假修習雖涉三觀元自在天然也此覺行圓滿中道觀慧也如來是一切下結成佛有慈無吝能與三慧為九法界衆生之大施主也汝等亦應下囑諸菩薩既為佛子應學佛有慈無吝也於未來世下教學佛與衆生假觀慧也為令其人下教學佛與衆生空觀慧而自然智中觀慧在其中也已上教遇大機説一乘之法也若有衆生下教遇小機當學佛於一乘作三乘説也汝等下謂上行等菩薩但遵佛教即為報佛之恩更不必他圖也寶塔中付囑有在之案完於此時諸菩薩摩訶薩至唯然世尊願不有慮時諸下上品諸菩薩發願直欲自得真淨大法是自利之心多也故佛於此品加其神力摩其頂門然後叮嚀一心流布廣令增益是欲利他之心重也諸大士既聞自他俱利兩足尊成歡喜遍滿於身恭敬益加於心而復命孝順之辭再四出於于口矣故曰如世尊敕等此結完拒他方過八恆河沙數菩薩諸願此方持經之案爾時釋迦牟尼佛至聞佛所説皆大歡喜爾時下謂諸佛出世一大事因緣既交付已果前所集之分身佛應各還本土也多寶下謂乃舊封其塔戶也問何不亦命歸于下方答尚欲留證宿王華之請藥王本事教妙音來見文殊受觀音之分瓔珞成無盡意之福田故本分流通訖支別流通有六品首置藥王本事者藥王持此經為一切衆生所喜見不惜燒身然臂見法師品之所因及持品之發願也藥王持經於此方之行則苦矣於他方之音則未妙故受之以妙音來往品見八十萬億那由他衆周旋往返之軌範矣周旋於世界為人雖妙往返於自身為己則不自在故受之以觀音普門品見上行等六萬恆沙之衆自欲得真淨大法無非普門自在之業矣流通至普門自在則可謂總一切法持無量義故受之以陀羅尼品以陀羅尼云總持故流通至總持則上合十方諸佛本妙覺心下合六道衆生同體悲仰莊嚴妙覺王剎之行至矣盡矣而無以加矣故受之以妙莊嚴王本事品妙莊嚴王成佛之果普賢勸發成佛之因欲明此經因該果海果徹因源則無越乎內樹四德外全萬行不捨寶威德上王佛國而來遊戲于娑婆世界故受之以普賢勸發品而告終焉此支別流通六品次第密顯此經為度生出苦之藥王而申明其法師品至囑纍品無非為佛所護念之教菩薩法也然此六品於本經各為一支別明一行故名支別流通分妙法蓮華經藥王菩薩本事品第二十三藥王等者娑婆世界衆生病多且重菩薩得此經之藥王為世良醫能令寒者得火裸者得衣商人得主孩子得母渡得船暗得燈貧得寶民得王故曰藥王然要能堪忍衆生之病與同憂患而不退息為本事故曰本事準楞嚴經自陳圓通是因無始劫為世良醫乃至分別味因佛印記名為藥王準本經原名一切衆生喜見因於日月淨明德佛法中精進修習此經得普現色身三昧之藥故名藥王也又本事者謂自得三昧後燒身身生然臂臂復是其本有之事故應知楞嚴但説得救世出世間治病之藥法華所説乃世間出世間出世間上上藥中之大藥也二經各述一事爾時宿王華菩薩白佛言至歌歎於佛以為供養爾時下當機謂娑婆為五濁惡世人所畏憚而藥王菩薩於持品獨發願遊於此土者有云何本事也世尊是藥王下謂藥王今日所以能遊娑婆者必多劫能受習難行苦行故願於多分中解説其少分俾天龍等部衆聞而生喜倣風而行以持經也爾時佛告下先敘藥王本所事之佛名與十號其佛下敘大小乘法眷之多佛壽下謂佛與衆位有尊卑壽相齊也彼國下謂國土純淨莊嚴盛也一樹下謂大小乘衆坐處樹離其喜盡一箭力之遠也應知彼佛菩薩壽命既長其身亦巨此一箭之道亦不如今之百步八十步之近數也名義引嘉祥云一箭道二里或云取射垛一百五十步或百三十步百二十步等諸寶臺上等者謂臺上不但大小乘衆坐更有百億諸天作天樂歌舞為供養也爾時彼佛為一切衆生喜見至即為其父而説偈言大王今當知我今行彼處至捨所愛之身説是偈已而白父言至合十指爪以偈讚佛容顏甚奇妙光明照十方我適曾供養今復還親覲爾時一切衆生喜見菩薩至世尊猶故在世爾時日月淨明德佛至一切人天得未曾有通節敘喜見菩薩往劫得此經之藥王故有燒身身生然臂臂復之本事也事係一案不可斷截故作一節訓爾時下敘淨明佛為喜見及衆説妙法是一切下敘喜見獨如説而行習其苦行經時久而證得法身也以現一切色身三昧即法身故法身為能現一切色身是法身中影像為所現故然法身即色身色身即法身似一而多雖多而一法華定力為然故曰三昧得此下喜因得遂於果也即作下念既得果應報其恩也即時下三昧中能現一切色也以華香皆屬色法故此香下謂香少而價重也名義云千二百黍重十二銖然則六銖是六百粒黍數也從三昧下念三昧所現屬於神力凡得法身大士皆能己獨欲燒身成法供養也即服下欲化穢質成香體也旃檀謂牛頭旃檀義翻藥與薰陸乳香兜樓婆草香畢力迦丁香沉水名義云阿伽嚧此云沉水香出阿那婆達多池邊名蓮華藏然如麻子大丸普熏閻浮提界膠香即松香類又飲下謂既以香為食復以油為飲俾火易著也滿千下謂飲食香油欲經時久俾純香無穢光明得長遠也香油塗身下使通體成一蠟炬狀也以神通下謂然身供佛一是神通力一是願力故得光明大且普也其中諸佛下諸上神力供養不如以身供養之言明身供養是真精進所以名真法供養也若以下校神力供養其餘財施皆不及也善男子是名下申歎法施尊上所以勝財施也準華嚴行願品法供養有七種一如説而行二利益衆生三攝受衆生四代衆生受苦五勤修善根六十捨菩薩業七不離菩提心今喜見菩薩一舉而七行皆具矣其身火然下謂所然之身隨所服香油之力盡而盡也一切衆生下三昧中能現一切身也故命盡復生於淨德下晉譯先云忽然化生後云結跏趺坐為順化生照前彼國無有女人案即為下以偈述往事見一切衆生喜見菩薩元是王子也説是下以往者所行歸功德于佛法也晉譯偈後有父王讚善欲同詣佛之文有此義更足也得解下一切衆生謂十二類生其語言實難盡解而喜見解之然語者心之聲得十二類生之心則得其總持也復聞下謂得陀羅尼後復聞此經有如是數偈也名義云那由他云溝蓋準算經數法十等億兆京秭垓攘溝澗正載則溝為十中第七數風俗通云千生萬萬生億億生兆兆生京京生秭秭生垓垓生攘攘生溝溝生澗澗生正正生載又億有四一以十萬為億二以百萬為億三以千萬為億四以萬萬為億今於八百千萬億後復云那由他明具四等億故名義於億後注那由他為溝也甄迦羅等在俱舍論六十大數中為第十六第十八第二十數也大王我今下謂彼佛既現在彼法又多得不可不申其供養以重報其恩也白已下敘請佛之儀異乎凡常水陸跋涉也往到下敘見佛之禮讚佛之言順乎法報也容顏甚奇妙讚佛報身光明照十方讚佛法身我適曾供養言有昔因今復還親覲言當報本喜見偈讚訖問佛猶故在世者謂己則再世而慶佛常住也爾時日月下謂佛法身固常住而應緣則有盡也故命備涅槃之具以候滅度之時也又敕下總付佛法家業不出人與法也亦以下別付佛法家業不出依報國土正報伇使也所有下託後事也如是下完前滅盡時至之案此足見藥王雖於持品發願持經而佛囑纍無與者以藥王元是淨明德佛弟子曾受過彼佛之囑纍故但可證其法與神力而不得交付家業也爾時下示同世孝不能忘情故動悲感也即以下遵付囑焚身起塔廣令衆生造福也旃檀云海此岸者以此校彼價重故𧂐音自謂以旃檀置地也復自念下謂上所為不足願復欲然臂成法供養也便語下先安衆也當一心念謂多衆合為一心不可各為其念良由人心如水念如波心念合一如波澄水靜見然臂而不驚懼乃後得三昧之先基也作是語已下謂然臂時久令人得益也得益有二令無數下一令求小乘及尋常人並發大心也皆使下二令由前一其心念今皆得其三昧也爾時諸菩薩下大衆示同憂患以啓喜見之立誓也于時一切下喜見誓未已而復全其臂者謂色身不能拒法身見此經為藥王之有效也故曰令我兩臂等由斯下謂燒身身生然臂臂復皆出於志誠非弄奇好怪顯異惑衆也故感天動地雨華為瑞應也此雖敘藥王本有之事實欲佛滅後諸持經者取法之然自佛滅度後誰行此精進哉唯二祖可禪師立雪斷臂堪倣佛也佛告宿王華菩薩至乃至一四句偈其福最多佛告下會昔通今俾見喜見藥王前後異名元是一人也其所捨身下以已説者例未説者尚多也宿王華若有下謂佛滅後若有人發心求阿耨菩提廣大法身雖不如喜見燒全身捨兩臂但能於色身中然手足一指之少分供養佛塔而此人即勝過捨國城等外財之福也以其為未見之法身而捨現前難捨之色身故若復有人下謂設另有人元不求阿耨菩提但求人天福報復不能燒身然臂及手足指但以寶滿大千供養四聖所得福德又不如但受持此經一四句偈者為多也何則以經詮法身能持者則聞佛知見彼求人天福報然身損財乃以苦欲捨苦於法身色身皆無益不得與藥王菩薩同日而語妄自損傷父母之遺體誠可愍也宿王華譬如一切川流江河至所得功德亦復無量通節申明上節往劫喜見今所以名藥王者以得此藥王之經也故前以十喻喻此經之為王後以十二喻喻此經之為藥宿王華譬如下承上文言謂所以燒身臂指寶滿大千供養四聖皆不如授持經之一四句偈得福為多者以此經在諸佛所説諸深大經中校量諸經譬如川流江河之深大此經則譬如其海為第一之最深大也良由諸經所説有聲聞乘有辟支佛乘有菩薩乘三乘中聲聞辟支佛乘為淺小菩薩乘為深大是對待之深大此經為第一之最深大者此經以不説有三唯説一乘之為深大也不説有三者不是削去其三乘也以三乘無是一乘所分出也唯説有一乘者非三乘外另有一乘也乃即會前所説三乘成今之一乘也如川流江河無是海之所分及至終竟還歸於海是以喻此經在諸深大經中為最第一之深大也又諸經深大者諸經豈不云一切衆生本來成佛乎豈不云一切衆生皆有佛性乎雖如是説然二乘人實不知本來成佛成何等之佛皆有佛性佛性在於何處今經授身子等萬二千人成佛之顯記則佛有其名居有劫國莊嚴法眷壽命及正像法住世久近而轉記何人如是則諸經向所説一切衆生本來成佛義至此經始親知親見而寶授矣豈不如川流江河之歸于海乎延至談法師功德品皆曰父母所生常眼耳等但持此經則皆清淨又知諸經向所説一切衆生皆有佛性不在別處直在吾人父母所生尋常眼耳等之六根中也如是六根涌寶塔變淨土集分身出沙衆接衆處空多劫半日又親知親見而必真矣豈不川流江河之深大一到海則為第一之最深大乎此授持一四句偈者雖曰少分如飲大海中一勺水之多而四天下川流江河之味全飲盡而無餘渧矣故以海之第一深大而王百川喻此經之第一深大而王於諸經也以上初以深大喻又如土山下第二以高上喻土山即尋常土石諸山黑山俱舍論謂有三重黑山繞四部洲小鐵圍山繞小千世界大鐵圍山繞中千大千世界十寶山華嚴經云一雪山二香山三柯利羅山四仙聖山五由乾他山此云雙持六馬耳山梵語溫縛拏山七尼民他山此云持邊護持七金山邊八斫迦羅山應法師云輪圍山也九宿慧山十須彌山衆山各有高上須彌為第一之高喻諸經此經高上可知以上用海之與山在地成形者為喻也又如衆星下第三第四用在天成象者為喻喻光明各有第一也以月能照夜明踰衆星此經照無明長夜踰於衆經日能照晝明破諸暗此經破一切不善之暗比衆經不同以衆經破暗乃費修證此經不持修證但知舉手低頭皆已成佛則一切惡業黑暗舉著皆化成佛知見矣又如小王下第五第六第七用天地人三才中最尊者為喻喻此經其尊其王其父皆第一也以上七種以世間六凡為喻喻此經無上義以諸喻各重在無上義故又如一切凡夫下第八第九第十用出世間四聖喻喻此經正等義以諸喻各重在正等義故然第八喻不唯喻經兼喻持經者亦為第一也宿王華此經下十二喻喻此經正覺義以諸喻各重在正覺義故能救等者謂經具大悲義故能救人令拔其苦惱佛知見一開雖有五逆三途之苦惱皆消滅故能大饒益等者謂經具大慈義以充滿其願是與樂義佛知見一開隨居何類作何行業皆有其本領得如願故以上是法如清涼下十二句用喻發揮充滿其願具能救人離苦惱義如渴寒裸商人子渡病暗貧民賈容等通明病義苦惱義皆有願欲義如池火衣商主母船醫燈寶王海炬通明藥義具能救義皆須充滿也此法華經亦復下是以法合喻之辭若人得聞下照六種法師十種供養以勸修行也多以燈言者破無明黑暗之對症藥故薝蔔云金色華又云黃華須曼云善攝意華波羅羅云重生華婆利師迦云雨華雨時生故又云夏生華夏時多雨故那婆云雜華摩利云奈華又云鬘其華可作鬘故以華薰麻取油點燈非徒能明亦多香氣也宿王華若有人聞至智慧禪定無有與汝等者上節明一部經之為藥王校受持者之功德無量此節明但持藥王一品者與受持一部者之功德無異宿王華下一品也若男若女以佛現在而言也若有女人下男子但聞即得功德女人須受持始得後世不受女身可見男身貴於女也若如來滅後下但以佛滅後之女人如説而行全部者言也所以然者除三惡道則女人為最苦故益顯非女人者功德尤盛也以生淨土校者此經是生淨土之因也梵語阿彌陀此云無量壽是得此經之果土也不復下無三毒大小隨眠之穢也得菩薩下有六根之淨也必以七百萬等明所見之佛數者佛知見不限乎六根六塵之量也是時諸佛下讚因行汝今已能下讚果覺因果皆大故為多佛神力守護而一切三乘人定慧不如也宿王華此菩薩成就如是至利益無量一切衆生宿王華下謂上節以持一品者與持一部者相校其功德者以此藥王菩薩功德智慧之力大也故人但聞藥王本事品稱讚一言之善者其人現世身口皆出香得功德又與持一品者相等也是故宿王華下前以十九品囑纍舊住娑婆世界上行等菩薩故以此一品囑纍當機也惡魔上還該置無令二字始順不然應削去斷絶二字亦順所以下徵明此經之為法藥之有效也知音訓此經為藥王準此宿王華汝若下結明受持者得法藥即為法王之不遠也故勉求佛道者應恭敬其持經之人則可得其法藥也説是下結證現前聞一説品者即得法藥其藥名解一切衆生語言之總持也多寶如來下結讚當機者以得其請知佛不以此經付囑藥王等之義其功德大也
