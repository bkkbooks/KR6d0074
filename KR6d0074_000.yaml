front:
  text: 妙法蓮華經知音序金陵石頭菴學無學僧江夏如愚撰諸佛說法如慈父之教愛子略無毫忽隱慝知無不言言無不盡亦如明師之訓蒙徒此不喻又取諸彼務得為子弟者解所以教訓而後止如是則何用其屋中架屋鉢上安柄更注疏講說者哉蓋佛法來自西域其言有不免華梵兼用其義有不免即世出世之差別是以諸大菩薩乘悲願力來生此土或示身為國王大臣或示身為長者居士或示身為沙門釋子留神內典若譯文者若注疏者若興供養者若顓講說者無非受佛付囑之人也又豈有彼此是非之優劣哉第受佛付囑時比當有情願不情願者之不同致雖來生此土其護持流通固有其淺深深者如子幹父事知父之家業為己有雖吃苦不懈也淺者如俠人作事不過完其當時受佛付囑一時之人情耳以故注疏者揭日月而行而覽之者轉播糠而昧目矣講說者擊鼓而求亡子而聽之者且呼鼠而為璞矣是經本明而注者晦之人本知而說者愚之求其為愛子而不為蒙徒不可得矣余見妙法蓮華一經文雖平易義實奇絶事雖明直理誠玄奧雖曰匪雕匪飾而一大時教極雕飾之玄文無以踰一大時教辟夫三場舉子角試之文無不盡其心力衒其抱負顏其藻麗極其致趣而奇中求奇明中索明惟恐主試者之不知其妙且中矣唯此妙蓮華王則如出榜唱名之文不假藻繪雕飾但曰第一名某人第二名某人而已又一大時教如做官者考續之賢否或薦或黜必用品藻修飾唯此金剛王寶覺則如奉聖旨之文不藉委曲都俞但曰是或曰有點者用而已然而得一是與一唱名者其先之文藻始有甲乙超擢否則向之工於艷麗令盡歸之空華泡影奚用哉是以此經獨以授記諸聲聞名某某之佛者為諸佛出世之一大事因緣也俾衆生開示悟入佛之知見為最後之極談者也夫一大時教不曰一切衆生皆有佛性乎不曰始知衆生本來成佛乎然未實知所成何佛佛為何人出何時劫據何國土有何眷屬說何佛法復轉記何人此泛言讀書者皆可登第做官之謂也寧如此經實授舍利弗等萬二千聲聞成佛十號劫國莊嚴之顯記歟彌勒雖嘗記於阿含彌勒乃菩薩非此經之記諸聲聞也此誠佛法中奉聖旨出榜唱名之經一大時教奚可類焉一大時教誠開華也若此經者則結果矣由諸聲聞初不信自心作佛致佛有四十年之含忍由將有作佛之機動故含忍不住直得放光動地三周九喻而說焉由說之中以平易而彰奇絶幽玄故俾人視之似淡而實深有味乎其旨也天台豈不玄乎未識玄於此溫陵豈不要乎未知要於是諸方講白文者豈不曰講經之大義乎而未達夫大義在授記吾人當來成佛劫國莊嚴之佛知見耳佛知見者何吾心本有之實相也吾心本有之實相者何經中或名眉間白毫光或名不時出之優鉢羅或名火宅門外白牛車或名長者室中大寶藏或名普雨三草二木之甘露或名權變過現未來之化城或名繫衣裡之明珠或名見泥邊之近水或名多寶塔或名三淨土或名阿私陀之仙人或名娑伽羅之龍女或名四行之安樂值大功者賞髻珠或名恆沙之弟子遇父歸者增壽命或名分別德或名常不輕或名如來現神力或名囑纍與菩薩或名肯服藥一切衆生皆喜見或名善行醫普門自在推觀音或名妙音陀羅或名莊嚴普賢行總之三藏十二部一切修多羅不出此經之𡀢矢也如愚生逢末劫膚受無聞鄰樹索環固多宿習深願乃甘自發作事不假人俠唯性慚愛子質秉童蒙不揆才難賤而自用然知佛誠慈父心如直弦直以佛心求佛言經外不另立其科恐坐截鶴續鳧之愆也又知佛實明師言如至寶直以佛言求佛心言雖重而意必有在故值一切繁文贅語必務究其源本雖不外立其科亦章句而節目之見經井井固自有程法非浪施也然後依乎牛之天理而遊刃於技經肯綮之未嘗若其經之來歷自有宣師之序在若其文之起伏義之淺深次第具載二十八品之注中日就月將從容卒業衆請災木以廣流通經云一切聲聞辟支佛所不能知唯佛與佛乃能知之是以命題曰知音者也諸方有目有趾者願必待是而成功幸無以耳當眼擇其善者而從之則不負昔日靈山對佛之發願而今日此經此注是為諸方再奉吾佛聖旨重揭成佛唱名之榜矣若其佛祖有所不為文字有所不立果是其人何嫌躐等計注成歷地凡三郡一邑始於南京應天府碧峰寺之石頭菴注兩品次於鎮江府之焦山寺注一品次於徽州府之松蘿菴注四品次於高淳縣之淳西菴及韓鄉官止菴精舍注十五品末復於石頭菴注六品也歷年凡三載有奇始於萬曆三十年壬寅夏六月十五日訖於三十三年乙巳秋七月十五日也妙法蓮華經弘傳序知音唐終南山沙門道宣述明護國金剛寺住持如愚著妙等五字經題也弘等三字據經題立序題也今先解經題後解序題先者諸經命題須當機請而佛說之唯此經題目自過去日月燈大通智威音王等諸佛法中已是此名且佛在定中文殊答彌勒業已先言之及佛出定許說亦莫過拈過去諸佛之舊題云如是妙法諸佛如來時乃說之此妙法二字可見是親佛說者又云如優曇鉢華時一現耳梵語優曇鉢羅准衆經論詩編當是靈瑞大寶青蓮華則蓮華二字亦是佛自喻妙法者此法喻所以名題也是知題標蓮華二字非目世間尋常所有紅白蓮華乃經中所云優曇鉢靈瑞大寶青蓮華也以大寶青蓮華世間希有故經云譬如優曇華世間所希有若紅白蓮華世豈希有哉有則為金輪聖王出世之靈瑞也佛以此華喻妙法者准經文全重一時字以諸佛出世凡說小大三乘之法順衆生機宜隨宜便說不拘其時唯此經暢佛本懷須時至而說何則以此經不說三乘唯說一乘然一乘即前三乘三乘元為今之一乘最難信難解故也不說則已說則一切聲聞辟支佛往日未許成佛者今皆得受記作佛即如優曇鉢靈瑞大寶青蓮華不出則已出則定有金輪聖王應世人民壽命國土莊嚴皆得增長故經云舍利弗當知諸佛所得法無量方便力而為衆生說或說修多羅伽陀及本事乃至未曾說汝等當得成佛道所以未曾說說時未至故今正是其時決定說大乘我此九部法入大乘為本以此而知經中法喻訓題全重一時字也題准經名經是佛語不可違佛自撰以方華即果處染常淨蓮有六義妙有十妙而強解也以染淨因果常即之言皆四十年前方等教中之義非此經最後極談不問染淨等賜白牛不拘久近皆付家業中可擬議也經云是大長者財富無量今此幼童皆是吾子愛無偏黨我有如是七寶大車其數無量應當等心各各與之不宜差別等此不拘久近皆授記成佛之家業證據此方出其經題之來源若欲訓其義理亦依經自釋為愈經云諸佛隨宜說法此訓題中法字四十年前小大三乘九部之經便機而談故曰隨宜意趣難解此訓題中妙字正法華經云爾等當信如來誠諦所說深經義甚微妙是也經中訓已又徵而釋之云所以者何隨宜所說之法意趣難解為妙我以無數方便種種因緣譬喻言辭演說諸法是法非二乘人等思量分別之所能解唯有諸佛乃能知之所以然者以諸佛所出之世界雖不同而為一大事因緣開示悟入佛之知見則同乃至云但以一佛乘故為衆生說法無有餘乘若二若三故云妙也此經中自標自徵自釋法之為法妙之為妙顯然無疑之明文也若准起信論直捷明法與妙者論云所言法者謂衆生心是心真如相即示摩訶衍體故是心生滅因緣相能示摩訶衍自體相用故此心既攝世間出世間之法故謂之法具體相用三大為諸佛本所乘一切菩薩當所乘覺與不覺之妙用故謂之妙法衆生一明此心法之妙即父母所生眼等六根當下便是諸佛之知見矣由衆生不敢承當經云窮子見父有大勢力即懷恐怖悔來至此乃至云作是念已疾走而去此不敢承當及不肯承當經云即時長者更與作字名之為兒爾時窮子雖欣此遇猶故自謂客作賤人乃至云下劣之心亦未能捨此不肯承當故佛於四十年前隨衆生所宜於阿含教或說此心法為有計十二年衆生聞法證得二乘小果之涅槃於般若教或說此心法為空計二十二年衆生聞法成就大乘之菩薩於方等教或說此心法非空非有即有即空計八年菩薩聞法究竟一乘阿耨之菩提如此小大三乘分別豈佛與諸佛出現于世之心乎佛與諸佛出世原只要衆生直下承當自見此心是佛則一件極大的事有因有緣皆畢矣經云舍利弗當知我本有誓願欲令一切衆如我等無異如我昔所願今者已滿足化一切衆生皆令入佛道是也由衆生難信難解致佛無漏無為諸法之王為其下劣忍於四十餘年與取相凡夫隨宜而說騃到四十年後佛涅槃時至忍駿不禁直得滿槃托出徹底為人故有此放光現瑞出定揚德二十八品之文以明佛與諸佛出世唯為衆生開示悟入本具佛之知見名一大事因緣者無非欲令小大三乘之人總得一乘劫國莊嚴成佛十號之顯記也故會前四十餘年隨宜所說之法都成一乘佛知見之妙法也故題云妙法者此也然須聲聞辟支佛及佛見前滅後聞一偈一句一念隨喜者受記時到與佛涅槃時至始能說之如優曇鉢靈瑞大寶青蓮華尋常不現須金輪聖王出世時到時一現耳故題喻蓮華者此也若經卷第一之訓仍諸舊疏可也優曇鉢舊翻瑞應知音訓為靈瑞大寶青蓮華考證附正法華經云如來云何說此法乎譬靈瑞華時時可見佛所歎法久久希有大方等陀羅尼經云爾時祇陀林中有寶蓮華從地涌出高七多羅樹其華有八十萬恆河沙重一一重中各有一佛與無量大衆前後圍繞說妙法藏舍利弗念欲供養是諸佛故以神通力繞此華王經八十七日百千萬分不周其一此知音所以訓大訓寶也文殊師利問佛此華是何名字諸佛中與無量大衆說妙法藏佛告文殊善男子此華名優曇鉢羅其中諸佛皆名釋迦牟尼汝等應當供養前標云寶蓮華后釋云優曇鉢羅即如此經題標蓮華經中以優曇鉢華為訓同也此知音所以唯佛訓優曇鉢為大寶青蓮華也問曰經文彼此一字增損不同切恐此經但云優曇鉢未嘗有羅字法護所以翻為靈瑞名義集所以翻為瑞應方等陀羅尼經既多一羅字佛所以用訓寶蓮華也答曰不然名義集標文亦直是優曇鉢訓文特增一羅字釋為瑞應也是知優曇鉢即優曇鉢羅瑞應即大寶青蓮華無疑矣本經妙音菩薩將來此土先現八萬四千寶蓮華文殊問佛是何因緣先現此瑞是亦以見寶蓮華為瑞應也問曰寶蓮華為瑞應則是矣而曰青蓮華豈不與瑞應有抵牾乎以名義集翻優曇鉢為瑞應翻優鉢羅為青蓮故二華各自一名一色故不可以瑞應為青蓮也答曰准方等泥洹經二華元是一華優曇鉢即是優鉢羅以彼經三度喻佛難值文異義一故初須跋求見佛云佛難遭值如漚曇華時時一有初無鉢字次佛教諸比丘覩佛儀容云却後一億四千餘歲乃當復有彌勒佛耳天下乃有漚曇鉢不華而實若其生華則世界有佛末訓阿難佛恩廣大無不成濟然而難值如漚波羅華時時有耳又無曇字有羅字一經一時三度之文或云漚曇漚曇鉢云瑞應者或云漚波羅云青蓮者皆喻佛難值是知瑞應即為青蓮華也問曰佛說方等泥洹經在北藏駒字函止得上下二卷由失譯人名附東晉録故致損益錯訛似不可准況名義集弘般泥洹經云閻浮提內有尊樹王名優曇鉢有實無華優曇鉢樹有金華者世乃有佛如是則優曇鉢是金華非青蓮華也豈可以失譯人之經為憑准耶答曰方等泥洹經失譯人名固不可信若鳩摩羅什者古稱為七佛譯經之師彼譯金華為青蓮亦不可信即吳支謙譯維摩經云清淨金華眼明好羅什譯云目淨修廣如青蓮是翻金華為青蓮華亦可信矣見寶塔品一品藏中別名云薩曇分陀利經今為開合華梵俾見經題蓮華是用經文優曇鉢華為義薩謂妙法祥邁師云梵語薩達摩此云妙法亦云正法蓋薩字中含攝二義故晉譯正法秦譯妙法曇即優曇瑞應義特省其文耳分陀利云白蓮華此開釋也合釋應云妙法瑞應蓮華經以彼薩曇分陀利證此妙法蓮華開合相符妙得佛心可為古今定衡矣問曰彼既云分陀利是白蓮華知音云非世間常所見紅白蓮華乃優曇鉢靈瑞大寶青蓮華豈不前後自相矛盾乎答曰青白蓮華凡生水中不足為瑞一生樹上皆可為瑞應而知音顓以青蓮華訓者以經論詩編往往皆以青蓮華言曾不十分以白蓮華言故從多多為善也玄義云蓮華是通稱分陀利是別稱道朗云或翻赤色或翻最香准此則分陀利亦不必定是白色也普曜經瑞應品云菩薩臨産之時先現瑞應三十有二其第四瑞應云陸地生青蓮華大如車輪又云於是王宮先現八瑞其第四瑞云諸觀屋宅悉自然生青蓮華大如車輪此證青蓮華嘗生樹上也宋丞相張無盡法華論云妙法蓮華經所謂蓮華非如他經所譬蓮華或取開敷出水因果同時乃取瑞蓮華也瑞蓮華即所謂優曇鉢華也宋洪覺範禪師法華論云優曇鉢三千歲始華華必金輪王應世佛以況第一希有之法生可見以經中優曇鉢喻題中之妙法也本經藥王菩薩本事品云是人現世口中常出青蓮華香論云晉建興二年長沙縣西自千葉青蓮華兩本生於陸地官吏掘之丈許根莖出於瓦棺發棺有白骨一聚青蓮根蒂出髑髏齒骨間有銘記棺上曰有僧誦法華經萬部臨終遺命以紙為衣以瓦為棺葬之事聞朝廷詔建寺其處名蓮華寺今驛亭其基經如此言論如此證誦經者生死皆以青蓮華言可見妙法是以青蓮為喻矣隋天台顗禪師法華玄義釋題有云經文兩處說優曇鉢華時一現耳此靈瑞華似蓮華故以喻妙法玄義又設問云經題蓮華定是法華三昧之蓮華定是華草之蓮華答云定是法蓮華指優曇鉢華也法蓮華難解故以草華為喻為中下難悟使易知也准此則天台亦知優曇鉢是訓題中之蓮華者但未的知為大寶青蓮華故以似蓮華之置之反以華草中蓮華訓題誤至今也宋雷菴受師楞伽經注云優曇鉢又云烏曇鉢羅此云瑞應象教皮編云漚波羅一云烏曇鉢羅青蓮華也雷菴一名烏曇翻瑞應皮編一名烏曇翻青蓮華則知瑞應即青蓮華也唐岑嘉州云參嘗讀佛經聞有優鉢羅華目所未見又唐詩云青蓮渝法微微即妙義既云目所未見可見非紅白蓮華也釋證經題竟釋序題者准本序讚揚無盡曰弘永貽來哲曰傳以序弘讚莫窮承貽諸後云序次序也又頭緒也序如墻觀東西墻知堂室之淺深緒如絲絲得頭緒而不紊經有序知文理之低昂及有緒而不亂也此一篇序章法應分四節妙法下標序一章之大旨蘊結下承序一經之出處夫以下釋成標青抑揚一大時教以四十九年為一時故云一大時也獨尊本經以表弘傳之義弘贊下結成序題妙法蓮華經者統諸佛降靈之本致也妙法為法蓮華為喻屬所詮經為能詮者之一字牒定經題指七卷文言統總攝義諸佛即經序品光中所現方便品中所談寶塔品中所會集降謂隱勝現劣如升降之降靈迹也致意願也謂經雖七卷文似不多其三世十方一切諸佛降靈迹之本意本願總統而攝盡無餘也既稱為佛何有升降蓋以諸佛清淨法身無有彼此色相可見方為正位一涉報化之形便屬偏位今光中所現方便所談寶塔所會無非報化身偏位之佛隱清淨法身之妙勝降現千丈丈六報化之劣迹比之法界衆生則靈較毗盧遮那妙體則迹為降也如此捨己從人無非曲成萬物要一切衆生知有白家已成了佛之法性耳經云諸佛出世無非為一大事因緣欲令衆生開示悟入佛之知見乃至一切衆生從諸佛聞法究竟皆得一切種智此諸佛之本意也偈云我本立誓願欲令一切衆如我等無異如我昔所願此諸佛之本願也蘊結大夏出彼千齡東傳震旦三百餘載西晉惠帝永康年中長安青門憞音屯煌菩薩笠法護者初翻此經名正法華東晉安帝隆安年中後秦弘始龜音丘茲音慈沙門鳩摩羅什次翻此經名妙法蓮華隋氏仁壽大興善寺北天竺沙門闍那笈多後所翻者同名妙法三經重沓文旨互陳時所宗尚皆弘秦本自餘支品別偈不無其流具如序曆故所非述此承序一經兩土之出處蘊蓋藏義結謂結集大夏西域之美稱出彼千齡等者謂經自佛滅結集以來蓋藏而未知所謂處也彼出彼西域千年始東傳此土所謂出也震旦亦名真丹西域謂中國之名蓋中國在天竺之東琳法師云東方屬震日始出曰旦易注一陽始生二陰之下震而動也詩云旭日始旦樓炭經云葱河以東名震旦三百餘載當作二百餘載於文始順於數始合佛法自漢明帝永平七年始入中國至獻帝終共一百五十五年歸魏魏五主共四十四年歸西晉西晉四主合五十二年至惠帝永康年中僅得二百餘載東晉元帝至安帝義熙羅什譯經之年始足三百四十一年也今先明漢帝本始佛法來源後詳其年載庶見為傳刻者所誤先明漢帝本始佛法來源者史記漢顯宗孝明皇帝諱莊光武太子陰后所生在位一十八年壽四十八歲諡法照臨四方曰明佛祖通載云帝夢金人身長丈六項佩日輪飛至殿庭旦令羣臣占之通人傅毅奏曰臣按周書異記昭王二十四年甲寅四月八日有五色光貫入大微王問大史蘇由曰是何祥瑞對曰西方有大聖人生也王曰於天下何如對曰此時無他後一千餘年聲教被於此土王命鐫石記之埋於南郊天祠中以年考之至今辛酉正合其數陛下所夢將無是乎帝即遣中郎將蔡愔博士王遵秦憬等十有八人西訪其道至大月是國遇摩騰竺法蘭持優闐王所造白氎畫像并四十二章經同愔等來至洛陽帝迎供蘭臺石室造白馬寺勑騰蘭等居之此帝之本始及佛法之來源也後詳其年載者漢明帝在位一十八年除佛法未至前七年甫得一十一年章帝烜十三年和帝肇十七年殤帝隆一年安帝祐十九年順帝保十九年冲帝炳一年質帝纘一年桓帝志二十一年靈帝宏二十二年獻帝協三十年右漢十一帝合一百五十五年魏五主共四十四年者文帝丕治七年明帝睿治十三年齊王芳十三年高貴卿公髦六年常道謝公奐五年西晉四主合五十二年者武帝炎二十五年惠帝衷十七年懷帝熾六年愍帝鄴四年除懷愍十年加漢魏通計二百四十一年故二百餘載文順數合東晉元帝至安帝義熙始足三百餘載者元帝睿六年明帝紹三年成帝衍十七年康帝嶽二年穆帝聃十七年哀帝丕四年廢帝奕五年簡文帝昱二年孝武帝曜二十四年安帝德宗二十二年恭帝二年右十一主共治一百四年除安愍𠮳一十五年通得八十九年合前西晉魏漢始足三百四十一年也若曰三百餘載為秦本言則應序於隆安年中西晉者司馬氏建都洛陽對東晉為言惠帝字正度武帝次子永康惠帝年號惠帝以庚戌即位改元永凞辛亥改元康甲寅改永平庚申改永康長安古稱咸陽漢高祖建都改為長安以山河百二子孫可長安也史記秦孝公十二年作為咸陽正義曰括地志咸陽故城在雍州咸陽縣即秦孝公徙都者漢元年十月沛公兵先諸侯至壩上乃以秦王屬吏遂西入咸陽文選云漢之西都在於雍州實曰長安注云漢書秦地於禹貢時跨雍梁二州漢興立都長安山河百二者史記秦形勝之國帶山河之險樂縣千里持戟百萬秦得百二焉虞喜注云二倍也秦地險固百倍於天下故云百二蓋言秦兵百萬當諸侯兵二百萬也文選呂延濟曰漢稱長安言可長安子孫青門俗呼乃長安東壩城門邵平種瓜處子美詩云文人才力猶強健奠傍青門學種瓜燉煌禹貢雍州之域禹貢書經篇名書黑水西河惟雍州漢為燉煌郡竺法護者梵語竺曇摩羅剎此云法護月氏國人究三十六國道術泰始二年丙戌自天竺達玉門徙居燉煌人尊其德諱其名稱其地曰菩薩後入長安居青門永康七年初譯出此經為十卷名正法華祥邁云梵語薩達摩此云妙法或云正法蓋薩字中含攝二義故經云演說正法初中後善法護准此又云其義深遠其語巧妙羅什准此雖傳震旦過二百餘載始成翻譯又此經來東土之出處也東晉者五胡亂華元帝渡江建都江東之建康望洛陽曰東鑑歷年圖云胡羯氐羌鮮卑是謂五胡注胡謂劉淵羯謂石勒氐謂苻堅羌謂姚萇鮮𢍉謂慕容廆佛祖通載云前趙劉淵字元海新興胸奴冒頓之後初漢主以宗女為公主妻冒頓約為兄弟故子孫冒姓劉氏都平陽六年改光熙後趙石勒字世龍上黨武鄉人其先胸奴別部年十四至洛陽上都門大笑王衍異之曰胡雛聲勢有奇志將為天下患遣人收之會勒已去後起兵據襄國一十五年勒初暴政及見圖澄鉢長青蓮回心納諫延及子虎慕德推賢前燕俊姓慕容字子英祖名廆字奕昌黎棘鮮𢍉人其先有熊氏之裔世居北夷紫囊之野晉封燕子遷都龍城生子皓俊皓之次子居鄴十一年前秦符健字建業湛第三子啓陽臨渭氐人其先有扈氏之裔西戎酋長洪有師十萬自稱秦王生健背有草付字改姓苻氏僭位四年都長安堅字永固亦洪之子雄武智略盡有中原立二十七年率兵百萬伐晉為謝石謝玄等所敗後秦姚萇字景茂赤亭羌人其先有虞氏之裔父弋仲有二十四子萇幼子也初仕苻堅南伐敗績縊殺堅有直僭位八年子興字子略立二十二年此五胡亂華之大槩也元帝渡江者准鑑晉愍帝癸酉建興元年漢主劉聰宴羣臣于光極殿使懷帝青衣行酒庾珉王雋等不勝怒憤號泣聰惡之殺晉臣十餘人帝亦遇害凶問至大臣立吳王晏之子鄴即位是為愍帝時長安城中不滿百戶蒿棘成林官無章服印綬唯以桑服署號後亦被劉聰虜之使行酒滌爵已而更使帝戎服執蓋尚書郎辛賓抱帝大哭聰引出斬之由是元帝渡江之江東也佛祖通載云東晉元帝者宣帝曾孫恭王覲之子也諱睿字景文初生之辰內有神光一室盡明白毫生於日角之左纍官都督揚州諸軍事左丞相懷愍敗後百官分離或走江南或為俘戮長安失據帝幽於江都之平陽于時忽有五日并出羣臣勸睿宜稱晉王統攝萬機以臨億兆及愍帝遇害遂即尊位改元建武因都建鄴避愍帝諱改名建康先時童謠五馬浮渡江一馬化為龍永嘉之亂宗室中唯琅琊西陽汝南南頓彭城五王獲濟而睿首基為天子安帝諱德宗孝武太子丙申繼孝武即位次年丁酉改元隆安凡五年又改元興凡三年又改義熙凡十四年後秦姓姚事見前注弘始姚興年號龜茲國名在焉耆西南沙門云勤習鳩摩羅什云童壽前秦王苻堅聞師名遣驍騎將軍呂光率兵七萬伐龜茲取什當晉太元七年壬午歲也得什俱還至涼州聞堅已歿光遂據涼州即三河王位國號太涼改元大安當晉太元十一年也光卒子紹立為太原公呂纂所害纂立又為呂超所廢立呂隆姚興弘始三年遣師伐隆隆降遂奉什至長安秦王師禮之當晉隆安五年辛丑歲也弘始八年什始于草堂寺譯出此經為七卷即今名也當晉義熙丙午年而序曰隆安以什入長安時言耳隋氏仁壽者隋高祖文皇帝姓揚名堅弘隆華陰人漢太尉震第十四代孫初宇文泰仕魏封周公至子覺受魏禪國號周堅父忠仕周有功官至太傅隋國公忠卒堅襲爵陳大建十三年辛丑堅受周禪都長安國號大隋自文帝至恭帝通三主合三十七年以國號為姓故曰隋氏仁壽文帝年號北天竺者天竺有五總名印度此云月簡非其四故曰北西域記云天竺之稱異計紏紛舊云身篤或曰賢豆今從正音宜云印度印度者唐言月月有多名斯其一稱闍那笈多准添品法華經序當是二人然彼經序無闍那有崛多翻譯集笈多上有達摩二字序云大隋仁壽元年辛酉普曜寺沙門上行請崛多此云德志笈多此云法密二法師于大興善寺重譯此經為八卷名添品妙法今序兩取半名合成一句曰闍那笈多也三經重沓等者繳前起後之辭謂經雖統諸佛降靈本致自西之東出處有時凡歷三譯不勝重沓再譯曰重三譯曰沓十卷八卷七卷而重重沓沓也文言旨義彼此互相陳列似無優劣第時人所宗仰而好尚者唯秦本弘傳為多此序王所以獨序秦譯不序晉隨譯者在順乎時也文旨互陳者如唯佛與佛乃能究盡諸法實相所謂諸法如是相等句法護譯云如來皆了諸法所由從何所來諸法自然分別法貌衆相根本知法自然校什譯則文不逮而旨實陳也何則以諸法即根塵界等世間出世間之諸法亦佛與諸佛四十年中說成三乘九部相性本末究竟等之諸法所由即一乘無漏實相之心性為所由也從何所來佛與者佛知從實相所來也諸法自然者謂既從實相所來則自然而然不因修而得不修而不得也分別法貌者謂諸法雖同一實相然而相性體力作因緣果報本末各有其法與像貌之分別也衆相根本知法自然者謂相性體力等法貌像雖多且廣同以一乘無漏實相心性為根本此佛與諸佛所以知其自然而然究竟等也如藥草喻兩譯尚多半品之文什譯則無兩譯藥草喻後多譬如日月譬如陶家作器譬如生盲值良醫得雪山藥王法喻等文又法護譯本五百弟子受記品當那受記前多導師入海採寶等文法師品前多藥王如來品以三譯並核似依晉本有藥王如來事而接因藥王告八萬大士始有由緒不如秦本胡為而闕之及閲添品法華經序始知皆由譯師出于各國帶來梵文有異故致彼此有無不一序云護是多羅之葉什是龜茲之文凡此皆文旨之互陳也如囑纍品什譯次在二十二法護譯次在卷末什以一十九品為正宗如來神力以下八品為流通護以神力等品皆為正宗獨屬纍品為流通皆可也自餘支品等者謂秦本既為時所宗尚則文旨皆善奚序於二十八品有述及述不及者以述不及者皆支品別偈也如見寶塔品在藏經中別是一支名薩曇分陀利經普門品別名普門經故序主於三周法中唯述序品方便火宅化城五百弟子受記及繫珠鑿井數品餘皆判入支別也不無其流具如序曆等者謂既是支別奚用列入正經以各有其流類也既有其流類當循流得源俱依品目次序而辭理曆明易知故序於鑿井顯示悟後有所不述唯述諸佛降靈之本致如下節所云云也不無其流者如提婆品是應法師品教菩薩法佛以國王為弟子求法不辭辛勤之流常不輕品是應法師品教菩薩法佛以比丘為師保持經能受忍辱之流見寶塔品是明佛所護念有報化身之流壽量品是明佛所護念有法性身之流藥王本事品以苦行持經為流觀音以普門自在為流等夫以靈嶽降靈非大聖無由開化適化所及非昔緣無以導心所以仙苑告成機分小大之別金河顧命道殊半滿之科豈非教被乘時無是核其高會是知五千退席為進增慢之儔五百受記俱崇密化之迹所以放光現瑞開發請之教源出定揚德暢佛慧之弘略朽宅通入大之文軌化城引昔緣之不墜繫珠明理性之常在鑿井顯示悟之多方詞義宛然喻陳惟遠自非大哀曠濟拔滯溺之沉流一極悲心拯昏迷之失性自漢至唐六百餘載總歷羣籍四千餘軸受持盛者無出此經將非機教相扣並智勝之遺塵聞而深敬俱威王之餘績輒於經首序而綜之庶得早淨六根仰慈尊之嘉會速成四德趣樂土之玄猷此釋成諸佛降靈本致以明弘贊也夫以者發語辭前云諸佛降靈此云靈嶽前通述十方三世此單述釋迦一佛故以靈嶽別之所以然者以釋迦為本經之教主諸佛本致出釋迦而唱顯釋迦本致暢則千百億無量無邊之化佛本致皆暢矣靈嶽即經耆闍崛山梵語耆闍崛此云靈鷲嶽者尊稱之降靈用詩惟嶽降神潤色詩大雅嵩高八章章八句首章云嵩高惟嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于番四方于宣非大聖無由開化者謂諸佛法身遍滿三千以釋迦之大聖獨降迹于靈鷲者非無其因由來此開權而化實也適化所及等者正顯其有由適當及到謂有何因由乃千二百阿羅漢適當於此山蒙佛開化得受記成佛時到以為由也既阿羅漢得記時到為佛降靈之由何故經中有化及化不及者化及者昔有大乘緣如千二百阿羅漢及二千學無學衆得記者是也化不及者昔無大乘緣如五千退席者佛雖有由平等能化則亦無以開導其心矣故曰非昔緣無以導心非大聖無由開化重能被之教化非昔緣無以導心重所被之機說為後機教相扣伏案所以仙苑告成等者申明大聖始終有由開化之地謂佛始有出於仙苑所以于仙苑而告成機亦分別其大小終有由於金河所以于金河而顧命道猶科殊其半滿豈非下是結證語謂如彼經所詮小大半滿之地豈非是佛教被乘時始終之有由哉第無足與靈嶽降靈之地相考核其高會說此授記二乘人成佛之妙法也仙苑即鹿野園往古仙人多于此得道故稱仙苑又為輸伽王養鹿之園復名鹿園屬波羅奈國成佛初成正覺三七思惟知衆生不堪大乘遂詣鹿苑告阿若憍陳如等五人言我已成正覺即三轉四諦十二行法輪云此是苦我已知此是集我已斷此是道我已修此是滅我已證等經云思惟是事已即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘說是名轉法輪便有涅槃音及以阿羅漢法僧差別名云云機分小大之別者謂佛自鹿苑說四諦法成一十二年之阿含教雖是有由平等開化不妨三乘機宜自有生滅四諦之小無生四諦之大之分別也金河准涅槃經有八大河金河是第四河經云如八大河一名恆河二名閻摩羅三名薩羅四名阿利羅跋提五名摩訶六名辛頭七名縛叉八名悉陀翻譯名義集引西域記云阿利羅跋提此云有金河是産閻浮金處梁宗法師云佛來此河邊入滅表河流奔注若生死遄速金沙不動喻佛性常住有云佛因地在此捨身故今亦至此入滅顧命尚書篇名成王將崩召公舉公率諸侯相康王作顧命鄭玄注云回首曰顧成王臨終回首顧羣臣而發命也太甲曰顧禔天之明命借以潤色佛臨滅度說大般涅槃經為顧命經也經云一時佛在拘那城力士生地阿利羅跋提河邊娑羅雙樹間與大比丘八十億百千人俱二月十五日臨涅槃時以佛神力出大音聲至於有頂普告衆生今日如來應正遍知將欲涅槃一切衆生若有所疑今悉可問為最後問此即是佛臨終顧命之言由是與迦葉等菩薩說涅槃經四十二卷道殊半滿之科者道言也殊別也科等第義涅槃經云譬如長者唯有一子詣師受學懼不速成晝夜殷勤教其半字而不教其毗伽羅論以其幼稚力未堪故乃至云善男子彼大長者謂如來也一子謂一切衆生如來視一切衆生猶如一子教一子者謂聲聞弟子半字者謂九部經毗伽羅論謂方等大乘經典以諸聲聞無有慧力是故佛說半字九部之經而不為說毗伽羅論准此則毗伽羅論喻於方等大乘經典為滿字矣又第八經迦葉菩薩問其字義佛以一十四音答之乃至云半字為世間諸經書記論文章根本滿字為出世間一切善法根本如人為惡名半人為善名滿人如來及正解脫不入半字以離文字故若有能知佛出現于世能滅半字名為解了字義之人准此則知涅槃經雖是大乘終教比阿含為喻然能被之教既分半滿所被之機亦殊菩薩聲聞等第不似今經無分小大半滿皆當授記作佛經云聲聞若菩薩聞我所說法乃至於一偈皆成佛無疑又云菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛如三世諸佛說法之儀式我今亦如是說無分別法准此則涅槃半滿阿含小大豈可與此經同日而相考核其高下哉況爪畫像沙為塔舉手低頭散心念佛小善微因皆已成佛俗間治世經書語言資生業等皆順正法豈半字根本而不入如來正解脫者乎是以一大時教皆無足與此經相方也高會者經分二十八品自序品至見寶塔前半品共十品半文在靈山頂上說校鹿苑金河其法會固已高矣自寶塔後半品至囑纍品計一十一品半文皆塔在空中佛在塔中說校山頂則尤為高會是其地其人其法俱難但考矣是知五千等者申明適化所及不及為無緣有緣之義謂既小大半滿不足與此經高會相考核云何此經而有五千退席之衆以是高會而知五千退席非真退席乃佛神通力示現以退者為增上慢輩作進者之緣也既退者可為進者之緣則五百受記成佛之進者愈崇顯其往劫曾蒙佛密化之迹矣經中舍利弗三請後佛才許分別解說時會中有比丘比丘尼優婆塞優婆夷五千人等禮佛而退佛因默然而不制止云如是增上慢人退亦佳矣五百弟子受記品云諸比丘諦聽佛子所行道善學方便故不可得思議知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺以無數方便化諸衆生類自說是聲聞去佛道甚遠度脫無量衆漸當令作佛示衆有三毒實自淨佛土等准此則知退席之衆是示現也在佛之弟子尚能內祕外現以為密化豈佛無量劫不能密化乎故五百弟子受記後說繫珠喻酬佛密化之迹云譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去其人醉臥都不覺知乃至法合云佛亦如是為菩薩時教化我等令發一切智心而尋廢忘我今乃知實是菩薩得受阿耨多羅三藐三菩提記准此益知俱崇密化之迹矣以上泛序一大時教始終旁明佛之降靈此下敘入本經正明佛之降靈問曰上既敘五千退席五百受記安得謂旁明答曰雖序五千五百之迹元為破惑者謂此經既屬高會不當有退席之疑故為之旁明所以放光等者謂經因有此退為進之緣進為崇顯密化之所以故序品佛於眉間放光現瑞彌勒文殊一席問答無非開舍利弗等千二百阿羅漢之心使發請諸佛出世為一大事因緣之教源也謂序品一品經是發起此教流源也出定揚德等者謂方便品中佛因舍利弗等不領會序品中義故直得自已出定贊揚權實二智之德無非演暢佛與諸佛智慧之宏略也經云爾時世尊從三昧安詳而起是出定也又云諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知是揚德也宏者大也即經佛曾親近百千萬億無數諸佛乃至如來知是廣大深遠等文是也略者要也即經舍利弗以要言之無量無邊未曾有法佛悉成就止舍利弗不須復說等文是也序主意謂方便一品經文出定揚德猶是大略至三請後佛計分別解說始為法說一周之全分朽宅通入等者法說一周身子得記其餘聲聞尚未信解身子代請佛重喻說以三界喻火宅佛喻長者聲聞辟支佛喻火宅中諸子先以三車引導喻佛四十年前所說三乘後等賜大寶白牛之車喻佛今說妙法雖區區數千言莫過為二乘人暢通入大乘之文同一軌度也文軌用記今天下車同軌書同文行同倫潤色譬品以三界譬火宅而序曰朽宅者經云是朽故宅屬于一人化城引昔等者迦葉等四大弟子領譬品說窮子喻酬佛佛更為說藥草喻品雖為四大弟子述成其不逮其實欲千二百人由藥草喻一時開悟佛知見與其成佛之記而五百弟子反由一味之雨潤於人華漸矢修行皆得道果及汝等所行是菩薩道漸漸修學悉當成佛之說安於小果迷其大乘意謂前後法既一乘人皆菩薩奚用精修更求與記故佛授四大弟子記後又說化城喻品為因緣說一問以明佛昔在智佛法中為十六菩薩沙彌時曾為千二百人植有大乘之因今成佛猶先度千二百人以小乘者以小是引入大之緣也大如寶所小是化城使五百弟子知昔有大乘寶所之緣不自墜墮于小果化城不實之涅槃安於漸而不頓進也繫珠明理等者五百弟子領佛因緣說一周得受果記感佛恩德說繫珠喻以佛喻親友自喻醉人一乘佛知見之理性以喻其珠今佛說三周法五百人開悟如酒消後覺昔珠今用智佛與佛相去劫塵雖是久遠而佛知見理性之珠不曾少刻遺失故曰常在經云佛亦如是為菩薩時教化我等令發一切智心而尋廢忘不知不覺既得阿羅漢道自謂滅度資生艱難得少為足一切智願猶在不失鑿井顯示等者承上文而言謂佛知見理性之珠雖在苟不得此經開示悟入修治之方四亦不得現前受用故佛於法師品又再四勸其精勤讀誦受持此經而說鑿井一喻謂在家出家學菩薩道求菩提有善不善者若依他經修習如於高原求水但見乾土雖費穿鑿其水尚遠若依此經修習如施功不已轉見濕土遂漸至泥知水必近以此經詮顯開示悟入圓頓成佛有多種之方便也多方用莊子多方乎仁義潤色詞義宛然等者謂序品至法師品三周之詞義雖曰宛然明白而數喻陳列思惟其實遠大以詞義似是世諦易見易知之常談而喻陳則明向上難信難解一大事之因緣故以上弘贊其經以明所說之法妙自非大哀下弘贊其佛以明能說者具慈悲之心妙謂自非釋迦之大哀與曠濟孰能說此詞義宛然之妙法拔其滯而不通溺而不升沉流之二乘人自非牟尼至極之悲心孰能譬此喻陳惟遠優曇鉢之蓮華極其昏而不明迷而不悟失性之衆生哉沈流指二乘人以沈于小果之流類也失性指六凡輩以失于三乘之本性也自漢至唐等者謂自非吾佛大哀極悲詮乎此經何以自漢至唐計年六百餘載是時之久也總歷羣籍計經律論四千餘軸是法之多也而人不受持他經獨受持此經最久且盛者驗是佛之大哀一極之悲心所加被也六百餘載照前三百餘載明唐異乎晉也受持盛者應前時所宗尚為不誣也以上既弘贊其佛將非下又弘贊其僧俗具有機教相投及聞而深敬之妙照前有由開化為教有緣導心為機扣投也合也謂昔佛在世親說此經猶多怨嫉而有五千退席今佛滅度既久受持者反如是之盛將不是機與教而相投佛與衆生有緣而相合耶此機教相投合者誠非一生一劫之善根乃並是大通智勝佛法中十六菩薩沙彌塵點劫前所化之遺塵也魏都賦先王之桑梓列聖之遺塵聞而下謂即未機教相投但一聞此經之名便深生敬仰者亦俱是常不輕菩薩於過去威音王佛法中嘗見蒙授記之餘績功勳也則機教相投與聞而深敬者又不可不自慶矣輒於下輒專首前綜織具錦絲萬億經緯由之提掇序主謂我知機教相投與聞而深敬之人既皆過去佛法中遺塵餘績故輒敢自專作序冠於經前如綜而提掇之使人見序而知經由經而開悟佛知見庶得六根早淨而勿晚攀仰彌勒慈尊龍華樹下受記成佛嘉美之勝會速成四德而不遲一直趣入常寂光之樂土證一乘實相之玄猷也早淨六根如法師功德品及常不輕菩薩品說仰慈尊者普賢勸發品云若有人受持讀誦解其義趣是人命終為千佛授手令不恐怖即往兜率天上彌勒菩薩所彌勒菩薩有三十二相大菩薩衆所共圍繞有百千萬億天女眷屬而於中生嘉會用易文言亨者嘉之會也潤文四德舊注訓常樂我淨若准本經亦勸發品云一者為諸佛護念二者植衆德本三者入正定聚四者發救一切衆生之心為愈以序主既弘贊三寶訖故序入普賢勸發品見彼序文該盡一經之始終故樂土准經當以三變淨土為樂土亦可指西方極樂世界名樂土所以然者以經有文故藥王菩薩本事品云如來滅後後五百歲若有女人聞是經典如說修行於此命終即往安樂世界阿彌陀佛大菩薩衆圍繞住處生蓮華中寶座之上是也玄猷即經火不能焚水不能漂汝之功德唯除如來其諸聲聞辟支佛乃至菩薩智慧禪定無有與汝等者准此以一女流持經其功德便度越三乘法衆寧不為玄猷乎弘贊莫窮永貽諸後云爾此結歸序題序主謂已作此一序人微言輕如撮土之助泰山勺水之益滄溟莫能窮盡經之功德萬分之一但願由此序而俾此經永遠貽諸後世表區區一念護法之誠也云爾者謂一序所云如此爾爾音釋廆音會冒頓音麥獨皓音晃氐音底烜音絢妙法蓮華經弘傳序
