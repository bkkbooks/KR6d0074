body:
  text: 姚秦三藏法師鳩摩羅什譯明護國金剛寺住持如愚著妙等四字為所詮經為能詮法喻名題義解見前妙法蓮華經序品第一此依經題立品題也品題各連經題名者以經題為總品題為別品雖各有類聚總屬妙法蓮華經故此經二十八品准常為三分序品一品為序分方便至常不輕計十九品為正宗分如來神力至普賢勸發計八品為流通分序分一品有通有別如是我聞至各禮佛足退坐一面為通序諸經通用此式爾時世尊四眾圍繞至佛當為除斷令盡無有餘為別序別序此經發起之因緣雖曰序分正宗流通大義實盡於此諸品之名唯藥王本事品及提婆達多品是佛自說餘或譯人所置令讀誦受持者見品題則知一品之大義序品者敘列起教之源本明此經何人而說在何地方而說為何人而說因何事而說說竟成何果報故曰序品中阿含經云渠此翻為品天台云義類同聚名品如是我聞一時佛住至盡諸有結心得自在此一名證信序謂凡諸經有如是等數行文言能使人證入法身信有三寶故如是者准智論為信成就也佛法大海信為能入信則言如是不信則言不如是故五位信位居初十一善法信亦為首信心之前更無勝法依此信本解行證始立劉虯云聖人說法但為顯如唯如為是故稱如是我聞者聞成就也我即阿難五蘊假名聞謂耳根發識廢別從總故云我聞合上如是為指法之辭云如是之法我從佛聞然我有四種一凡夫徧計之我二外道神我三大小乘人假我四法身真我今揀非餘故云假名乃隨世流布以便生賓稱之為我大小乘人辨聞不同有云耳根有云耳識有云根識和合今從後義問曰既曰耳根發識合云耳聞奚言我聞答曰以耳為六根之別我乃一身之主廢別耳從總我故言我聞楞嚴經云此方真教體清淨在音聞欲取三摩地實以聞中入則聞之一字乃娑婆教體故一切經首置之一時者時成就也師資合會說聽究竟故言一時不拘春夏秋冬子午卯酉等時以佛說法四十九年總為一大時故佛者具云勃陀此云覺者謂自覺覺他覺行圓滿為說此經之法主乃六種成就中主成就即釋迦牟尼文佛也住者四威儀之一約能住則住屬佛約所住則住屬王舍城等處又此數句是佛將涅槃時阿難請問一切經首當置何語佛命置如是我聞一時佛住某處使天下後世知佛法有源本非世人可妄作也一以斷疑二以息諍三以簡邪有此三益佛命置之經首斷疑者阿難陞座相好如佛眾起三疑一疑佛重起二疑他方佛來三疑阿難成佛及舉如是等語三疑頓息息諍者謂不言我從佛聞是自有制作則諍論起矣簡邪者謂外道邪法經首皆置阿憂二字阿者言無憂者言有外道謂萬法雖多不出有無為吉佛法異彼故云簡邪舊解無此補之王舍城等者處成就也昔為駁足王與千子共立舍宅之都故名王舍乃摩揭提國國王即阿闍世耆闍崛云靈鷲解見前序是佛所居說此經之地先城後山尊地主也與大比丘等者眾成就也是此經當受記成佛之人比丘羅漢准餘經各有翻譯訓釋茲不贅但以本經相釋大比丘一句標列其數正法華經但標千二百人皆是下解釋其大之所以謂稱比丘則已何言大也以皆是阿羅漢故對下學無學二千人而言以顯未證四果大阿羅漢則名小比丘也諸漏已盡者三界果喪也無復煩惱者四住因亡也一等出家為僧皆佛弟子元無大小之別但漏盡無惱為大否則小也逮得己利等者陽似嘆德陰實斥過以不肯同菩薩己利利人但圖自身滅盡三有見思之結惑使三界因亡未來不漏入煩惱坑中則分段果喪三明六通從心所欲惟利無害自在而已心自在簡非菩薩法自在此經將要授記二乘人學菩薩發大心故嘆德中寓有抑辭下出名其名曰阿若憍陳如至如是眾所知識大阿羅漢等梵語阿若憍陳如此云最初解摩訶云大迦葉云飲光優樓頻螺云木瓜林依林住彰名伽耶云城依城住彰名那提云河依河住彰名舍利弗云身子大目犍連云采菽氏迦旃延云文飾阿菟樓駄云無貧劫賓那云房宿憍梵鉢提云牛呞離婆多云星宿畢陵伽婆蹉云餘習薄拘羅云善容摩訶拘絺羅云大膝難陀云喜孫陀羅難陀云艶喜富樓那彌多羅尼子云滿慈子須菩提云空生阿難云慶喜羅睺羅云障覆此萬二千之首領故云如是等其名其德出處多端餘經具述此不繁引此為三周說法得授記者伏案復有學無學二千人此所謂比丘非大比丘也研真斷惑名學真窮惑盡名無學此二千人即學於阿若憍陳如等之弟子輩廼初二果之人為後授學無學記品伏案摩訶波闍波提比丘尼至亦與眷屬俱上男僧此女僧摩訶波闍波提云大愛道又名尼眾主是佛姨母耶輸陀羅云華色是佛在俗后故連佛子羅睺以標名此序出家二眾為後持品得記之案菩薩摩訶薩八萬人至能度無數百千眾生菩薩下標其數皆於下嘆其德菩薩所以異乎二乘者在上求下化福慧雙修具足四無量心也於阿耨菩提不退轉者大喜也得總持辯才轉不退轉法輪者大悲也供無量佛植眾德本者大捨也常為諸佛所歎以慈修身善入佛慧者大慈也世人得一名位而永不失尚生歡喜況於菩提無退其不喜耶所以初地名歡喜且文殊等是等覺地菩薩於菩提無退及喜之大可知矣世之悲愍人貧賤之苦濟以富貴莫過有時有數菩薩既喜自家得陀羅尼之總持又喜得四無礙樂說之辯才於無量劫中以其明辯才華轉自所持不退之菩提與無數之眾生令成佛果其悲願之大何有過焉得不退自利也轉不退利他也二乘人能如是乎世人以捨心供養一賢一聖有其限數其捨之福莫過求人天小果菩薩捨身命供養無量百千諸佛不求人天福報只願於諸佛所植眾德本則其捨之大可知也世人或得一王侯長者稱歎尚自愛心慈而不暴以通其大人之智慧菩薩由喜悲捨之大願力常為諸佛所稱歎寧不以慈脩身善入諸佛甚深無量之實慧乎通達大智等者謂因得菩提轉法輪自利利他所以通大智到彼岸彼岸即菩提也由供佛植本慈以修身慧以濟人自利利他有如此實則有如此之名所以名稱普聞無量世界能度無數百千眾生也二乘人能如是乎喜之與悲慧兼於福明法施也捨之與慈福兼於慧明財施也故以四無量心為訓中攝福慧二嚴及六波羅蜜菩薩之所以為大菩薩者此也其名曰文殊師利菩薩至菩薩摩訶薩八萬人俱上歎德此列名此為後文各品當機之伏案天台云聲聞形出俗網迹近如來聞法為親故前列也天人形乖服異迹非侍奉聞法為疎故後列也菩薩形不撿節迹無定處既不同俗復異於僧處季孟間故置中也摩訶稱大廣如智論爾時釋提桓因至與其眷屬萬二千天子俱此序三界天王及天眾也爾時下欲界諸天娑婆下色界諸天少無色界以無形質不能聽法故也釋提桓因具云釋迦因陀羅此云能作能作三十三天之主故復有下是能作之臣名月即月宮天普香是星宮天寶光是日宮天此三天子是帝釋內臣四大天王即東方持國南方增長西方廣目北方多聞統領四洲為帝釋外臣自在第五化樂天大自在第六他化樂天此及四王忉利欲界六天也舉下上而中攝夜摩兜率二天娑婆云堪忍色界分四初禪為娑婆世界主尸棄云頂髻初禪天主光明二禪天主以圓光成音為教化故等之一字攝盡三禪四禪有八龍王至各與若干百千眷屬俱難陀云歡喜䟦難陀云善歡喜此兄弟二龍王娑伽羅云鹹海和修吉云多頭德叉迦云現毒亦名多舌阿那婆達多云無熱惱池名摩那斯云大身優鉢羅云青蓮華亦池名此八龍王或因德性或因居止各得成名廣如他解有四緊那羅王至各與若干百千眷屬俱緊那羅云疑神似人而頭有角見者疑之帝釋之歌樂神也居十寶山凡佛說法身現其相歌於空中諸天聞之皆來聽法故以法妙等為名有四乾闥婆王至各與若干百千眷屬俱乾闥婆云尋香行帝釋奏樂神凡帝釋將奏樂先焚香此神居十寶山中一聞香氣便到帝所而奏樂樂者緣幢倒擲之技樂音者節湊金石絲竹等音美則倒擲中勝者美音則節湊中勝者有四阿修羅王至各與若干百千眷屬俱阿修羅云非天又云無端正因中作福帶嗔感果與天同而非同天之受用故云非天男醜女美故又云無端正婆稚云團圓佉羅騫駄云廣肩毗摩質多羅云淨心羅睺云障蔽與帝釋戰即障蔽日月也閻浮人行善多則帝釋勝行惡多則修羅勝四天王所以恒察人間善惡願天勝也有四迦樓羅王至各與若干百千眷屬俱迦樓羅云金翅鳥其翅金色兩開則廣三百三十六萬里扇開海水取龍為食懾伏羣類故云大威德形踰羣類故云大身食龍飽足故云大滿頸有摩尼之珠故云如意自天至此名八部其間少夜叉及摩睺羅伽二部夜叉云捷疾鬼食人之屬攝在四天王部下摩睺羅伽云大蟒神攝在八龍王部中故不另言也戒多乘少為諸天眷屬乘急戒緩為餘七部眷屬乘戒俱急為菩薩乘戒俱緩則墮三途凡是八部中王皆是大願力菩薩應身以四攝法為教化者為後舍利弗得記時慶讚及法師品授廣記案韋提希子阿闍世王與若干百千眷屬俱韋提希云思惟瓶沙王夫人也阿闍世云無指又云未生怨王舍城之國王也初韋提懷阿闍王相師占曰此兒生已定害父母王信其言阿闍始生命撲殺之但損一指故名無指宮人潛養呼為善見後害父母果如相言故又名未生怨得佛教化知非悔過一墮地獄即生天上文句引普超經云世王從文殊懺悔得柔順忍命終入賓叱羅地獄即入即出生上方佛土彌勒出時名不動菩薩後當作佛號淨界如來准涅槃第十九及二十經還是得佛教化知非悔過發菩提心而生天也各禮佛足退坐一面謂四眾八部等無論僧俗俱各頂禮佛足退坐一面以待說法也一面者謂佛在眾中說法無前後左右俱見佛面故此言一面下言圍繞圍繞於前後左右一面也釋通序竟下釋別序別序有三節冥顯開示悟入一大事因緣之方便初從爾時世尊四眾圍繞起至歡喜合掌一心觀佛止是佛將要與二乘人授記作佛恐其安於小果迷其大道故先說無量義經名教菩薩法欲二乘人從聞思修開佛知見者矣又入無量義處三昧是佛為二乘人入三摩地示佛知見者矣先說經後入定從今時至實際所謂先以定動也次從爾時佛放眉間白毫相先起至以佛舍利起七寶塔止是佛見二乘人不知動定特從眉間放白毫相光圓現法界事相生佛始終示人人本有一無位真人在六根門頭日夜放光動地欲二乘人悟佛知見者矣三從爾時彌勒菩薩起至品末文殊云佛當為除斷令盡無有餘止是佛見二乘人根鈍而不悟密遣二人即求窮子具陳上事欲二乘人入佛之知見者矣定中放光二大士而復問答者從實際至今時所謂後以智拔也二乘人既不入故勞我世尊從三昧安詳而起有方便之談起正宗分也爾時世尊四眾圍繞至歡喜合掌一心觀佛爾時下承上文而敘佛甞說經不簡二乘人今日為諸菩薩說大乘經則簡二乘人矣名無量義則顯二乘人甞所聞之義皆有量矣教菩薩下謂云何為大乘以是教菩薩法故云何名無量義以是諸佛所護念故此方便品中所以有其智慧門難解難入之權智也准起信論大有三義謂體相用乘有二義一切諸佛本所乘一切菩薩當所乘佛廼如此說者欲激動二乘人而二乘人不動者意謂既教菩薩於我何有故佛說此經已即結跏趺坐入無量義處三昧使二乘人明見教菩薩法不離吾人身心之不動處非二乘人全無此方便品中所以有諸佛智慧甚深無量之實智也二乘人不解意謂諸佛甚深無量義定我何能入只得天雨四華地搖六震天地無情尚為動雨而四眾八部及人王等反不迴頭轉腦知有此一段真光為自家分內事却歡喜觀佛是何辜負我世尊要為二乘人開佛知見無緣之慈乎宗門所謂貪觀眼前浪失却手中橈只知說經入定者是佛雨華震動者是天地而不知能觀能雨能動者總是自家一尊活佛之知見也將說此經結集者先敘無量義經者是欲明佛四十年來所說華嚴阿含方等般若等經一得此經會通小大權實其能詮之名皆是大乘所詮之義皆成諸佛智慧甚深無量也或者使後世知說此經在彼經之後一大時教即彼成此圓融行布次第不相礙也不然無量義處三昧為彼經所詮奚用為此經之瑞天台訓身心不動云與所緣相應身之本源湛若虗空心之理性畢竟常寂以此持於身心故不動也稱為無量者從此一法出無量法若作序義身法運動今令不動心法分別今不分別故曰身心不動餘義詳乎無量義經天雨四華據文是應佛說無量義經之瑞亦敘為此經瑞者以此經始適諸佛本意故天即雨小大適意華以應之以曼陀羅云適意故此經既是教菩薩柔輭之法不比聲聞剛強但能斷惑不能柔輭恒順眾生故天即雨小大柔軟華以應之以曼殊沙云柔軟故普佛世界六種震動者是佛入無量義處三昧神力使然以萬八千佛土言之是何等廣大高厚苟非先以定力震通則彼此質礙毫毛一光奚能徧照見於彼土法會大眾豈能即近而見其遠哉故將放光先動地也六種者動涌起震吼擊也爾時佛放眉間白毫相光至以佛舍利起七寶塔爾時佛放眉間下眼耳鼻舌各司其能眉無所職位居其上所謂當其無有器之用故佛將為二乘人說授記一大事因緣成佛之本末究竟先於眉間白毫相中而放其光示佛知見不遠吾人之眉睫間二乘人何難會也以上文身心不動會之六根皆有動唯有兩眉不動故光從眉間放也白毫相三十二相之一東方為羣動之首萬八千世界約大數而言靡不周徧者言寂而常照之真光無處無之以上明能照之光下至下明所照之處阿鼻云無間地獄極惡之苦處阿迦尼云色究竟天堂最善之樂處下地獄上天堂中攝餓鬼畜生人及修羅依正之報善惡之形有殊寂而常照之心光直一相而無相也盡見下謂此光在六道眾生而不減也又見下謂此光在三世十方諸佛而不增也以眾生本是佛佛是眾生之所成故見眾生時即見彼土現在之諸佛也及聞下謂藉佛光此土四眾眼中既得見彼多土諸佛耳中亦得聞彼多土諸佛所說經法也後文三變淨土所來分身諸佛案於此矣并見彼諸下謂以一真心之光周徧上該果海諸佛在此光中下徹因源眾生亦在此光中是心佛與眾生三無差別矣佛與眾生位且懸殊而共一光豈比丘等四眾修行得二乘之道者又不在於光中耶二乘人亦可以因是而悟入矣奈何哉二乘人不信甘心為聲聞而不願學菩薩乎故示比丘等四眾後光中復見彼多土諸菩薩種種因緣信解相貌俱在常寂心光中而行六度萬行求成諸佛之道也復見諸佛般涅槃者謂彼多土十方諸佛既在我佛光中說法現前成佛矣種種菩薩又在我佛光中行道未來成佛矣恐此土會眾謂成道說法時光明則有涅槃之時光明則無故又示彼多土諸佛般涅槃者亦在此佛之光明中也經云縱汝形消命光遷謝此性云何為汝有無如是則生者未甞生長者因子不信是父脫珍御而隱勝現劣焉滅者亦何甞滅醫王因子不服藥而示往他土矣此佛知見所以為不生不滅也復見諸佛般涅槃後等者謂彼多土諸佛應化之身雖滅此經所詮生佛等有之法性常存眾生能持此經經中已有如來全身舍利不須復起塔寺也如是則寶塔品中會諸佛圓證前法過去多寶佛塔先案於此矣是知光中圓現生佛始終無非法界實相諸佛一大事因緣本末究竟業已畢矣上根利智之人不待吾佛從三昧安詳而起告舍利弗則已徹矣何則先說無量義經即入無量義定者廼示此心照而常寂也又從定中雨華動地放光者廼示此心寂而常照也寂而常照諸佛不異眾生照而常寂眾生本是諸佛何所往而不達而二乘人都不信耶由是下文有二大士示問答會古今也詳經文理說經入定天華地動感悅眾喜都是說此經前一層事唯放光一瑞始為此經發端然經家敘置總為此經六瑞者如云國家將興必有禎祥宗門云若立一塵家國興盛此亦身子等萬二千聲聞得授記成佛禎祥興盛之先瑞也觀佛三昧海經云白毫相光佛初生時牽長五尺苦行時長一丈得佛時長一丈五尺其毫中表皆空如白瑠璃筒內外清淨從初發心中間修行乃至涅槃一切相貌功德皆現其中凡看此品要遐想當時靈山會上佛止放眉間一白毫相光其能照之光有幾多大小而所照之地橫則徧照東方萬八千世界竪則上照萬八千世界之有頂下照萬八千世界之阿鼻一世界該三千大千之數則萬八千世界是何等之高厚何等之廣大其間法界事相生佛始終善惡業緣果報好醜許大差別境界直一光一時皆頓現於此土四眾目前了無毫忽障礙又是何等之時節有能於經作是想者當時許大靈山法會殊勝因緣不假修證一開經都炳然齊現於吾人常住之心目中矣此後文所以謂之開示悟入佛之知見及持誦妙法華經也故文殊答文中累累以斯由佛光照為言非譯者好重杳政恐吾人容易其文而忽略其旨也後見塔變土涌眾諸品之文應以此為例爾時彌勒菩薩作是念至悉見彼佛國界莊嚴爾時彌勒下彌勒既同文殊於日月燈明佛法中曾見此瑞曾聞此經豈有不知佛現神變相之因緣大率只要提醒身子等萬二千人使心有所措聞佛出定之談不驚疑耳今佛下始而作念無可問答以佛定中所現神通之相不得問故復作下繼而作念有以問答以文殊既不入定又見多識廣可得問而答故爾時比丘下謂不止彌勒一人有疑眾皆疑也爾時彌勒菩薩欲自下謂自疑未決固應問更觀他疑尤應問故曰而問文殊師利等可謂四顧躑蹰亦模寫當時之形容盡矣以何因緣與下文為一大事因緣相照應然疑字最重以有疑始有信悟故於是彌勒菩薩欲重宣此義以偈問曰文殊師利導師何故至身意快然得未曾有於是下彌勒此云慈氏思益經云若眾生見者即得慈心三昧故天台云經奚有偈具五義故龍樹毗婆沙云一隨國土天竺有散華貫華之說如此方序後銘也二隨樂欲有樂散說有樂章句三隨生解有因散說得解有因章句得解四隨利鈍利者一聞即悟鈍者再說五為眾集有先後必以彌勒文殊問答者此經授記聲聞當來成佛非當來成佛之人不能問故彌勒以大慈而興疑問然非過去已成佛人不能答故文殊以大智博古以通今文殊師利等者頌六瑞一段略其說經入定二瑞妨文贅也長行放光後雨華先頌文反之旃檀下四句長文無者頌文補之其景像可想見眉間光明照於東方至受報好醜於此悉見眉間光明等者頌長行自爾時佛放眉間光明起至盡見彼土六趣眾生止謂因佛光見彼萬八千土中第一事眾生善惡光景有如此者土非金色因佛光照變如金色善惡業緣因也受報好醜果也天堂果報則善好地獄果報則惡醜問曰佛為何放光使見彼多土惡善醜好答曰為後文諸佛出於五濁惡世之先證使法會大眾見佛光所照多土皆釋迦之化土耳又觀諸佛聖主師子至梵音深妙令人樂聞又觀諸佛等者頌長文因佛光見彼多土現在諸佛第二事及聞諸佛所說經法第三事光景有如此者佛稱聖主師子謂三界九地類皆有聖佛是聖中之主人中之師子也光中所見諸佛以見寶塔品求之乃我釋迦之分身佛也演說下能被之教文言則微妙第一聲音則清淨柔軟教諸下所被之機根大而人多由諸佛梵音深妙令人樂聞所致也各於世界講說正法至求無上慧為說淨道此頌長行由佛光并見彼多土諸比丘比丘尼優婆塞優婆夷諸修行得道者第四事也各於世界下謂上諸佛以柔軟音教諸菩薩彼受教無數億萬菩薩又各於彼萬八千世界化佛場化而講說正法或以種種因緣說或以無量譬喻說無非照明諸佛所講之法開示悟入所化比丘等四眾之眾生也此又明菩薩為能被之教主比丘等四眾又為所被之機宜良由比丘等四眾是六趣中眾生肯聞法修行之人故長行以修行得道者言頌中云眾生也若人遭苦苦諦也厭者憎惡欲斷之義謂生老病死是苦之果凡人皆以為樂而愛著今得佛與菩薩說法開悟有厭惡之心則知苦而斷見思惑之集矣為說涅槃滅諦也盡諸苦際道諦也謂眾生既遭世間生死苦果而厭惡之諸佛菩薩便為說出世間不生不死之涅槃以見道一十六心修道一十六心斷盡八十八使八十一思苦之分際得聲聞乘如彼諸子求乎羊車出於三界之火宅也際字對遭字看諺遭際也盡字有修行工夫對厭字看以遭際雖有分限能厭則始能盡斷故也此所謂慕滅修道也若人有福等者辟支佛乘如彼諸子求乎鹿車出於三界之火宅也聲聞不供養佛所以遭苦辟支佛少行布施以供養佛故云有福供佛因也有福果也種福因而得中乘福果者其志在求勝于聲聞乘故佛菩薩為彼說十二因緣之緣覺法也若有佛子等者大乘之菩薩如彼諸子求乎牛車出於三界之火宅也菩薩上求下化修種種六度四攝之行紹隆佛種使不斷絕則佛為父而菩薩為子故稱佛子其志不但如辟支佛求勝諸聲聞乘而已乃欲得佛無上之慧故佛菩薩為彼說其清淨六度之道也六度謂之淨道者不住相也菩薩曰淨道則二乘人所得之道尚未清淨可知矣以二乘人但淨見思證我空未如菩薩淨無明證法空故佛一光中所見彼多土諸求三乘人光景有如此者文殊師利我住於此至如是眾多今當略說文殊下結前起後我住於此者此謂靈山法會之近地也見聞若斯者斯謂光中或見諸佛及三乘人之身或聞諸佛菩薩說三乘之法或三乘之眾遵法修行而得三乘之果如此百千萬億之妙事據前較後如是眾而且多遠隔萬八千世界之廣大高厚如在目前略無障礙不能盡述今當略說如下文所云云也我見彼土恒沙菩薩至濟地獄苦令入佛道此節及下節共計一百二十六句頌長行因佛光見彼多土諸菩薩摩訶薩種種因緣種種信解種種像貌行菩薩道之第五事也我見彼土下謂見彼土能行道之大士數如恒沙之多也故以種種因緣一句牒醒其長文通標六度為因緣而種種信解在其中矣信解無相用布施而發揮故又信解不真雖拔一毛而利天下不為況肯內外財皆施乎而求佛道者通標所求一乘之果也或有行施下別釋金銀等七寶奴婢情與無情皆施也小則車乘大則輦輿輕重皆施也以歡喜之心為因用所施之物為緣但迴向佛道也願得下迴向之辭謂願世間有限七寶等財施而得出世間諸佛所嘆三界第一之大乘也願曰迴向者大經十迴向亦名十願故或有菩薩下謂或見菩薩不唯施車乘等而更施駕車乘等之駟馬及輦輿上欄楯等之莊飾也復見菩薩下謂不唯施車馬等之外財而更施極難捨身肉手足等之內財如我釋尊為月光王捨頭善眼僊人施目皆欣樂施與自非信解真為不能也文殊師利下頌種種相貌一句謂由佛光見彼多土菩薩或以以王相貌說佛為道而行檀度捨內外財為僧之相貌剃鬚髮被法服便於行忍辱而持戒也妙莊嚴王案伏於此問曰剃鬚髮被法服作持戒可也作忍度何也答曰以後文云如來衣者柔和忍辱心是故也或見菩薩下謂菩薩以在家作出家之相貌也問上云剃髮等即是比丘此奚重言答上具比丘體此點出名義重處閑而誦經獨處下多聞之相貌也勇猛下精進之相貌也又見離欲下求禪定之相貌也深修下謂因定得通則成千變萬化之相貌也又見菩薩安禪等者謂於安禪之時感佛恩德以聲音為佛事之相貌也復見菩薩下智深所以能問諸佛之妙法志固所以聞悉億劫而受持凡此皆智慧之相貌也以上頌自利之相貌又見佛子定慧等者頌利他之相貌也謂菩薩由深修禪定則定得具足由智深志固能問能持則慧得具足定具足自性宗通慧具足稟受師承所以內不失己外不誤人方能近取譬以無量喻為眾講法而利人也欣樂下為眾講法約中下根言欣樂說法化諸菩薩約最上一乘人言菩薩既能觀機說法故將破魔兵而先擊法鼓也又見菩薩寂然等者謂菩薩一動一靜語默無非佛事語慧則利擊法鼓而破魔兵定默則雖天龍恭敬不以為喜也又見菩薩處林等者謂菩薩由定慧具足故能處林放光拔濟地獄眾生出苦頓令入佛道也頌因緣信解唯以布施一度表彰頌相貌則以六度而形容不然無以見其種種相貌也慈氏可謂善問井井有條什師可謂善譯而運斤成風不亂也不然經文才言布施又言布施才言車乘又言寶車只見文字重疊錯雜顛倒今准長行諦察頌文始知妙哉聖經無一字之多無一語不善自古諸師何不細審閱而用己意妄穿鑿之耶又見佛子未嘗睡眠至以此妙慧求無上道此頌長行行菩薩道一句分六度度每以佛道殺文又見佛子下精進波羅蜜也六度以精進為首者意警二乘人不精進但念空無相無作於菩薩法遊戲神通淨佛國土成就眾生不生一念好樂之心也此經要授二乘人成佛十號劫國莊嚴之顯記故以精進而激發其心故後授阿難記曰我與阿難於空王佛所同時發心阿難常樂多聞我常勤精進是故我已成佛而阿難護持我法未嘗睡眠去昏散也經行林中攝正念也勤求佛道不求小果也又見具戒者勤尸羅波羅蜜也威儀無缺戒相具也淨如寶珠戒性淨如珠能澄破戒之泥滓也又見佛子住忍辱力者勤羼提波羅蜜也增上慢人或辱於口而惡罵之如後文言是無智比丘等是也或辱於身而捶打之打音頂以物亂打曰捶以杖直刺曰頂如後文或以杖木瓦石而打擲之乃至數數見擯出遠離於塔寺者是也皆悉能忍者英雄豪傑睚毗必報撻辱市朝士之所耻今菩薩皆能忍者以求佛道故佛豈嗔恨而欲報橫逆之冤乎此忍辱之有力也如此又見菩薩離戲笑者勤禪波羅蜜也戲笑離則自心定矣癡眷屬離則外境不擾矣親智者以求得定之方入山林為除亂想之便故能億千萬歲攝念而不動非同二乘人樂獨善寂之滅盡定乃欲成佛道也或見菩薩肴膳飲食者勤檀波羅蜜也檀之最急飲食為先飲食成疾則湯藥為急寒暑須衣以名衣上服直千萬兩重價者施之名衣千萬尚可著價捨之似易或無價衣則價亦難著矣捨之為難菩薩欲滿足檀度亦不悋惜而施佛及僧者如後文無盡意解頸真珠眾寶瓔珞供觀自在者是也千萬億種旃檀寶舍下起居須舍不用凡材施以旃檀之寶舍坐臥須床不用麤惡施以眾妙之臥具四事備足若無園池為游戲三昧地則亦不為如意之檀也故菩薩又施華果茂盛之園林流泉清淨之浴池如此種種微妙歡喜而施不求人天福報但求無上之佛道也或有菩薩說寂滅法者勤般若波羅蜜也般若利人則種種教詔無數眾生而不倦般若自利則觀諸法性無有二相猶如虗空成我法二空真俗二諦也又見佛子下般若不著二邊成我法俱空之不空得中觀慧則第一義諦以觀諸法性屬自教詔眾生屬他至中觀第一義中則自他諸法無二之性猶如虗空廣大而無相性既無相心何能著不著二邊之慧是為妙慧以此妙慧求無上道成佛必矣頌眾生諸佛聞法及四眾則略頌菩薩種種因緣信解相貌行道則廣佛已成道功德不可以言盡眾生尚未成佛業苦之相亦難以形容唯菩薩者為上求佛果下度眾生之人諸佛賴以傳法眾生賴以出苦其荷擔之責任亦重矣要二乘人學菩薩故以此而警醒之或是我釋迦一佛因中之行見佛求法如此之勤也或是十方三世一切諸佛之行證佛求法如此之同也或是妙音觀音藥王等之行遵佛囑累如此受持其經而堅固也世無去來界無遠近一時一會皆於眾生毗盧遮那常寂心光中炳然齊現一大時教何有如此之奇特事焉是以此經為諸經中王矣佛白毫光中所見彼多土大乘菩薩光景有如此者問曰佛光何以但照東方萬八千世界不及餘九方耶答曰東方屬震為羣動之本佛意欲二乘人捨寂趣動從空涉假入𮠔垂手修六度化眾生證大涅槃故光但照東方表佛知見即動而靜於作用中成大事因緣也不然人人都學二乘人趣空證寂眾生無邊教阿誰度又世間日光多從東至西佛光既為出世間法與世相逆故多從西照東至後見寶塔涌沙眾則及下方變淨土會諸佛則普及十方經云南西北方四維上下白毫相光所照之處亦復如是是矣至法會將終佛將以此經付囑上行等流通先現神力色光聲光又徧照三變淨土外之十方也然後示佛知見中世不分三方不分十總成一常寂光土經云于時十方通達無礙如一佛土如是則知經中言一方十方各有次第自有程文不必勉強配釋也文殊師利又有菩薩至如天樹王其華開敷此頌長行依佛光復見彼多土諸佛般涅槃者及見諸佛般涅槃後以佛舍利起七寶塔第六事及第七事也文殊師利下不依長文頌諸佛般涅槃之事而但頌佛滅度後供養舍利者譯人不欲經文膠柱影攝之也又見佛子下言塔之多數逾恒沙者以國土世界多而莊嚴光飾無限極也問曰上第六事佛滅度後供養舍利既已言矣此第七事何以復言造諸塔廟等句答曰第六事但云供養舍利顯是佛才般涅槃露地供養佛身骨之時比尚未造塔也此第七事云造諸塔廟等者謂佛滅度已後欲將佛身骨藏而不露使人但供養塔廟也故後雖有為供舍利之句不為贅也以彼一時此一時故寶塔下言塔之高一由旬四十里五千由旬則其塔之高二十萬里矣直曰縱橫曰廣正等者橫直四方一樣二千由旬則該八萬里寬大此釋成其塔之高上才言一塔一一下釋成其妙更敘其多塔每塔皆具旛鈴故曰各千幢幡內挂摧去物之我慢而生敬珠網外交於露幔日照光生何其烜爀以相暎奪寶鈴匝垂於層級風動聲宣何其音響以相節凑見莊嚴塔之妙不可以見聞盡矣諸天龍神下謂有如此塔自然感天龍八部常以華香伎樂而供養也故彌勒復稱文殊以結告其高妙云彼萬八千世界諸佛子等如此莊嚴光飾塔廟本意直為供養舍利不為莊嚴國界然不妨由塔之莊嚴而國界自然殊勝奇特妙不可思好不可言也亦所謂丘夷而淵實也如天樹王等者忉利天上東北有員生樹其樹生須彌山頂人間羣樹高大者無以過又天帝釋所鍾愛故稱天樹王其樹華開敷諸天為之游樂叢集圍繞其間有如天龍人神供養此塔生敬仰也依佛一光見彼多土諸佛般涅槃後供舍利造塔廟光景有如此者舍利云身骨塔廟云方墳佛放一光我及眾會至我等見此得未曾有佛放一光下結前起後謂佛止放一光能令我輩見彼萬八千國界無邊無量種種殊妙如上七事者皆諸佛神力智慧力使然求其四十年前俱未曾見故曰希有放一淨光下正明其希有又解佛放一光能照也我及眾會依光能見之人也彼東方一萬八千世界去靈嶽不知多少高厚遠近而曰見此國界下曰見彼國界者因佛光所照即遠即近如在目前忘其彼此也若以眾生隔紙膜不見外物隔皮膚不見五臟之眼目之誠分彼此以佛五眼目之窮盡微塵清淨國土乃至恒沙界外一渧之雨亦知頭數則萬八千世界亦直佛菩薩自家屋裏微塵大事何分彼哉故曰見此國界國界為法會所見之境也諸佛神力智慧希有者謂世界廣大高厚計一萬八千以聖凡因果情器劫時久近始終因緣信解相貌之多彙而無量無邊然而不移此而見彼無遠近也不移一時而見多劫無過現未來也佛是佛生是生善善惡惡聖是聖凡是凡隱隱顯顯果是果因是因此此彼彼略無毫忽不並見略無些須有錯雜非諸佛神智二種之力安能如是故曰希有放一淨光者言能照者有分限也照無量國者言所照事無量也所以謂我等是此得未曾有誠未曾有也准經所詮則我輩目前身心世界外誠有無邊無等等佛法身心國土眷屬在俱由佛知見未開迷悶而不悟入耳佛子文殊願決眾疑至瞻察仁者為說何等自初說頌沿至前節皆申彌勒一己之疑應長行爾時彌勒菩薩作是念起至我今當問止之文此及上節頌彌勒為法會大眾申疑應長行爾時比丘比丘尼起至悉見彼佛國界莊嚴止之文故前頌初曰我住於此次曰我見彼土三曰我見諸王皆以我為稱上節頌所見七事既完將欲求答以除其疑故兼大眾而云我及眾會我等見此始以己兼人而稱至是則專主眾會而請故稱佛子文殊願決眾疑也四眾欣仰下承上文而言謂六瑞七事若是一向曾有之事則眾人不疑即疑我彌勒亦能為眾而決之因一向未有今忽見之四眾所以欣仰瞻著仁者又視著我各生其疑謂今世尊何故放此眉間光明照見遠方生佛始終法界事相我既不能為眾決疑眾又不敢請仁者故我雖為眾請實亦為自請仁者解我疑則眾疑自解矣故云佛子時答決疑令喜時答者謂如時候生物應節不遲乃求速答之義何所饒益等者正出其疑謂佛尋常說經則不入定入定則不雨華雨華則不動地動地則不放光放光則光中亦未嘗見許多之光景今佛如此振天動地放光現瑞果有何所饒益眾生之事而先演暢此光明耶佛坐道場等者謂佛今演此光明還是為發明佛菩薩樹下始坐道場所得妙法今欲說此耶還是為與諸大菩薩授阿耨菩提成佛之記耶示諸佛土下謂佛若為說道場所得之法往者已說矣若為授諸大菩薩成佛之記往者亦曾授記矣並不曾見佛眉間光明中示萬八千世界之佛土眾寶莊嚴而清淨亦不曾見佛土中有許多之諸佛今者示土現佛故我定知此非小因小緣必是說妙法及授記之大事因緣也但不知佛何故重說妙法重授何人之記耳汝文殊既過去見得佛多又具大智必定當知示土現佛之瑞幸勿負我及四眾龍神瞻察仁者之心於此二事為說何等問詞鏗鏘義亦綢繆靈山一會賓主酬酢宛然在目思之爾時文殊師利語彌勒菩薩至難信之法故現斯瑞爾時下前佛說經入定放光現瑞一大事因緣滿盤托出彌勒業已眇目矬陋莊聾作瞽而故問為文殊者何不將出昔日把住世尊陞座諦觀法王法法王如是的手段出來待佛纔結跏趺坐兩手掀翻下座世尊也只得本分向王舍城中乞食免得家醜外揚豈不省話會哉方且云如我惟忖後惹世尊出定料簡不少云不退諸菩薩其數如恒沙一心共思求亦復不能知則二大士面皮厚三尺矣何也佛既曰思求不得奚文殊曰如我惟忖乎雖然鈎錐在手為人與為己不同安知二大士不與釋迦老漢曾暗打合同來耶舊傳二菩薩問答一曰彌勒觀七事以騰疑二曰文殊擬十因而領答前問章既判七事此答章應判十因故將經文分十二節初一節總答問意末一節結答問意中十節因緣申證其總答初中語彌勒菩薩等者彌勒上問曰世尊何故放斯光明為說妙法為當授記此非小緣故今答曰善男子佛意固難測量但我惟古忖今知佛世尊果如汝所疑此非小緣乃欲說大法也雨大下以三喻一義擴充其大雨大法雨者二乘人自謂年並朽邁枯稿極矣佛以一乘佛知見法雨而潤開之吹大法螺者二乘人自謂已得涅槃無所堪任昏聵至矣佛以一乘佛知見法螺吹示以警醒之擊大法皷者二乘人不復進求阿耨菩提懈退慣矣佛以一乘佛知見法皷擊悟以䇿進之演大法義者二乘人但念空無相無作於菩薩法游戲神通淨佛國土成就眾生心不喜樂佛以一乘佛知見大法之義演暢痛快使趣入之諸善男子我於下文殊謂我何以知今佛欲說大法也以我於過去諸佛曾見說經入定後便即放光放光後便即說大法故以上惟古也是故當知下由古以忖今也欲令眾生下謂欲說何等大法也乃欲令大小乘眾生咸得聞知一切世間難信之大法也此句最重一經二十八品若文若義都攝盡故與方便品佛出定後雙嘆諸佛權實二智為案諸善男子如過去無量無邊至三菩提成一切種智諸善男子下十因中第一劫遠名法相同因上言過去未知過去多少劫此言過去無量無邊無數劫阿僧祇云無數故上言諸佛未知是何佛此言號日月燈明佛具如來等十號與今佛同也演說正法下明彼佛未說此經之前亦先說三乘與今佛同也法謂正法者以初中後皆善故也其義下謂既分初後何以皆善以言分初後義則深遠語則巧妙故分初後純一下釋成深遠為求下釋成巧妙燈明過去雖久十號之稱三乘之法與今釋迦不異則知今佛所為皆先佛之程規非創式也初善謂聲聞乘中善謂辟支佛乘後善謂菩薩乘始則依一佛乘分別說三初所以善末則雖說三乘但化菩薩後所以善經云如來但以一佛乘故為眾生說法此純一也無有餘乘若二若三此無雜也欲令眾生開佛知見使得清淨故此具足清白也又云乘是三乘以無漏根力覺道禪定解脫三昧而自娛樂使得無量安穩快樂此具足梵行之相也若有眾生內有智性從佛世尊聞法信受速出三界自求涅槃是名聲聞乘如彼諸子為求羊車出於火宅此為求聲聞乘說應四諦法度生老病死究竟涅槃也其辟支佛乘菩薩乘一一皆如火宅喻求鹿車牛車可知又初中後善三義無量義經中更詳盡次復有佛亦名日月燈明至所可說法初中後善次復有佛下十因中第二佛佛道同意非偶然因二萬佛法姓號皆同其式則其來久矣信不虗矣頗羅墮云利根二萬佛本末七十餘言敘盡譯手其高也其最後佛未出家時至已於千萬佛所植諸善本其最後下十因中第三捨寶位父子出家今昔得果相同因燈明八子釋尊一兒多少不同捨王位成正果則無二矣言其最後者則知前二萬佛所事矣八子皆以意名及其出家而又名發大乘意不名大乘心者梵語末那第七識之名翻云意意多染汙以執我故故第一以有意為名謂雖是菩薩尚有我故第二名善意者謂雖有我而多分執十善法為意故第三名無量意者謂十善法可以擴開四無量心故第四名寶意者謂四無量心為世間出世間之寶故第五名增意者謂知四無量心為寶則增長佛果位中八萬四千法門故第六名除疑意者謂法門既得增長諸疑佛法僧為有為無等疑皆除遣故第七名響意者謂疑惑既除聲名高響故第八名法意者謂高響名出令人得其法喜以樂意故此八名舊訓記八種識以八種識皆由意執我法而起故准起信論意有五名攝盡八種識故纔出家使發大意修梵行為法師者以值得佛多而種善根深也是時日月燈明佛說大乘經至如今所見是諸佛土是時日月下十因中第四今昔未曾說妙法先示六瑞相同因彌勒當知爾時會中至欲知此光所為因緣彌勒下十因中第五今昔眾疑欲問相同因時有菩薩名曰妙光至若身若心而生懈倦時有下十因中第六今昔放光後為說妙法相同因妙光即文殊前身央掘經云現在北方歡喜世界作佛號歡喜藏摩尼寶積佛又慈恩上生經云未來成佛名曰普現又首楞嚴經云過去無量阿僧祇劫已成佛號龍種上尊王佛燈明因妙光起定說法釋尊因舍利弗起定說法昔眾六十小劫如食頃今會五十小劫如半日日月燈明佛於六十小劫至當入無餘涅槃日月下十因中第七今昔諸佛能事畢矣唱滅相同因我佛說畢三周之法亦於寶塔中普告大眾唱滅矣時有菩薩名曰德藏至阿羅訶三藐三佛陀時有下十因中第八今昔授記相同因多陀阿伽度云如來阿羅訶云應供三藐三佛陀云正徧知覺十號之三也昔佛說經授菩薩記今佛說經何授聲聞記文殊敘往事已曾得記之聲聞故名菩薩今經聲聞廼未授記之菩薩安知彌勒降靈時舍利弗等不稱為菩薩乎佛授記已便於中夜入無餘涅槃此十因中第九今昔涅槃相同因諸佛出世元為開示眾生佛知見使得同於己而已燈明出家得道轉法輪授顯記於眾生欲前佛歸源後佛續脉本願訖矣化緣盡矣故般涅槃則究竟不生滅矣今法華有唱滅之言無涅槃之事而因曰涅槃相同者以唱滅去涅槃時之不遠但佛未授完二乘人作佛之記及授記已便詣雙林入涅槃又說涅槃經矣經敘彼佛一大時事集在一時此以結集者分為二類故有唱滅之言而無涅槃之事其實法華與涅槃同時故因曰涅槃相同佛滅度後妙光菩薩至供養恭敬尊重讚歎佛滅度後下十因中第十今昔佛滅後持經得益相同因燈明因妙光出定而說經則囑累亦在妙光矣故妙光受佛遺囑而持經滿八十小劫此自利也為人演說利他也八子師妙光羅睺師身子八子得師教化堅固菩提最後成佛名然燈者則精進者早成佛矣妙光有八百弟子身子亦領三百弟子從佛出家八百弟子中有一人號求名者言精進持經依而行者固先成佛即懈怠持經以經求名利者亦得藉以種善根遲得成佛遲早雖殊持經得益同矣而人不可不持經持經又不可求名利也彌勒當知爾時妙光菩薩至教菩薩法佛所護念彌勒當知下承上文結足十因歸前總答如我惟忖今佛世尊欲說大法等文妙光既是文殊求名又是彌勒則彼此眼見耳聞今日釋尊所為不異昔日燈佛故事故曰是故惟忖等一經題目佛未出定法未出口文殊預先名之別序初曰說大乘經名無量義末曰說大乘經名妙法蓮華可見未說此經以前凡有所說小大三乘皆屬無量義一說此經後其大小三乘無量義經皆為佛知見皆名妙法蓮華也初曰為諸菩薩今不曰為何人但曰說大乘經者以再敘為諸菩薩則身子等益生感傷空生等益不生一念好樂之心矣直至法說一周後將為身子授記始曰為諸聲聞說是大乘經名妙法蓮華方知前所說經入定雨華動地放光現土皆是為二乘人授大乘記會權歸實之所為應知三周九喻二十八品之言語文字總名妙法萬二千人得記總喻優曇鉢靈瑞大寶青蓮華時一現耳故文殊不待佛出定先說明經題者見三世十方一切諸佛凡所說法不問大小乘皆名妙法凡聞法得果記成佛者皆喻蓮華也故後文曰唯佛與佛乃能得之經題大義益明且著也爾時文殊師利於大眾中欲重宣此義而說偈言我念過去世無量無數劫至亦隨修梵行爾時文殊下頌長行第一因佛未出家下頌第二第三兩節因也不頌最初總答第一節者後結答文中補之時佛說大乘經名無量義至說法求佛道此頌長行第四因也時佛說大乘下頌六瑞與今同也缺眾喜一瑞頌此光下頌昔光中所見七事與今光中同也示一切眾生等者頌六趣眾生又見諸佛等者頌十方諸佛眾寶莊嚴依報身如金色正報正報之佛坐於依報之土如淨琉璃內現真金像形容依正之妙如此世尊在大眾下頌又聞諸佛所說經法也一一諸佛土下頌併見彼諸比丘比丘尼等也又見諸菩薩下頌諸菩薩種種因緣信解相貌也七事中缺頌佛般涅槃及記寶塔二事爾時四部眾見日月燈佛至是事何因緣此頌長行第五因也天人所奉尊適從三昧起至悉皆能受持天人下頌長行第六因也人之所信莫過己眼今妙光為人天眼目所以七眾歸信如信其眼所以然者為妙光能奉持諸佛法藏故也如我下佛先使妙光歡喜而因起以說法是妙下妙光果如佛言而能持證知明非信解而知佛說是法華令眾歡喜已至億劫時一遇頌長行第七因也未說其經先令妙光歡喜而說之已說其經又令大眾歡喜而唱滅可見妙光與眾師資高下說法涅槃去住之次第也學般若菩薩大事未明如喪考妣終身憂啼且未已有何歡喜一旦開佛知見了知生死不相干何喜如之可見諸佛出世只要眾生歡喜眾生不喜如己之內於溝壑今既喜矣故逕唱滅以勉其眾則慈悲何有焉世尊諸子等聞佛入涅槃至亦度無量眾頌長行第八因也世尊諸子下謂佛慧如日眾生有目趾者待是而後成功今忽唱滅如天之亡日故懷悲惱云佛滅一何速耶聖主法之王下謂佛法如王前王既歿後王復御燈明滅而淨身興何必憂怖此諸佛臨涅槃時故以授記為大事因緣也意世間不可頃刻無佛法僧三寶使眾生不安慰而生憂怖耳可見大聖人一去一來無非為安慰眾生也是德藏下申明不必憂怖以有所倚也佛此夜滅度如薪盡火滅至以求無上道頌長行第九因也佛此夜滅度下前頌光中七事少諸佛般涅槃及造塔二事此中足之薪盡火滅用莊子指窮於為薪火傳也不知其盡潤色謂諸佛報體如薪之有盡而法性之身如火此驛盡則又傳至彼驛何有滅哉恒沙之眾佛在有恃佛滅何依故遵臨終遺囑無放逸之命倍加精進各自努力不求小乘俱願成佛故曰以求無上道也是妙光法師奉持佛法藏至其數無有量頌長行第十因也是妙光法師下遵佛遺命廣持其經也是諸下謂八王子師文殊精進持經次第得成佛見經之効也見佛供佛福足隨順行道慧足兩足既備八子皆成其佛獨以然燈名者以釋迦師然燈彌勒師釋迦顯文殊為釋尊九世師祖為彌勒十世師翁今釋尊欲說妙法文殊又為證盟則其來久矣而其言可信矣此為後文於舊住娑婆世界文殊師利前現大神力之案彼佛滅度後懈怠者汝是至令盡無有餘彼佛滅度下一十二句承上文頌會通今昔之事而結前總答且釋彌勒一人之疑謂昔燈明佛滅後懈怠弟子既是汝彌勒妙光法師又是我文殊我見彼佛本昔光瑞如此汝豈不知而更問耶以是今昔我汝之故千古一日則知今佛欲說法華經也今相如本瑞者本昔也謂所以知今釋迦佛欲說法華經者以今佛放光現瑞之相如昔覺明之本瑞故是諸佛方便者謂佛無古今凡說經皆先放光者乃是諸佛方便權巧之妙用助發吾人人本有佛知見一乘之實相義也方便二言為下品張本實相義者無量義經云無量義者從一法生其一法者即無相也如是無相無相不相不相無相名為實相此一十二句乃文殊放出納僧本色作家之語謂佛祖頭上機緣元無瑞不瑞今佛不得已放光現瑞無非助發也諸人今當知下八句釋四眾等疑初四句為會中一種大根眾生不願小乘而求大乘未滿足者而言故曰一心待又曰充足此為身子等萬二千受記成佛之案直案至授學無學記品後四句為會中一種已得三乘之小果者而言恐彼悔其自貪其小而失其大而又疑其何以為菩薩說大為我聲聞辟支佛說小故曰諸求三乘又曰若有疑悔佛當下謂佛今無小大一一皆平等授記成佛所有如昔疑悔今皆當為汝諸人除斷無餘此釋天龍八部等疑直案至法師品首求聲聞求辟支佛求佛道者授廣記等文文殊心雖慈憫辭甚鋒芒宛然諸佛之師吐聲發氣自是飛揚文殊答彌勒必敘昔佛日月燈明與今佛釋迦略不少異者要使當時法會與吾人知今日釋迦受記所成之佛即昔日二萬佛中最初日月燈明受記所成之佛推而廣之則這般毗盧遮那常寂心光性相皆空離名絕義照古騰今過去無始未來無終吾人能如是一開佛知見則知最初日月燈明佛法會至今尚儼然千古猶未解制故頌中每每以本瑞及佛光照言有以也由是凡看經者詎可少忽其文哉解序分竟序分有三一眾集敘人二放光現瑞敘事三問答敘疑悟此下釋正宗分妙法蓮華經方便品第二方法也便者通利自由之謂如人事有阻礙為設一方法使得通利便彼自由今經是佛見二乘人為智障所礙不信自心作佛故假言語方便分別解說令二乘人開佛知見得受記作佛以自由文殊答彌勒今相如本瑞是諸佛方便則佛前說經入定放光動地已是方便矣經云吾從成佛已來種種因緣譬喻廣演言教無數方便則方便又不止於今經放光動地乃從成佛已來種種言教皆方便也偈云過去無數劫無量滅度佛種種緣譬喻無數方便力則方便又不止於釋尊一佛乃十方三世一切諸佛出世說法皆方便也又云更以異方便助顯第一義則方便又不止於三乘一乘六度萬行之正經方至舉手低頭沙為塔爪畵像或出於誠敬或發於戲樂無非一大事因緣之方便也故云方便品正宗分首置此兩言則知七卷經文無非方便方便爾我一切眾生開悟自家本有之佛知見得以成佛自由自便也品中有三重方便以顯法之妙至下逐文釋之爾時世尊從三昧安詳而起至辟支佛所不能知自此至後如是本末究竟等為第一重止而請說之便便也文分五節初節總標二智餘四節展轉別釋顯法妙不可思議爾時世尊下佛初入定云結跏趺坐身心不動佛今出定云從三昧安詳而起不唯敘置文字相照應而使宛然見佛身心為機定動也安詳從容自得不怱遽貌舍利弗云身子為法說一周先得記之當機乃智慧第一之人經首標阿羅漢有萬二千人出定獨云告身子者有所因也法說後身子自述曰我昔從佛聞如是法見諸菩薩受記作佛而我等不預斯事甚自感傷失於如來無量知見又曰我等同入法性云何如來以小乘法而見濟度若餘萬二千人者則曰我等居僧之首年並朽邁自謂已得涅槃無所堪任不復進求阿耨菩提又曰於菩薩法成就眾生不生一念好樂之心如是則身子願學菩薩授記成佛惟恐不得而萬二千羅漢尚不生一念好樂之心則自足與不足者見矣故佛出定獨告身子有其因也諸佛智慧者是佛要二乘人信己先推證於眾故雙嘆十方三世一切諸佛權實二智使二乘人心有所激發而生疑動請好與授記作佛則一經大旨實重於斯甚深無量者無論十方三世一切諸佛及我釋迦一佛成道以來四十年前所行事為深為無量即約此會佛入無量義處三昧則寂然示一乘佛知見於威音那畔如此智慧二乘人可能測度乎彌勒為等覺地菩薩尚曰今佛入于三昧是不可思議況二乘人乎故曰甚深佛放眉間白毫一光照東方萬八千世界乃顯然示一乘佛知見即在目前如此智慧二乘人可能思量乎彌勒云世尊何故放斯光明彌勒尚不知故況二乘人乎故曰無量釋迦一佛一時動靜之智慧尚深不可量況百千萬億無數諸佛及佛成道已來四十年前所行事寧不甚深無量耶此一句且標實智其智慧門者標權智也權智謂之門者諸佛以實智證理權智說法引人自淺至深由堂入室俾極愚痴凡夫得以開悟佛知見而成聖果皆九部法權巧方便使然故謂之門難解難入者無論十方三世一切諸佛及佛成道已來四十年前所說法門難解難入即約此會雖云佛說大乘經名無量義是教菩薩之法然佛何嘗分別二乘人不是菩薩而二乘人自己不悟其資高者乃云我昔從佛聞如是法見諸菩薩受記作佛而我等不預斯事甚自感傷失於如來無量知見其資少卑者則曰年並朽邁身體疲懈於菩薩法不生一念好樂之心如此智慧之門二乘人其能解乎故云難解佛入定放光無非是大師子吼而二乘人業已與入頭處佛於定中又密遣大慈如彌勒之善問者為二乘人而問之大智如文殊之善答者為二乘人而答之二乘人雖因二大士之問答知佛欲說授記之大法則亦莫過謂與他大菩薩授記非為己耳如此智慧之門二乘人其能入乎故云難入釋迦一佛一時如此為二乘人放光動地開方便門尚難解難入況百千萬億無量諸佛及佛成道已來四十年前所開無數法門二乘人其容易解而入耶故總歎曰我云諸佛實智甚深無量權智難解難入者是誰難解難入是汝身子等一切聲聞辟支佛所不能知也此中一切聲聞辟支佛所不能知與下文唯佛與佛乃能究盡等相照應意顯諸佛二智二乘人難知唯我釋迦一佛能知之也所以者何佛曾親近至隨宜所說意趣難解所以下徵釋上文明就實開權之義謂諸佛二智許多二乘人都不能知唯佛一人所以能知者何也以佛一人曾親近得諸佛多盡行得諸佛道廣於諸佛道法中勇猛精進名稱普聞故其所成就實為甚深未曾有也然將此甚深未曾有之法隨汝身子等機宜所說其說中主意趣向汝二乘人所以都難解也相與為眷屬曰親恒不離左右曰近親近則明其所習學屬於知盡行則明其所操履屬於行習學則知其深操履則知其甚深知其深則名勇猛知其甚深則名精進有如此知行之實德則有如彼普聞之名稱名者如佛名釋迦牟尼稱者如釋迦一佛則有如來應供等十號之稱頌也普聞者佛之十號十方微塵剎土無不皆知也名實既真則自利利他三乘十地以至等覺菩薩所未曾有法方得其成就初曰親近次曰盡行後曰成就則佛之於道見修證因果宛然矣親近諸佛則曰無數盡行諸佛之道則曰無量無量佛道難以盡行故又曰勇猛勇猛似近鹵莽故又曰精進由是成就則曰甚深矣二乘人纔得佛一有餘涅槃便謂所得弘多其餘則謂無所堪任如是何有親近無數諸佛之願乎不復進求阿耨菩提何有盡行諸佛無量道法之力乎身體疲懈但念空無相無作何有勇猛精進名稱普聞之因乎於菩薩法遊戲神通淨佛國土成就眾生心不喜樂何有成就甚深未曾有法之果乎故後文云若我弟子自謂阿羅漢辟支佛於菩薩法不聞不知此非佛弟子非阿羅漢非辟支佛正謂二乘人不能如此學佛行事也及舍利弗等悟後佛與其記必曰於無量若干劫供養無數若干佛已然後廼得成佛號曰某佛則其劫長果大安可因中不先開悟佛知見耶故開悟佛知見為經中一大事因緣也苟先不如此說得極透教二乘人於無上菩提云何不生畏懼而不退息哉應知自所以者何下明佛實智甚深之所以隨宜所說下明佛權智難解之所以親近二言案至化城喻品及提婆品以親則智佛與佛及十方佛皆父子兄弟之親近則提婆為師佛為弟子奉事千歲為近故盡行二言案至常不輕品以惡罵捶打尚致禮讚為盡行故名稱普聞案至藥草喻品以大音聲善徧天人阿修羅我是如來應供等神力品諸天於虗空中唱言有國名娑婆佛名釋迦皆是佛之名稱普聞故成就甚深未曾有法案至寶塔品以去涌塔變土集分身出法眷談壽量分別法會功德乃至提婆得記龍女成佛皆是佛所成就甚深未曾有法一向不曾與二乘人說二乘人亦不曾見今經皆從實說出所以為難信難解者也舍利弗吾從成佛已來至知見波羅蜜皆已具足此詳釋隨宜所說意趣難解之文以明開權便為顯實之義舍利弗下承上節而言謂佛習學如此無量操履如此無數成就如此甚深而為二乘人隨宜所說意趣難解者以吾釋迦從菩提樹下成佛已來隨眾生機宜將此大法或作種種因緣而說或作種種譬喻而說如此廣演三乘九部言教成其無數方便無非引導二乘眾生令離諸著也所以下徵釋謂所以將大就小言教方便但令離著者二乘人業已遵佛教離其著已今又謂隨宜所說意趣難解者何也以我釋迦如來將大就小無數言教方便主意趣向元不但教二乘人離凡夫之著即取方便波羅蜜證偏空小涅槃而已若然者則離著之方便反為執著矣廼佛種種言教無數方便波羅蜜中業已具足開示諸佛如來知見之大波羅蜜大涅槃在其中矣舍利弗如來知見廣大深遠至言辭柔軟悅可眾心此釋上方便知見波羅蜜皆已具足之文而申明權實並行二乘人所以不知之義舍利弗如來知見下謂佛無數方便波羅蜜中即具足如來知見之大波羅蜜二乘人所以不知者以釋尊曾親近過百千萬億無數諸佛如來知見所以廣釋尊曾盡行過諸佛無量道法如來知見所以大釋尊勇猛精進如來知見所以深釋尊名稱普聞如來知見所以遠釋尊成就甚深未曾有法如來知見所以有四無量心四無礙辨十力四無所畏百千禪定萬億解脫恒河沙三昧如海之深如空之無際所以果上得成就一切聖凡所未曾有之法也舍利弗如來能種種下謂以上未曾有之法皆佛與十方三世一切諸佛自證之實智而言具足於方便波羅蜜之權智中者以如來能種種分別善巧而說故其善巧說為何如謂佛將廣知見為二乘人作狹知見而說大知見作小知見而說深知見作淺知見而說遠知見作近知見而說一切未曾有法都作尋常所有之法說以故一切小大乘眾生聞而不驚不怖只見如來言辭柔軟無有強牽將來悶絕躃地之患而悅可其眾心也此豈非無數方便波羅蜜中皆已具足一乘佛如來知見之大波羅蜜在其中耶然二乘人但取其小不求其大但證有餘方便之化城不進無餘實相之寶所是何負我佛之慈悲屈我佛之喜捨故曰一切聲聞辟支佛所不能知又曰隨宜所說意趣難解也應知此中如來二字獨指釋迦牟尼一佛如來知見下申明佛實智如來能種種下申明佛權智舍利弗取要言之至如是本末究竟等此結成上節二種波羅蜜而明權實皆妙難以言盡之義為後吾當為汝分別解說直至囑累品張本舍利弗取要等者謂如來知見波羅蜜固廣大深遠方便波羅蜜又巧妙柔悅廣言之則二乘人聞以驚駭試取廣中最緊要者略言之則又無量無邊略尚無邊廣何能悉廣略既難盡妙不如止而不說為愈故云止舍利弗不須復說所以下徵明謂佛所以無問而自說說而復自止者何也以佛所成就是第一義從來未曾說之希有二乘人難信解之妙法唯我釋迦一佛與十方三世一切諸佛乃能究盡廣略諸法中之實相汝二乘人所以難知也所謂下謂唯佛與佛乃能究盡諸法實相汝二乘人難解為妙者是何等之諸法也乃即是我釋迦一佛成道已來四十年前以種種因緣種種譬喻廣演言教無數方便隨宜所說如是相性本末究竟等之諸法也前標中所謂其智慧門難解難入之權智者此也實相者即十如是與究竟等之三言也十如是及究竟等三言訓為實相者以相性等諸方便法中元具足如來所是究竟生佛平等一乘佛知見之實相在其中前標中所謂諸佛智慧甚深無量之實智者此也此中止不須復說為下身子等生疑動請之案諸法實相十如是為後吾當為汝分別解說之案佛意謂我於菩提樹下始坐道場於三七日中觀知眾生根鈍不堪大法故將究竟生佛平等一乘佛之知見權隨眾生小機之所宜或說萬法唯識則曰相或說三界唯心則曰性或即相以談性則曰體或即體以談用則曰力或說力有善惡之業用能興起世間出世間則曰作或說真如佛知見及無明三細為世間出世間能作之因或說諸佛菩薩善友開示悟入及境界六麤為世間出世間所作之緣或說因必生果法身同而善惡毫釐實不昧或說緣必感報莊嚴異而好醜分文曾不爽或說心識為三界之本或說萬法為心性之末如此隨宜所說皆佛實智稱真如無非必是之方便也雖有許多方便眾生聞者不同而究竟皆得一切種智也故曰究竟等等者准楞伽經諸佛有四種等謂字等語等法等身等究竟者如二乘人二乘法有二乘果之究竟人天機人天法有人天果之究竟大乘機大乘法有大乘果之究竟所究竟雖不同而能究竟如是性相皆空之實相則處凡不減居聖不增而平等故曰究竟等此義詳於藥草喻中佛成道已來四十年前所譚大小乘教此相性本末諸法也佛今日毫光中所示現此相性本末諸法也下文分別解說開示悟入一大事因緣乃此相性本末諸法中如是究竟授記成佛劫國莊嚴之實相也二乘人四十年中錯過隨相執相隨性執性到今說經入定而不知放光動地而不知彌勒文殊再四指引尤不知故佛不得已而如此諄諄尚須三請後分別解說唯身子一人而知可謂一切聲聞辟支佛所不能知唯佛與佛乃能究盡也爾時世尊欲重宣此義而說偈言世雄不可量諸天及世人一切眾生類無能知佛者爾時下頌總標第一節也長行云諸佛此云世雄謂諸佛始是世間出世間真英雄也長行云諸佛智慧甚深無量其智慧門難解難入此但云不可量則二智甚深無量皆攝盡矣長行云一切聲聞辟支佛所不能知此推廣云諸天及世人一切眾生類則下文新發意及不退諸菩薩如稻麻竹葦之多者皆標於此矣佛力無所畏解脫諸三昧及佛諸餘法無能測量者佛力下頌長文第二節義文云佛曾親近百千萬億無數諸佛盡行諸佛無量道法勇猛精進名稱普聞成就甚深未曾有法頌中云佛力無所畏解脫諸三昧正是長文所謂無量道法及甚深未曾有法之實智也及佛諸餘下諸佛因眾生難解實智故以方便權智隨宜說成餘大小乘法一切眾生所以無能測量也無能測量即長文意趣難解本從無救佛具足行諸道甚深微妙法難解難可了此頌長文第三節承上文言謂上云及佛諸餘法眾生無能測量者以佛本從無數佛所具足行訖諸道故方便權智法中有甚深微妙實相之法在中一切二乘人所以難見難可了也於無量億劫行此諸道已至信力堅固者此及後節唯我知是相十方佛亦然止總頌長文第四第五兩節之文於無量下頌如來知見廣大深遠等文明佛實智波羅蜜也問曰上節既云具足行諸道此節又言行此諸道已言豈不贅乎答曰上節具足行諸道頌佛因中之事故以無數佛言此節行此諸道已頌佛果上之事故以無量億劫言應知上節重具足字上此節重已字上各自一義問曰此既頌第四節文云何雜其第五節文以如是大果報種種性相義我及十方佛乃能知是事是長行第五節之文故曰長行第四節如來知見廣大深遠無量無礙等文是佛欲廣譚實智波羅蜜之文第五節唯佛與佛乃能究盡諸法實相等文是就廣譚中取緊要者略言之之文因此長文兩節元是一義故頌文合而頌之道場得成果者准後文我始坐道場觀樹亦經行是指阿蘭若法菩提場為道場也我已悉知見者准後文即我所得智慧微妙最第一是指佛因圓果滿證得一乘佛知見也如是大果報種種性相義應前文則照如是果如是報如是相如是性等為言應後文則為變淨土集分身涌沙眾說壽量之案以彼昔是佛之大果報性相義故我及十方佛乃能知是事應前文則照唯佛與佛乃能究盡諸法實相之言應後文則我即釋迦一佛共多寶佛坐寶塔中者是十方佛即化城喻品十六王子各於十方成佛及三變淨土分身諸佛坐寶樹下者是是法不可示下頌長行如來能種種分別巧說諸法言辭柔輭悅可眾心為佛方便權智波羅蜜之文然承上頌而言是法者謂是佛坐道場成果知見人人本具一乘之妙法也此法佛於三無數劫所行所證唯自覺聖智所受用本不可指示於人故曰不可示所以不可示者以非言辭話會可得乃離名絕相要心領而神會也故曰言辭相寂滅由是佛於四十年前就小機眾生於一佛乘雖曰巧妙柔悅無非要大小乘人同開佛知見同受記作佛而大小乘人各隨語取證不契佛心所以謂諸餘眾生類無有能得解也此佛見聲聞人執著言辭之相不得開悟佛知見之激辭下文身子云世尊何因何緣殷勤稱嘆諸佛第一方便甚深微妙之法正對此也除諸菩薩下謂此言辭相寂滅之法但責聲聞人無有得解除諸大菩薩信力堅固者不在此例也此冥激發身子等能生信力則即是菩薩不與諸餘眾生比也故後文每每勸舍利弗生信云汝舍利弗以信得入應知小乘人成佛全重在一信字上諸佛弟子眾曾供養諸佛至亦復不能知此頌應六截推廣諸餘眾生類無有能得解二句申明諸佛二智甚深無量然人則一層高一層義則一句緊一句只要發揮一切聲聞辟支佛所不能知惟佛與佛乃能究盡之義初諸佛弟子下供佛有福漏盡無過以有福無過最後之身而力不堪諸佛二智甚深無量可知矣二假使下謂諸佛弟子雖多或無智慧容有不知即如一舍利弗之智聲振五天竺國名遍三千大千世界不拘劫數盡其思量亦不能測諸佛二智甚深無量可知矣三正使下謂不但假使即正使滿十方眾生皆如舍利弗之智乃更加其餘諸大弟子神通如目連頭陀如迦葉辨才如富那戒律如波離蜜行如羅睺多聞如阿難解空如空生論義如旃延等亦遍滿十方剎土盡其神思忖度測量亦不能知諸佛二智甚深無量可知矣四辟支佛下謂舍利弗等諸大弟子或假使正使雖多且廣乃三乘阿羅漢容固難知即二乘利智如辟支佛者亦遍滿十方數如竹林之多合做一心如此人眾心一時長且久亦莫能知諸佛二智甚深無量可知矣五新發意下謂聲聞辟支佛固是中乘人容不能知即新發大乘意菩薩供佛有福超二乘人矣達義說法自利利人有慧超二乘人矣其數之多不但如竹林且如稻如麻如葦又充遍十方剎土非散亂之心乃禪定一心非其少時乃恒沙之多劫一齊思量亦不能知諸佛二智甚深無量可知矣六不退下謂新發意菩薩雖是大乘然以新發意故容有退息不知即初地以上法身大士不退地諸大菩薩其數如恒沙之多合做一心共思而求佛之智慧亦不能知則諸佛二智甚深無量可知矣佛與諸佛二智如此難知則一切聲聞辟支佛安可謂佛說一解脫義我等亦得此法到於涅槃所得弘多固不能知佛明矣新發意菩薩不知為後授學無學人記品疑阿難不應得記之案不退菩薩不知為提婆品智積菩薩不信龍女成佛及壽量品阿逸多菩薩不信從地湧出菩薩是佛弟子之案又告舍利弗無漏不思議至十方佛亦然又告舍利弗等者謂上既已告汝是法不可示言辭相寂滅矣今又告汝諸佛弟子至不退菩薩皆無有能得解者以諸佛所證是無漏不思議甚深微妙之法汝等一犯思議則成有漏矣淺而不精微矣麤而不玄妙矣所以皆不能知而曰唯我與十方三世諸佛能知之者以我親近佛多盡行道廣故其成就亦甚深所以我釋迦一佛與十方三世一切諸佛乃能究盡也故曰我今已具得等舍利弗當知諸佛語無異至引之令得出舍利弗當知下承上文而言謂諸佛所證既同所知又同則其言語無不同也故云諸佛語無異於佛所說下謂佛與諸佛語既不異信我一佛之語即如信十方三世一切諸佛言語同矣故勉身子當生大信力則與前所推除諸菩薩眾信力堅固者相等矣世尊法久後下謂當生大信力者信何法也信我釋尊說法四十餘年至是則可謂說且久而最後必要說真實不說方便也告諸聲聞下謂說何等真實謂汝身子當告諸聲聞眾及緣覺之人說我四十年前說法令汝二乘人脫苦果之縛逮得有餘涅槃者比言辭皆非真實乃是佛以方便力假示三乘之教也眾生處處下謂佛四十年前何以不用真實而用方便開示耶以汝二乘等眾生於世間出世間處處貪著故假以方便先且引之出世間而今又引之世出世間也此佛與十方三世一切諸佛同而無異真實之言也爾時大眾中有諸聲聞至甚深微妙難解之法自此至是等聞此法則生大歡喜乃第二重止而請說為當機生信之方便堅求其妙也爾時大眾下有諸聲聞從因稱也漏盡阿羅漢就果稱也千二百羅漢獨標陳如為疑首者陳如以佛成道最初聞小乘四諦法得解脫者故以佛說一解脫義為言及發聲聞下千二百人之弟子各作下師資為佛所激動而念中默述佛嘆大斥小之言佛所得下默述實智有所下默權述智佛說下師資念中循環自揣謂己既已遵佛教已證涅槃而今又謂我輩不知則誠不知其所以然矣故云而今又知等爾時舍利弗下當機乘眾疑而序己疑以請佛決謂佛尋常不高己下人今以何因由緣故再四嘆己所說所證之高深而貶斥諸佛弟子及不退菩薩皆不能知我自從佛以來未曾聞也此陳己疑今者下通眾疑惟願下請決疑世尊何故下結回何緣求決也身子初從因緣悟入故以因緣而請此中疑何因何緣下佛答云是一大事因緣身子疑為法說一周一人得記之案阿若等疑為後喻說一周因緣說一周千二百人及五百弟子得記之案良由不疑則不開悟不開悟則不得受記疑有淺深由根有利鈍致法有三周記有先後非徒然矣又佛說一解脫義我等亦得此法到於涅槃而今不知是義所趣四句為後三周九喻文字之大案爾時舍利弗欲重宣此義而說偈言慧日大聖尊久乃說是法至欲聞具足道爾時下偈有十一行初慧日下三行半總述佛所說所得非二乘人所知唯佛與十方三世一切諸佛所知所得次無漏諸羅漢下三行頌陳如等師資之疑求佛為解於諸下兩行半頌當機自己之疑求佛為解諸天下兩行要會中大乘之機求佛為解慧日等者天無日不見四時運化之功佛無慧不見三乘修證之道故以慧喻日尊佛為大聖也久乃之久應上世尊法久後言自說等四句申成久乃說是法之法道場所得法應前道場得成果而言無能發問者應諸佛弟子眾乃至不退諸菩薩不能測佛智而言我意難可測應假使滿世間皆如舍利弗盡思共度量不能測佛智而言亦無能問者謂除不退諸菩薩及我舍利弗既不能問則亦無有能問者矣無問而自說下謂佛在定中既知我等皆不能問似不應與我等而說却出定後又因我等無問而自說既無問而說說應異常却又只是稱嘆佛四十年間平常所行之道若論佛平常所行之道則佛說一解脫義我等亦得此法到於涅槃不見甚微妙而不解佛又說平常所行方便道中有智慧甚微妙非二乘人所知乃諸佛之所得因此無漏諸羅漢及發心求羅漢涅槃者今皆墮疑惑網中謂何故說此言責我等不知其求緣覺下謂不但小乘求羅漢果者生疑即中乘求辟支佛果僧俗人等亦皆彼此眼相視而心猶豫故瞻仰於佛謂是事為云何哉若我等所得非真則佛當初不應印可於我若真則又有何義趣不知四眾既不能問又豈能解故曰願佛為解說此身子代頌四眾之疑為二乘人請說其妙於諸聲聞下謂千二百羅漢有疑乃智慧不如我者如我則佛尋常見推於二乘中為智慧第一之人似不應有疑今聞佛說尚不能了況其他乎為是究竟下正出己疑謂佛說滿世間之身子不能知者為是不知佛最上一乘阿耨菩提之究竟法耶為是不知佛尋常所行之三乘道耶若尋常所行三乘之道我已證得不應責我不知若阿耨菩提究竟之法佛原不許我二乘人作佛難得今佛授二乘人記要我等作佛耶佛口所生下謂若果記我二乘人成佛則記出佛口我得其記而為佛子則子從佛口中生矣故我千二百人手則合掌目則瞻佛果如我疑則願佛口早生其子出微妙之音使我疑解正是其時故曰時為如實說如實說一句正應上文要當說真實言以上身子為己請竟諸天下要眾請數如恒沙言其人多求佛下言其根大又諸下言其來遠合掌下言其心誠欲聞下言此多眾大根之人皆從遠方而來至誠之極非求半珠在獲全璧故曰欲聞具足道具足道亦應上甚深微妙法我今已具得言身子求心切而求詞迫故法說一周後即先得記亦有由矣智論謂婆羅門自稱已從大梵天王口中生餘姓皆從他處生故佛弟子亦以佛口所生為尊重也爾時佛告舍利弗至聞佛所說則能敬信爾時舍利弗欲重宣此義而說偈言法王無上尊惟說願勿慮是會無量眾有能敬信者爾時下身子業已為人為己陳其疑請其妙佛復止而復止意在悅可眾心不使驚疑說之令疑且驚是以不說身子復要眾而再請者謂天人雖疑尚有不疑者多而敬信者廣豈可因少疑而害多信者缺其慈悲哉佛復止舍利弗若說是事至將墜於大坑爾時世尊重說偈言止止不須說我法妙難思諸增上慢者聞必不敬信佛復下佛法常儀一請便說況今無問自說反再請而不許者正為增上慢輩耳上以一切天人不信為辭此以增上慢眾為辭言緩意迫輕重漸及佛慈而威可見矣大坑地獄也凡人不信佛言則墮地獄豈可說法度生翻令不信者受苦耶可見說與不說皆是慈悲是以辭之深而絕之至也爾時舍利弗重白佛言至長夜安隱多所饒益爾時舍利弗欲重宣此義而說偈言無上兩足尊願說第一法至則生大歡喜爾時下佛以增慢者為辭身子以類己者多為請佛以現前不信者為絕身子以世世受化者為求佛以墮大坑為慮身子以長夜安隱為解偈中初四句為己求是會下為天龍八部求文殊所謂諸求三乘人等者是也我等千二百下為同道者求文殊所謂諸人今當知等者是也文澹義濃求之深而語益該矣則會中雖有不信之人佛亦不能顧其難而欲慈悲矣故下文有分解說之應允當第三重生信為開示悟入之方便分別解說其妙文分九節爾時世尊告舍利弗至惟然世尊願樂欲聞爾時世尊下從堅請許說汝今下誡聞與意合而聽始專吾當下分別解說四字按品題正是方便論文義則為一經應前啟後之大關鍵初佛云止舍利弗不須復說身子請曰是事為云何願佛為解說第三次佛却曰止止不須說身子請曰惟垂分別說則分別解說四字元是身子請辭佛今允可但加吾當為汝四字此論能詮文勢相承之嚴密如此若論所詮義者前云是法不可示言辭相寂滅可容分別乎又云無漏難思議甚深微妙法可容解說乎又云諸餘眾生類無有能得解又云惟我知是相十方佛亦然則如佛與諸佛所得妙法元不可分別解說今云吾當為汝分別解說者是為身子等無有能得解者不得已而以言語為方便將佛與諸佛所知不可示者而分別之將佛與諸佛所能不可思議者而解說之下文如是妙法已去直至囑累品終皆是為二乘人分別解說也而開示悟入又為分別解說之四門說此語時下經家敘置謂佛方許可為當機等分別解說法之所以為法妙之所以為妙之時法會之中便有比丘等五千人禮佛而退去不欲聞佛分別解說四十年前所說諸法之妙義也所以下徵釋五千人不欲聞之所以者以此輩罪根深重及懷增上慢故也准頌文罪根深重指我慢及不信言頌云優婆塞我慢優婆夷不信故以我慢及不信為極深重罪過中之根本故增上慢准頌文但指比丘等出家二眾言頌云比丘比丘尼有懷增上慢故法數云慢有七恃己陵他名我慢同德相慠名慢於同爭勝名過慢於勝爭勝名慢過慢未得謂得名增上慢於劣自安名𢍉劣慢不禮三寶名邪慢今五千人法到耳邊禮佛而去於七慢中犯其我慢及增上慢所以然者以五千人聞佛四十年前所談少有所證抱守功勛我相以為妙境今忽聞二乘人不知意豈不曰我輩千艱萬難得到此地若更不是則終無有是然不知此正見罪根深重及增上慢也有如此失下失過也謂五千人有此罪根深重及增慢過失是以佛默允其退去而不制止也佛法常儀以默然為應允故制如天子稱制之制勅命也爾時佛告下始是佛自述默然允其退去而不制止之義我今此眾無復枝葉者乃佛自慰之辭後文云今我喜無畏者此也貞本榦也對枝而言實果實也對葉而言凡物有榦實不愁無枝葉若雖有枝葉而無榦實則何益也此佛所以略不勅命而制止者以五千人是眾中不肖之枝葉去之無損留之有累故不如默允其去為佳也汝今善聽下叮囑之辟謂當機既是貞實之人故須善聽能善聽則上不負於佛之所說下不負於己之慇懃三請舍利弗言下當機遵佛勅囑由此後文囑累持經甚懇劫三變淨土移置天人於他方也佛告舍利弗如是妙法至以大事因緣故出現於世佛告下正為當機分別解說一切聲聞辟支佛所不能知唯佛與佛乃能究盡諸法實相等文也如是二字即前文所謂諸法如是相等之十如是妙法二字即前文相性本末之諸法前云諸法此云妙法者未許分別解說時三乘不得濫於一乘則相只為相性只為性乃至本末只為本末不得與究竟覺等成一相一種故謂之諸法二乘人所以不得受記作佛既許分別解說則相性本末三乘之法皆與一乘實相不相違背都成一乘佛知見究竟覺平等之妙法二乘人所以得受記作佛故此中指定前文云如是妙法也諸佛如來時乃說之者時字最重謂如是相性本末等諸法四十年前不分別解說其妙只待四十年後方分別解說其妙者以十方三世一切諸佛都要待時到而說故云時乃說之時乃之時謂諸佛涅之時及二乘人受記成佛之時化城品云諸比丘若如來自知涅槃時到眾又清淨信解堅固了達空法深入禪定便集諸菩薩及聲聞眾為說是經世間無有二乘而得滅度唯一佛乘得滅度耳是也如優曇鉢華下謂如是妙法云何要時到而說以妙法非時不說說則一向不許二乘人受記成佛者今皆得受記成佛即如優曇鉢靈瑞大寶青蓮華非時不現現時定有金輪聖王出世國土莊嚴臣民壽命皆得增長八萬四千歲也此借世間第一希有靈瑞大寶青蓮華以喻出世間第一希有之妙法皆由時到而說而現耳經題由此名妙法蓮華者也舍利弗汝等當信下謂身子等既以喻知妙法如華三世十方一切諸佛皆以時到而說則亦當信我釋迦一佛四十年前不說相性本末等諸法為妙直到於今四十年後分別解說其妙者亦時然後言不虗妄也上云諸佛如來指十方三世一切諸佛此云信佛所說指釋迦一佛唯佛與佛之分別見矣舍利弗諸佛隨宜等者文承於上義釋於前謂諸佛法妙以時說如優曇鉢華以時現而不虗妄者時何法也有何妙也法者即我出定時所嘆諸佛隨宜所說如是相性本末等之諸法也妙者其間隨宜所說相性本末等法主意趣向汝二乘人都難信難解故也所以下徵明謂所以諸佛隨宜說法意趣難解稱妙者何也我以下釋成謂且勿論十方三世一切諸佛隨宜說法意趣難解為妙即我釋迦一佛成道已來四十年中以種種因緣譬喻言辭無數方便權智演說如是相性本末等諸法汝二乘人都用第七識思量第六識分別殊不知如是相性本末等諸法中妙義非汝二乘人第七識思量第六識分別之所能解也故云是法非思量等以上分別解說前文一切聲聞辟支佛所不能知之義唯有諸佛下又分別解說前文唯佛與佛乃能究盡諸法實相等文謂我前又告汝唯有十方三世一切諸佛乃能知我釋迦一佛權中所以有實之妙者何也以三世十方一切諸佛世尊出世之世界雖不同而出世為一大事因緣之意趣則皆同也故釋其所以云諸佛世尊唯以一大事因緣故出現於世此句會通十方三世一切諸佛出世說一大時教之本懷於法則為會三歸一於人則聲聞辟支佛由是得授記作佛名會權歸實也六祖云此經以諸佛出世為一大事因緣故為宗是也舍利弗云何名諸佛下徵辭可知釋辭云諸佛出世元不為開示悟入眾生聲聞緣覺知見乃欲令眾生開示悟入成佛之知見而出現於世也舍利弗是為下結足徵義諸佛世尊四字指十方三世一切果覺為言如後文多寶佛為過去世佛舍利弗成佛名華光佛乃至阿難成佛名山海慧自在通王佛皆未來世佛化城喻品十六王子各在十方成佛寶塔品會集諸佛皆現在世佛故此中諸佛世尊該盡一部經中所詮佛也欲要也意願之謂令者使也眾生者世間因緣也以九法界眾生雖有聖凡不同皆具無明三細為因境界六麤為緣開字為出世間之緣佛知見三字為出世間之因以佛知見為眾生本有之正因一向迷而不知諸佛說法但為開之而為緣故知見兩言攝盡六根以見屬眼知屬意經舉兩頭中攝耳鼻舌身使得清淨故者眾生未開佛知見時眼視色染耳被聲汙乃至意被法汩名之為濁一開佛知見後即父母所生肉眼耳等一十八界皆成如來藏妙真如性故曰清淨六根清淨之義法師功德品中廣明欲示眾生等者上文但明開者不障蔽義此云示者不隱藏義悟者不迷惑義入者不退墮義開示屬佛說法悟入屬機證入以佛知見釋大事者如後諸授記品成佛十號劫國莊嚴法眷壽命正像法久近是也大事謂之一者眾生雖與諸佛名位不同而知見則一未開悟時則佛作眾生知見及開悟後眾生便是佛之知見如後文云十方國土中惟此一事實餘二則非真是也諸佛出世要眾生開示悟入佛知見之意趣如此所以四十年中隨宜說法莫過要眾生得一乘法而聲聞辟支佛眾生之意趣如彼於四十年中聞隨宜所說取證二乘偏空之小果佛於前文安得不謂一切聲聞辟支佛所不能知唯有諸佛廼能知之此猶約佛四十年前所說大小三乘十二部經為訓若約當經則方便一品為總開示舍利弗一人為先悟入喻說因緣說為別開示千二百人為次第悟入自方便品起至記學無學二千人品止共記九品經名說三周法授三根記且就開示悟入法身佛言若約開示悟入報化身佛言則初十品為開佛知見二種力中多分屬智力見寶塔品至涌出品五品經文為示佛知見壽量一品為悟佛知見分別功德品至囑累品六品經文為入佛知見二種力中神力居多是知一經所詮不出佛知見三字一經能詮不出開示悟入四字而分別解說又開示悟入之大方便也如身子等萬二千人由方便譬喻信解三品分別解說知見佛於四十年前所說許多三一權實之心事由藥草喻品分別解說知見佛四十年前唯實無權許多言不盡之功德由化城喻品分別解說知見佛不唯四十年前唯實無權即無數塵點劫前為沙彌時亦唯實無權許多之因緣由諸授記品分別解說知見身子等千二百人未來許多各自成佛十號劫國壽命法眷等之莊嚴由法師品分別解說知見以聲聞作菩薩許多師資之執度由寶塔品分別解說知見佛有許多之分身身有許多之國土勸持有許多校量之難易由提婆品分別解說知見佛為弟子甘許多之辛苦文殊為師保成許多之勇徤許多提婆於地獄而持經同乎文殊之說法許多龍女以畜道而證果等乎釋迦之修因由持品安樂行品分別解說知見諸菩薩之持經有許多忍辱願力與安樂由從地涌出品分別解說知見佛有許多常隨大乘之弟子由壽量品分別解說知見佛有許多過塵劫不性不滅之壽命由分別功德品至常不輕品分別解說知見現在大會及未來過去持經者人人各得許多之功德由神力品分別解說知見佛與諸佛有許多之神力由囑累品分別解說知見佛所付囑許多修習是難得阿耨多羅三藐三菩提之家業故此品佛知見三字不容易悟入也諸聲聞辟支佛苟非釋尊如此從始洎終分別解說方便開示則何能悟入哉佛告舍利弗諸佛如來至無有餘乘若二若三佛告舍利弗下覆釋上節謂諸佛所以不為眾生開示聲聞緣覺知見者以諸佛如來本意但為教化菩薩之機故在因地時雖諸有所作六度萬行但為一大事故今果上自己既已成佛為人分上亦唯以佛知見示悟於眾生也舍利弗如來下謂當機既知諸佛但為一事則知我釋迦如來迺諸佛中一佛諸有所作一准諸佛程規四十年前以至今日亦唯以一佛乘為眾生隨宜說法實無有餘若二乘緣覺若三乘之聲聞也應知以佛知見教菩薩所以為大事無有餘乘若二若三所以為一大事此節又佛重訓上文一大事之言事者對理而言果報之義此經妙在不譚理不說行證但說一乘佛知見為事以理行證四十年前皆說盡矣經云先所出內是子所知若據本分為入則佛有何知見而為事今為因地眾生談果上受記成佛十號劫國莊嚴等事故曰一大事前文云如是大果報種種性相義我及十方佛迺能知是事則成佛大果報莫過是吾人該當為的一件大事除此則餘皆小事耳此一節申前啟後下第七節有結文合於此舍利弗一切十方諸佛法亦如是舍利弗下足成上文無二無三之義引起下文三世諸佛之文上雖言諸佛未知諸是多少此云一切十方等謂無二無三一乘之法不但我釋迦一佛與東西南北三四方諸佛而已乃一切十方諸佛皆無緣覺聲聞但有一乘佛知見之法也當機雖是小果不信大乘到此推車拄壁不得不信解矣故後述成己悟云初聞佛所說心中大驚疑將非魔作佛惱亂我心耶乃至佛說過去世無量滅度佛安住方便中亦皆說是法疑悔永已盡我定當作佛則佛引證十方三世諸佛非徒然也下第八節有結文合於此舍利弗過去諸佛至究竟皆得一切種智舍利弗過去下謂不但一切十方諸佛法亦如是即過去日月燈佛大通智佛威音雷音王等諸佛雖說無量無數因緣譬喻三乘言辭權智之法其實只為佛知見一乘實智之道以上明過去能被之教主但為一乘所謂會三歸一也是諸眾生下謂過去所被化之眾生雖以聲聞緣覺之機從過去諸佛聞相性本末等三乘之法至究竟時亦各各皆得一切種智而成佛也所謂會權為實也下三節倣此一切種智即一乘佛知見變文能所被機教既皆同為一乘得一乘則十方三世無餘二三乘可信矣舍利弗未來諸佛至究竟皆得一切種智舍利弗下未來諸佛即千二百羅漢悉亦當作佛者如身子未來作華光佛華光又授堅滿菩薩記號曰華足安行佛乃至羅睺作佛號蹈七寶華佛皆未來佛也舍利弗現在十方至欲令眾生入佛之知見故現在諸佛者與我釋尊同時之教主如後文三變淨土所來者是也又妙音品淨華宿王智佛普賢勸發品寶威德上王佛皆是也義雖引證催當機入信而文亦二十餘品伏案舍利弗是諸佛但教化下迺總十方三世諸佛之文結合前第三節之文但言示悟入不言開者以無量方便因緣譬喻說法即是開義也舍利弗我今亦復如是至尚無二乘何況有三舍利弗我今等者謂我釋尊一佛與十方三世一切諸佛先三後一說法之式相同也知諸下實智所知也隨其下權智所闡也舍利弗如此下謂雖就實開權本意只要因權入實也舍利弗十方下謂所以先權後必欲入實者以十方世界中法本如是唯有一乘無二三乘故也自出定嘆德至此我釋尊成佛已來懷抱方得揚眉吐氣文略而義深也故後頌文應此節者益加詳盡十方世界等三句為結前第四節之合辭彼云十方諸佛法亦如是此云尚無二乘何況有三其言校前益厲佛慈為人益深矣至是身子雖多狐疑其心寧不安如海乎舍利弗諸佛出於五濁惡世至無有餘乘唯一佛乘前第三節以釋迦一佛結諸佛而啟十方三世之文上第八節以十方三世諸佛結我釋迦一佛以明唯有一乘之義則分別解說唯佛與佛乃能究盡諸法實相之義業已至矣此第九節仍以諸佛合我佛結歸初二兩節勸當機生信冥顯一切聲聞辟支佛元不是二乘皆是大乘之菩薩也舍利弗十方下承上節言謂既十方世界尚無二乘何況有三者云何諸佛起初又說三乘也以諸佛所出之時世迺五濁不良不得已而以方便力於一佛乘分別說作三乘耳所謂下標其五濁如是舍利弗下釋成劫者時也濁者非清淨義乃煩惱等四濁聚於一時故云劫濁亂時也眾生垢重眾生濁也慳貪嫉妬煩惱濁與見濁也成就諸不善根命濁也以根即命根故於一佛乘分別說三三周法訖皆用此為結法喻二周以諸佛言因緣周但以釋迦一佛言舍利弗若我弟子下以上既明從實開權此下應會權歸實也謂若佛弟子初未聞佛分別解說諸佛出世權實三一之故容有不聞不知但化菩薩之事自甘分為二乘人可也若已聞知而又執迷自認是二乘人不是菩薩者此則皆非佛弟子非阿羅漢非辟支佛矣又舍利弗是諸比丘下轉釋上文謂自認為二乘人即不是佛弟子等者是何物人也以既得二三乘便執為最後身究竟涅槃不復發志向四生九類度生求無上菩提皆即是前五千退席增上慢輩之人也此誠斥以小果為足不發大心者之言也所以下謂所以既為羅漢辟支佛但不復志求阿耨菩提便同增上慢者何也以實得阿羅漢辟支佛者必開佛知見必度無量眾生必求阿耨菩提故何則以辟支佛阿羅漢與佛知見之菩提心元非二法故故曰若有比丘實得阿羅漢不信此法無有是處無有是處者謂有實得阿羅漢不信阿耨菩提者無有此理也除佛滅度下謂苟得二三乘又不信此法除我釋迦佛滅度後現前十方世界中一佛也無容許有此等不信之人何則以佛現在親見親聞尚有五千退席況佛滅度後現前又無一佛故雖有如是等經在世受持讀誦者不過循行數墨轉益見知安能望其依經解義而信自心作佛乎故云是人難得也若遇餘佛下謂除非佛滅度後更遇著餘佛方能於此妙法蓮華經中而得開示悟入佛知見之決了耳決謂決去聲聞緣覺之疑了謂解了佛性也又解謂如是等經既不能解義則流布於世何益以雖現前無佛不得開悟解義若遇餘國有佛其讀誦受持者終有一日決了是亦可以植遠因也舍利弗汝等下謂佛滅度後受持讀誦者尚遇餘佛而得決了豈汝等現前親為佛子親聞佛說豈容不見不聞諸佛如來但化菩薩事而受記作佛乎故云當一心信解受持佛語也諸佛如來下謂當一心信解受持佛何等之語乃當信解十方三世一切諸佛如來言無虗妄無有餘二三乘唯一佛乘之語也此節是結前第二第三兩節之文故諸弟子信解悟入後其自述者皆本於此身子述成云我等今者真是佛子從佛口生從法化生得佛法分迦葉等四大弟子述成云我等今者真是聲聞以佛道聲令一切聞我等今者真阿羅漢普於人天應受供養正應於此爾時世尊欲重宣此義而說偈言比丘比丘尼有懷增上慢至唯有諸貞實爾時下頌長文第一節也長文合四眾而言總責罪根深重及增上慢此分僧俗而言以增上慢責比丘等我慢責優婆塞不信責優婆夷總之責不信自心作佛則七慢皆具矣如是下頌其數不自下出其過缺漏以破器而責瑕疵以玷病而責糟糠以不醇粹而責枝葉以不貞實而責惟缺漏所以護惜惟護惜以見智小惟智小則尠福德惟福智尠少所以不堪妙法初曰佛威德故去又曰斯人尠福德不堪受是法者謂此五千人之去一是佛之威德所臨一是彼自少福德少福德故如瑕疵糟糠多威德故播揚擠拶而去糟糠去而米酒之精醇者存以安瑕疵枝葉盡而木之貞榦玉之純美者得以成其器此佛於長文中所以默然允其去而不勑命其止也責辭但以戒有缺漏言者謂五千人未嘗不持在家出家所受之戒品但一不信妙法雖持戒即成缺漏矣故後之贊持妙法者云是名持戒行頭陀者與此相照應也舍利弗善聽諸佛所得法至皆成佛無疑此頌長文第二節也舍利弗善聽下頌權實應機以成九部鈍根樂小下明應小機之未大有佛子心淨下明應大機之非小聲聞若菩薩下明稱佛本懷不分小大諸佛所得法者佛自證之實智長文所謂如是妙法者是也無量方便力而為眾生說者佛之權智也長文所謂諸佛隨宜說法意趣難解者是也此一行頌應長文則總攝二智於頌中為總標起眾生心所念者九法界眾生未發於行事之念想也種種者多而難言之數也所行道者已發於行事之道術也若干者有數存其間不必盡言之謂也諸欲性者好尚五欲之情性也先世下謂眾生所念所行所欲多不可言皆莫知所以然而然者以有先過去世無明善惡業識管轄定而毫釐不差唯有佛與諸佛乃能究盡故曰佛悉知是已初標諸佛所得此言佛悉知是見佛與諸佛之分別也以上頌佛具實智故能悉知以諸緣譬喻下頌權智該攝長文所以者何我以無數方便以下之文謂佛以實智知眾生性已然後將實從權投機說法或以諸因緣而說或以諸譬喻而說無非順其眾生所念所行所好尚使令一切歡喜易信從也或說修多羅下申明因緣譬喻所說之法以成九部之題目也修多羅云契經上契諸佛所證之理下契眾生所樂之心伽陀云孤起不應長行孤孤另起而頌者本事即佛往昔世界中本所行之事如捨頭目髓腦國城妻子之類是也本生如佛於四生六道本有受生之類是也未曾有如放光動地希有神通之祥瑞是也因緣有小大內外之分如化城品因緣說一周之類是也譬喻如本品優曇鉢二卷火宅窮子三卷藥草之類是也祇夜云應頌即應上長行而重頌者是也優婆提舍云論議如外道與佛論量人天因果世間出世間法有無真假者是也此佛四十年前隨宜所說相性本末諸法載之九部唯有諸佛乃能知之妙法也若加方等自說授記三部則名十二部也鈍根樂小下謂上九部之說非佛本懷乃不得已而為鈍根眾生樂於小法不信大乘愛着生死不識涅槃者而說也於諸無量下謂諸佛當親近而不親深妙道當奉行而不行所以無福生死不應貪著而貪著眾苦不當受惱而受苦惱所以無慧福慧全無鈍根眾生難以說大只得隨所宜而說小果故云為是說涅槃也應知九部法是能詮之文字涅槃是所詮之果證也我設下應長文是法非思量分別之所能解謂佛四十年前雖說小果涅槃迺佛所設之方便借是令入諸佛之智慧也未曾下謂才密密以小法引入佛慧實未曾顯說汝身子等千二百人當得受記成佛道也所以下出其未曾顯言之所以應長文時迺說之之時字謂所以不顯說汝等當得成佛者非佛不肯早說乃佛說此經之時及汝等受記成佛之時未至故也今正下謂今汝等受記作佛之時既到佛涅槃之時又至故佛不二三其言決定直說一乘佛知見之大乘也我此九部下謂既今日所說大乘是實則知佛四十年前所說九部之法雖是隨順眾生權智所說原其佛心直欲以小引入大乘為本意也故曰入大乘為本等此一切聲聞辟支佛所以為不知佛隨宜所說之義趣也有佛子心淨下申解四十年前亦甞說大之義謂佛既以小果引二乘人入大乘者奚佛四十年前亦甞為諸菩薩說大以有一類大乘佛子心淨軟而根亦明利供無量佛行深妙道福慧雙修故我為此等佛子說是方等大乘經典授記其人來世得成佛也者以彼內則深心念佛外則修持淨戒此輩一聞得佛音聲生大歡喜充徧其身不生退懼故佛以他心通知彼菩薩心之與行與佛無異故為彼即說大乘也然則佛四十年前亦甞說大者是彼機之所感非佛有所偏而不平等說也應知菩薩言心淨則二乘人心猶未淨菩薩言柔歎則二乘人心尚剛強但能斷惑不能度生菩薩言利根則二乘人是鈍根菩薩於諸佛所行深妙道故根軟而利二乘人於諸佛所不行深妙道所以根鈍而強菩薩深心念佛不同二乘人但樂於小法菩薩修持淨戒不同凡夫人但貪著於生死彼著生死故為苦所惱彼樂小法故為說小乘以脫苦此為喜所充故為說大乘以成佛此佛四十年前所以有大小之分別小定不可語大半定不可語滿也聲聞若菩薩下謂前雖有大乘乃對小之大許利根作菩薩鈍根為二乘今則不然不論聲聞若菩薩小大利鈍凡有聞佛所說大小乘法乃至一偈之微少今皆得授記成佛而無容疑者以稱諸佛世尊唯以一大事因緣出世之本懷也無疑二字勉當機生信之語十方佛土中唯有一乘法至說佛智慧故此頌長文第三節十方下承上節而頌謂聲聞若菩薩但聞一偈皆得成佛者以十方諸佛國土中唯有一而無二三故也除佛下謂除佛以二三乘為一乘實相之方便則說有聲聞及辟支佛也然此但是以聲聞辟支佛之假名字引導一類好小果眾生由小成大說其佛之智慧也聲聞辟支既是假名字則菩薩為真名字可知矣諸佛出於世唯此一事實至唯一無二乘此頌長行第四節也長行止有一切十方諸佛法亦如是一句頌中廣者以長文第四節元是結證第三節如來但以一佛乘故為眾生說法無有餘乘若二若三之文故頌中亦直於諸佛輕頌過而獨重明我釋迦一佛之本懷通節七十九句初三十三句申釋上頌十方國土中唯有一乘法無二亦無三之義次三十二句申釋上頌除佛方便說但以假名字引導於眾生說佛智慧故之義末十四句結回前節聲聞若菩薩聞我所說法乃至於一偈皆成佛無疑之義生起下節三世諸佛之頌諸佛下迴釋上文謂因十方佛土中唯有一乘本法諸佛出世莫過演其本法云唯此一實事也因十方佛土中元無二三諸佛所以說餘二三乘則非真也終不下謂十方佛土既只有一乘是真故諸佛自初說法至終決不以餘二三非真之小乘法濟度於眾生也以上於諸佛輕頌竟佛自住下重頌我釋迦今日直說一乘者一遵諸佛本法而平等度人也如其下謂佛既自住大乘法則亦如其自所得所住大乘法若定若慧若力若莊嚴以度生也自證下謂佛即以如己所得而度生者以佛自證無上菩提雖曰大乘却為生佛人己皆有分之平等法於大乘平等法中苟以小乘法化其一人則是佛自墮入慳貪於大自與而以小與人反為不平等矣此平常君子且不為況佛肯可此慳貪鬼道而為之乎故云此事為不可若人信歸下謂佛不可此慳貪者以若人既歸佛以信佛即待之以誠故不自欺其身口意之三業以誑於人誑者狂大不實之言口業貪嫉者只願自好不耐他榮之心意業佛口記人作佛不誑嗊於人口業淨自住大乘欲人亦住大乘則心不貪嫉意業淨心口誑嫉乃根本大小隨惑為諸法中至惡佛已淨而斷之故佛於十方世界獨無所畏感得三十二相八十種好紫磨金色莊嚴之身光明烜爀照曜世間則身業尤淨矣自天至人無量無邊之眾見佛三業清淨無不尊而崇之故以誠實之意而說一切眾生皆當作佛之實相印也印者天魔外道不能改移之謂舍利弗當知下又從果以原其因謂佛三業待人如此之誠者以佛初發菩提心為菩薩時因地中本立誓願欲一切眾生如己無異到今果上化汝身子等一切眾生受記作佛果得如因則佛之願始滿足也若我遇眾生下謂佛雖果因如一最初若不觀根逗教便盡教以一乘佛道者則眾生亦難化矣何也以無智者聞佛說一切眾生是佛便錯會佛意謂妄不妨真亂猜佛語謂真即是妄迷惑其見修證之次第即為不受教矣我知此眾生下謂我知此不受教眾生雖有一個現成佛之知見為諸善之根本但由往昔因中見得佛少修得善微不曾發明故識不破五欲而堅固執著由執著而生癡愛由癡愛而生煩惱此五欲中煩惱濁也以諸欲因緣下謂癡愛為因五欲為緣由此因緣則墜墮於地獄餓鬼畜生三種惡道輪迴於人天六趣之中備盡受其苦毒此五欲中眾生濁也受胎之微形下謂有此眾生濁之果縛遂將廣大無邊法性拋却不問反受父精母血腥臊交媾胎中微小之形骸一世苦命受未已又增長一世薄其德而少其福所以生老病死等苦逼迫於身心此五欲中命濁也入邪見稠林下謂六道眾生為苦命所煎逼不知反省業因方且妄入邪見稠林謂若有無斷常窮達壽夭付之天命非人力所為自是羣黨吠嗷亦有即是亦無非斷更計非常從而各立門戶具足六十二種邪見撥無佛法因果為師者不知此等邪見皆是妄心分別深著而自愛為弟子者不知其非以妄傳妄尤堅固領受不可捨此五欲中見濁也我慢自矜下謂如此見濁聖慧眼覷之已為可憫彼且我慢自矜而誇高言我道有所傳業有所習面是背非陽放陰收諂於人曲從於己以不實為實謂己是正道除此反命為邪道矣故於百千萬億劫中更不聞有佛之名字況有見佛之事乎既不能見佛又安得聞正法哉如是五欲汩濁其心膠擾其形之人誠難度矣此五欲中劫濁也是故舍利弗下申繳謂因是難度之人故佛最初且不直說一乘而為開設方便說小乘之法盡苦之道而示之以涅槃者乃投其所好也我雖說涅槃下謂佛雖順機示之小果涅槃許二乘人得滅乃方便權設實非真滅也諸法從本來下謂要得真滅入佛大涅槃者須知眾生所具根塵識相性本末等諸法從本以來元不曾動著一毫性自真常體自寂滅若能開悟此者則汝舍利弗等不是聲聞即名佛子所得涅槃不名果德即為因行四諦十二緣即為行六度之道已竟矣有此行道之大因當來之世必當得作佛之大果也我有方便下結完謂佛既有此大涅槃真實之法最初奚用小果以佛有方便權智之力故將一乘而開示為三乘法也然佛所開示三乘不妨即是彼十方三世一切世尊所說之一乘道也今此諸大眾下勸信其實謂既知我之三乘即是彼諸佛之一乘則汝等昔三今一之疑惑可除而佛與諸佛唯一無二之言語可信矣此節文勢初以諸佛標起次以釋迦申釋末以諸佛結成過去無數劫無量滅度佛至皆已成佛道此頌長文第五節也明過去諸佛不但以無數因緣譬喻說三乘法為一乘之正方便乃為眾生深心所樂不同尚以人天因果為一乘之異方便以異方便是有漏業元不許成佛今尚資以成訖佛果況緣覺聲聞無漏業又豈不容受記作佛乎故廣說異方便使當機深信入耳過去無數下頌正方便又諸大聖下標起異方便若有眾生下列釋六度為異方便問曰六度是菩薩成佛之正方便何曰異也答曰經不云乎助顯第一義第一義中即佛之一字亦為異方便況頌中殺文皆云已成佛道佛道既已成訖而復說六度如人到家說路上事非異而何若人善軟下人天異方便之心也供舍利起塔廟人天善軟之事也或七寶或沙土或香木或甎瓦雖誠戲不等無非善軟之心助顯第一義故皆成訖佛矣若人為佛下塔廟成矣佛像興焉故或刻雕香寶或鑄塑金泥或漆布彩畵或自作使人雖木筆爪甲貴賤之物有殊誠戲之心無二無非善軟之心助顯第一義故自己皆已成訖佛道而又但化菩薩度無量眾生也若人於塔廟下形像備矣供養之具設焉故或種種幡葢種種伎樂一音之小一華之微有出於敬喜有出於靜亂無非善軟之心助顯第一義故皆成訖佛矣或有人禮拜下供養足矣禮節度數成之故或五體歸命禮拜與合掌不同或一手輕心低頭與南無有異無非善軟之心助顯第一義故自成無上佛道又廣度無數眾生共證大涅槃如薪盡火滅也則知過去眾生資小善微因皆已成佛況我釋尊現在弟子豈可但為二三乘而已哉未來諸世尊其數無有量至導師方便說此頌長文第六節也初十句照長行可解諸佛本誓願下謂未來世諸佛本在因地中行道發願欲一切眾生成佛如己及至果上雖說無數法門亦只為一乘此願當如是也諸佛兩足尊下明法當如是謂諸佛所以稱福慧兩足尊者由證知一切世間根塵識法本自真常無性不似二乘人因斷見思惑而無性所以慧足佛種下謂未來世佛雖知諸法真常無性是佛乘種子不妨即無性為緣而起六度萬行以度生不似二乘人但坐在空中所以福足然則諸法無性是成佛之因誰無此因乎佛種從緣是成佛之緣誰無此緣乎諸法無性性也佛種從緣相也性不礙相因即是緣雖曰兩足元是一心故云是故說一乘是法下是法即上一乘之法住謂不曾頃久暫離法位謂根塵界法各有見聞等分位世間相常住者謂由一乘佛知見之法在世間根塵法位上不曾頃久蹔離故世間根塵等相即常住真如也於道場下謂未來世諸佛於阿蘭若法菩提場中成等正覺證知自所得世間相常住一乘法已亦用方便權智將大就小作三乘而說也此數句為出定嘆德中唯佛與佛迺能究盡諸法之實相獨詳頌於此者以身子等千二百阿羅漢是未來受記之佛故此特言之天人所供養現在十方佛至隨應方便說天人下頌長文第七節也謂天人所供養現在如恒沙多諸佛出世佛安隱眾生亦只說世聞相常住如是一乘之法也知第一下正明安隱謂現在諸佛雖知第一義諦本自真常性相寂滅不容有說然為安隱眾生不妨以善權方便力故假示因緣譬喻種種言說之道而說三乘雖說三乘然其實只為一乘也知眾生下謂現在諸佛所以知一為一而復說三者以機有行念業習進怠利鈍之病不同故於第一寂滅無方便法中而設言辭方便以說之也今我亦如是安隱眾生故至說無分別法此頌長行第八節通計一百二十二句今我下八句總頌長行權實二智謂釋尊因援三世十方一切諸佛以安隱眾生心為例故亦以種種三乘權智法門宣示於一乘實智之佛道也者由佛具實智之力能知眾生性欲故以方便權智說法令眾生得歡喜也應知初一行由權而實次一行明為實而權由權而實所以安隱為實而權所以歡喜舍利弗當知下一百一十四句別頌長行權實二智別頌義有四層初自舍利弗當知起至而起大悲心止明佛見眾生以苦為樂為樂所苦而不安隱以起大悲次自我始坐道場起至疾入於涅槃止明佛為安隱眾生故將大就小即實開權以成大慈三自尋念過去佛起至我常如是說止明佛憲章諸佛陽小陰大開權便為顯實以開大捨四自舍利弗當知我見佛子等起至說無分別法止明佛下不畏機上不逆佛得遂本願以成大喜此四層文則結歸前頌二三四節義則為下譬喻品張本所以長行略而頌中廣也以上分章此下逐文解義我以佛眼等者佛有五眼肉眼同人天眼同天慧眼同二乘法眼同菩薩所見皆有分際唯佛眼則同諸佛所見則無分際今云佛眼觀者謂見得真而且普也六道眾生無福慧眾生濁也入生死險道苦續不斷命濁也著欲自蔽煩惱濁也不求佛與斷苦之法劫濁也深入邪見見濁也無慧故貧入險道無福故窮苦不斷道險苦續苦之果也著欲自蔽苦之因也因果不明如𤛆牛愛尾而殺身故曰盲瞑因其盲瞑則自蔽佛知見之因不求斷苦之法自蔽開示悟入之緣一大事因緣內無所見外無所求遂依妄想分別起斷常有無等邪見以臥棘塗灰為因求生無想等處為果此以苦而捨苦也其苦果能捨哉𤛆音𭾹目被毛塞見不真之義佛具大慈能與涅槃之樂佛具大慈能拔生死之苦故云大勢佛斷苦法者如知苦則斷集是其法也而外道不知為是眾生等者言為此五濁貪欲受苦眾生起大悲心而欲拔濟也此段為譬喻品自若國邑聚落起至無求出意止張本我始坐道場者佛自述華嚴之時於摩伽提國阿蘭若法菩提場中始成正覺主伴重重之處也觀樹亦經行者述不離一切菩提樹而昇忉利等天也於三七日中思惟者觀機逗教也我所下思惟佛自所得法大也眾生下思惟眾生機小也如斯下謂以微妙之大法投鈍根之小機方木不入圓竅也以第一之智慧訓癡盲之眾生揭皷而求亡子也法不投機說置兩難故曰如斯之等類云何而可度此佛述初七日無人請而自思惟也爾時諸梵王下謂佛正自思法大機小難度之時又值三界諸天來請若順請而但讚佛乘眾生為苦所淹沒殊不信自心是佛一不信不但無益方且有損故躊躇不已思入涅槃此佛述第二七日因諸天請而思惟也此段為譬喻品自舍利弗是長者作是思惟起至但東西走戲視父而已止張本尋念下述第三七日思惟也初七循已法妙難投諸佛之法而不現前第二七循人機苦難信諸佛之法亦不現前至第三七日忘其人已上循諸佛下順眾生諸佛之法始乃現前故云作是思惟時十方佛皆現此為化城喻品十六王子今現在十方成佛案梵音下述成十方諸佛慰喻之辭得是無上法所以第一隨諸一切佛就實開權所以善哉我等亦皆下述陳十方諸佛引己為諭以明就實開權開權便為化實舍利弗當知下佛又自述回敬十方諸佛及奉行諸佛所慰諭之義前文唯佛與佛乃能究盡之語到此益明矣思惟是事下明佛遵諸佛之教以開權也波羅奈即鹿野園十二年說阿含小乘教之處也諸法寂滅相不可以言宣者佛自證一乘之實相也以方便力故為五比丘說者即一乘之實開三乘權智而說也是名轉法輪下謂佛最初成道始坐道場三七思惟三寶之名業已久昌但因法不投機世間未知有轉法輪度眾生之事直到鹿野園就實開權始有三寶之名出世也涅槃音法也小果也阿羅漢僧也賢位也從久遠下謂自佛成道如是久遠讚嘆得大涅槃之法生死苦永盡之聖僧佛常如是說已但二乘人不見不聞耳此段為譬喻品自爾時長者即作是念起至爭出火宅止張本以上明為實而權舍利弗當知我見佛子下明由權而實承上之言謂佛從久遠劫來讚示大涅槃之法生死苦永盡之聖僧二乘人既不知則為何人說也乃為一類有大乘志求成佛道之佛子所說以彼數多而心敬往昔又曾從諸佛聞過方便之說故佛作念不須再言方便但說其佛慧正適其時也此所謂雖知根鈍且稱本懷說大方廣佛華嚴經者是也舍利弗當知鈍根小智下謂彼時獨為佛子說大乘而不普說者以有一類鈍根小智著相憍慢之人不能信是大乘法也今我喜無畏下謂佛初畏此等枝葉之眾破毀大法而帶累彼墮惡道故忍而不說今四十年後機熟法純枝葉盡而貞實存故佛歡喜無畏於諸菩薩眾中正直捨去昔日方便權教但說一乘無上之道也菩薩聞是等者謂自華嚴般若方等會上諸菩薩根人自既是大乘今更聞此大乘則疑惑已除固不必言但汝身子等千二百羅漢昔日稱為小乘者悉亦由權入實當同菩薩授記作佛也如三世諸佛等者謂昔日小乘今日所以皆得為大乘作佛者以佛如三世十方一切諸佛會權歸實說法之儀式也我今亦如是下謂十方三世一切諸佛既無小大分別同授記弟子作佛我釋迦又豈不然乎此段為譬喻品自是時長者見諸子等安隱得出火宅起至得未曾有非本所望止張本諸佛興出世懸遠值遇難至自知當作佛此頌長文第九節結完長文第一第二兩節諸佛興出等者謂五濁惡世尋常賢聖且隱伏況其佛乎則無量無數懸遠劫中一遇佛興出世為難可知矣正使諸佛出世為眾生根鈍人天福報三乘漸教之法尚難驟言況說一乘頓教之妙法乎則說妙法為難可知矣無量無數下謂無量數劫難得聞之法五千在會之人法到耳邊而復遠去則得聞是妙法為難可知矣能聽是法下謂既得聞矣若復不能聽信則與不聞者同故云斯人亦復難譬如優曇下謂以數難得之遭際聞能聽信生難遭想則此人亦譬如優曇華一切人見皆愛樂可知矣所以然者以此人此華天上人間從來罕見時當其時一乃出現不容易故也此譬長文喻妙法以時說在頌文喻聞法之人亦以時出所以照應長文初二兩節也聞法歡喜讚下謂不但聞能聽信為難即聞能歡喜能發一言讚嘆亦過於遇優曇華之難也此過激之言要人信得及之義能聽之聽字訓信字方順不然聞與聽同則文為贅矣達耳謂之聞著心領受謂之聽如有聞而不信者只當不聽則聽與聞殆各一義汝等勿有疑下謂聞發一言讚嘆尚過於遇優曇華之難汝身子等聽信者過於優曇華可無用疑當信自心作佛矣我為諸法等者謂諸佛難興我已為法王則是佛不難值矣妙法難說業已普告大眾則是妙法不難說矣三乘之眾雖難聞今但以一乘道教化諸菩薩則無聲聞辟支之弟子則法亦可謂有人聞而不難矣汝等舍利弗下謂如上諸難不難而所難者在於聞而不疑肯聽信耳汝等既肯聽信則當知此妙法是諸佛秘密之要不可妄授與人也以五濁下謂既說而復囑汝秘者非惜法也慮當來世惡人不信此法反墮惡道也故須有慚媿清淨志求大道者不但不祕藏亦當為此等之人廣讚其道庶無失言失人之過也舍利弗當知諸佛法如是下結勸謂諸佛先三後一先小後大非有他故乃十方三世諸國土中本法如是故諸佛以萬億方便隨機所宜而說其不習學之人固不能曉了小大方便隨宜之事汝等既已知諸佛是世出世間調御之師則知其佛之為佛也又知諸佛小大隨宜方便之事則知其法之為法也佛法既皆知之則無更以小大先後為疑當須生大歡喜自知於當來世必得作佛也大歡喜者當以一生死海中沈淪凡夫得作二乘可謂歡喜矣又由二乘而得成一乘之佛則歡喜豈不大乎此佛世尊可謂慈悲婉切口苦腸出恩難報哉此節為譬喻品自舍利弗於汝意云何是長者寧有虗妄不起至善哉善哉如汝所言止張本如𤛆牛愛尾宋史夏西平王李彝興獻𤛆牛一
