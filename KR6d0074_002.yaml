body:
  text: 姚秦三藏法師鳩摩羅什譯明護國金剛寺住持如愚著妙法蓮華經譬喻品第三譬喻品者準經文是對因緣立名也經云吾從成佛以來種種因緣種種譬喻廣演言教無數方便引導衆生令離諸著則前品諸佛世尊唯以一大事因緣故出現於世等文是以種種因緣之言於千二百人中引身子離二乘之著已此品置譬喻兩言是又以種種譬喻之言於千二百人中引迦葉等四大弟子離二乘之著也故下文身子代千二百人請曰善哉世尊願為四衆説其因緣令離疑惑而世尊答曰我先不言諸佛世尊以種種因緣譬喻言辭方便説法乃至今當復以譬喻更明此義諸有智者以譬喻得解則身子所請雖以因緣而世尊所答則以譬喻矣故以譬喻名品其實一經文理翻來覆去不出種種因緣種種譬喻廣演言教引導衆生令離諸著等數句如前品本談諸佛出世之因緣其中以優曇鉢華喻妙法是因緣中有譬喻也此品至四大弟子受記品皆譬喻也末後則曰我及汝等宿世因緣是又譬喻中有因緣也化城喻及五百弟子受記品本談昔日大通佛時之因緣而演以化城繫珠之譬喻法師品至壽量品本談今日釋迦佛及未來佛之因緣而又演以鑿井醫師之譬喻皆於因緣中談譬喻以譬喻喻因緣也故此品題非要解所謂身子受記為法説緒餘合聯前品之末喻説名題合標緒餘之後濫與不濫之辨但因卷帙重大分之為七譯者順經文拈一兩語作品題復前後錯綜其文使讀誦受持者知卷雖分七文義不割耳豈有他哉爾時舍利弗踊躍歡喜至失於如來無量知見爾時下身子領佛一大事因緣分別解説已開悟佛知見敘今昔得失呈解於佛見其承當處可受記也故經家敘置六根歡喜之相踊躍下意根即起下身根瞻仰下眼根歡喜二字應上心生大歡喜照後我心大歡喜言而白下敘今得也舌根所以下敘昔失也謂今聞二乘人受記作佛之法音則聞同得同所以歡喜昔雖亦聞此法見菩薩受記作佛而己不預則聞同得異所以感傷感傷失於如來無量知見不得同菩薩作大乘也此中失於如來無量知見如來二字即上品諸佛與釋尊通稱無量二字即諸佛智慧甚深無量知見二言即如來知見廣大深遠及諸佛世尊欲令衆生開示悟入佛之知見也世尊我常獨處山林樹下至遇便信受思惟取證世尊我常下申明昔日感傷不得之義山林樹下二乘人修行之處行坐思念心中不甘為二乘一涅槃之法大小乘人共得故曰我等同入法性云何下謂大小乘人所悟入既同則所濟度亦應同而佛云何濟菩薩以大乘得無窮之寶藏度我聲聞以小果給有限之工價佛心似不平也此不平之咎似在於佛也是我等下引咎歸己謂今聞佛説大乘平等法若以小乘化乃至於一人我則墮慳貪此事為不可則失於如來無量知見乃是我等自捨多而取少之過咎非佛有彼大此小之不平故曰非世尊也所以下徵明謂所以先似咎在佛而今日是我等咎者何也以佛初説小乘正是以小引我入大之因但我不待説其所因自為小乘若待佛説我此九部法入大乘為本之因則我等自然應得成就阿耨多羅三藐三菩提而佛必以大乘度脫我也阿耨多羅云無上三藐云正等三菩提云正覺以上申釋非世尊也一句然我下又覆明己之不待之所以釋成是我等咎一句謂我等所以不待然者以我等本是著邪見之人才來歸佛不解佛光以小乘為方便且隨我等根行所宜而説故一聞即便信受用第六識思惟心而取證則以權為實矣誰知佛更有大乘真實之法哉此節應對方便品第二節頌文看世尊我從昔來終日竟夜至從法化生得佛法分世尊我從下申明今日歡喜有得之義承上文言謂我初雖不解方便取證小果然從昔以來見諸菩薩受記作佛於終日竟夜之間亦無時不抑損刳剋於心責備於己傷感其不長進不得同大乘菩薩受記作佛今忽聞佛説聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑則是而今從佛聞昔所未曾有之法故斷其疑佛之心取小之悔身意六根皆通泰平然快得安隱矣今日乃知等者謂當初説菩薩真是佛子我等聲聞宛似義兒雖成小果心實未安今説諸佛如來但教化菩薩無聲聞緣覺又聞是千二百羅漢悉亦當作佛乃知我等今日真是佛子菩薩非聲聞流也從佛口生者謂成佛之言出於佛口我信佛言而成佛子則子從佛口中生矣從法化生者謂從一乘法化煩惱成菩提化生死成無餘涅槃也得佛法分者法謂法身分謂分證謂己雖居因地未至究竟然既真是佛子實乃得分證佛之法身也此舍利弗聞佛分別解説一直信入者也終日竟夜老子飄風不終朝驟雨不終日爾時舍利弗欲重宣此義而説偈言我聞是法音得所未曾有至聞亦除憂惱爾時下頌長行第一節敘今得也我聞此法音指方便一品之文得所未曾有小乘人得佛是四十年前所未曾有未有而有故心大歡喜而疑除也昔來下頌昔失也謂住昔疑網未除似有失於大乘今疑網既除則知從昔以來蒙佛小教正是今得大乘之階也佛音等者謂昔來蒙小故能除我做凡夫衆生時憂惱今不失大又能除我做羅漢聖人時不得成佛之憂惱此今昔小大佛音所以皆為甚希有也我處於山谷或在林樹下至我為自欺誑此頌長行第二節申明之文校長行有增者發所未盡也我處下標起思性之地若坐若行四威儀之二也嗚呼下釋成思惟之相嗚呼哀嘆聲憂惱所激然也深自責者謂著實自責不敢責佛也云何下自責之辭自欺記云誠其意者毋自欺也我等下謂菩薩固是佛子我千二百阿羅漢亦是佛子以與菩薩同入無漏涅槃法故不能於下謂入道既同説道亦應同今既不能則為自欺於未來説道之因心也金色下又自欺於未來得道之果體也三十二相初足下安平如奩底二足下千輻輪三手足指長勝天人四手足柔軟五手足如鵝王網縵六足跟圓滿七足趺高好八伊尼延鹿王腨九立身手摩膝十陰藏如馬王十一身縱廣等十二身毛青色柔軟十三毛向右旋十四身真金色光十五身光面各一丈十六皮膚細滑不渟塵水十七手肩等七處平滿十八兩腋下滿十九身如師子王二十身端直二十一兩肩圓好二十二具四十齒二十三齒白淨齊密根深二十四四牙白大二十五頰車如師子二十六得昧中上昧二十七舌薄覆面至髮際二十八梵音深遠如頻伽鳥二十九眼色如金精三十眼睫如牛王三十一眉間白毫三十二頂上肉髻也十力一處非處力二業力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力也諸解脫即八解脫也一內有色觀外色解脫住初禪二內無色觀外色解脫住二禪三觀淨解脫具足住三禪四觀空無邊解脫具足住四禪五觀識無邊解脫六觀無所有處解脫七觀非想非非想處解脫八觀受想滅解脫超出三界也同共下謂聲聞既同菩薩悟入無漏法性上之相力解脫同是一法性中物應當同得而我等獨不得也八十種妙好初指爪纖長終胸前卍字十八不共法初無有過失終知三世無礙無著不與二乘共也如是等功德者等謂等其四無畏四辨才及一百四十種功德然百四十種功德即上三十二相八十隨好四種清淨十力四無畏三念住三不護加大悲無忘失法永害習氣一切種智廣如華嚴會玄記我獨下獨行則不得如佛同衆行行失利也我名才聞五天竺國佛名則聞十方名失利也我山林自善其一已佛善則廣饒益於天人實失利也自惟等者謂我自思惟若行若名若實皆失其利而不如佛者豈佛有欺誑於我哉乃我自不學菩薩發大乘意心自欺而言自誑也長行所謂是我等咎者此也我常於日夜每思惟是事至教化諸菩薩此頌長行第三節申明之文初八句頌長行我從昔來至每自剋責三句次二十句頌長行而今從佛聞所未聞之法三句亦頌前節所以者何至思惟取證六句後四十句應長行斷諸疑悔至得佛法分七句如此分屬者使知長行偈頌略無溷濫若論文理頌中自有起承聯絡則又不得割裂故須逐句重釋我常於日下承上文言謂我雖知自欺失利然亦常日夜思惟又恐未必盡矣由此進退循環自不能決欲請佛決其得失故曰欲以問世尊等我常見世尊下謂我所以不自安於失而欲請問世尊者以我常見世尊向二乘人前稱讚大乘菩薩心中自揣佛如此者莫亦要我二乘人作大乘耶以是日夜籌量其得失之事今忽聞佛説千二百羅漢悉亦當作佛音聲方知佛四十年前隨宜説法真是無漏難以思議元非教我等作小乘乃令我等至成佛之道場也我本著邪見下謂佛本意令我等至成佛道場我不待説所因而速思惟取證於小乘者以我本是著邪見之人又為諸梵志著邪見者之師世尊知我是生死海中人心易滿足故説小果四諦拔其邪見賜與涅槃我遵佛教除邪從正得證空法當爾之時其心自謂真得至於滅度所以不求成佛之道場也而今乃自覺下謂今蒙佛從定起告於我曰我雖説涅槃是下非真滅諸法從本來常自寂滅相佛子行道已來世得作佛我始覺知先所證者非是真滅必得同菩薩受記作佛具三十二相天等八部恭敬亦如佛在大衆名聞滿十方廣饒益衆生此時乃可謂真滅永盡無餘也佛於大衆等者謂我所以覺今是而昔非者由佛於天人大衆中説我當作佛故我聞如是作佛法音疑悔悉已除也初聞下謂最初疑悔未除時聞佛説我小乘人作佛心中亦大驚疑謂將非魔作佛説故欲惱亂我禪定之心耶佛以種種下謂佛見我心疑乃引種種因緣譬喻善巧云將一乘分作三乘而説我心始乃安靜如海疑魔之網盡斷也佛説過去下謂佛又恐我疑斷復生廣引三世十方一切諸佛證成我佛從生之始得道之終中間説法無非一乘由是我始決定知成佛之言果是世尊真實之道惡魔波旬必無此事故云非是魔作佛也我墮等者謂既決定知是佛説何先疑是魔説以我墮在疑惑網故也聞佛柔軟等者謂既墮疑網今又何得心安如海以聞佛從容柔軟之音深遠微妙演暢十方三世一切諸佛清淨之法故使我心歡喜而疑悔永已盡也安住實智中者謂不安住昔日方便之權智也我定當作佛者謂不思惟取證二乘之小果也安住實智開佛知見大事之因也定當作佛入佛知見大事之果也有此大因大果故為天人所敬此自覺也轉無上法輪教化諸菩薩覺他乃覺行圓滿也我心大歡喜我定當作佛與上品心生大歡喜自知當作佛相照應準華嚴會玄謂初獲聖性具證三空能益自他生大歡喜則知身子等凡遇授記歡喜皆登十地位中之初地也爾時佛告舍利弗至教菩薩法佛所護念爾時下身子敘昔憂今喜以呈解佛亦述昔教今忘以授記也吾今於天人等者證其不虗使其不可再忘大而取小也且承頌中為天人所敬等而言謂汝要天人等所敬我當對天人大衆中而説我昔下敘昔也二萬億佛準經文當是佛為常不輕菩薩時二萬億威音王之佛也為無上道者謂佛在彼佛為菩薩時不曾教身子以小況今成佛又豈以小乘法而見濟度乎汝亦長夜等者謂豈但佛無量劫中不曾教身子以小即身子無量劫中亦不曾學小乘法也受學云長夜者自己佛知見未開雖從佛受學總屬無明長夜耳我以方便等者敘今也謂往昔既教大學大而今復先度以小者是佛先以小引身子後入大之方便也舍利弗我昔等者謂佛既昔教汝志願大乘佛道今復以小果方便為接引者以汝昔日既在無明長夜受學將佛所教大乘志願盡忘而便取足於小果自謂得其滅度豈佛見濟汝以小哉我今還欲等者謂汝雖善忘我能善憶今不欲汝忘還欲汝憶故為汝小乘聲聞人説此大乘經名妙法蓮華然此妙法蓮華名大乘者以是教菩薩法佛所護念之經也不然則為汝小乘人止應説四諦法度生老病死究竟涅槃足矣是知為諸聲聞説大乘經聲聞元菩薩也聲聞既是菩薩則汝何嘗失於如來無量知見而歡今以悼昔耶為諸下五句為一經文字之大關鍵一經義理之大肯綮大關鍵者上三句自此品直案至授學無學人記品止下二句自法師品直案至普賢勸發品止大肯綮者則知諸佛世尊為一大事因緣故出現於世開示衆生成佛之知見從來不曾為諸聲聞人而説也舍利弗汝於未來世至像法住世亦三十二小劫此正是為諸聲聞説大乘經名妙法蓮華教菩薩法佛所護念之義而結成方便品諸佛世尊唯以一大事因緣故出現於世之文良以此經使二乘人開示悟入佛之知見為妙法得受劫國莊嚴顯記為大事如優曇鉢靈瑞大寶青蓮華時一現故耳上節我昔曾於二萬億佛所為無上道等文是佛與身子述過去大事之因也此節是佛與身子成未來大事之緣也其文有八項以記其大事凡一切衆生不成佛則已成佛則定不可少者前品所謂如三世諸佛説法之儀式也凡後受記之文雖有廣略不同皆不異此舍利弗汝於下初授本起因地福慧兩足之記供養若干千萬億佛者福足也方便品所謂親近百千萬億無數諸佛者是也奉持正法具足菩薩所行之道者慧足也方便品所謂盡行諸佛無量道法等者是也福慧二嚴定記過無量無邊不可思議劫者以衆生無邊煩惱無盡法門無量佛道無上故也上文所謂教菩薩法者此也當得作佛下第二授果上十號之記方便品所謂名稱普聞者是也號曰華光名也如來等十號稱也稱其名下有實也如來者金剛經云諸法如義無所從來亦無所去故名如來三德中法身之稱也應供者後經云普於天人應受供養三德中解脫之稱也正遍知者正簡不同外道之邪遍簡不同小乘之偏謂現前種種松直棘曲鵠白烏玄皆了元由乃至恆沙界外一滴之雨亦知頭數故曰正遍知三德中般若之稱也大經云佛身充滿於法界如來也普現一切羣生前應供也隨緣赴感靡不周遍知也而恆處此菩提座正知也此三為總稱下七為別稱明行足者明即智度行即檀等五度足者謂由奉持正法則明足由供養若干千萬億諸佛則行足明足所以有正遍知之稱行足所以有應供之稱此自覺之稱也福慧謂之足者果德福慧滿足如人之有足而能行止故善逝世間解者覺他之稱也善者能也逝者往也世間者器及有情智正覺三種世間也器世間者山林河海等神如器而盛載有情有情世間者胎卵濕化等類各有分別情性智正覺世間者三乘聖賢滿分各有所覺之正道也解即解脫如大經三世間主雖各謂得一解脫門然皆佛之法身善能往應使然也此又如來之別稱也無上士者謂自人至天自天至二乘自二乘至菩薩自菩薩至等覺各各雖自尊而各各皆有上惟佛一人超越世間出世間而更無有上也此又應供之別稱調御丈夫者調謂調理御謂控御丈夫男子能説能行之美稱一切衆生不開悟佛知見輪回六道無有停息佛説三乘九部之法調理控御使其自凡至聖由小至大開悟本有佛性乃至三千大千世界無有如芥子許不是菩薩捨身命處非調御自他之大丈夫其孰能與此此又正遍知之別稱也天人師者一切三界天人皆為弟子佛獨為師以其善能調御故也佛者覺也謂自覺則無上覺他則善逝世間解覺行圓滿則明行足有此三覺圓滿萬德備足故稱之曰佛世尊者總此三覺圓萬德備為一切情與無情及智正覺三世間所尊敬故曰世尊無上以士稱約素法身言調御以丈夫稱約萬行莊嚴言天人以師稱則約教化人天成佛而言此十號十法界中除佛一人敢當餘自天至菩薩皆無敢當此者上文所謂佛所護念者此也方便品所謂成就一切甚深未曾有法者此也此授身子因果正報之記下授第三依報之記國名下標起其土下釋成安隱下二句則有情清淨正報嚴飾也琉璃等五句則無情清淨依報嚴飾也華光如來下授第四轉法輪記亦以三乘教化者此因方便品諸佛出於五濁惡世而言問曰華光佛出既非惡世何以亦説三乘答曰以本願故準大悲空藏經云身子於六十劫行菩薩道因婆羅門乞眼唾而踐之身子起瞋退作凡夫發願成佛之日開三乘之法其劫下授第五眷屬記有標有徵有釋記云楚國無以為寶惟善以為寶經以菩薩為大寶同也彼諸下數多為寶若欲下準承足為寶非初下德久為寶於無下植德之所恆為下佛歎植德為寶常修下慧寶具大下通寶善知下申明得佛慧之效質直無偽真實為寶志念堅固不被魔邪所撓為寶舍利弗華光佛壽下授第六住世壽量記華光如來過十二下授第七涅槃時至説大乘轉記菩薩記舍利弗是華光下授第八正像之法住世久近記身子未來一大事因緣成佛之始滅度之終佛於天人大衆中一一授之身子則一一記之矣方便品所謂心生大歡喜自知當作佛者此也經文自佛説經入定放光動地以來到此方為一結局可信諸佛惟以一大事因緣出現於世之言不虗矣爾時世尊欲重宣此義而説偈言舍利弗來世成佛普智尊號名曰華光當度無量衆此頌授第二果記十號之文供養無數佛具足菩薩行十力等功德證於無上道此頌授第一本起因地兩足之文過無量劫已劫名大寶嚴此頌授第五眷屬記標文世界名離垢清淨無瑕穢至常有華果實此頌授第三依報世界之文彼國諸菩薩志念常堅固至華光佛所化此授頌第五眷屬記釋文佛為王子時棄國捨世榮至壽命八小劫此頌授第六壽量之文佛滅度之後正法住於世至宜應自欣慶此頌授第八正像法住世久近之文略頌第四説三乘法第七授堅滿記之文正法者有教有行果證不虗也像法者有教無行徒存三寶像貌也劫者時分義如中國呼年為載為歲西域則呼年歲載為劫方便品謂於諸聲聞衆佛説我第一我今自於智疑惑不能了惟其疑惑未了上品所以先告惟其智慧第一此中所以呈解先了而亦先得記也上品云為是究竟法為是所行道此中佛先與述成二萬億佛所之事是明所行道也後與劫國莊嚴之記是明究竟法也上品云願出微妙音時為如實説此中述成與記正是微妙音如實説也爾時四部衆比丘至今乃復轉無上最大法輪爾時諸天子欲重宣此義而説偈言昔於波羅奈轉四諦法輪至盡回向佛道爾時下四衆八部即序品所敘列之人大衆見下身子自述要天人等所敬佛即對天人大衆而授記故記畢天人大衆即皆歡喜供養慶讚希記而回向也身子前三請中云是會無量衆能敬信此法者是也各各脫身下敘因喜而興供養以上等衣欲色二界天主供以天妙衣也凡供養多以衣言者示歸依也以華言者示因同於果也所散天衣於虗空而自回轉者明回小向大轉三為一也諸天伎樂一時俱作者明眼色耳聲皆成大乘之空相也而作下歎昔所説一乘法也照方便品思惟是事已即趣波羅奈等句今乃下慶今所説一乘法也照方便品今我喜無畏於諸菩薩中正直捨方便但説無上道等文偈中初四句頌昔也今復下頌今也波羅奈説小乘之地五衆得小果之人生滅謂生滅四諦異乎無生無作四諦也是法甚深奧者言今大乘異乎昔之小乘然昔小乘即是今之大乘所以為甚深奧也少有能信者謂惟其深奧故少有能信惟其信少故數聞其小不得聞其大也世尊説是法下謂有大智信解如身子者今得其成佛尊記即我等雖無大智但能隨喜必亦當得成佛於三種世間為最尊上也此應序品即文殊所謂諸求三乘人若有疑悔者佛當為除斷令盡無有餘照法師品則為授廣記之伏案佛道下歎昔權中有實也我所下回今小以向大也爾時舍利弗白佛言世尊至説其因緣令離疑悔爾時下身子要同列者開佛知見亦同己之除疑得記故代千二百人以請發起種種譬喻之端也此應方便品舍利弗知四衆心疑自亦未了之文上得佛述成與記是自疑已了矣代衆再請則完知四衆心疑之案我今無復下明為己則不敢再勞以疑盡而記得也是諸千二百下明為人則不敢不再請佛常教化下述昔所教副所學而今於世尊下述今所聞異所得此千二百人所以有疑悔而不得開悟佛知見也善哉等者請佛再説先小後大之因緣使千二百人解其疑而得其記則不負昔權今實之方便也千二百人云住學地者學研真斷惑修行之地也佛云常教化者教字對學字看教真窮惑盡得果之方也生老病死為世間三界十二類生有生之苦究竟涅槃為出世間大小三乘共有不生不滅之樂凡迷有苦依佛教而能離之聖人有樂依佛教而得之然得至二乘未為究竟由二乘而入大乘始稱究竟此千二百人為學者學去苦求樂也佛為教授師教共離苦得樂之方法也故曰我法能離等以上知苦慕滅是學無學下斷集修道亦各自以者該衆之謂生老病死苦之果也由我見及有無見為因而總集也等者等其貪癡邪慢疑八十八使八十一思也不言餘惑獨言我見等者我見即身見有無攝其斷常名邊見也身邊見見思之粗細惑為集諦下因集因一斷苦果不生故千二百人各遵佛教以離之離即斷義謂得涅槃者謂佛雖知彼千二百人未得究竟而彼自謂得究竟涅槃與佛同也是以小而為大也上品所以謂佛説一解脫義我等亦得此法而今不知是義所趣此正述彼文也法説一周衆尚不知必得火宅喻説而知可見千二百人知見校身子有差別也爾時佛告舍利弗至諸有智者以譬喻得解爾時佛告下謂據佛先所談則應悟而不應疑以先能化權智種種因緣譬喻諸方便言辭之法既皆是為阿耨菩提之大乘則其所化聲聞緣覺之人亦皆是菩薩此法則會三歸一人則會權歸實方便品中業已盡分別解説矣有何因緣而用重説然舍利弗下謂據汝今所謂四衆尚有疑然者則應復説譬喻更明先三後一先小後大之義不應復説因緣也以千二百中諸有智之人既於先説一大事因緣法中難解必於今説一大事譬喻法中而得開解也故云今當復以譬喻等下文法喻各有五節喻文五節根今當復以譬喻一句法合五節根更明此義一句諸有智下二句伏信解品一品之案舍利弗若國邑聚落至心不厭患無求出意舍利弗下若謂假若譬喻義發語辭國邑聚落之有長者喻諸佛出於五濁惡世為一切世間之父也國喻大千世界邑喻四天下聚落喻人天六趣其年衰邁長也喻佛成道以來劫數甚大久遠也財富無量大也喻佛成就無量知見力無畏等之法也多有田宅下於文則明財富無量於義則喻佛具足智慧方便二種波羅蜜等之法實智不動故譬田宅權智可移故譬僮僕其家廣大下家喻大千世界門喻妄心謂三千大千廣大三界火宅惟一妄心生滅可以出入度生老病死教化令得阿耨菩提及二乘涅槃也起信論云依一心法有二種門一者心真如門二者心生滅門是二種門皆各總攝一切法以是二門不相離故準此依心生滅門則成世間六道法依心真如門則成出世間四聖法問曰論云二種門經言一門其義云何答曰二門既不相離唯是一心故與經一門正相符也舊以一門喻一乘若是則諸子已在一乘門中何有火燒之患而反欲引出耶況後等賜大寶白牛之車又將安配哉多諸人衆喻貧窮無福慧正報之衆生一百下喻三界衆生及二乘機未出苦集之時故曰止住其中準化城喻品先以五百由旬為譬是通喻三界二乘數合五百後云過三百由旬化作一城是別喻二乘人出三界得有餘涅槃彼以五百由旬況所出人與果此以五百人況未得果之衆堂閣下喻衆生為貪著追求五欲之依報容易敗壞而生苦火此中略而頌文詳盡長者諸子下喻千二百阿羅漢尚未歸佛做外道時也若十喻大乘二十喻中乘三十喻小乘乘愈下數愈多者見大根之機少也人以百言子以十言見大千五趣衆生受佛化而為子者僅十一也長者見是大火下喻佛見諸衆生為少老病死等火之所燒煮也而作是念下喻佛不忍捨衆生自求安樂也而諸子等下上品所謂入生死險道相續苦不斷也不覺下上品所謂深著於五欲如𤛆牛愛尾以貪愛自蔽盲瞑無所見也火來逼身下喻不求大勢佛及與斷苦法也此佛雖以佛眼見五欲之火是苦驚怖憂念而三乘諸子未出火宅之時全不知恩反以為樂遂起下節喻三七思惟救濟之方也此節配方便品第八節我以佛眼觀等頌舍利弗是長者作是思惟至但東西走戲視父而已舍利弗是長者下喻佛初七思惟也身手有力喻佛有大神力也衣裓胸前護衣裓服也几案香几案桌也從舍出之者謂衣裓在身几案應手皆可以有力而出子於火宅也復更思惟者喻佛第二七思惟也是舍惟有等者正出其思惟之義謂長者雖有身手之力及濟勝之具奈人多而門小子且幼稚而無識以無識好戲之幼子出愴惶狹隘之小門父子之情未通怖畏之事未白未免好心而成惡意之纍故曰或當墮落等喻佛所以有神力而難用也我當為説等者喻佛不用神力而復用智慧力以陳其怖畏使諸子自知其利害而出火宅也此舍下正出其心中所要説之事作是下申明如所念而告之父雖下申明子不信所告面出亦復下結足不信不出之義總歸重於幼稚無識也上但云無求出意似尚有可救援之道此云了無出心則神力智力二俱思惟盡而不得子出火宅之心則亦吾未如之何也已此節譬方便品我始坐道場觀樹亦經行等文身手有力照方便品但喻佛智慧力經云我所得智慧故配後法合則通喻佛神智二力經云有大神力及智慧力故護衣裓服爾雅云衣蔽前謂之襜是也衣裓几案配後法合即如來知見力無畏等之法也是舍之舍大喻三界小喻一身一門狹小喻妄心執我不解空理廣大也諸子幼稚喻聲聞人未嘗久遠發菩提心故未識於妄心而攀緣六塵取著男女二根名戀著戲處也或當下方便品云衆生沒在苦不能信是法破法不信故墜墮三惡道後法合云是諸衆生未免生老病死憂悲苦惱而為三界火宅所燒何由能解佛之智慧不驚者以樂著也不畏者以嬉戲也此所以父雖善言誘論説樂是苦而子了無出心也亦復不知下申明不肯信受者以不知色等五欲為火四大幻身為舍不明大事毫釐繫念萬劫沉淪為失也東西走戲謂以六趣升沉輪回生死奔走為兒戲也視父而已者謂止眼視心則不聽也爾時長者即作是念至競共馳走爭出火宅爾時等者謂長者見火勢已急不獨救子且欲自救故曰己為所燒而又曰我及諸子等此為子者雖無知而不信父言而為父者則不得不早為之所故云我今當説方便等父知諸子下追原長者設方便之初意在投子平素所好之先心故不嫌其虗設也如此下門外本無三車而云羊鹿牛車今在門外者正見其方便也爾時諸子下謂子因父投其所好故不問其虗實而爭出也此喻佛第三七思惟不得已而就實開權應方便品尋念過去佛所行方便力我今所得道亦應説三乘等四十四句偈文種種珍玩奇異及希有難得記後法合即是聖所稱歎自在無繫無所依求無漏根力覺道禪定解脫三昧等句羊車配聲聞乘鹿車配辟支佛乘牛車配佛乘照後法合若有衆生內有智性等三段對看又情必樂著喻二乘人好棄有著空經文讀之雖似平淡而敘事脈胳自有輕重如初云歘然火起次云或當墮落為火所燒雖有歘然所燒之患而曰起曰或何等緩頰至是則曰己為大火所燒而又曰我及諸子必為所焚則何等愴惶先曰了無出心東西走戲視火而已何等怠玩今曰心各勇鋭互相推排爭出火宅則何等精勤可見方便有力而實相容易難言也是時長者見諸子等至得未曾有非本所望是時長者下謂長者見子出火宅歡喜己之方便不徒設而有子可以承受無量之財富也四衢喻四諦也爾雅云四達謂之衢露地喻我空有餘涅槃也以有餘涅槃較火宅固清涼尚無六度萬行寶車之莊嚴故名露地無復障礙者謂我空之果雖小而有山壁猶之直度六通縱任無為之樂也其心下謂子安隱父心泰然喻其天性相關生佛同體也諸子求三車而長者各賜等一大車者喻三乘之人同出三界同名佛子應不令有人獨得滅度皆以如來滅度而滅度之也舍利弗爾時長者下喻説今經法則會三歸一人則會權歸實車以衆寶莊嚴而名其大者以喻菩薩智悲雙運六度萬行也牛以一白色姝好而駕其車者以喻佛知見一相一種大菩提心能生淨妙第一之樂也以上法喻相配理事性相合明然車為所駕牛為能駕經文前後注中皆雙釋者使見人字條理整齊耳縱直曰高橫濶曰廣欄楯以備憑俯鈴懸以虞衝突幰蓋以蔽塵露繩絡以防風掀華纓外垂筵枕內置皆以寶為者示文而不俚也筵曰婉枕曰丹者謂皆可以悅心志而榮起居也以上別訓其車之莊嚴駕以下別訓其牛之德性謂如此寶車豈尋常羊鹿牛可配哉故須大白牛以為駕也膚色下正明其牛之白充潔約色言姝好約形言有大下正明其牛之德性謂尋常之牛有步平正而行不疾速者有行疾速而步不平正者皆不可以乘重服遠也今二者皆備則牛之德用無以加矣喻阿耨菩提之大心貞固足以幹事也又多僕從下謂有此車此牛又有此人役也喻菩薩乘此大因大果則得四衆八部日夜衛護也上品所謂天人夜叉衆龍神等恭敬是也所以下徵釋謂諸子元各求小大三車而長者所以平等賜與大車者何也以是大長者財富無量而心無偏黨也由財富無量所以周給一國疏遠之多人而不匱乏由愛無偏黨所以等賜親生幼子而不吝惜以喻四衆八部尚皆與記成佛豈千二百阿羅漢為佛常隨影響之衆而不授記作佛耶上品所謂大乘平等法若以小乘化乃至於一人我則墮慳貪此事為不可又所謂聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑是也是時諸子各乘等者謂所得過其所望喻千二百人本求大小三乘有分別之果而出三界今不期佛説無分別法平等授與一乘之記同作佛也此配方便品第八節舍利弗當知我見佛子等至今我亦如是説無分別法二十八句頌也而作下明財富無量今此下明愛無偏黨以上敘長者心中作念喻佛欲會權三之義我有下又敘長者念中自決之辭喻佛欲等與一實之義配後法合即如來亦復如是為一切衆生之父若見無量億千衆生以佛教門出三界苦得涅槃樂如來爾時便作是念我有無量無邊智慧等文也舍利弗於汝意云何至善哉善哉如汝所言舍利弗於汝等者謂長者先許三車竟無而後轉各等與一大寶車似昔之所許實有者成虗今之所不期而等賜者為妄與也故曰寧有虗妄不舍利弗言不也者謂凡稱虗妄者以無益於人有損於事也今長者於諸子既有益無損故不為虗妄也是長者但令下有益也何以故下徵明有益況復下無損也世尊若是下申明無損復有徵有釋可知也何況長者自知下結盡有益佛告舍利弗下善其詳喻明而酬問當心故曰善哉等喻文五節此節最重以千二百阿羅漢疑佛先説三乘之法為虗悔己所得涅槃是妄今既喻其所以復前後校明使知先所以説三乘者為引出三界火宅坐露地以出苦自全軀命得少分樂也今所以説一乘者乃由出三界之苦然後能乘寶車并能全其軀命以化衆生自他兼利也是知今説一乘正昔日所以説三乘之結果非今實而昔虗見佛法有漸不妄與也此配方便品長文於一佛乘分別説三及頌文普告諸大衆但以一乘道教化諸菩薩無聲聞弟子等文舍利弗如來亦復如是至雖遭大苦不以為患此配第一節喻文也舍利弗如來下以佛配長者為一切世間之父無過而有德也於諸下明無過謂地獄三途衆生有分段生死諸怖畏過人天福報有五衰相現及貧窮困愛別離等諸衰惱憂患過二乘聖賢雖無分段生死過尚有無明變易生死之暗蔽不得開佛知見過佛則於上諸過永盡無餘也而悉成就下明有德謂有實德故成就無量知見十力四無所畏大神通力及大智慧力也有權德故具足方便智慧二種波羅蜜及慈悲喜捨四無量心也常無懈倦喜也恆求善事利益一切捨也以不大喜則懈倦而不恆求善事不大捨則雖求善事不肯利益一切衆生而生三界朽故火宅也為度衆生下謂佛既有德則不須復入三界以修德既無過亦不容復入三界以斷惑今無過有德乃復入三界火宅者以佛自己無苦為度衆生亦出其苦自己有得欲化衆生亦得無上之菩提此佛一人所以能為九法界衆生之父也見諸衆生下以衆生配火宅中諸子雖皆佛子未出三界而樂少苦多也生老病死等有生皆具總明八法之為苦亦以五欲下別明八法為苦見三界火宅燒煮情狀之輕重五欲即下第三節所得粗弊色聲香味觸五法五法為衆生現在貪著追求所欲之苦境業屬前因又以下謂貪著追求是好五欲之苦心業招現苦及後報地獄等之苦果故云現受衆苦等以上釋生老病死之四苦含其三世以現即現生後即死後老病在其中矣若生天上等者釋憂悲苦惱之四苦文承於上謂不但死後受地獄三途之劇苦即微有善業若生天上人間亦不免貧而無財窮而無位困而不伸之憂苦六親知識本相愛善偏多別離之悲苦亂臣賊子惡友等本相冤害憎嫌偏多聚會之惱苦則三世因果五趣善惡皆苦矣其燒煮之情狀則何如哉如是等下結其苦之大槩而明苦之細微多端難以盡言也衆生沒在其中者謂佛雖見是苦而衆生反沈沒其中以為樂也歡喜下正明沒在其中之義繳盡上文謂五欲財利本是苦境而衆生以為樂事故生歡喜而遊戲貪著追求本是苦心而衆生性恐貪之不酷求之不巧故不覺知地獄三途本必有之苦報應寒心而恐畏者而反不信謂且顧生前奚遑死後故不驚怖天上人間貧窮困愛別離冤憎會本是苦聚應厭惡而遠離者然間植小善微因求一人身天福惟恐不得故不生厭如是等種種諸苦皆應𤼭求解脫者而衆生且淹沒陷溺其中故不求解脫由此癡迷無有智慧故不知覺由不知覺故不驚怖由不驚怖故不生厭由不生厭故不求解脫而於三界火宅日出而作則隨善業以東馳日入而沈則隨惡業以西走改頭換面往還五趣雖千百萬億劫不開悟佛知見受無間地獄之大苦則亦不以為患此何異諸子火來逼身苦痛切己心不厭患無求出意哉舍利弗佛見此已便作是念至何由能解佛之智慧舍利弗佛見等者配第二節喻文初七思惟也謂佛見此衆生以苦為樂似不可救已然衆生分為其子固容無知自不求解脫佛乃我為其父又具正遍知覺豈可隨彼無知故陷於不慈而不盡佛為父之道乎故云便作是念等此佛所以明知機不稱法而必欲以法投機也舍利弗如來復作下合第二七思惟謂拔苦與樂雖佛為父道者所當盡然佛復念法大機小終難從實捨權為諸衆生讚生佛共有如來知見力無所畏之德相故云衆生不能等所以下徵釋謂所以為衆生讚生佛共有佛知見等法而衆生反不能以是得度者何也以諸衆生尚未免生老病死等之業苦而被三界火宅所燒縱與其樂而不能信如人身在縲紲遽未可以語衣錦之榮故曰何由能解等此佛雖為慈父難卒然教衆生不肖之子故興下文先且拔苦後方與樂合第三七思惟諱實開權之方便也下第三節明先為衆生應拔其苦難一句第四節明後與無量無邊佛智慧樂令其遊戲一句舍利弗如彼長者至如彼諸子為求牛車出於火宅此配第三節喻文每節舉喻合法者使千二百人容易開解也舍利弗如彼長者下牒其喻文明始則諱實開權然後各與下明終則由權入實如來亦復下法合其諱實但以智慧下法合其開權問曰智慧為實方便為權經云智慧方便是實與權並演注何但曰由權答曰經單以力無所畏為實昉佛自受用之實雙以智慧方便為權明應機則即實而權故明用權即含有實不然權從何起權泯何歸此經所以明權不離實也三界者欲界五趣雜居色界四禪無色界四空各有界限種族也俱名火宅者皆是輪回數也拔濟下衆生配長者諸子為説三乘配門外三車以上總敘三界內外苦樂二果而作下別敘所説三界內招苦果之集諦因色等五欲所以為火貪著生愛所以被燒莫得勿貪誡勸知苦斷集之辭悲夫三界五欲本是戕生苦火衆生反甘沒其中歡喜遊戲不驚怖者以色等五欲為細妙而不知是粗弊之苦火今佛勸誡知苦以斷某集故曰汝等莫得要住又曰勿貪等以一貪等則生愛取一愛取則境分逆順順則流而忘返固是苦火逆則瞋癡從是生焉尤為苦火則三毒之火薪焰生生不絶矣汝速出三界下教其慕滅修道謂三界內苦集一往不知是火容可緩頰今既明以告汝則有燃眉焚首之急故曰速出三界外聲聞辟支佛等之滅道一往無人保任或恐難成今既有佛為作保任則出三界內之苦得三界外之樂為不虗矣以上教慕滅也汝等但當下教其修道也如來以是等者結成雖有力無所畏等而不用之但以智慧方便於三界火宅拔濟衆生之如此也復作是言下申明三乘滅道所以為樂之義釋成誘進之言皆是聖所稱嘆者謂聲聞等乘非三界凡夫所能稱嘆也自在無繫謂不受五欲財利種種苦所繫縛也無所依求謂不依貪著追求現受衆苦也乘是三乘下謂得無漏五根五力七覺支八聖道四禪八定諸解脫三昧而自娛樂則更不後受地獄畜生餓鬼之苦也便得無量安隱快樂者謂亦不受天上人間貧窮困愛別離冤憎會等種種諸苦也此又佛誘進出三界外滅諦之樂如此舍利弗若有衆生下又申明汝等但當勤修精進誘進於道諦以三乘配三車釋上聲聞乘也內有智性具見道之因從佛聞法精勤修習得修道之緣欲速下謂欲速則不達自求則不為人此所以人為小乘而配乎喻中之羊車也次若有下釋上辟支佛乘也梵語辟支迦羅此云緣覺亦名獨覺緣覺出有佛世聞佛説十二因緣而證果獨覺出無佛世自悟因緣而證果今云求自然慧樂獨善寂是出無佛世之名以自然慧不待師教自然而有之慧支佛智也樂獨善寂不擕部黨獨善一身支佛行也深知諸法因緣是出有佛世之名故經先説從佛聞法等句次説求自然慧等句雙舉二種機名也又解求自然慧則慧不止如聲聞但內有智性而已深知諸法因緣則志不止如聲聞但速出三界自求涅槃而已故校菩薩雖小校聲聞差大此所以果為中乘而配乎喻中之鹿車也後若有下釋上佛乘也勤修精進檀等前五度也求一切下智度也一切智大圓鏡智佛智平等性智自然智妙觀察智無師智成所作智又一切智則超辟支迦羅佛智則超菩薩自然智則超聲聞無師智則超天人具此四智始能成就如來知見十力四無所畏此上求也自利也愍念下下化也利他也衆生以三途言三途唯苦故曰安樂人天苦樂相半故曰利益謂去其苦而益其樂也度脫一切者謂以菩薩乘度脫一切二乘人也具此自利利他之大心不同羊鹿中小之戲具而配乎喻中之牛車故云是名大乘也菩薩求此下釋成大乘二字謂前云佛乘此云大乘者以佛是大果衆生能求此大果而乘之以自度度人故又名為摩訶薩之大乘也問曰此中既有大乘以配牛車何下節又云等賜大乘豈有兩樣大乘耶答曰此佛四十年前三乘中有分別之大乘下節乃四十年後無三一小大分別之大乘是知此中大乘權教也下節大乘實教也雖無兩樣却有前後問曰若然者則四十年前大乘亦同小乘為虗耶答曰準喻門外元無三車則此中大乘似虗若準方便品今我喜無畏於諸菩薩中正直捨方便但説無上道菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛及舍利弗自述見諸菩薩授記作佛而我等不預此事則此中大乘與下節大乘元是一乘並無兩樣但前後遲速有異又若準後頌諸佛世尊雖以方便所化衆生皆是菩薩則門外羊鹿小中之車亦是大乘豈有二哉此法喻第五節皆用校量不虗政為此義也舍利弗如彼長者至能生淨妙第一之樂此配第四節喻文明終由權而入實與無量無邊佛智慧樂也舍利弗如彼下舉喻如來亦復下合法若見無量下昔由權二三乘之人也以用也謂用佛四十年前隨宜所説九部教法為門諸二三乘之機出三界苦險得小乘滅樂如諸子安隱出火到無畏處也如來爾時等者喻今説妙法入實也佛之法藏既多衆生又是佛之親子所以不惜而等與也不令有人下釋成等與之義四十年前獨許菩薩受記作佛不許聲聞是令有人獨得滅度四十年後而説此經許聲聞與菩薩同得受記作佛是皆以如來滅度而滅度之也是諸衆生下牒昔所化由權之人悉與諸佛下結足所念與大之事皆是一相者一乘實相也一種者究竟一切種智也第一之樂者得五住究盡二死永亡劫國莊嚴常樂我淨之妙樂也昔分菩薩得佛乘緣覺得辟支佛乘羅漢得聲聞乘則一佛知見分別成三相三種故其樂亦為有量有邊之三等不得淨妙第一也舍利弗如彼長者至於一佛乘分別説三舍利弗如彼下舉喻合法可解前喻中第五節有於汝意云何等之問答明無虗妄今法中第五節但準喻中無有虗妄故不用問答但曰舍利弗如彼等乃至然彼等則佛知當機既解喻之三一必知法之權實也何以下徵釋謂初説三乘既為引導則似非實然後但度以大乘曾無先期則似為妄何所以之故而言無有虗妄以虗妄者無而為有能許而不能與之謂今佛如來既有無量智慧力無所畏諸法之藏則非虗矣又能與一切衆生大乘之法而不吝惜則非妄矣但因法大機小佛能盡與而衆生不能盡受故初但不盡與而後衆生始能盡受有要衆生盡受之因緣故諸佛將一乘之法用方便力先且不盡與而分別説作三乘以引導如是則先所説種種因緣譬喻言辭方便諸權智三乘之法但名不盡與豈云虗哉由昔不盡與而今始得其盡受一乘阿耨菩提之顯記又豈妄哉千二百阿羅漢何用疑佛昔説三乘為虗而悔己所證涅槃非真而有妄耶故云如來有無量智慧等佛欲重宣此義而説偈言譬如長者有一大宅至毒害火災衆難非一此頌第一節喻文也譬如長者佛也有一大宅等者廣頌大千三界苦集狀也宅者託也安也人所託以安身也宅久則易壞故曰頓弊總而言之曰宅別而言之宅有堂舍之分堂者當也當賓客之酬酢也舍者止也止身家於其間也靠壁曰柱即礙曰根橫曰梁直曰棟房址曰基階砌曰階東西曰墻前後曰壁泥塗所以飾縫隙覆苫所以蔽晴雨在簷曰椽在脊曰梠籬落四圍曰周障徑巷穿叉曰屈曲而曰高危摧朽傾斜等者正見頓弊之形狀以明三界依報不堅牢之如此有五百人等者明有世界則有衆生業果之正報也鴟梟下正報中畜生報也鴟梟害所親雕鷲食死尸烏報凶鵲傳喜鳩奪巢鴿肆淫此畜生中羽羣具三毒有如此者蚖者元也乃蛇之大者蝮者復也觸之則復螫於人也乃蠍之大者蜈蚣瞋狠而行速蚰蜒漣涎而走滯守宮蝘蜓也漢宮中養以丹砂取血以塗眉間防淫亂也故謂之守宮百足蚿也多足蟲也鼬鼠之大者由穴而噉鼠者貍狐之大者年老而成妖媚者鼷鼠甘口鼠也食人而不覺痛者也此畜生中輕跳蠢軟具三毒有如此者諸惡蟲輩下謂諸惡類雖飛行不同而同交橫馳走於朽宅中也屎尿下大小便利惡臭不堪𧏙蜋諸蟲以為香美而集於不淨流溢之上則人於男女二根生欲樂想者迷倒極矣狐多疑狼多猜野干夜鳴而為怪或口取諸蟲以咀嚼或足躡屎尿而踐踏齷齪至矣以唇至血曰嚌以齒斷骨曰齧是生蟲咀嚼以殆盡則死尸嚌齧而有餘故曰狼藉藉草也謂狼食不盡零落於草間也世人肆筵設席杯盤狼藉之時可厭矣由是羣狗下謂由此骨肉狼藉之餘羣狗不知彼己食之無味如遺唾而且奔兢搏撮於其間兩足翻尋曰搏收聚一處曰撮搏取不得故飢羸慞惶而求食求之有得故鬬諍摣掣而嘷吠向前相奪曰摣往後相扯曰掣乃鬪諍之貌也啀喍嘷吠鬪諍之聲也銜物死諍曰啀喍失物潑呌曰嘷吠此畜生中毛羣或野或家具三毒有如此者其舍恐怖下結完畜生道而起鬼報之恐怖變狀也處處皆有下正明鬼報西京賦曰山神虎形曰魑宅神豬頭人形曰魅木石變怪曰魍魎夜叉云苦活食人度命以苦自活也毒蟲之屬下謂諸蟲禽獸雖皆惡毒至見夜叉則貪生畏死亦各護其黨卵屬以爪護所生日孚胎屬以身藏所産曰乳夜叉兢來下謂彼雖善藏此能強奪以奪而食故既飽而惡心轉熾也鬪諍之聲下正見其惡熾鳩槃荼云可畏無常殺鬼也或蹲踞土埵或往還虗空離地一尺二尺是虗空也內不畏天遊行縱逸而嬉戲外不懼人撲狗失聲而取樂無忌憚極矣此鬼道中得食強梁肆三毒變狀可畏者也復有諸鬼下不得食之餓鬼也長大裸黑形可畏呌呼求食聲可畏針喉牛首貌可畏食人噉狗口舌可畏殘險飢馳心行可畏飢渴逼馳所以釋為不得食餓鬼也夜叉餓鬼下雙結鬼畜二道謂鬼與畜或飽則爭食鬪諍或飢則呌馳窺窗喻吾人一動一靜無非為三毒業繫不得出離三界逼迫身心起火生下地獄之報故曰如是諸難等是朽故宅下將明地獄報先將大千三界內依正三途八難屬之長者好起下節方宜救濟之文其人近出喻佛去伽耶城不遠得成正覺也問曰上言屬此言出何也以屬則不出出則不屬故答曰不言屬則於己無干涉不應救濟不言出則己且被焚安能救人哉以喻一切佛本在因地皆發願度脫一切衆生如己身則三界十二類生為佛一人之所有故曰屬於然不先自成佛則雖欲從之未由也已故曰近出於後宅舍下敘前畜鬼二道依正被火燒然即是地獄以地獄苦報唯以為重故曰忽然火起也生老病死會成劫濁故曰四面一時憂悲苦惱從而煎煮故曰其𦦨俱熾棟梁椽柱等既已頓弊故火起則震裂而崩倒以上燒然依報諸鬼神下燒然正報謂諸鬼畜初火起則縱逸嬉戲今被火燒則揚聲大呌而受燋頭爛額之痛矣雕鷲諸鳥畜生也鳩槃荼等惡鬼也初則孚乳産生何等惜護往返遊行何等戲樂今則周慞惶怖不能自出求其離地一尺二尺不可得矣惡獸毒蟲初則交橫馳走今皆藏竄孔穴矣竄穴本欲偷生不期值穴中之鬼毗舍闍而殘害是不有天災則有人禍矣野干之屬初則咀嚼踐踏嚌齧他人之死尸何等英雄今則自已前死而尸又為惡獸之所食噉則善惡業緣受報好醜於此悉見矣臭煙熢㶿下謂蜈蚣等蟲含毒陰處墻壁自謂得其所矣今為臭煙熢熢扇鼓㶿㶿熏炙不能自安只得爭走出穴矣藏穴者毗舍得以假手出穴者鳩槃得以快心則無福之人出處皆傷無地可以逃生矣又諸下謂得食惡鬼或穴中飲噉或穴外取食苦中求活火裏偷生尚皆為飽鬼也若夫餓鬼者頭則火然腹則飢渴周慞悶走不能如前從容四向窺看窗牖矣良以三界五趣衆生生縱三毒起殺盜淫以快一時之心死墮三途受無量劫之苦經云此皆純情墮落業火所燒故曰其宅如是等毒害下謂災難甚多難以盡言故曰非一此文若不作三途而釋只見文字重疊泛濫然如來妙法譯師高手澄心諦觀并有條理毫無贅疣自古注疏不明專肆牽強配合為尤可笑是時宅主在門外立至猶故樂著嬉戲不已此頌第二節喻文也是時宅主門外立者照上節其人近出之近字喻佛始坐道場出三界之不久也聞有人言者人即十地菩薩於華嚴會上作梵王帝釋等諸佛轉法輪之人也方便品云再時諸梵王及諸天帝釋護世四天王及大自在天并餘諸天衆恭敬合掌禮請我轉法輪我即自思惟若但讚佛乘衆生沒在苦不能信是法等汝諸子等先因遊戲等者明千二百阿羅漢皆先於大通智佛法中受佛教發大心但因無明所蔽而內祕外現來遊戲於三界也長者聞已下應長行身手有力等文方宜下喻佛欲以神力救濟告喻下喻佛欲以智力救濟惡鬼下總述三途之為苦毒蛇下別釋三途為苦之次第此苦難下結足三途地獄為重諸子下應長行父雖憐憫善言誘諭等文是時長者而作是念至到於空地離諸苦難此頌第三節喻文諱實開權也是時下全同長文諸子下長文云此舍已為大火所燒我及諸子若不時出必為所焚長者既慮與諸子並焚所以益其愁惱今此下六句申明益愁惱之義舍宅無一可樂喻大千五趣皆苦也諸子耽湎嬉戲喻衆生執苦為樂也不受教為火害喻不信佛言集苦因而招苦果長文所以云必為所焚也即便思惟下十句應長行我今當設方便至隨汝所欲皆當與汝止之文隨意下喻佛説三乘法隨小大三乘之機意所取證也諸子下如長文可知長者見子得出火宅至嬉戲快樂自在無礙此頌第四節喻文由權入實也長者見子下喻佛父因衆生之子樂而樂也此諸子下申明因子樂而父樂者以子生育甚難而又愚小無知非敢於作惡也愚小無知苦因也而入險宅苦果也多諸下正明宅險毒蟲畜道險也魑魅鬼道險也火猛地獄道險也四面下謂三惡險道皆具生老病死之四苦故曰俱起而此諸子下謂諸子昔以苦為樂為父者所以為其疾之憂也我已救之下謂今諸子由父設方便使令離苦得樂為父者所以為不陷於不慈也是故呼告諸人而結云我今快樂爾時諸子下喻四十年前由權之人本求小大三乘也長者大富下喻四十年後説今經入實也庫藏等四句正見大富造諸等十七句頌長行爾時長者各賜諸子等一大車至安置丹枕之文有大白牛八句頌長行駕以白牛至何況諸子之文諸子是時下六句頌長行是時諸子至非本所望之文告舍利弗我亦如是至如是等火熾然不息此頌法合第一節也告舍利弗下九法界衆生分情器等三種世間類類各有其聖而佛獨王於衆聖之中故曰尊曰父此應長行如來亦復如是等文一切衆生下應長行見諸衆生為生老病死等文一切衆生既皆佛子云何不得如佛以深著世樂無有慧心所以不得出於三界火宅也衆苦下正明無安如火之義常有下正明甚可怖畏之實此中因長文廣故頌中略耳如來已離三界火宅至雖復教詔而不信受此頌法合第二節釋成上節告舍利弗等六句偈文申明為父為子之義如來已離下謂佛所以為尊為父者以能先離火宅寂然間處於林野故也一切衆生所以為佛子者以大千三界依報十二類生正報皆為佛之所有故也昔之三界既為佛有佛已出離今之三界為衆生有衆生亦當出離已出離者職應為父未出離者分應為子故云其中衆生等而今此處下謂未出離三界者故多患難已出離三界者故多安樂豈有父受安樂子嬰患難而不見救濟者乎故云唯我一人等雖復教詔下謂父愛子而子不如父願乃法大機小也前八句應長行佛見此己等文後六句應長行舍利弗如來復作是念等文於諸欲染貪著深故至有得緣覺不退菩薩此頌法合第三節釋成初節深著世樂無有慧心等十句之義於諸欲染下承上文言謂雖復教詔而不信者非敢為不信乃因無有慧心深著欲染執苦為樂而不信也以是方便下謂以是為著欲之深不信故佛不以一乘實智教而以方便權智教將一乘而説為三乘也以上明為機鈍闡能被教令諸衆生下明所被機因佛教而知苦斷集慕滅修道也是諸子下總明三乘之因心具足三明下別明三乘之果證汝舍利弗我為衆生至今所應作唯佛智慧此頌法合第四節汝舍利弗下明為衆生闡能被之教法喻皆為一乘以此譬喻者長文所謂今當復以譬喻也説一佛乘者長文所謂更明此義也汝等若能下勸所被之機能信佛語即成佛道長文所謂諸有智者以譬喻得解者是也一切皆當等二句釋成説一佛乘之佛字是乘微妙等四句釋成説一佛乘之乘字佛所悅可下謂由信受佛語故諸佛歡悅而許可由自得佛乘又能開悟衆生故衆生稱讚而禮拜無量億千下謂佛悅可則上該果海生稱禮則下徹因源此佛乘所以為微妙清淨第一具足無量億千諸力解脫定慧等諸餘佛法也此八句釋成於諸世間為無有上二句申明説一佛乘之佛義得如是乘下又釋成是乘微妙清淨第一二句申明説一佛乘之乘義謂令千二百諸子得此大乘不論菩薩聲聞直下皆同至成佛之道場更無委曲也以是因緣下謂以此不問菩薩聲聞皆當成得佛之因緣故十方諦求唯有一乘更無餘二三乘唯除佛方便有二三乘也告舍利弗下通結法合一二三四節之頌文也謂前言一切衆生皆是吾子我則是父者子即是汝等千二百人父則即我釋迦是也此結初節我亦如是衆聖中尊世間之父一切衆生皆是吾子汝等纍劫下明身子等為子之義我皆濟拔下明佛為父之義此結第二節我雖先説下明昔説三乘之義結第三節今所應作下明今説一乘之義結當節之第四也一一對之可見不頌法喻第五節相校之文者以皆不虗妄之義至藥草喻為四大弟子始述成之若有菩薩於是衆中至在所遊方勿妄宣傳以上八節頌今當復以譬喻更名此義之文訖此及下節頌是諸所説皆為化菩薩故之文申明上節以是因緣十方諦求更無餘乘除佛方便之義若有菩薩下謂機若大而法即大也以在衆中心聽專一無往不是諸佛一乘實智之法諸佛雖用方便權智即權所化衆生亦是大乘菩薩此申明更無餘乘矣若人小智下謂法小元是機之自小也申明除佛方便矣智小故著深愛屬心欲屬境世間根境苦果也為此等故下謂佛為此深著愛欲以苦為樂之人將一乘實相之法説為三乘中苦諦故小智衆生得佛投其所好心中歡喜曰得未曾有佛説下謂所以云得未曾有者以佛説苦諦真實無異故也無異謂不假也此八句為四諦中苦諦若有衆生下八句集諦謂利根衆生才知苦果即不問因若有根鈍衆生雖知諸樂是苦尚不知苦之根本猶深著苦因時刻不能暫捨執於我見佛又為是等輩用方便力説言諸苦所因非他法為本乃是貪欲為本因也説道之道訓言若滅貪欲下四句滅諦滅擇除義承上文言謂貪欲既為苦本若有衆生依於寂滅理觀擇除貪欲是苦因已盡而諸苦果則無所依止應知但曰無所依止則惑尚有餘果未證極至第四果後三品思惑斷盡始為滅盡諸苦名第三之滅諦也為滅諦故下四句道諦道有三十七品皆能離諸苦縛縛離則名得解脫矣是人下徵循名也以上問辭但離虗妄下答辭以法言之謂斷見思以喻言之如出火宅坐露地名得解脫者指權乘小果也其實下釋違實也以法言之則惑未斷乎無明果未極乎佛地以喻言之如在露地未得大竇白牛之車也佛説下會三歸一也謂佛説此人未得實滅者非謂於昔所説小乘統無所得但未得今所説成佛之無上道也我意不欲下謂以汝身子等千二百人證得小果雖自為足然於佛意願未滿則猶以為不足也以不欲其人捨今之大而但證昔之小故也我為法王下承上文言謂佛意既不欲但證小滅度者初奚又以小説也以佛既為三一小大之法王則於小大法中得其權實自在昔因機生權大為小安隱衆生使無破法不信故墜墮三惡道之不安隱今因機熟實小為大安隱衆生使無嗚呼深自責云何而自欺之不安隱故曰安隱衆生等汝舍利弗下誡當機當妙體佛心傳法之時勿失其先後次第法印者謂佛之法王掌此權實自在大小乘之法印印定一切衆生或即大為小或即小為大一切天魔外道不能改移也為欲利益下謂昔説小有二乘之利益今説大又有一乘之利益在所遊方勿妄宣傳者誡辭謂當機等無因佛於小大皆有利益汝或住所在或行腳遊方便一槩朧遇機生時遂妄宣其大遇機熟時又妄傳其小如此則無益而反有損也若有聞者隨喜頂受至此人罪報汝今復聽此節反覆詳明在所遊方勿妄宣傳要有益於人而無損也若有聞者下謂宣傳時假若有聞者先隨喜而後頂受此豈尋常之人必是阿惟越致不退地之菩薩矣若有信受下謂縱不頂受但能信受此人雖非不退地菩薩亦是曾見過佛聞過法福慧具足之人也恭敬供養福足亦聞是法慧足以上且約聞佛現前能信受者言若人有能下謂不但頂信佛所説即有人能信汝舍利弗所説此人亦見我及汝三乘法衆今日説法之心矣此豈可不擇機容易而妄宣傳乎斯法華經下謂所以定要擇能信之機而傳者以此經元為見佛聞法智深能信之士不為迷情惑理識淺不解之夫所説故也一切聲聞下謂何以但為深智不為淺識以一切二乘人智解之力皆不能及故也汝舍利弗下謂當機雖此一切二乘人名為有智然尚加以信力得入況餘無智又無其信安可傳乎其餘聲聞下謂況餘聲聞教汝莫傳者以其餘聲聞雖有信而無智不知法無高下唯狗人之尊𢍉故但能信佛語隨順此經不能信汝舍利弗語隨順此經也又舍利弗下謂其餘聲聞所以不信汝語者以汝為法臣校我為法王而傳法彼必心懷憍惰計著我見謂彼佛弟子也汝佛弟子也彼安忍長遠恭敬於汝而求法耶此其餘聲聞縱有信而無智不可傳也凡夫淺識下謂其餘聲聞固是出家二衆有我見而不可傳其餘凡夫乃在家二衆或不知好惡似無我見而可傳乎然凡夫知識甚淺五欲事障尤深彼雖不計彼我亦聞而難解故云亦勿為説若人不信下謂所以僧俗無智皆誡汝勿妄宣傳者以凡無智則不解不解則不信不信則毀謗興毀謗興過則非小彼心必欲斷滅一切世間成佛之種子也或復顰蹙下形容斷佛種者之形貌及心相也謂彼必憂愁形於面日夜欲滅其教而不可得故曰顰蹙斷滅萌于心高低欲毀其人而似難動故曰疑惑雖汝傳法意在度脫一不擇機便有損無益之如此故曰汝當聽説此人罪報若佛在世下正明罪報謂不但佛在世謗法者之罪報應聽即佛滅度後謗法者之罪報汝亦聽之故云汝今復聽前偈中所譬三途之人正由此等不信大法而致所以前列其喻此出其法文不虗設也其人命終入阿鼻獄至生輒聾啞諸根不具此節影其餓鬼修羅以餓鬼攝在地獄修羅少分天福故不顯言也其人命終下地獄報從地獄出下畜生報若得為人下人報畜報略明五種謂狗野干馲駝驢蟒也人報有二種諸根暗下業報永不見下難報常處地獄如遊園觀至無智人中莫説此經此節文似疊出義實攸分常處地獄下謂初因謗法墮於三途八難難才受畢又入地獄地獄惡報苦不可言而此人者業不由己時出時入則以地獄當園林臺觀也故云常處在餘惡道餓鬼也不去朝夕故譬舍宅駝驢豬狗畜生也時時來往故云行處此明初從三途出為人第二次復墮落者若得為人下明次從三途出而後為人者以聾盲等患為莊嚴則不自知其為醜也以水腫等病為衣服則終身不覺在其體也身常臭處下謂謗經者素無見佛聞法之因不知改悔而且深著我見愛此劣形人或憎惡不識醜恧反增瞋恚人畜異類不當野合淫心熾起不擇雲雨著我貪也增恚瞋也熾欲癡也有此三毒須臾人報才畢又將墮入三途矣所謂具足一劫劫盡更生有何窮已常處舍宅行處不其然乎故曰謗斯經等以是因緣下結前起後也謂佛出世元為安隱衆生説法元為利益世間汝身子等一不擇機妄傳非器俾無智無信衆生謗法誤膺斯苦是豈佛之初心哉故云我故語汝等若有利根智慧明了至汝當為説妙法華經此節正教當機為欲利益世間故説此經之義申明若有聞者隨喜頂受等文計七十六句分十波羅蜜而解若有利根等者遇十波羅蜜中有智者許説也智慧明了得此經之因多聞強識求此經之緣若人曾見等者遇十波羅蜜中有施者許説也見佛植善福施也深心堅固施福不求人天小果所以為深心也若人精進等者勤波羅蜜也常修慈心勤與樂也不惜身命勤拔苦也若人恭敬等者禪波羅蜜也無有異心意定也離凡愚處山澤身定也又舍利弗等者方便波羅蜜也捨惡近善各得其方便故也若見佛子等者尸羅波羅蜜也持戒如珠六根清淨之因求大乘經開佛知見之緣若人無瞋等者忍辱波羅蜜也質直柔軟不人辱也愍一切敬諸佛不辱人也復有佛子等者慧波羅蜜也於衆心淨慧自利也因緣譬喻慧利他也若有比丘等者力波羅蜜也為智求法信力大也樂大不小慧力大也如人至心等者願波羅蜜也求經與求佛舍利同視此經即佛也不求餘經願不小也未嘗外典願遠邪也告舍利弗等者結前起後謂以十波羅蜜明求法而教汝為説者乃多中少分之相也信解二字為下品張本妙法蓮華經信解品第四信者信得諸佛世尊以種種因緣譬喻言辭方便説法皆為阿耨多羅三藐三菩提信法則會三歸一也解者解得是諸所説皆為化菩薩故解人則會權歸實也經云我等昔來真是佛子此自信也又云而但樂小法若我等有樂大之心佛則為我説大法乘此自解也故云信解品爾時慧命須菩提至我等今者樂説譬喻以明斯義爾時慧命下上品佛為千二百人説譬經家惟敘置四人所謂諸有智者以譬喻解者也須菩提解空第一故稱慧命迦旃延云文飾論義第一迦葉云飲光頭陀第一目犍連云采菽氏神通第一故皆以摩訶稱摩訶云大言四人為千二百衆中第一之大阿羅漢也從佛所聞下敘領方便譬喻兩品之文未曾有法即指舍利弗以聲聞人得同菩薩授成佛一乘劫國莊嚴之顯記為未曾有之法故也問曰若然者則經家但敘領方便品未曾敘領譬品注中何得釋為領兩品之文答曰一則未曾有法一句該盡兩品之文一則舍利弗得記在譬喻品中釋敘領兩品之文無失發希有下謂空生等一向安于小果不曾發作佛之心今得佛説兩品之文開悟佛知見信其自心作佛生大歡喜證入初地是為發希有之心而踊躍也即從座起下正明六根歡喜踊躍之儀而白佛言下一等信解四人共陳故曰我等臘德並高故居僧首朽謂將死對無所堪其進而言邁八十已上對無所任其求而言自謂己得下謂以佛分中謂我等未得無餘涅槃似乎未滿佛之本願以我等生死中人得離三苦則亦自謂已得涅槃矣前品云佛説一解脫義我等亦得此法到于涅槃而今不知是義所趣此正述彼念也由是我等年老身朽之人于小果涅槃有得則於佛無上大涅槃為無所堪任不便進求阿耨菩提也此敘五時中阿含時已攝華嚴時也世尊往昔下又敘五時中般若方等二時説法之法佛於般若方等時為菩薩所説阿耨菩提之法既久謂般若方等共説三十年也我時在座下謂佛於三十年中説般若方等我比時亦在佛座下所以不復進求阿耨菩提者一則以年並朽邁之人身體疲懈一則於阿含會上涅槃有得但念空等三解脫門足以法樂為自受用故于菩薩法遊戲神通等事皆心不喜樂也上云年並朽邁約壽命言此云身體疲懈約形質言上云已得涅槃約小果言此云空無相無作約小果具三解脫門言其實空等三法大小乘同具前身子云我等同入法性肇論云三乘等觀性空而得道是也問曰既三空同入何以為小答曰以過在一念字上起信論云一切衆生不名為覺以念未淨故上云阿耨菩提約果覺言此云菩薩法等約因行言遊戲下正明菩薩之法遊謂無住戲謂不真神謂精神通謂雖從實際遊戲于今時不妨遊戲之精神命脈而令一切衆生通于那畔此菩薩法之妙用也淨佛國土上求也成就衆生下化也小乘人但念空故不喜樂于妙用但念無相故不喜樂于上求但念無作故不喜樂于下化殊不知佛以一大乘實相權而為大小中之三空也所以下微釋樂小而不喜大之義謂所以淨佛國土是菩薩成佛時自受用之報土成就衆生是菩薩成佛時自莊嚴之法嗣而皆云不喜樂者何也以世尊令我等出於三界之苦集得證涅槃之道滅故安於小而不求於大也又今我等下謂於今經法華會上則比般若方等之時年已益加朽邁故於法會之初佛為菩薩説大乘經名無量義教菩薩法不但比前般若方等時心不喜樂而已乃至不生一念好樂之心也如是則我等小乘人於大乘阿耨菩提之法絶望極矣我等今於佛前下謂般若方等時雖聞授菩薩作佛之記佛比時猶呵升聲聞今於佛前聞方便譬喻之説不但不呵升而且令聲聞與菩薩得同受其阿耨菩提之顯記此我等之心所以為甚歡喜而今經妙法蓮華所以為得未曾有也不謂於今下申明心甚歡喜等義謂若有求而得則不為希有今無求而得故云忽然得聞等分所當得則不為慶幸今經乃昔分所不當得而得故云深自慶幸獲大下結上起下領譬品法喻各第四節之文無量珍寶者一乘阿耨菩提之法寶也不求自得者四十年前本無所求四十年後不期佛忽然授記也此二句為下説喻文張本我等今者下二句為下喻文四節之本以明斯義一句為下法合四節之本此四大弟子所以為諸有智者以譬喻得解也下文法喻雖各四節然皆初二兩節以明不求三四兩節以明自得譬若有人年既幼稚至往至貧里以求衣食據五時教體此節譬華嚴三七思惟之時以明不求大者為無知也舊稱窮子喻通篇描寫四大弟子及佛窮富之狀然一行敘子一行敘父通領方便譬喻兩品之文譬若下有人四大弟子自況父譬法身佛年既幼稚再雅云幼鞠稚也又云幼冥也注幼稚者冥昧以喻聲聞之機冥昧不知本有法身佛為父也他國譬大千三界五趣或十二十下從幼至艾也年既長大自艾至老也譬前年並朽邁加復下喻小乘人雖由無明種現熏習在外道中多年而不知本有佛知見為無量珍寶故曰窮困數數然于生死海中馳求臥棘塗灰等邪法以為衣食故曰馳騁生老病死謂之四方漸漸遊行下喻植有往昔善根漸由外道而向佛法本國云漸漸者難以頓悟也悟既非頓則乏本智乃是偶然故云遇向上云捨父逃逝喻背真逐忘此云遇向本國喻返妄歸真其父下約喻則喻法身佛在萬象之先約領文則先來二字領方便品初七二七思惟之文及領譬品初二兩節長者求子不得其子出火宅之心故曰先來又曰不得若依文勢為訓謂文既先來子猶漸進則前後相左故云不得中止謂法佛以遍法界清淨光明之身現千丈遮那報體止於色究竟天為一城也其家大富下喻佛有無量無邊智慧十力四無所畏等法論云身有無量色色有無量相相有無量好所住依果亦無有量金銀等七寶之富其諸下錢之富多有下人力之富象馬下禽畜車馬之富出謂借貸入謂取償乃放債之富也乃遍他國者喻佛圓音落落該十剎而頓周也商佑賈客下行曰商坐曰賈大財曰商小販曰估喻佛主伴重重極十方而齊唱也此領上二品佛悉成就無量知見力無所畏等文時貧窮子下接遇向本國言父雖求子子元不求父而亦來者喻佛與衆生法性相同如世間父子本屬天性雖似不相知機緣當會不得不來也父每念子下接其父先來求子不得至商估賈客亦甚衆多而言云每念子喻佛大慈悲時刻心在衆生經云大慈大悲常無懈倦恆求善事利益一切而生三界朽故火宅等云與子離別五十餘年者喻聲聞人未得涅槃時恆在五趣四生輪轉也云未曾向人説如此事者喻佛在華嚴會上但説阿僧祇隨好光明兩品之文餘五周四分皆菩薩説故云但自思惟心懷悔恨者悔謂悔己中止一城恨謂恨子逃逝而已未曾向人説也此由方便品云我所得智慧微妙最第一似有悔義衆生諸根鈍著樂癡所盲如斯之等類云何而可度似有恨義故作此譬自念老朽下申明悔義無有子息下申明恨義是以殷勤下結足悔恨以上喻佛初七思惟復作是念下喻佛第七七思惟有展轉反側冀得之義喻佛求聲聞必得授記作佛之慈再時窮子下接遂到其父所止之城而言經文自國而城自城而舍描寫漸漸遊行之法以身顧人曰傭任力取直曰賃前行曰展復回曰轉住立門側者意在傭賃也遙見其父下喻二乘人形卑眼小高視遮那妙體華藏莊嚴不能得近也師子床為身所坐故曰踞師子獸中王無畏羣獸表佛為人中師子説法無所畏也床高几襯是不委頓故曰承以上明身所受用婆羅門云淨行剎利云王族居士謂居家有道潔白其操以上喻佛為三界天人所仰止故曰皆恭敬圍繞以真珠下明身所佩服吏民下明人所奉事覆以下明居所蓋飾香水下明地所淨潔散衆下明所玩賞出內下明所交易總之喻佛富有萬德蕩無纖塵為世所尊之義故曰有如是等窮子見父下謂窮子不知長者是己本生嚴親應生歡喜反懷怖懼譬二乘人於菩薩遊戲神通上求下化之功德心不喜樂也竊作是念下謂窮子念中錯疑己父是王不然或是與王相等之人非我下譬當機等先在外道時見佛之威德謂佛非己可能親近道非己可能習學方便品所謂不求大勢佛及與斷苦法也不如往至下論語注二十五家為里爾雅肆力訓極力謂窮子見父富貴勢大甘從貧里為極力傭工之地而衣食易得也方便品所謂以苦欲捨苦如犛牛愛尾以貪愛自蔽也若久住下申明捨富從貧之義作是念已下謂竊計定而形隨心伇去之速也時富長者下接坦然快樂無復憂慮而言謂子不識父父却認得子事與願諧故心大歡喜所以喜者以子來適其夙志故即遣人急追不少緩也譬佛三七日中雖知根鈍且稱本懷敕諸法身大士説七處九會五周四分之法經云奇哉我今普見一切衆生具有如來智慧德相此急追將還也爾時使者下經云初發心時即攝五位成等正覺此疾走往捉也窮子驚愕下二乘人素不願成佛今教其發心即得成佛是以心驚口怨為不相犯而見捉也使者執之下經云若人欲了知三世一切佛應觀法界性一切惟心造是執之逾急強牽將還也于時窮子下二乘人以見思惑為罪以三界為囚執以入滅盡定為生出滅盡定為死所謂變易生死也今教斷見思惑之機觀法界性出定度生是為無罪而被囚執此必定死也轉更惶怖等者謂佛初教二乘人修道證滅以怖畏三界內生死苦也今教出三界生死苦者復入三界內以同事攝修行六度度脫衆生勿惜生死之苦是以轉更惶怖悶絶倒于地也躃倒也父遙見之下譬佛第三七日思惟尋念過去佛所行方便力我今所得道亦應説三乘等也遙見喻佛與小機相去遠也而語使言喻佛菩薩密語不與二乘人語也不須不用也勿強將來者知心未服也冷水灑面醒暈死之法故曰令得醒悟莫復與語者知不相信徒益驚駭也此譬佛三七思惟後順機所宜欲諱實也所以下徵明謂所以先命急追將還似有用此人今云不須用此人等者何也以為父者知己知彼一則志劣一則貴豪兩難容易契合也審知是子下心知親而形不妨暫踈濶故不語他人云是己子使者語之下使遵主命放子所謂將欲取之必固與之故曰我今放汝等窮子歡喜下照前竊作是念等文喜其不見逼迫強使也喻佛及諸大菩薩順小機鈍根衆生將欲隱勝現劣必投其所好以遂其本願故諱實而開權也此領方便品第二節舍利弗善聽諸佛所得法無量方便力而為衆生説等五十四句爾時長者將欲誘引其子至更與作字名之為兒此節譬十二年説阿含時以明不求大者為貪小也爾時長者下承上文言謂既審知是子雖暫時下劣不可倉卒語人而根骨豪貴可以從容方便而圖喻二乘人權雖小果實有大基不可急得可以緩求故曰將欲誘引等密遣二人下正出誘引方便密遣謂不似先顯言急將追還形色憔悴下謂不使見形生畏汝可下徐語不使聞言起怖此有作處反上非我傭力得物之處倍值明非逼迫強作窮子若許下謂從即引來設惑疑難問何所作便可實告云顧汝除糞俾信其肆力有地不必往至貧里也我等二人下共作明其有伴時二使人下謂如長者之教而行既已得之下謂如密遣之辭而言此喻諸大菩薩上遵佛教下依本願內祕外現以同事攝權宜求人莊嚴佛法也爾時窮子下取價恐其見欺喻聲聞人依四諦修證皆先果後因此領譬品汝等當知此三乘法皆是聖所稱歎自在無繫等文以上敘其主使求人其父見子下敘父子始相邇也愍謂愍其不相信先索其價怪謂怪其甘為賤役喻佛悲憫衆生迷本有一乘佛之知見而怪其甘為小乘貧所樂法也又以他日謂非得子之當日窗牖遙見謂非大庭廣衆公然覿覩喻佛雙垂兩相二始同時即華藏而視閻浮也子身羸瘦喻聲聞身無功德肥膩糞土塵坌喻雖則知苦斷集尚有無明煩惱未獲清淨智光即脫下謂先雖密遣但可得人此欲更名故須親降是子雖不以父為意而父則時刻在子此領方便品思惟是事已即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘説也脫瓔珞等喻佛隱勝也著粗弊等喻佛見劣也手執糞器示形同憔悴不使疑惑是王等故曰狀有所畏先語餘人勉其勿懈後方近子留其恆作加工價給器使皆領譬品如彼長者雖復身手有力而不用之但以殷勤方便勉濟諸子火宅之難等文我如汝父下申其留作增價等義本是嚴親而曰如父喻法身同體報化則分真似所以下徵釋謂所以貴賤分位而曰如父者何也以有三所以釋成如父之義一則年有老少一則常作無面欺背怨一則衆所公見都不見惡似餘人此領譬品我今為汝保任此事終不虗也汝等但當勤修精進自今下始終定其久要上曰如父領譬品我亦如是衆聖中尊世間之父此云如所生子領譬品一切衆生悉是吾子即時下更改也謂更改顧與長者作工之賤字為己親兒成貴名也他日承父家業始於此爾時窮子雖欣此遇至下劣之心亦未能捨此節譬方等般若二時以明雖不求大而分證其大也爾時窮子下喜遇名也猶故下未信為實也客作廝養傭顧兩可之賤稱今新安詈子弟不才者曰客作由是下謂由是未信為實之故雖受更名之寵於二十年中猶常令除糞異乎親子之尊貴也準五時判教阿含十二年方等八年是二十年也過是下喻過阿含方等之後佛父衆生之子彼此之心始相體相信也體謂設以身處其地父子如一人也信實也信長者實如父己實如兒也入出無難者謂父子既相體信入則不難為兒出則不難為客作也方等大乘算同阿含除糞以法雖大而機自小聲聞菩薩聞同得異也然其下謂心雖相體信身不難入出然實未居子舍猶以客作自處初節所謂但念空無相無作於菩薩法遊戲神通心不喜樂也世尊爾時長者有疾下譬般若會上命諸大聲聞轉教付財也自知將死喻佛涅槃時近也我今多有下喻佛自證阿耨菩提法藏無量也其中多少下取喻聲聞自取大乘與謂以小果與大乘人説兩皆命其悉知可見佛未嘗於小乘人有吝大乘之意方便品云佛自住大乘如其所得法定慧力莊嚴以此度衆生自證無上道大乘平等法若以小乘化乃至於一人此事為不可此正領彼文也我心如是下喻佛心及佛所證之法雖如是平等能與而不惜然説佛法者亦當善體佛心必擇得其機然後始傳也所以下徵釋謂所以教汝知我財寶者何也釋云以我與汝便為不異是子應承父業也所以又教汝知我心如是當體此意者何也以我有即是汝有不可推是父物恣肆拋撤故宜加用心無令漏失也此領譬品無智人中莫説此經若有利根智慧明了乃可為説庶無失言失人義也爾時窮子下喻四大弟子遵佛命卒以小果而領知大法也而無希取下喻受大命而自不發大心也然其所止下謂窮子不解父無令漏失之教疑父吝惜故但執守不取一餐敢多自用哉所以然者以身之所止尚在客作心之下劣亦未能捨喻二乘人耳雖聞大位猶小果心雖知大猶貪寂滅前文所謂於佛教化菩薩阿耨菩提不生一念好樂是也復經少時父知子意至今此寶藏自然而至此節譬當經授與聲聞成佛劫國莊嚴之顯記以定佛與諸佛為一大事因緣出現于世之本願也復經少時者喻今經去説般若經時不多時也父知子意漸通泰者喻得般若彈呵淘汰之功也成就大志者前品身子所謂我等亦佛子同入無漏法不能於未來演説無上道也自鄙先心者即嗚呼深自貴云何而自欺等義也臨欲終時者譬佛自知涅槃時到也而命其子等者即吾今於天人沙門婆羅門大衆中之説也皆悉已集者如序品所敘集四衆八部及八萬大士也即自宣言等者即我昔曾於二萬億佛所常教化汝之説也於某城中等者即我昔教汝志願佛道汝今悉忘及譬品汝等纍劫衆苦所燒也其本字某者如身子本聲聞名也我名某甲者即為諸聲聞説大乘經名妙法蓮華授身子阿耨菩提劫國莊嚴眷屬壽命正像法之顯記未來成佛號曰華光者也昔在本城懷憂推覔者喻昔在大通智佛時植有大乘之因也忽於此間遇會得之者喻佛今於靈山會上為二乘人成大乘之緣也此實我子者領譬品法合第四節云是諸衆生皆是吾子也我實其父者領譬品如來亦復如是為一切衆生之父也今我所有一切財物皆是子有者領譬品皆以如來滅度而滅度也先所出內是子所知者領譬品我先不言諸佛世尊以種種因緣譬喻方便説法皆為阿耨多羅三藐三菩提也世尊是時窮子等者結成品首所謂無量珍寶不求自得之文也世尊大富長者則是如來至迷惑無知樂著小法此合初節喻文世尊大富下以長者況佛我等下以窮子自況如來常説下釋成為子之義歸於佛説非敢自認也世尊我等以三苦下釋成似義謂佛既常説我等為子我等不認真而自云似者以苦多惱重迷而不知樂小故也三苦謂苦苦壞苦行苦苦多故熱惱熱惱故迷惑迷惑故無知無知即無明也有此無明之惑故迷自己本具一乘佛之知見不作外道即著小乘何異窮子怖親生父而往貧里哉準瑜伽顯揚二論三苦即三受瑜伽云復次三界有情所依之身當云何觀謂如毒熱癰粗重所隨故即於此身樂受生時當云何觀謂如毒熱癰暫遇冷觸即於此身苦受生時當云何觀謂如毒熱癰為熱灰所觸即於此身不苦不樂受生時當云何觀謂如毒熱癰離冷熱等觸自性毒熱而本住故薄伽梵説當知樂受壞苦故苦苦受苦苦故苦不苦不樂受行苦故苦乃至云想受滅為樂中第一顯揚以三受況為癰疥癩三病能了第三行苦為癩方得涅槃不了不苦不樂之行是苦苦樂二受由是而生也今日世尊令我等思惟至當有如來知見寶藏之分此合第二節喻文言今日者對上節我等以三苦故為往劫之言其實今日指阿含時非法華時也謂阿含時佛知我等往日受多苦不過樂其小乘脫苦之法所以即教我等思惟得小果之法在於蠲除根塵諸法中見思惑戲論之糞也思惟即前六識屬于知蠲除即修斷義戲論之糞乃即諦下煩惱此迷佛教知苦斷集也瑜伽第一意地中問云何生由我愛無間已生故無始樂著戲論以熏習故淨不淨業因已熏習故彼所依體由二種因增上力故從自種子即于是處中有異熟無間得生又五十一論云復次修觀行者以阿賴耶識是一切戲論所稱諸行界故今云蠲除是依觀行以斷第八識中見思惑謂糞穢耳我等於中下謂我等即奉佛教於佛所説法中勤修不淨無常苦空無我諸觀果然得至涅槃如彼窮子為長者除糞得一日工價同也此修道所以證滅也既得此已下謂初得至涅槃心甚歡喜便私自謂由修而證所得弘多不知尚少也云佛法中顯非外道法中也然世尊先知下謂彼時佛不為我説尚少然者以佛世尊先知我等為凡夫時心著六塵弊欲之久為欲所苦不過故今心樂小乘脫苦得空之法所以便見縱捨不為我等分別言六塵不惡還同正覺若知根塵皆如來藏性依而修假中二觀則當有如來知見寶藏之分也吁此言胡可容易與小乘人言哉以見思惑未斷六種根塵實會染害人故見思惑斷者始可入垂手依根塵作佛事也世尊以方便力至而我等不知真是佛子此合第三節喻文世尊以方便下承上文言謂佛于阿含教中不為我等分別當有如來知見寶藏之分而於方等會上却以方便權智之力説六種根塵皆是如來實相智慧之法我等既從佛任阿含會上得涅槃一日之價遂以小為大故於此方等大乘雖曰心相體信入出無難然亦無有志願求于大也我等又因下謂佛見我等於方等會上無有志願求于大者以權實皆在佛也故於般若會上佛俾權實在己便於自求我等又因如來智慧但為諸大菩薩開示演説而我等自己於此大乘法而亦無有志願者何哉謂佛知我等心樂小法莫過以方便力隨順我等彈呵淘汰其樂小之心而後或可䇿進更求於大也而我等不知比轉教付財時自己業已真是大乘佛子不須更求其大也此如窮子雖受教敕領知衆物而無希取一䬸之義同也問曰上節既敘得至涅槃一日之價已今復敘者何也答曰上敘阿含為正得之時此敘方等指先得而言文同義別故不為重也今我等方知世尊至所應得者皆已得之此合第四節喻文今我等方知下承上文言謂我等初不知真是佛子疑佛但以如來智慧教我等為諸菩薩説似於我等深有吝惜今佛説諸佛世尊以種種因緣譬喻言辭方便説法皆為阿耨菩提是諸所説皆為化菩薩故方知世尊於佛智慧果於我等無所吝惜也所以下徵釋謂所以先疑佛似吝而今方知不惜者何也以我等從昔以來真是佛子而但樂小法所以將真作假也若我等昔有一念樂大乘之心則佛于四十年中所説方等般若之大乘皆為我等所説豈直為諸菩薩説哉於此經中下謂何以知我等有樂大之心佛之方等般若大乘皆為我等而説以於此經之中聞佛每每言諸佛世尊惟説一乘故也而昔於菩薩下謂以今經驗昔日方等般若會上佛于菩薩前毀辱訾詈聲聞樂小法者然實非毀訾我等乃即欲以大乘法教化我等也我等不知都作毀訾而會是故於喻説後我等説本無心有所希求今法王大寶自然而至如往昔方等般若會上諸佛子所應得者我等皆已得之矣不復更用修而得也昔于菩薩前毀訾聲聞者如楞伽經于大慧菩薩前動則以聲聞同外道名愚夫跛驢維摩經喻盲人敗種圓覺經教人發願莫值聲聞及諸外道等皆是也爾時摩訶迦葉欲重宣此義而説偈言我等今日聞佛音教至無上寶聚不求自得此頌品首第一節為喻立本之文我等下四句應長文自爾時慧命起至歡喜踊躍止佛説下應長文即從座起至以明斯義止由長文已廣頌中所以略也今日對四十年前言聞即耳根所被機也佛音教即本經三品文言能被教也歡喜約心言踊躍約身言照前心生大歡喜自知當作佛看小乘人一向不許作佛今得授記作佛是得未曾有也佛説下正明得未曾有無上寶聚喻阿耨菩提四十年前無望故曰不求四十年後授與故曰自得二句為喻之本譬如童子幼稚無識至何用衣食使我至此此頌第一節喻文準長行應分五段譬如童子下六句為第一段初句標譬次句釋成童義第三句釋成無識四五兩句喻背真之地遠第六句喻逐妄之時多也其父憂念至有大力勢二十八句為第二段應長文其父先來起至亦甚衆多止之文初句標其三七思惟之心憂念即大悲心也次句明思惟設法以盡其方第三四句喻既知根鈍且稱本懷説大華嚴經也一城喻其覺場造立舍宅喻二十重華藏莊嚴世界海華嚴教屬一乘圓頓故曰頓止世界成就品及華藏世界品皆普賢菩薩於一真法界正位中唱出故曰造立中詮四分五周明佛依正自受用之因果故曰五欲自娛也其家巨富此句為總申五欲自娛多諸下別明巨富之七寶象馬下別明巨富之四乘田業下情無情親疏之巨富也出入下生意近遠之巨富也出謂出其本入謂入其利行曰商坐曰估以有易無曰賈無處不有者喻法身遍在一切處也千萬下親疏遠近之衆多也圍繞恭敬者富貴不去其身為物所景仰也以上明富利常為下明貴與勢世出世間不出富貴勢利而已王者君也羣臣牧也記云體羣臣王愛念隆聖眷也臣宗重尊德性問學也以諸下結其近者悅而遠者來也豪富下結其富貴勢利之有力也而年朽邁至遂至父舍二十句為第三段應長文時貧窮子起至住立門側止之文長文先敘到城次敘父念後敘到舍頌文以父念敘於首以到城舍敘於末而年朽邁者承上文言謂為父者富貴勢利儘自足其不足者惟乏其子是以益其憂念朽邁喻佛成果之時已久千二百人尚未得記也夙早也夜夕也死時將至喻佛涅槃時將至也癡子者父心痛子之詞捨我五十餘年者念其別久也庫藏下念其財富無交閣也爾時下前云童子繼云癡子今云窮子殊有次第求索衣食正見其窮從邑下求索地之近遠或有下衣食得之有益飢餓見其枵腹羸瘦見其形醜瘡㿍見其病纏皆窮子之窮狀也漸次下由遠至近也傭賃下由近至親也爾時長者起至欲往傭作止有二十四句為第四段應長文遙見其父起至疾走而去止之文於其門內喻佛居阿蘭若法菩提場內也以華嚴法界品敘有舍利弗等六千比丘故施大下依報蓋覆無畏眷屬下正報主伴攝護窮子眼中所見之貴如此也或有下窮子眼中所見之富如此也故曰窮子見父等謂是下窮子心中生疑以出世間之大聖人疑為世間之帝王豪貴尊嚴也驚怖下謂窮子神情不安非己所宜到也覆自下心中默述非己所當止也思惟下往回默忖以定其去就謂與其受制于富貴之強使不若安貧賤之自便也長者是時起至使我至此一十二句為第五段應長文時富長者起至以求衣食止之文長文詳而頌文略也初四句喻佛不動覺場雙垂兩相二始同時也故曰在座遙見等默而識之用易繫辭默而成之潤色此以四句頌長文十一句即敕下以兩句頌長文六句長文爾時使者疾走往捉二句影在敕辭中窮子驚愕稱怨大喚我不相犯何為見捉四句攝在驚喚二字中迷悶躃地五句攝盡長文使者執之逾急以下六行半文是人執我下正頌窮子心中迷悶之意謂彼使者執之急牽之強非是顧人做工之情乃欲殺我之狀也豈有能衣食我者使我至此急耶夫親生父子一旦違離久而不相知若此吾人之干本有心性會無彈指頃顧盻浮世幾何一失此身千生萬劫改頭換面視親如冤以惡為美者何限吁亦可畏也長者知子愚癡狹劣至又以軟語若如我子此頌第二節喻文準長行應分三段長者知子至淨諸房舍一十六句為第一段應長文爾時長者起至尋與除糞止之文若論文理此中初四句應截置上節頌尾以此四句是應初節喻文父遙見之而語使言等文知音截為第二節者有二義故一則第二節頌無此四句則無起端之文一則長文第二節喻中有爾時長者將欲誘引其子而設方便以故此中初四句雖應喻中第二節長行之頭其實影釋喻中第一節長行之尾乃譯人超略其文互存其義之法也初句喻佛三七思惟後以他心通智知機如世諦知子者莫若父也次句愚癡即惑重狹劣即器小應長文父知其子志意下劣三四句正見愚癡狹劣應長文自知豪貴為子所難第五句應審知是子起直至第二節而設方便止一十二句之文以長文雖有一十二句不出即以方便四字為要故也什師譯手得廣略易簡之妙如此更遣餘人下七句申明即以方便一句餘人則異乎前所遺之使者長文云形色憔悴頌補以眇目矬陋眇目謂壞其隻眼喻有慧眼無法眼也矬謂短小陋謂卑醜此現身之方便也汝可下示語之方便也顧除糞穢乃方便之事也倍價含初中後善之義以外道作佛之聲聞弟子得四果為正價也由聲聞小乘而受大記作佛是倍價也可見佛法權中元含有實也窮子聞之下長文有窮子若許等文皆長者教諭之辭頌中略之但頌窮子受命服役之事各自一義譯師斟酌華梵語義何等諄切委細學者不可忽之長者於牖起至汝當勤作止一十六句為第二段應長行其父見子起至好自安意止之文於牖見子者易云納約自牖終無咎注云牖非所由之正而室之所以受明始雖艱阻終得無咎喻佛三七思惟以大法投小機如納約自牖之象也念子愚劣樂為鄙事等者維摩經云釋迦牟尼佛隱其無量自在之力乃以貧所樂法度脫衆生故著垢衣執糞器近語勤作益價足油皆小乘人貧所樂法塗足油謂赤足行乞足多裂以油蜜塗之而後裂合如莊子不龜手之藥也飲食充足日食飽也薦席厚暖夜寢安也此頌長文盆器米麵鹽醋之屬及老弊使人數句知斷慕修出苦得樂之義如是苦言者汝當勤作即苦言也又以軟語下第三段也若汝也謂上既言益價足油食充席厚業已軟語矣此又復以軟語云汝非客作之賤乃如我親生之貴子同也此二句頌長行我如汝父勿復憂慮等文長行詳盡頌中略之本是親生之子反曰若曰如則人之貧富貴賤惟業是定雖慈如至親不能一時一毫可移易于愛子達乎此凡不安命者非愚則妄矣長者有智漸令入出至自念貧事我無此物此頌第三喻文長者有智下頌喻説方等之時示其金銀下頌喻説般若之時猶處門外下頌然其所止等文自念貧事下頌下劣之心等文漸令入出約人言諸物出入約財言父知子心漸以曠大至甚大歡喜得未曾有頌第四第喻文父之下領譬品佛知身子作念我等同入法性等文世人心廣體胖則財寶自生佛子因心廣大則果覺自成故曰欲與財物即聚下謂私與恐生人疑對衆公説使知父子得失去就不惟親親之誼暢而使為子者受家財亦白安享此十方三世諸佛所以至涅槃時畢竟欲與聲聞人授成佛劫國莊嚴之顯記為諸佛出世一大事之因緣也此領譬品佛昔曾于二萬億佛所為無上道教身子等文長行注記詳審可知佛亦如是知我樂小未曾説言汝等作佛頌法合第一節長行除兩稱世尊餘有六句此中以四句頌盡佛亦如是一句頌長文大富長者則是如來至常説我等為子之文知我樂小頌長文我等以三苦故至樂著小法之文未曾下二句是頌長文第二節然世尊先知我等心著弊欲等文而説我等得諸無漏成就小乘聲聞弟子頌法合第二節而説下頌長行今日世尊令我等思惟蠲除諸法戲論之糞至涅槃一日之價之文成就下頌長行既得此已至所得弘多之文佛敕我等説最上道至而於是法永無願樂頌法合第三節長行有方等般若二時之分此中照之文似錯雜然一自有條理初四十八句是頌般若時文次二十二句是頌方等時文兼攝品初我等居僧之首等義凡長行廣者頌必略之前經略者後必補之譯人文字躲閃法不使見重疊也佛敕下敕小説大是明教二乘人作佛也我承下二乘人不解卒小與大説大果作佛見佛語不虗也一切諸佛下謂佛不以實告致令雖與人説而自無願樂也如彼窮子下引喻證法可知我等內滅下釋成為人説自無志願之義聲聞以斷見思為內滅淨國度生為餘事也我等若聞下謂足於小果都無欣樂於大乘也所以者何下徵釋謂所以不喜其大而安於小者何也以根塵等一切諸法皆悉空寂也既皆空寂則國土衆生亦空寂矣又何求焉無生下以三解脫門釋空寂義無生無滅空解脫無大無小無相解脫無漏無為無作解脫謂觀三科七大世出世間諸法無我我所名空空故諸法一異等相實不可得名無相無相故則於三界無所造作不起願念不受後有名無作亦名無願如是思惟下結完我等內滅等四句以上頌訖聞佛説方等時義我等長夜下頌聞佛説般若時義申明我等若聞淨佛國土等四句謂凡人不知本性有大般若雖證聲聞涅槃皆是無明如長夜然既居無明長夜則於佛淨國化生般若實智都無所見如窮子於父之富有大業不知為己有甘心棄置於度外無貪著之志願同也故曰於佛智慧等而自於法下謂我等於佛智慧無志願者非佛有所慳惜乃我等自己於所證未究竟之空法錯謂即是佛之究竟大乘之空法也我等長夜下又申明而自於法謂是究竟之義謂上言而自於法果何法也乃即我等無明長夜中所修習無生無滅等之空法也修習此空法果空脫其何物乃空脫其未來世三界生死苦惱之大患也故此修空脫苦現在之身即為住世最後之一生身也以此身一盡再不受身故對前無始是為最後尚未卸滅故曰住等此最後身見思雖斷無明尚餘無明雖餘而實不來三界受生故名之曰有餘涅槃也佛所教化下謂果雖有餘乃佛所教為因因果皆真故為得道不虗道既不虗即為心不負教已報佛之恩矣我等雖為下謂在己則果既得在佛則恩已報故雖嘗為佛子轉教富財説菩薩法六度大因以求佛道三身大果皆視為餘事而永無願樂矣前云不生喜樂今云永無願樂則小乘人於大乘法絶望極矣導師見捨觀我心故至於一乘道隨宜説三此頌法合第四節導師見捨下謂佛昔日所以見捨我於大乘之外者以觀知我心樂小法故不勸我等進其大乘言我與菩薩説中自己亦有成佛之實利也如富長者下引喻例明昔之不勸為今之所以勸也佛亦如是下復以法合其喻我等今者下慶信今日得其實利非同昔日虗名也如彼窮子下以喻例法可知世尊我今得道下道謂一乘佛知見之道也果謂授與劫國莊嚴等記也於無漏法法身也得清淨眼見本有法身莊嚴不假外索之道眼也我等長夜下以今校昔申敘四十年前所修小乘因行始於今日得分證法身大果莊嚴劫國大報為不負也不然則昔於無明長夜持佛淨戒皆虗而無實矣故曰始於今日等法王法中下申明謂上説始於今日得其果報者以昔所得乃三乘小果非同今日於佛法中久修梵行得無漏無上之大果也法王佛之異稱梵行即上淨戒此四大弟子不知佛昔以大示作小説而謂今日得實昔日似虗致下品有藥草喻之談也我等今者下校由實得名有今昔之異也謂法今既得無上大果而人尚名聲聞羅漢不異昔者昔聲聞因地假名也不過以四諦聲令一類二乘機聞今聲聞真名也乃以無上佛菩提道聲令十方一切諸菩薩機聞也昔阿羅漢亦果上假稱也不過以一身應受一類人天善者之供養今阿羅漢真果也乃即佛法身於情器智正覺三種世間或天或人或魔而惡或梵而善皆應普受其供養也是知今名雖與昔同而受用之實利則與昔天懸也此正應方便品第九節非阿羅漢非辟支佛等文世尊大恩下謂我等名實既大而不小真而不虗則見佛之恩德廣大事業希有憐愍之心教化之功利益之深無可言報矣我等先得小果謂心不負教足報佛恩以今校之豈唯一生一劫即無量億劫亦誰能報手足供給者采果汲水拾薪設食之役也頭頂禮敬者謂雖執勞不生憍惰加其敬也一切供養者手足供給屬身業頭頂禮敬屬意業則三業各言故此復言一切供養則知不止三業有無所不至者矣皆不能報者謂凡上所言皆世間所有非希有也若以頂戴下所謂以身而為牀座也非一時乃恆沙劫非輕易乃盡心非怠玩乃恭敬又以美膳下四事供養約佛在世言牛頭旃檀下七級浮屠約佛滅度後言亦不能報者以諸佛之法是希有凡上供養皆常有諸佛之法無有邊量凡上供養皆有邊量諸佛之法不可思議凡上報恩皆是思議諸佛之法是大神通所成就凡上報恩皆小知小解有作有盡之心也以上皆發揮誰能報者一誰字前諸佛大恩以希有事起此仍以諸佛希有等四句結經文亦奚嚴密哉無漏下足成諸佛希有反顯佛非有漏世界有為數中之聖人比所以稱世出世間諸法中王也能為下劣等者下劣四大弟子以己與千二百阿羅漢自鄙之詞謂佛法王大聖能為己鄙賤之夫忍可一大事因緣於四十年而不開示也取相下謂佛所以忍者以知我輩是一向生死海中取相凡夫故隨機所宜將一作三大作小而説也凡夫兩言約未嘗歸佛時言若已歸佛得證四果即名聖人矣若以羅漢小聖對佛大聖亦可稱為凡夫何則十地位前三賢稱外凡故此五句領方便品以結諸佛於法下申明諸法之王一句謂諸佛所以稱為王者以於小大三一法中得最極自在故昔能即大為小即一為三到今四十年後又能即小成大即三成一由己自在各令解脫不同餘忍而不受用也以上明能忍於法知諸衆生下又明能忍於機謂上言於取相凡夫隨宜為説者以佛具他心通智知諸衆生有三一小大種種之欲樂及三一小大權實之志力皆隨其所堪任因緣説不解又以無量譬喻而説此我等所以有今日不求而得望外之法喜也此八句領譬喻品首之文以結隨諸衆生下案伏因緣説一周謂佛既能忍大隨小説其法喻身子及我輩業開悟佛知見已又當隨諸千二百人中有下根衆生於佛有宿世成佛善根者説其因緣也此又佛所自知善根成熟者為誰善根未成熟者為誰佛既種種籌量分別先以知己故當用因緣重説於一乘道隨宜説三使千二百人俱開示悟入佛之知見俱得劫國莊嚴等之顯記以完佛之本願也於一乘道隨宜説三正與前方便譬品照應
