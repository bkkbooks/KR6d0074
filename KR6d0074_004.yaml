body:
  text: 姚秦三藏法師鳩摩羅什譯明護國金剛寺住持如愚著妙法蓮華經五百弟子受記品第八五百者千二百人中之大弟子也經中有千二百五百之言品題中獨標五百者餘七百必五百人最初所勸化發心者也名其師之數則資在其間故經中佛總其大數同是羅漢同佛所印證元無高下則曰是千二百阿羅漢我今當現前次第與授阿耨菩提記別其名分必原先後發心之所自則曰其五百阿羅漢優樓頻螺等乃至云迦葉汝已知五百自在者餘諸聲聞衆亦當復如是則師資輕重究可知矣楞嚴長水解云千二百五十人者初度陳如等五人次度三迦葉兄弟兼徒一千次度舍利弗目犍連各兼徒一百次度耶舍長者等五十人准是益見餘七百人為五百人所勸化發心者明矣記不曰授而曰受者與前品相表顯也授四大弟子記末云我諸弟子威德具足其數五百皆當授記前既曰授此諸得記者但受之而已華嚴經云一切諸佛成熟有緣不失時此經成熟千二百人成佛所以有因緣說之一周也又云授菩薩記不失時此經所以授三根記先後次第各以時也問曰准長水解千二百人數止得二迦葉波身子等五人為師知音何得言五百人為師耶答曰知音准品題及經文以意會之以品題云五百經文別名與記亦不會逐一各名但總云其五百阿羅漢等經云千二百又與品題數違則有前後相違過要使經文無過須知云千二百人者即身子等五人在前得記者亦在數中云五百者即五百人與身子等為行輩也故知音分餘七百人在弟子列不見經文有過矣奚膠柱哉問曰奚經文授記不逐一列名哉答曰使千二百人逐一列名此七卷經紙尚不足數況後授有學二千人記及耶輸姨母六千人記逐一列名難為紙矣經文紙少得記人多佛語以略攝廣談無量事故僅僅六萬餘言真妙法也不然滿紙皆鋪張其授記人名及劫國莊嚴處處言同益使末世覽者厭繁矣爾時富樓那彌多羅尼子至能知我等深心本願據前五人得記例五百阿羅漢聞因緣說訖即當說繫珠喻明其領悟而後佛述成與記始為順也今不如例獨先記滿慈者見富那非下根諸弟子比也爾時下經家敘置敘當機聞三周法之得益而結盡前文從佛聞是等者敘領法說一周結方便一品之文以方便品多說智慧方便之隨宜故又聞授諸等者敘領喻說一周結火宅窮子藥草授記四品之文以四品喻說皆為授諸大弟子記故復聞宿世等者敘領因緣說一周結化城喻一品之文因緣之事指佛為王子言神通之力指佛為導師言經云當設大神通化作大城郭衆生畏佛道長遠不信一乘佛能以小果化城度之不失其大衆生住於二地生安隱想佛能以實相寶所度之不外其小故曰自在神通得未下敘得淨六根之益心淨踴躍淨意根即從座起等淨身根瞻仰尊顏等淨眼根而作是念淨舌根以口不言而舌與心自念故曰到曰却者到則進禮雙足感佛恩德如子之就母却則退住一面畏佛威德似臣之仰君見佛慈嚴能俾為弟弟子者進退成禮也世尊甚奇下敘當機領悟佛具三德以希記申明而作是念之念中義悟佛法身德也以佛法身為世奇特希有故隨順世間等者悟佛般若德也拔出衆生等者悟佛解脫德也我等於佛下對前如來復有無量無邊功德汝等若於無量億劫說不能盡為言當機意謂以身子之智慧迦葉之苦行善吉之解空目連之神通旃延之論義各各第一之人以法自述則曰是我等咎非世尊也以喻況法則曰無上寶聚不求自得皆是宣佛功德者既云無量億劫說不能盡則我富那一人之智行又豈能加於五人之上乎故曰我等於佛功德等唯佛世尊下謂佛功德大我固莫宣我心願深佛自能知是述成與記固不待我富那開口而佛業已先得其心矣噫滿慈雖云於佛功德言不能宣而開悟佛知見莫是為愈比與神光三拜少林謂之得髓何異哉先五百人得記宜矣爾時佛告諸比丘至漸漸具足菩薩之道爾時佛告下佛為當機述成其深心本願也深心者謂深寄小果聲聞之迹而便於化無量阿僧祇人令立阿耨菩提也本願者謂本是大乘菩薩具足神通之力隨其壽命發願示為聲聞助揚佛宣法化也然佛必告衆而述成者以衆徒見佛現前尋常所歎為聲聞說法第一有限之跡而未知於多三世劫中為菩薩化人成佛無量之本也故曰汝等見是富樓那彌多羅尼子不我常稱其下正明衆所見之近迹也亦常歎其下謂佛因歎迹亦并歎其本也精勤下正出尋常所歎本迹而釋成種種功德之言精謂不粗勤謂不怠護持謂將一乘實相護持於內助宜謂將一乘實相助佛宣為小乘諦緣於外故能使四衆根鈍者樂投其所好聞其開示教誨而得利益歡喜也具足解釋下謂雖為根鈍者諱實開權於外不妨開權時即具足為根利者業已解釋一乘實相佛之正法於中矣故又俾與己同梵行一等之人為有大饒益也自捨如來下謂富那諱本現迹藉小成大其言論辨才除佛一人餘無有以為敵也汝等勿謂下謂衆不可因佛尋常一時之歎賞但知富那護助我釋迦一佛之法為僧中第一若然則心何足以見其深而願何足以見其本其實於過去九十億佛所亦然故云於彼說法人中等又於諸佛下上云佛之正法一乘妙法也此云諸佛所說空法乃小大三乘共證之空法也空法即如八部般若正法即如方等諸經三一權實未會有空正之別三一權實既會空正皆名妙法矣明了謂雖一空法三一小大同悟同修然富那明小乘自小了大乘元大權實教體不相濫也通達謂通昔三乘共證空無相無作之空即達今之大乘究竟涅槃常寂滅相終歸於空之空權實義不相妨也理以上自利之功德也得四無礙下兼利他之功德四無礙者法辭義說四皆無礙於小大權實若准經訓常能審諦為法無礙清淨說法為辭無礙無有疑惑為義無礙樂說無礙在其中也具足菩薩下內祕也隨其壽命下外現也彼佛世人下謂彼過去九十億佛所之人咸不能知富那本是菩薩而皆以迹謂實是聲聞也彼既如此勿怪汝今現前之衆也而富樓那下謂富那正以彼之不知而為己就實開權之方便所以饒益小乘衆生百千又化大乘人令立阿耨菩提無量也饒益下開權之方便又化下顯實之方便為淨佛土下謂當機權實方便非唯成人實所以成己之嚴淨佛土也維摩經云菩薩隨所化衆生而取佛土此富那不辭億無量劫現小乘者正欲密得大乘人莊嚴自己當來成佛劫國眷屬也諸比丘富樓那下即過現以起未來廣三世深心本願皆為第一人也七佛舊謂毗婆尸尸棄毗舍浮屬過去莊嚴劫千佛中最後三佛也拘留孫拘那含迦葉釋迦屬現在賢劫千佛中最初四佛今觀經文既云七佛又云今於我所等復云於賢劫中等則是獨以釋迦一佛為現在餘皆屬之過去也亦於未來下應知此又賢劫後之未來也即如千二百羅漢成佛富那亦為護持助宣無量無邊佛法為其弟子則其心之深願之廣可涯量哉所以然者無非為上求下化故為淨佛土下結完上求教化衆生下結完下化以上總為述其因行此下授其果記過無量阿僧祇劫至佛滅度後起七寶塔遍滿其國過無量阿僧下富那既無量億劫於此土上求下化故成佛時亦直在此土果不昧因也此土指娑婆世界故後品勸發願持經不見身子富那等者以身子富那等原於此土持經故號曰法明者名稱其實也其佛下通記佛土之廣大七寶下別記佛土之嚴淨地平為無山陵溪壑所以如掌而清淨臺觀因與天宮交校所以充滿而莊嚴以上記依報無諸惡道下記正報無惡道女人衆生正報清淨得神通光明衆生正報莊嚴得神通屬意根出光明屬身根志念下明意根清淨之所自普皆下明身根莊嚴之所自其國衆生下明無淫欲之所利以上皆佛土中世眷有無量下記法眷也其佛國土下總結劫名下授劫國之名佛壽之數正像法住世之久該五種記爾時世尊欲重宣此義而說偈言諸比丘諦聽佛子所行道至我今但略說頌計八十六句初二十八句通頌千二百人深心本願為富那引啓見記有先後人咸大乘三周三根無非法門一時施設次第元無高下也諸比丘下佛子菩薩名今即聲聞也所行道深心也善學方便本願也謂諸聲聞今稱佛子者以己所行之道元是大乘示為小果故曰善學不妨即小成大故不可得而思議也知衆下申明善學不思議有五層謂諸佛子所以即大示小者以先知衆生根性愛欲小果諦緣之法怖畏大乘成佛之智故諸菩薩捨長就短不作菩薩而示作聲聞緣覺此以大作小成不可得思議一也以無數下再申明謂諸菩薩示作聲聞緣覺以行無數方便不惟人視為聲聞且自己亦說是聲聞與佛道相去甚遠由止度畏大樂小之人無量皆得成就於小果也此以大名小成不可得思議二也雖小欲懈下三申明之謂以大作小名小是皆可思議者奚云不可得思議哉以雖作小名小順其欲小者之懈怠不妨即懈為勤即小而大漸當令其作佛也此以懈為勤成不可得思議三也內祕下四申明之謂諸菩薩內心祕藏六度萬行外貌現作二乘聲聞惟外貌故少其貪欲苦因厭其生死苦果惟內心故實自淨其己之成佛國土此以外貌成其內心為不可思議四也此猶順示也示衆下逆示三毒謂貪嗔癡三根本惑行則能令人墮其惡道故謂之毒邪見五利使之一即崇祀水火祭天要福之邪見也如孫陀羅難陀貪淫舍利弗含嗔周利槃特愚癡畢陵伽婆慢習三迦葉波崇祀水火皆佛現在世弟子無非大權方便示現以度一類頑癖衆生使歸佛道故曰我弟子如是等此以正示邪以逆為順成不可得思議五也若我具足下結足善學謂但略不廣說其示現之方便者恐聞者致疑也未頌富那而先頌諸大弟子者以五百阿羅漢有六羣比丘在其數故今此富樓那下三十句別頌富那之因行其後得成佛下二十八句別頌富那之果記一一對長行可解果記中長行後者頌先之藥草喻無三乘之法此品無三乘之僧如來壽量品無三身之佛應知爾時千二百阿羅漢至盡同一號名曰普明爾時世尊欲重宣此義而說偈言憍陳如比丘當見無量佛至汝當為宣說爾時下陳如等千二百人於法說一周之初聞佛出定權實二智之談乃去不知是義所趣安望授記成佛及佛喻說雖知是義所趣然猶坐執小果以當大乘亦不希記故佛無問而自說因緣一周以小果喻化城大乘喻寶所明其不惟諦緣是成佛之因即示衆有三毒亦菩薩乘內祕外現之權便然後始知先三後一先權後實義之所趣矣故各作念俱願得同諸大弟子授成佛之記也故云我等歡喜等我等歡喜徑照方便品心生大歡喜自知當作佛為言吁因緣說一周於千二百人有大功德哉此可見經文三周次第非徒設也佛知此等下正結方便品中千二百羅漢悉亦當作佛之案千二百人中先授陳如記者陳如為佛在俗親黨鹿苑最初得度弟子也其五百阿羅漢下正結授四大弟子記品我諸弟子其數五百皆當授記之案其五百人同號普明者以同為法師同以小大三一成佛之法明於人果不昧因也偈中初二十四句頌陳如一人劫國莊嚴憍陳如下頌因行常放大光明下頌果德果德有五一光明二神通三名聞四衆敬五說法故號下謂由有實德而具斯美名其國下頌依報清淨法眷勇猛咸升下申明淨猛十方佛國其數無量乘樓閣而遊是與不出戶者同也獻佛供還本國跋涉程途經歷時劫事體無邊攝在須臾是與不動念者同也非神通勇猛而何良由證至法身塵點劫視如彈指十方國總在自心非世眼所見凡心所測也佛壽下有四記一記佛具壽命二記正法三記像法四記末法以法滅天人憂皆末法事故然皆補長文所未盡中十四句其五百比丘下例陳如一人而通頌五百人劫國莊嚴末六句迦葉汝已知下例五百人而盡記餘七百人劫國莊嚴華嚴經云現前得授記不現前亦得授記此也妙哉經文其易簡哉爾時五百阿羅漢至甚大歡喜得未曾有此領我及汝等宿世因緣之義結完化城喻一品之文爾時下前節列千二百數此但以五百人敘者以千二百數該前則攝身子等六人該後則攝阿難羅睺前既各已敘悟後尚未說本末故但以五百為言而簡別之然通篇重悔過自責一句世尊我等常作下述昔迷今悟以立譬本謂我五百人尋常不知機有頓漸法無小大但恆作念以己所得小果有餘涅槃即同佛之所證究竟滅度是以權為實昔日所以迷也此正照方便品佛說一解脫義我等亦得此法到於涅槃今乃知之下謂今由佛三周法喻開通聾瞽乃知佛昔小今大無非由漸而頓要我受記作佛此今日所以為悟也佛於火宅喻首說諸有智者以譬喻得解比既不解必待佛因緣說一周始知此豈有智者哉故曰如無智者此照方便品而今不知是義所趣前云不知今云知之此可見五百人至是真開悟矣以上明自責所以下徵明悔過謂所以佛前說我等為智者今我等反自責云如無智者何也以我等既同身子等聽佛說法喻二周比即應同得如來智慧進寶所受顯記矣反坐守化城而便自以小乘之智為足也世尊譬如下以喻明法發揮迷悟有人五百羅漢自況為三有中人親友況佛為十六王子時醉酒喻己所證全是無漏無明寶志公歌云禪悅珍羞尚不飱誰能更飲無明酒楞伽經云酒消然後覺是時下官事公事也謂十六沙彌勤修六度思速成佛為己公事故曰當行以無價下謂十六沙彌以一乘實相與五百人說如以摩尼繫酒醉者垢衣內也與之而去者喻十六菩薩沙彌各於十方成正覺去也其人醉臥下喻十六菩薩沙彌雖各有升法座之功五百人元以無明見思未淨故不覺知本有一乘實相佛之知見也起已遊行下法性譬本國五道喻他國為衣食下喻五百人既迷本有墮入五道不免為人天福報之衣食崇水事火持牛狗戒而勤力求索甚大艱難也若少有下喻五百人由外道歸佛示以有餘涅槃斷其見思超脫分段生死不知此但少有所得而便自以為足也以上喻昔之迷幸冥植有大乘之因於後親友下喻今之悟賴遇佛成就大乘之緣後謂今經談於四十年後咄喝醒之聲哉助語辭丈夫男子之美稱何為下牒斥上文為衣食故等文謂不須為人天福報及聲聞小果勤苦求索妄受艱難也我昔欲令下申其以無價寶珠繫其衣裏之事所謂我在十六數曾亦為汝說也於某年日月者謂智佛入靜室禪定八萬四千劫時也上云安樂五欲自恣喻成佛時果上受用此云以無價等者喻佛在因地曾教五百人發大心也今故現在者謂昔指示法性本有元不失也而汝不知者為無明所障也以無明障本覺雖得小果忘其大因是為勤苦求活癡之甚也汝今可以下以因證果曰貿即小成大曰易謂既有大因今可即因貿易大果於九法界隨類現身遇緣接物不妨既以與人己愈有而無所乏短也佛亦如是下法合昔雖迷幸植有大因之文今者世尊下法合今雖悟賴值佛以成大緣之文並領方便品我雖說涅槃是亦非真滅等文亦領藥草喻品汝等所行是菩薩道等文以是下結明章首踊躍歡喜爾時阿若憍陳如等欲重宣此義而說偈言我等聞無上安隱受記聲至便自以為足頌立譬本之文譬如貧窮人往至親友家至五欲而自恣頌以喻明法發揮迷悟之文我等亦如是世尊於長夜至身心遍歡喜頌以法合喻之文頌與長文少有損益對閲易明妙法蓮華經授學無學人記品第九爾時阿難羅睺羅至如阿難羅睺羅所願住立一面爾時下經家敘置我等每自思惟者謂自身子得記時思惟起也俱白下方是兩尊者之言謂我等於此成佛之事迹雖有學本乃大乘亦當有受記之分若曰記五百人中曾教迦葉等轉授者我等雖為身子采菽氏弟子莫過學小乘法耳至於劫國莊嚴等乃成佛大事因緣必欲佛親記也故曰惟有如來我等所歸又我等為一切下謂以己名分之尊為天人等所見知識應當記也以己與佛天倫之親一為佛侍者護持法藏一為佛適嗣繼紹宗祀尤當與記故曰若佛見授等我願既滿者親親之道當先也衆望亦足者天人阿修羅始喜也爾時學無學下所謂衆望者也爾時佛告阿難汝於來世至所共讚歎稱其功德爾時世尊欲重宣此義而說偈言我今僧中說阿難持法者至種佛道因緣爾時下先受果號記阿難本久發大心迹為侍者以多聞第一而護持法藏仁德如山智德如海本迹無相礙故曰山海慧自在通王名稱其實也當供下次授因行記供佛福足護法慧足兩足故然後得成菩提自三覺圓也教化下令他三覺圓也福足則莊嚴高勝故國名常立勝幡慧足則教法通徹故劫名妙音遍滿諸佛法藏詮法身而無量阿難既皆護持故成佛時壽命長而正像法倍增得諸佛讚歎果不昧因也偈中先頌因行攝論云多聞者依聞作意俱生俱滅此心帶彼記因而生由此熏習能攝持故名持法者故云我今僧中說阿難持法者號曰下後頌果號其餘照長文可解爾時會中新發意菩薩至其本願如是故獲斯記爾時下應佛初出定時所歎新發意者謂始發菩提心之人咸作是下初發道心者六通不甚大具故未知菩薩聲聞本跡所以動疑然須有此阿難之本迹始伸故佛知其念而告之諸善男子下般若經說佛於然燈佛所發心今經說同阿難空王佛所發心各就機之談誠如稻麻竹葦之新發心苦莫知發心本也樂多聞與授記跡也願也是故我已下謂精進勝於多聞也而阿難護持下謂阿難以護法藏為精進遲速尊卑佛與侍者同在最初所發菩提心中直一念耳無甚高下也故曰其本願如是等大寶積第二十八經云聲聞得阿耨多羅三藐三菩提記者以見聲聞有佛性故具佛性者尚得記久發菩提心者獲記宜矣楞伽經謂謂化佛授聲聞記非法佛也阿難面於佛前自聞授記至而說偈言世尊甚希有令我念過去至護持諸佛法阿難面於下喜佛親記不用他轉次授也即時下驗佛告新發意菩薩其言不虗也客嘗有問余曰佛信口說三世多劫中事實否余曰佛雖信口能令佛前聞見者如面覿以故人天信之也篤客曰如是使佛現在吾亦出家矣故今文中佛告新發意而阿難即自憶念過去諸佛法藏而無礙又識知本願皆佛神力智力加庇也偈中前四句如長文可解後四句前半明昔同佛發心之本實智也後半明為侍者之跡權智也阿難一人本迹權實既自頌明後二千人得記諸新發意菩薩始三緘其口矣爾時佛告羅睺羅至當得阿耨多羅三藐三菩提爾時世尊欲重宣此義而說偈言我為太子時羅睺為長子至以求無上道阿難多聞羅睺密行聞行相資故國土莊嚴皆同獨果號異也菩薩大願或願為侍者護持法藏或願為冢嗣蒸嘗佛道皆密行也人莫得知獨佛能知故偈云羅睺羅密行惟我能證知悲華經當佛為寶海梵志發願時有帝釋名善見足發願在在常為佛子是也華嚴經菩薩有十種如海智第七智云菩薩入未來世觀察分別一切諸劫無量無邊知何劫有佛何劫無佛何劫有幾如來出世一一如來名號何等住何世界世界何名度幾衆生壽命幾何如是觀察盡未來際皆悉了知不可窮盡而無厭足此釋迦所以授羅睺記供佛知有十世界微塵數皆以子道為密行也夫人之愛莫愛于子子之得父何所不盡其極哉菩薩願行其矣乎爾時世尊見學無學二千人至正法像法皆悉同等爾時世尊欲重宣此義而說偈言是二千聲聞今於我前住至漸入於涅槃二千人皆阿難羅云弟子意地軟淨正是開悟佛知見得記之機方便品云若人善軟心皆已成佛道是也故佛問慶喜見不者俾證其記不浪施也此完序品復有學無學二千人案爾時學無學二千人聞佛授記歡喜踊躍而說偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌佛智慧如燈能鑒日月威光所不能照之意地軟淨授記音至此似見灌其甘露所以歡喜上阿難羅睺得記我願既滿也此所謂衆望亦足矣妙法蓮華經法師品第十法師者法乃即心是佛之妙法攝近則該本經三周九喻前後之文攝遠則該四十年前所談十二部經以無非說此心法故師即千二百阿羅漢及二千學無學聲聞乃至佛現前滅後聞一偈一句一念隨喜前後受記之人皆可以妙法為天人師範應有六種然前三卷半經是為諸聲聞說大乘經名妙法蓮華故曰法後三卷半經是教菩薩法佛所護念故曰師以諸聲聞雖本是菩薩而得記之迹惟新若得記後不教以菩薩持經之法則不得諸佛之所護念故自此品至經之終皆與序品所敘列舊住婆婆世界菩薩摩訶薩八萬人所唱和而教諸新得記聲聞作菩薩之法故曰法師品問聲聞得記於卜位菩薩地當居何地答若據圓頓機當十地中第七遠行地第八不動地准華嚴楞伽菩薩羅漢同於第七八地中人滅盡受想定故若准本經諸聲聞得記皆居十信位也以經云汝舍利弗以信得入故准是諸得記聲聞既住信位此後三卷半經皆教學十住十行十回向四加行十地等覺菩薩以漸而圓頓也如龍女不涉地位頓往南方無垢世界成等正覺智積身子先俱不信後云默然信受是以漸而信頓教之證也若據一信一切信以漸而信圓教者從地涌出之衆雖彌勒一生補處慈尊尚有所不信說父少子老之喻以難之故佛將說壽量再三誡以汝等當信解佛誠諦之語彌勒等八千恆河沙菩薩亦再三答云惟願說之我等當信受佛語故說壽量品後即受以分別功德品分別自信位至等覺自等覺位回至初發心菩薩一一各得分證佛法身性海中之功德准此一信一切信則此經為國教也總之七卷文言徹果該因屬一信字為其門故故華嚴經善財童子依彌勒教到普門國見文殊文殊遙伸右手過一百一十城摩善財頂曰善男子若離信根心劣憂悔功行不具退失精進於一善根心生住著於少功德便已為足不能發起行願不為善知識之所攝護不為諸如來之所憶念不能了知如是法性如是理趣如是法門如是所行如是境界若周遍知若種種知若盡源底若解了若趣入若解說若分別若證知若護得皆悉不能正符前經三賢四加十地等覺皆攝於一信字法門也問曰經中如何不明判地位答曰四十年前他經載矣故曰先所出內是子所知故不用更明而自具也應知三賢十地菩薩報化佛護念如寶塔品三變淨土中坐者是也以此佛此土皆有相故有集散故等覺地菩薩則唯法佛護念其佛其土皆無相故無集散故如壽量品所談者是也又教菩薩為弟子法當如釋迦以國王事仙人教菩薩為師傳法當如釋迦以常不輕之善遇增上慢四衆故判後三卷半經為教菩薩法佛所護念大有其旨在焉學者思之爾時世尊因藥王菩薩至阿耨多羅三藐三菩提記爾時下因者謂因藥王在日月淨明德佛法中名一切衆生喜見菩薩曾習苦行精勤萬二千歲得現一切色身三昧燒身身全然臂臂復於雷音宿王華智佛法中為妙莊嚴王王子名為淨藏淨眼以豫道化其父母聞妙法出家證果實於開示悟入佛之知見一大事因緣有其功續是故因之以告八萬大士也八萬大士即經首所敘列者前既敘贊其德此中應如新發意菩薩所念當逐名與記而不與者以八萬大士元各有本所事佛往劫皆曾受過大記為舊住我婆婆世界之耆宿非我釋迦適嗣今在會中莫過助揚法化故但因而告之一則以證現前滅後聞經得記者雖劫長果遠汗漫無涯佛功德智慧之言不虗一則俾現前滅後得記者發願持經當學藥王燒身然臂不畏其難一則明佛求妙法華經出處本跡智力所談神力所現如涌塔變土集十方分身諸佛於頃刻談安樂勝行涌六萬恆沙眷屬之菩薩等一大事因緣本末究竟自非八萬大士諸新得記者實難信解有是所因故因藥王一人以告八萬大士也藥王汝見下前序品文殊云諸人今當知合掌一心待佛當雨法雨充足求道者上千二百阿羅漢及二千聲聞既云內祕外現則知元是大乘之機今得授記無非於道未足示其充足而已此天龍等部衆既非內祕外現乃是定性於小中大不可移易三乘之機文殊所謂諸求三乘人若有疑悔者故今以求聲聞等三求字為照應也如是等類下雖云聞一偈一句其實義多如仁王云於一偈中復分為千分一分中說一句義不可窮盡又處胎經云有經一句五百言一句千言一句萬言是也前舍利弗得記時此定性三乘部衆曾慶讚云世尊說是法我等皆隨喜故今以一念隨喜之言為照應又云大智舍利弗今得受尊記我等亦如是必當得作佛故今一槩與授當得作佛阿耨菩提之顯記也缺佛名劫國莊嚴等事者一則人多難名故一則劫國等皆法身中事既得阿耨菩提之法身不虞無劫國等報化之事故然授二千人記後必授八部四衆記者一則完文殊所謂若疑悔者佛當為除斷令盡無有餘之案以三周法完定性三乘人疑悔皆斷皆當得記故一則完佛自許若有聞法者無一不成佛之案見佛語不虗故又此中一念隨喜為後隨喜功德品之伏案也以上援佛現前聞法者之記佛告藥王下授佛滅度後聞法者之記若復有人受持讀誦解說書寫至三藐三菩提故上節授現在未來六種法師之果記此節明現在未來六種法師所以應得記者元具有因行也若復有人下明佛現在持經者雖有全略不同同為法師有六種次第一受持謂從現前法會領受而持於心也二讀誦謂由受持逐字句念讀熟成卷而課誦也三解說謂由讀誦久自知分解與人講說也四書寫謂由解說得經妙處而復另書所讀之經更寫所講之義也五於其經卷供敬如佛六加上節乃至一念隨也種種供養下其供養有十種分別隨喜得一生究竟十種分別者一華香草樹所生名華具香氣者二瓔珞珠寶所穿挂而莊嚴者三末香沉檀搗為細末者四塗香即清淨水或淨水塗洗其香一則味清一則健燒也五燒香成炷而焚爇者六繒蓋絹帛團簷加益經上以障塵穢者七幢幡段帛成匹飄揚經之左右驅除鼠者八衣服錦繡裁褁裝嚴經之首尾表裏者或新淨上好衣服先用供養經然後著也九技樂歡喜舞蹈而奏絲竹者十合掌恭敬皈命頂禮以盡誠者也藥王當知下謂當機應知以上六種法師十種供養雖直一偈此人過去已曾供養佛多成就順大元不該受生濁世但因悲愍衆生開示佛之知見故生此人間也以上明持經一偈者具大因也藥王若有人問下明得大果故教當機答其問者未來作佛必現在持經一偈之人也此上節所以與記焉何以故下雖是徵辭其實申明上節聞經一句者獲記之義謂不但持經一偈即持一句仍以十種供養者一切世間亦應瞻奉以供養佛之物而供養此人也當知此人下謂所以然者以持經一句者是大菩薩過去因深也成就阿耨菩提過去果大也但為哀愍衆生乘願生此世間雖然一句之略即同全部之廣演分別也何況下謂佛現在略持者既同其廣演者何況盡全部廣持及種種供養之人哉藥王當知下謂由佛現在肯全部廣持則其人始肯捨自己清淨業報之安樂而於佛滅後悲愍衆生生于惡世危險中而廣演也若善男子下謂佛滅後其人不唯公然對大衆廣說即能私竊為一人乃至說經一句之略者而其人亦是佛所使遣行佛之事者也如來使謂曾受囑纍也行如來事謂代佛揚化行開示悟入佛知見之一大事也何況於大衆下謂未來世竊而不公為一人說一句尚為佛所使遣行佛之事何況公然而不私竊大庭廣衆中演說全部者則其人功德愈無以為況矣故以惡人一劫罵佛校毀廣說者為罪重以佛肩所荷擔校供養廣說者為福多也故曰藥王若有惡人等夫人之生也直而人之性又皆善何不善之與有但以三業不良而名惡也以不下意惡於一下長久之時惡現於下明非皆有後言乃當面之身惡常毀下口惡以三業皆惡時長且久敢罵萬德慈尊罪實甚重而云尚輕者佛功德智慧具無所損也慈悲忍力足肯再說也若人下一惡言不長呼一劫不該乎身意背地毀此在家出家不類乎佛前惡罵其罪校輕而云甚重者藥王其有下釋明所以也謂其讀誦此經者既是佛所使遣行佛之事則其人尚未成佛但以佛之智慧功德莊嚴為己之莊嚴今一毀則前人或不來親近是有所損矣此人雖乘過去之悲願代佛揚化今一訾則前人即來親近或慵於再說矣是毀訾者則為斷滅一切世間佛種衆生竟不獲開悟佛之知見矣故其罪校詈佛為尤重也以上校罪則為如來下校福承上文言謂佛見未來讀誦法華經者以佛嚴自嚴則為佛肩之所荷擔其人所至地方應向其方致禮亦如其人十種供養於法而供養之詎可毀訾乎一心合掌下人間所有之上供也應持下人間所無之上供也所以下徵釋並申明一念隨喜者得記之義結完第六種法師於衆生有益而顯前五種法師現在未來廣略持經者功德為尤大也謂所以未來公然對衆廣說者上得佛肩荷擔下應天人供養者何也以是人歡喜說法令大衆須臾頃聞之法雖少得果則究竟也故曰即得究竟等應知須臾聞即一念隨喜義此節近為寶塔品以大音聲普告四衆等張本遠為持品及囑纍品伏案以二品皆是佛所遣行佛之事故爾時世尊欲重宣此義而說偈言若欲住佛道成就自然智至愍念諸衆生若欲下求道之機也常當下教機求得道之人也自然智不待師保教而本具然必勤供養其人而後得者以此人能開示其機使得悟入故是自然智者自性通宗也務供人而得者稟受師承也其有下上自然智為涅槃妙心此一切種者差別智也當受持下上涅槃心直供養持經者得此雖供養持者亦欲自持其經而得也得自然智善一乘實相得一切種智兼善三乘方便若有能受下上兩行正應長文若復有人起至一切世間所應供養瞻奉等文此一行繳上兩行而應長文當知此人是大菩薩起至當知是人則如來使等文大般若第五百二十五經佛自訓一切智智略有三種謂一切智共聲聞緣覺之智道相智共菩薩摩訶薩之智一切相智乃諸佛如來不共妙智以聲聞緣覺雖知內外等法門差別不知道相及不知一切法一切種相故菩薩則知聲聞道相獨覺道相菩薩及佛道相故佛則知一切法皆同一相謂寂滅相是故佛名一切相智則兼小大三一一切種智之差別相也諸有能受持妙法華經者至行於如來事初八句及後四句是頌藥王當知是人至何況於大衆中廣為人說之文中十二句是頌其所至方至應以奉獻之文若於一劫中常懷不善心至法華最第一此頌佛與廣說者罪福輕重相校之文末四句結前起後長文直校罪頌文校福故知音准頌訓長文有校福義爾時佛復告藥王至皆近阿耨多羅三藐三菩提此節釋成上頌我所說諸經法華最第一之文以明凡經皆是教菩薩法唯此經為諸佛所護念也爾時下通指三世所說之廣已說別指過去已成佛時所說今說別指現在四十年前所說當說別指未來餘國作佛時所說而於下謂三世說中唯法華為最難信解上偈法華最第一者此也或總四十九年一大時教判為三世亦可華嚴鈔第八云已說者法華之前謂般若等今說者即無量義經當說者即涅槃等諸經皆不及法華難信難解者以法華是會三之始歸一之初信解者難耳昔經雖妙猶帶三乘曾未明言唯說一實涅槃之中雖明一極法華在前已破三乘後說一極便易信受法華猶如先鋒涅槃如是大軍先鋒已破於賊後軍用刀不多耳又破三顯一法華如收獲涅槃如捨穗故涅槃三十六云昔於靈山說法華八千聲聞得受記別如秋收冬藏更無所為即其義耳若依難信之義設將已說該著華嚴若比法華亦為易信始成正覺便說一極上根所受不對昔權故比法華誠易信耳藥王此經下謂由最難信解諸佛所以祕藏故誡當機值非器不可妄授也諸佛下申明祕藏而此下申明不可妄授謂此經所以為諸佛祕藏者以佛從昔成道以來至今四十餘年未曾顯說一乘是實二乘所得涅槃非是真實今一顯說致佛現在猶生許多怨嫉有五千退席況佛滅後豈可容易分布不擇機而妄授乎良由大乘器宇一開悟佛知見後心廣願深同事攝多如宗門所謂但問見諦不問行李二乘定性之機遇之罔諳內祕外現不免責無戒定是以多生怨恨嫉妬也以上明因此經最難信解諸佛所以護念藥王當知下明因護念其經所以護念持經之人其豈也謂以佛智慧功德慈忍之大現在顯說尚致怨嫉況佛滅後佛所使遣行事者豈能獨以己力為六種法師公然對衆為人顯說耶故必為已滅度之釋迦衣所覆庇及現在他方諸佛之所護念也是人有大下謂未來顯說之人因過現佛所護念益顯己有三種大力也大信力者自信己心成就慧身有所聞法即自開解不由他悟是也及志願力者如後文惟願世尊不以為慮我等亦自欲得是真淨大法等是也諸善根力者如前文是諸人等已曾供養十萬億佛等是也以上明因佛加故己有力當知是人下明因己有力故感諸佛有加庇之事共宿如多寶佛分半座與釋迦共坐經五十小劫者是也又共宿則衣自覆摩頭見其護念藥王在在下明因經與人為佛所護念故若經及持經之人所居之處皆應起寶塔供養也在在約經及人之能在言處處約經及人之所在言如後文諸聚落城邑行處親近處僧坊巷陌等是也經與人能在所在之地方尚應起塔供養則人與經應以如來供養而供養者宜矣己有全身舍利為後開寶塔見多寶佛案若人得見下見塔致禮敬者尚近阿耨菩提則是人歡喜說法須臾聞者即得究竟無上正等正覺無疑矣此節申明上節為下品伏案下節又申明當知是等皆近阿耨多羅三藐三菩提之近字義藥王多有人在家出家至當知是為增上慢者此節明佛雖善護念持經之人若人不得此教菩薩之經則亦不為諸佛所護念也藥王多有下不得教菩薩法者也故或在家或出家雖行檀等前五度菩薩道而不得見聞此經是闕般若波羅蜜門名為不善行也若有得聞下是得教菩薩法乃名善行者也故以其有最下之衆生求無上之佛道但一得見聞此經信解受持當知此人雖未疾得阿耨菩提則亦近於阿耨菩提矣藥王譬如下喻法疊申其善不善近不近之義有人喻在家出家行菩薩道之人渴謂口涸乏謂力竭求水喻求阿耨菩提高原喻他經典穿鑿喻不善行良以他經雖詮菩提之水猶費修證穿鑿既費修證必經多劫故喻猶見乾土知其人得菩提之水尚遠也此喻不得此經名不善行菩薩道者也施功下喻其善行功當作工濕土喻此經泥喻衆生衆生本有阿耨菩提之佛知見喻泥中之水謂善行菩薩道者由先於他經典施修證之工穿鑿不已忽善根成熟一但回頭轉腦看見此經開悟自家佛知見後遂行方便漸就四生六道汙泥衆生頓至涅槃果海如由濕土至泥其人決定心知近於菩提之水也問此經頓教奚云漸至既曰漸至奚異他經答他經即此經之方便門但閉而未開耳一開則漸至不礙頓知也問准此經何以得頓知決定成佛義答我心大歡喜我定當作佛此依前品得決定知也佛現前滅後凡有聞一偈一句一念隨喜者皆得與授阿耨菩提記此依當品得決定知也地獄道之提婆授天王如來之果記畜生道之龍女即南行而成佛此依後品得決定知也然則新發意菩薩不肯聲聞得記是誣泥中之無水也二乘人不發心修萬行度生成佛是住高原施功也今二種人皆得決定知矣菩薩亦復下法合喻中渴乏須水等文申明不善行若得聞解下法合喻中施功不已等文申明其善行所以下徵釋謂所以菩薩道必欲得此經為善方者何也以一切菩薩道之因行阿耨菩提之果記皆屬於此經也此經開方便下正明皆屬之義謂一大時教無非衆生成佛之方便門但尋常不記聲聞人作佛乃方便門之未開也聲聞直聲聞菩薩直菩薩乃真真實相之未示也今經法則會三歸一方便門開矣人則即小成大真實相示矣此菩薩因行果德所以皆屬此經也是法華經藏下展轉結明謂前示此經是諸佛祕要之藏今何不祕而反開耶以前云祕者為此經藏深固幽遠無人能到此方便品首佛出定時所以歎一切聲聞辟支佛所不能知也今佛教化下謂前云不可分布妄授與人今何不辭怨嫉而反示真實相耶以前云不可分布者謂不可妄授與聲聞人也今佛所教化全無聲聞皆是成就菩薩故不惜其開其方便之門示其真實之相也此譬喻品首與身子授記所以云為諸聲聞說大乘經名妙蓮華教菩薩法藥草喻品末所以云今為汝等說最實事諸聲聞衆皆非滅度汝等所行是菩薩道漸漸修學悉當成佛也凡此皆此經開方便門示真相處藥王若有下謂既知此經是教他成就菩薩若有菩薩聞而驚畏者即與疑阿難不當得記諸新發意菩薩同也既知今所謂菩薩是真實相昔所謂聲聞是方便門若聲聞人又聞而疑怖者即與前五千退席生怨嫉增上慢人同也此二種人或在家或出家雖行菩薩道乃名不善行者也藥王若有善男子善女人至我還為說令得具足上節明得不得此經名善不善行此節顓明其善行而得其經見品題法師之所以為法師也藥王若有下標其善行云何應說下徵入如來室下釋一切衆生中大慈悲心既是如來之室末世說經者所以與如來共宿也柔和忍辱心既是如來之衣末世說經者所以為如來衣之所覆也一切法空既是如來之座末世說經者所以為如來手摩其頭肩所荷擔也安住是中下所謂以佛莊嚴而自莊嚴有大信力及志願力諸善根力為如來使如來所遣行如來事也藥王我於下謂不唯能說法者為佛所遣使即能聽法為內外護者亦復所遣使行佛之事者也初遺化人為能集衆之會首重在集字乃說法者入慈悲室之所感亦遣化比丘下次遣化人為所集聽法之四衆重在聽信等字乃說法者著忍辱衣之所感也以上能集所集皆內護也若說法者下三廣遣化人為天龍等八部之外護乃說法者坐法空座之所感也皆以化言者學問之道貴乎變化遇逆順境始不違逆也我雖在異國下四佛親自現身乃說法者不懈怠心之所感也以上總明善行菩薩道者得佛之所護念也若於此經下結成因善行故能得此經而不忘失其句逗也常不輕菩薩臨欲終時具聞威音王佛先所說法華經二十千萬億偈悉能受持案符于此此上注義是准前節照應而訓然當節本義應須補之藥王若有下謂說此經者必具四行始下得衆聽上得佛護名善行菩薩道也一切衆生中等者一切衆生節十二類胎卵等說法者慈能與彼之樂悲能拔彼之苦雖有從違天地為心益載不計故以室言然慈悲太煞衆生不無不知恩處又當以柔和忍辱而忍耐之忍服既久不覺纍身故以衣言如是柔忍苟不體會一切法空不免終身懈怠直須坐在法空以當床榻故以座言一切法即世間三科七大及出世間一切法也安住是中等者謂將欲說法先須安住其心在以上三行中也語云於汝安乎安則為之今取彼文不取彼義以凡為世間君子小人苟不安心為之則不免顧首顧尾都做不成況出世法不安住空忍慈悲則不能感佛與衆生上下之緣也我於餘國等者見佛報應身雖滅而佛法身常住故能用神力而廣遣四衆八部為聽衆也若說法者在空間等者謂人見說法者有時身不登座口不談玄似在空間然此空間心合道妙口雖不言文彩已彰政是天龍側耳諸佛現身之時所以報化身佛雖示迹異國而法身佛與默時說之法師恆相見也故云時時令說法者得見我身前云我於餘國更有異名是也若於此經下古德暫時不在即同死人之謂也我還為下古德一回吃草去驀鼻拽將來之謂也應知此中現身非謂現其報化身為說非為說文字章句若但見報化是謂病眼見空華也但說文字章句是謂葛藤滿地也此節通結前諸節為現寶塔品以去諸品伏案爾時世尊欲重宣此義而說偈言欲捨諸懈怠應當聽此經是經難得聞信受者亦難此品長行共計五節初二兩節自有頌文此頌第三節也長文謂佛於三世所說經典無量唯此經於諸經中為最難信解欲捨下不信自心作佛名為懈怠今欲捨其懈怠當聽此經者以此經所詮不歷三無數劫修證凡有經處即有如來全身之塔見塔致禮敬者即得近於阿耨菩提所以此經為難得而聞信者亦難有也如人渴須水穿鑿於高原至近於佛智慧此頌第四節長文如人下頌喻文得水之遠近藥王汝當知下頌法合得菩提之遠近謂此經為深經者以佛四十年前所說諸聲聞法皆是此經成佛之前方便門今方便門一開即見聲聞是菩薩之真實相故謂此經為諸經王者以不得此經授記成佛諸經皆無其主故故曰決了聲聞法等聞已下謂應當諦實思惟此經諸經雖有王臣之分而頓漸一體淺深一貫不致此經諸經有大小是非之分聲聞菩薩有彼此尊卑之辨則此人近於諸佛之智慧而不遠矣若人說此經應入如來室至得見恆沙佛此頌第五節長文若人下頌四行之標文大慈悲下頌四行之釋文若說此經下長行無文謂說此經者具上四行設過惡罵刀杖之害能念佛忍則感佛萬億土中現身護庇多劫廣說而無害也若我滅度下頌具四行感遣化之文六句頌遣所集之衆二句頌遣能集為會首者故曰我遣化四衆等又曰引導集之等若人欲加惡下謂既有能所集衆供養聽法若人嫉妬復加刀杖瓦石者佛又遣化人為之作衛護也以上現身遣護說時是護利他也若說法之人下現身默時說其忘失章句是護自利也若人具是德下謂持經者具前四安樂行之德不問說默二利皆得見佛法身也良由此經詮顯生佛等具法身動靜一體故人若在空間下謂持經者雖得通利佛所說忘失之章句然懼其有害尚處空間不敢驟說佛更遣天龍八部作聽法衆使其人分別樂說無有罣礙又令聽衆喜也若親近下動勉伏得此經為弟子者具因行之案為後提婆品張本隨順下伏得此經為弟子者成果德之案為下見寶塔品張本此一品經單明教菩薩法一句前半品教菩薩為弟子之法後半品教菩薩為師傳之法下見寶塔一品單明佛所護念一句見護念之佛具三世十方也妙法蓮華經見寶塔品第十一見寶塔者序品光中所見寶塔乃使佛光而見宗門所謂光影門頭事為光不透脫也至是法之漸頓皆會一實人之小大皆得作佛無一剎一塵不為淨土無一偈一句不是妙法謂達可記龍女可佛古今一際過現一身故過去多劫之寶塔不假佛光從地涌出俾衆親覩則昔光影門頭事今皆成實相而吾人與佛等有法身無三種光二種病矣故曰見寶塔品一則證上品在在處處若說若讀乃至若經卷所住處皆應起七寶塔極令高廣嚴飾不須復安舍利此中已有如來全身等文一則證現在釋迦能顯說此經既感過去佛同宿衣覆則佛滅後願持經者亦然結完方便品三世十方一切諸佛法亦如是等文故變上集佛費佛許多神力智力也然唯重塔中以大音聲普告四衆數句以塔中數句為後一十六品若文與義之源本故此品在北藏草字函名薩曇芬陀利經雖已引證於題其實義載悲華經佛於寶藏如來發願取此娑婆穢土成佛而寶藏如來以芬陀利華譬況佛之悲願之大今佛度生成佛願果於昔將欲示滅要衆發願此土持經使佛種不斷故涌塔變土集佛以囑纍此經也爾時佛前有七寶塔至分身諸佛禮拜供養爾時下經家敘置有十科初敘塔之高一由旬四十里五百由旬則塔高二萬里也縱廣下敘塔之大二百五十由旬則塔大一萬里也從地涌出之地表佛與衆生共有常住之心地住在空中之空謂此心地無形無相乃究竟涅槃常寂滅相終歸於空之空也世間之地既載華嶽而不重振河海而不泄出世真空心地詎不能載二萬里高一萬里大七寶塔乎信無疑矣種種下次總敘塔之嚴飾五千下別敘嚴飾有七項一欄楯二龕室三幢幡四瓔珞五寶鈴六旃香七幡蓋凡此皆以七寶合成也高至下上云塔高五百由旬尚未知高止何地此云高至四天王宮則知自靈山頂至四天王宮僅二萬里也三十三天下三敘供奉塔之天龍八部皆是近於阿耨菩提之人也爾時寶塔下四敘不唯眼中見塔而耳中亦聞塔中出大音聲致讚歎也讚歎有三一稱名二能以下讚德平等大慧數句一照方便品自證無上道大乘平等法等之文二照譬喻品為諸聲聞說大乘經名妙法蓮華等文然自方便品談至上品有七種平等約法有先三後一權實之平等約人有祕內外現小大之平等約持誦經者有一偈乃至一念隨喜與廣說全部者功德之平等約授記有不問多寡皆與阿耨菩提記之平等此照前之平等也約後則有提婆與耶輸等冤親同得顯記之平等從地涌出之衆有一多平等諸佛壽量有法報化身延促之平等故曰能以平等大慧為大衆說等三如是下即證真實謂前後七種平等皆真實不虗也爾時四衆下五敘法會得塔中出聲印讚若見若聞皆喜己所得之法真而怪涌塔之事奇也故曰見大寶塔等從座而起下六敘由塔住在虗空故皆起立合掌却住一面亦欲升於虗空也爾時有菩薩下七敘當機欲除人己之疑而請問於佛也當機名大樂說者無礙辨中有樂說無礙辨謂具此辨者始能說而無懈然樂說與藥王同行八萬人中一人上品明三世之持經非藥王之耆宿不足以因此品會十方三世而付囑非具大樂說者不足以請請有二義一以何下問寶塔為何因緣從地而出二又於下問凡為塔者非置佛舍利即安置諸經經與舍利何會言語故曰世尊以何因緣等爾時佛告下八敘佛答當機謂塔中非舍利與經乃是過去久滅度多寶佛之全身在其塔中故會做聲此徑應上品此中已有如來全身不須復安舍利之文此先答第二問也菩薩處胎經第二卷全身舍利品說一形法云此大地種厚八十四萬億里地下有風風下有水水下有火火下有沙沙有金剛剎各各厚八十四萬億里諸佛全身盡在彼金剛剎中乃至云有法鼓世界厚八十四萬億里過去億千萬佛皆留舍利彼土舍利我亦有分非一非二不住一處亦非不住周旋往來光相具足示現教化是知多寶佛之全身舍利皆在金剛剎及法鼓世界從地涌出也其佛下次答第一問謂寶塔來之因緣由多寶佛因中曾發大願即成佛後身雖在塔亦願聽此經讚說此經之佛之善涌塔現前而作證明也此徑應上品諸佛世尊從昔以來之所守護之文彼佛成道下申明多寶果不昧因也其佛以神下申明多寶因常成果也大樂說今多寶下結足答義是時大樂下九敘當機躡答申請願見多寶佛身然此請非佛力加被不能故曰以如來神力等佛告大樂下十敘佛答當機謂多寶佛現身要合彼深重願也其深願者要現在說法之報身佛與十方分處之化身佛同會集一處多寶佛始出現也此完方便品所謂三世十方一切諸佛法亦如是之言及完為衆生開示悟入佛之知見之義也其三世者多寶屬過去佛釋迦為現在佛身子等授記名未來佛釋迦分身為十方佛故其重願者要三世十方報化身佛同據向上法身平等無冤親之理性而授有冤親人之果記也大樂說我分身下謂多寶佛深重之願如彼汝之所請又如此則是我釋迦分身諸佛在十方者亦合當集於此也大樂說白佛下謂我但請過去一佛相見而得現在十方諸佛相見則亦是我等之深重願也故曰我等亦願等爾時佛放白毫二光至諸佛如來遍滿其中爾時下經家敘置有十科初敘釋迦佛欲己十方化身佛來集故放光見東方國土與佛有五百萬億那由他恆河沙之數也彼諸國土下次敘照見化身佛土之莊嚴唯淨無穢也無數千萬下三敘照見化身佛之法眷唯大乘菩薩無小乘聲聞也遍張下四敘照見彼國依正圍蓋皆寶為幔網也彼國諸佛下五敘照見化身佛及菩薩皆以說法為政事也上品云我千萬億土現淨堅固身於無量億劫為衆生說法至此益信矣南西北方下六敘一方以例其餘之九方也故曰南西北方等爾時十方下七敘照見十方諸佛與菩薩主伴重重皆欲以化身來報身佛處供養多寶佛也我今應往之應照前今應當集之應時娑婆下八敘十方分身諸佛欲來此土以佛神力忽然變穢為淨也其變穢成淨有十科一變琉璃為地二變寶樹三金繩界道四無聚落等諸相五燒大寶香六天華布地七寶幔覆上八懸諸寶鈴九唯留此會十移置天人於他土以上敘第一變實報莊嚴土也此上本淨不須更變為諸新得記者言變故變文中不敘無有地獄等言良以諸新得記者初未開悟佛知見時即淨見穢如淨名身子之所見今既開悟見穢為淨如螺髻梵王之所見也是時諸佛上九敘十方分身諸佛各與侍者至報土寶樹下師子座上趺坐各有安置也如是展轉下十敘十方變土雖廣且大不能容受釋迦佛一方之分身況能容餘九方之分身此見釋尊應化之多也以起下文第二第三之變土也各帶侍者為下文遣使問訊之案吾人能讀誦此經不須作觀即見大千世界無一剎一塵不是佛矣時釋迦牟尼下謂釋迦佛欲盡容受所餘九方之分身佛故次於娑婆三千大千華藏世界海外復變凡聖同居土為實報莊嚴土也故曰八方各更變等惟其變凡成聖變穢成淨故校初變文中敘無有地獄等言此可見佛實報莊嚴土中元無六凡穢也亦以琉璃下同初變之文可知目真鄰他云石山摩訶目真鄰陀云大石山鐵圍山亦有大小用圍小千大千世界者其山皆鐵成也須彌云妙高七寶所成也通為下謂因無諸山海所隔此凡聖同居土與上實報莊嚴土通同為一淨土具莊嚴也釋迦牟尼佛為諸佛當來下第三於凡聖同居土外變方便有餘土為實報土為釋迦未來世餘國作佛之分身佛坐也故云復於八方各更變等爾時東方下但結第二變土容盡釋迦正東一方所分之身也如是次第下通結由三變淨土如容盡釋迦十方所分之身也爾時一一方下第二第三變土時每云二百萬億等今合兩個二百萬億云四百萬億那由他也經文再變土為容受十方分身第三變土既云為諸佛當來坐故當來者未來也則容受三世分身矣義表竪窮三際橫遍十方皆由佛與衆生等有常住真心之所變現經云汝身汝心外道山河虗空大地咸是妙明真心妙明中所現物初佛於菩提樹下三七思惟正思惟衆生到此田地奈衆生有目不覩有耳不聞說到四十年後至說此經以三周法雨潤開聾瞽各見授記至此品中變土集佛無非驗明開示悟入佛之知見見我釋迦一佛分身有如是之多國土有如是之廣神力有如是之自在可謂有眼始得見華藏界有耳始得聞舍那聲矣惟其始得不免業習初乾尚見土有更變佛從外來逮提婆耶輸等并記龍女立地成佛新得記者各發願以弘經得安樂之勝行舊所化衆俱從地而涌出證久遠之壽量則清淨法身之佛絶無彼此色相可見而常寂光明之土即三變而無變矣而後乃知讀誦受持此經者淨智妙圓體常虗寂具佛無量之功德故談壽量後分別其功德有一念隨喜六根清淨之不同引常不輕結證因中持經之曠迹現神通力囑纍果上說法之大業而唯佛與佛一大事因緣本末究盡始無餘蘊矣此經中會集諸佛之大宗也問序品放光曰眉間今直云白毫一光何也答眉間表無位由聲聞人以有餘涅槃為真故以無位破其執也今聲聞人既皆成菩薩通身及土無非白毫一光故不用眉間言有無也問三變土中既皆移置天人又奚云諸天寶華遍布其地答寶華似天華不必諸天所布或大乘菩薩為天人非尋常可移置者此經不云乎唯惡此會衆豈此會中無天龍八部乎問佛心無處不慈悲何於天人言移置耶答以佛龍女記提婆事異于常慮天人障深難信生謗墮苦故權移置至神力品仍令聞其國名娑婆佛名釋迦經名妙法以種其善根是移置者乃所以為佛之大慈悲也問一物何能分無量之身答佛三無數劫以大願力於十二類衆生中修菩薩行受無量身逮至成佛則從前一切類身皆成佛身是故其身隨願而多況吾人夢中一念尚現無量人境佛為大覺至尊神力智力一為無量無量為一乃其常理不足怪也華嚴經云一切諸佛於一念中悉能示現無量世界不可言說種種佛身此足證其分身也又云一切諸佛於一念中悉能示現無量世界種種莊嚴無數莊嚴此足證變淨土也問變土集佛何以必待多寶佛塔出現答多寶佛現見過去佛不滅佛分坐塔中唱滅見現在佛不生發願持經見新受記未來成佛者雖劫長果遠一持經即證不生不滅之理而與三世佛等所謂皆已成佛道不須更成也問會分身變淨土徒有廣大玄言人多不見果實事乎抑幻術乎答准唯識論皆八個識相應智品實德所成非幻法也論云此四智品雖皆遍能緣一切法而用有異謂鏡智品現自受用身淨土相持無漏種平等智品現他受用身淨土相成事智品能現變化身及土相以上與經分身變土相合毫髮無異觀察智品觀察自他功能過失雨大法雨破諸疑網利樂有情此與經集分身變淨土說向後一十六品經同而無異准論證經皆出世間真實理事豈虗誕哉唯是吾人身世皆八識所變相見二分起我法二執從始至終唯業轄絆不能變化凡遇佛言皆誣為幻妄不知諸佛既能轉識成智一切變現非為煩惱皆合涅槃妙德也又論云如是法身有三相別一自性身謂諸如來真淨法界離相寂然絶諸戲論具無邊際真常功德是一切法平等實性亦名法身大功德法所依止故論此段是明寂光土法身佛無能所分合也二受用身有二種一自受用謂諸如來三無數劫修集無量福慧資糧乃至云恆自受用廣大法樂此同經中釋迦之自身也二他受用謂諸如來由平等智示現微妙淨功德身居純淨土為十地菩薩轉正法輪決衆疑網等此同經中釋迦十方之分身也三變化身謂諸如來由成事智變現無量居淨穢土為未登地菩薩二乘異生稱彼機宜現通說法令獲利樂此同四十年前所說諸經之釋迦也是時諸佛各在寶樹下至諸佛遣使亦復如是是時諸佛下大般若第五百七十三經云三世如來同在一處自性清淨無漏界攝若一若異不可思議准是則諸分身佛同一報體如金不博金故各坐寶樹下而不相到皆遣侍者下謂分身佛之與釋尊雖同一報體不妨有彼此應化之形如鏡照鏡雖各不相到而光光相攝故順世諦遣使齊華而問訊也般若所謂若一若異不可思議者也如我辭下遣使以病惱為辭者病約身言惱約心言順堪忍世界人情體諺云事不害理從俗可也論云示有微苦相應也彼某甲者分身佛各教侍者向釋迦代稱己名之辭此可見分身佛不必皆名釋迦也華嚴謂佛每一世界有四百億十千名前品謂異國作佛更有異名也與欲者同欲也謂三變淨土中諸分身佛同欲開多寶佛塔滿深重願也爾時釋迦牟尼佛至佛欲以此妙法華經付囑有在爾時下牒其十方來儀皆聞下牒其諸佛使命即從下謂佛上副分身與欲下順四衆願欲即去地在空以指開塔也一切四衆下謂佛起四衆不敢上視也於是下謂佛以右指開七寶塔以表開方便門也出大小謂開塔戶之聲有如開大城門之關鎖聲也即時一切下謂塔戶方便門既開則見過去佛如入禪定表示真實相也華嚴第六十八經瑟胝羅居士得菩薩解脫名不般涅槃際知十方三世一切如來除為調伏衆生畢竟無有佛般涅槃者故一開旃檀塔戶即次第見過去七佛乃至一念頓見百千億那由他不可說不可說世界微塵數佛准彼多寶佛實滅而不滅無怪矣又聞下謂不唯見佛且聞其言讚釋迦而趣其快說法華也其快說有二義一歎其說得快活序品至法師品是也一催其作速快說此品至法會告終是也故曰我為聽是經等爾時四衆下謂四衆見聞生喜皆興供養於二佛也初塔未開天等供養表外護也今塔開已四衆供養表內護也此所謂若有見塔供養者皆得近阿耨菩提也爾時多寶下謂多寶佛知釋迦佛將欲涅槃故入塔中分半座與同坐也即時下謂現在佛果依過去佛命入塔中而跏趺也然分座有三義一證上品有能廣說此經者與如來共宿衣覆之言不虗也二表究竟涅槃常寂滅相終歸於空而空非斷滅之空乃有不滅者有使大衆肯發願以持經也三為記提婆佛龍女其事太奇非與過去佛同座而說則人難信也爾時大衆下謂大衆見二佛在塔塔在空中與己相去之遠故求佛以神力接衆亦處虗空得相近以聞法也譬喻品謂若我但以神力及智慧力捨於方便衆生不能以是得度今明衆生既能以是得度故捨於方便而但用神力及智慧力也即時釋迦下衆生以佛神力得度也以大音聲下衆生以佛智力得度也以廣說妙法屬智慧力故然佛求廣說妙法獨以娑婆國土為言者娑婆是釋尊發心得果本土事詳悲華經中此土雖云極惡而利根衆生亦盛有肯發願修此經者校他土成佛亦極快也今正是時者時字徑應化成喻品如來自知涅槃時到之時結完方便品諸佛如來時乃說之之時如來不久下謂佛欲涅槃經欲人持四衆新得記者苟不蚤發願以持經則將此經付囑從地涌出舊所化之衆也然舊所化六萬恆沙等衆尚未涌出故但云有在嗚呼云如來不久涅槃者明佛難常住於世也云妙法付囑有在者明此經不容易分布妄授與人務交付得所也然此數句必涌塔變土集佛分座而後說者以妙法難說而人難信難解也故下偈中獨以難字發揮為後諸品源也爾時世尊欲重宣此義而說偈言聖主世尊雖久滅度至在在所往常為聽法此頌長文第一節長文雖分四節獨重末節數句故節末節而發頌端聖主下謂以多寶久滅度之聖主業已不須妙法身處塔中可以不必遠來而尚為法來是分應安逸者為法而反不惜乎勞止也故曰雖久滅等諸人下謂四衆既稱諸人則知尚未成佛校多寶為法為要緊而身且現在佛前此塔中遠來為至便而不精勤為法是職當勇進者而反善於自寬也此佛下應長行果德之文彼佛下應長行因行之文也又我分身無量諸佛至以是方便令法久住此頌長文第二第三兩節初十二句應爾時佛放白毫一光起至我今應往娑婆世界等文次二十二句應三變淨土及第三節之終又我下承上頌言謂不唯過去一佛為法而來又我釋尊分身之佛多如恆沙而一來聽法並見多寶佛故故各捨土衆及供養事無非令法久住也為坐下謂我釋迦因為坐分身佛故用神通力移置天人變穢令淨俾分身諸佛各各坐寶樹之下如清淨池中蓮華之盛開為莊嚴則色相可愛也其寶下謂分身佛多光大如夜極暗時然大炬火其照耀天地可樂也身出下謂分身佛香妙遍衆生蒙薰者不勝其喜如大風吹小樹枝難以言其趣也以是下謂多寶之來分身之集淨土之變凡此皆十方三世諸佛令法久住之方便也華藏莊嚴世界海宛在目中壽量品我此土安隱案伏於此告諸大衆我滅度後至一切天人皆應供養此頌長文第四節略其開塔者以既見真實相不論開方便門也告諸下十四句雙標持說二門正應塔中以大音聲普告四衆等文護持約自利言讀說約利他言具六種法師義謂佛滅後誰能持說此經對佛自誓即同久滅度多寶佛之師子吼即為多寶與釋迦所集分身佛之所知也諸佛子下十六句單申明持者不但為諸佛所知即為供養三世十方佛矣若說此經下四句單申明說者不但供養諸佛即為見三世十方佛之所以為佛矣諸善男子下四句結成對佛自誓誨其諦思佛所以必欲大衆發願然後以此經囑纍其人者以佛滅後能持說此經實為難事也此為難事一句引起下文二十餘行難不難之校核文則不出持說二門義在不出神通智慧二事皆以餘經與此經相對校也諸餘經典下標起說餘經智力神力可及者為餘經難而易此經易而難有六番也若校下須彌難以手接大千難以足動今皆不難者餘經所詮神通人易信也若立下有頂為色界究竟處與無色界空無邊處相鄰最難以立彼處天人多厭色歸空不能聞法亦最難說經今皆不難者餘經所詮智慧之力或易信也若佛滅後下此經不假接須彌動大千之神通立有頂說餘經之智慧直令讀說者知舉手低頭處皆已成訖佛道不須更修其誰能說而其誰能信哉故曰是則為難此雙以餘經神力智力單校讀說此經者為難故宜發願一也假使有人下空無形相難以手把空既被把難更游行今皆不難者餘經所詮之神通人或易信也於我滅後下此經不假把虗空游行之神通但能自書及使人書持則究竟涅槃常寂滅相佛與大衆已同住於空中矣此單以餘經神力單校護持此經為難故宜發願二也若以大地下大地難置足甲即置亦難升於梵天今皆不難者餘經所詮之神力也佛滅度下此經不假置地上天之神力但暫時讀說則已三變淨土移置天人於他方其誰能信哉故曰是則為難此單以餘經神力單校讀說此經為難故宜發願三也假使劫燒下乾草極易著火劫燒非常火所同入中不燒為不難者餘經所詮之神通也我滅度下此經不用擔乾草入劫燒不焚之神力但能自持為一人說則大衆見劫盡大火所燒時我此土安隱矣此單以餘經神力雙校持說此經為難故宜發願四也若持八萬下八萬法藏及十二部經一人為難持即持亦難說即說亦難令聽者得六通今皆不難者餘經所詮說者聽者神力智力也於我滅下此經不假如上說聽得通之力但能令聽受者一問其義即父母所生肉眼等之六根不用修證已護清淨矣此雙以餘經智力神力單校聽問此經者為難故宜發願五也若人說法下說法令一人得阿羅漢果具大神通尚難況令千萬億等衆生得果具通為不難者餘經所詮神力智力極廣且大者也於我滅下此經不須八萬四千等法藏之多神力智力之廣且大但能奉持一念隨喜須臾聞之即得究竟阿耨菩提況從法會出展轉傳至第五十人一念隨喜功德已勝於供養四百萬億等六趣衆生滿八十歲復令得四果算數譬喻所不能及矣此以餘經神智單校奉持此經者為難故宜發願六也我為佛道下單約護持者結回此為難事一句謂如上校核獨以持說此經為難者以國土雖無量說法雖無數始終唯有此經為第一之難持也故末世持者不名持經即名持諸佛之身矣諸善男子下雙約佛滅後持說二門結回宜發大願一句故曰誰能受持讀誦等此經難持下謂由經之第一難持而末世暫持者亦為第一難得故暫持者即感佛與諸佛歡喜而難賞也是則勇猛下謂佛滅後於此經雖曰暫持其實則為勇猛精進則名持戒行頭陀行之抖擻也亦即為疾得阿耨菩提之無上佛道也則為即得二句為龍女速至菩提之案以上明持經者得果之速能於來世下一十二句明持經者植因之大為提婆品張本是真佛子住淳善地冥顯釋迦因中為國王采果拾薪等役是諸天人世間之眼冥顯提婆因中為仙人傳法之迹於恐畏世下四句照法師品中說經者之利益也妙法蓮華經提婆達多品第十二提婆達多云天授謂乞天授與也斛飯王世子如來堂弟阿難親兄也據餘經是纍劫魔害佛法者據悲華寶積二經乃實助成我釋尊之功德者故述其往劫為師之事以授記也上品彰佛果上之迹明佛分身隨願而多此品彰佛因中之迹明大願由師所教而成故授其記以酬其恩此所謂能以平等大慧與大衆說也爾時佛告諸菩薩至精勤給侍令無所乏爾時下總標求此經之迹於多下別釋無量劫求經而多分迹為國王也求法華云無懈倦對上品諸人云何不勤為法而言發願求無上菩提云不退轉對上品此為難事宜發大願而言然法華即無上菩提能詮之文無上菩提即法華所詮之理以上并約智度言為欲滿足下謂因智度而並勤行其六度也六度攝於檀施一度故曰勤行布施等於菩提云無退轉於布施云無吝惜正見國王無懈倦處以菩提果覺名檀等因行名故象馬下外財頭目下內財時世下謂時壽短捨內外財人或能之世壽既長王能捨其國位者以重妙法重於為國也委正當作委政謂以治國政事委付太子而並命擊鼓宣求法之敕令也誰能下出所宣令之辭時有下奉敕令而至之人若不下仙人要君以踐終身給走之令王聞下行果顧其令言采果則上樹汲水則下㵎拾薪則登山設食則充庖凡此皆給走之事也以一身兼數役晝間可謂辛苦矣而夜間尤不得暇或以身為床則任其從橫或以身為座則隨其左右如此奉事經千歲而身心無倦者為妙法之難得也現前諸新得記者顧奉事我釋尊校國王之於仙人為何如而尚不發願以持經乎爾時世尊欲重宣此義而說偈言我念過去劫為求大法故至今故為汝說阿私云無比食化志在樹曰果在地曰蓏張宴曰有核曰果無核曰蓏周禮云共野果蓏之薦注果桃李之屬蓏瓜瓞之屬餘照長文可解佛告諸比丘爾時王者至若在佛前蓮華化生佛告下會明今昔由提婆下述成法利歸功於師成提婆之因行也悲華經佛為寶海梵志在寶藏如來前發願極大有一裸形梵志名亂想可畏亦願佐佛成其因行隨佛在處凡內外財一切求索滿其六波羅蜜俟佛成道已願為弟子聞法獲記爾時寶海即稱裸形是己無上道伴任其求索皆施實無罪分以故一切經中凡云冤害佛者皆名提婆達多然餘經多述求索頭目等緣是為佛滿足檀等前五波羅蜜唯此經以傳法言是兼滿般若波羅蜜也故知彼經云裸形梵志定是調達竺法護譯時有仙人為時有梵志與悲華合告諸四衆下授其果記以謝其恩提婆云天授成佛亦號天王果不昧因名稱其實也周稱皇帝為天王世界名天道者意天道無親常與善人也現在滅後皆以三乘法度生得果者天王佛之本願也佛告諸比丘下謂佛滅後人能於此品信而不疑則果感有三一生佛前常聞此經二生人天受樂三蓮華化生大寶積第二十八經佛告淨無垢菩薩云善男子若無提婆達多善知識者終不得知如來具有無量功德乃至云過去五百生中處處提婆示現作冤家事顯佛無量功德而諸愚人不善取義墮三惡道提婆達多善修無量諸勝功德親近諸佛宿植德本心向大乘近於阿耨多羅三藐三菩提入大乘論說提婆達多是大寶伽羅菩薩為遮衆生起逆罪故示現作業墮於地獄若果佛怨云何而得世世相值如二人行東西各去步步轉遠豈得為伴准此則知一切經中凡言提婆達多事迹皆順力示現助成佛道非真為冤家也亦他山之石可以攻玉不善人善人之資義耳於時下方多寶世尊至於海教化其事如是爾時智積菩薩以偈讚曰大智德勇健化度無量衆至令速成菩提文殊師利言我於海中唯常宣說妙法華經於時下上三節佛為四衆不發願持經故敘其遠因明人能以法為重雖國王不惜其尊四衆比國王之發願顧何如人能以身為輕雖地獄不辭其苦大衆校提婆之持經顧何如此節恐四衆謂調達雖能地獄持經而得記然天王之樂尚未現證而地獄之苦尤難實受故難於發願也如此則皆智有所積滯而不通達清淨實相立地成佛之旨故假智積菩薩趣多寶回本土而發起文殊說經度龍女現前立地成佛以證妙法得果之極易俾四衆信得及衆生本來是佛只在善說法如文殊者一加點化耳如是則娑婆雖弊惡校地獄猶為堪忍衆生雖上慢比龍女猶為法器有何不可持說此經而難於發願乎故記提婆後有龍女成佛之事為此品中之大義故說此品後即有持品諸菩薩而發願也白多寶下智積表權智見諸四衆不發願謂徒來此會即以權而趣寶佛歸本土之實也釋迦牟尼下佛留智積以待文殊者文殊表本智謂智積不可因四衆滯于發願之迹便欲以權歸本此間除不發願者外自有根本智如文殊師利者可以證明持經得果之易故曰此有菩薩名文殊等爾時文殊下此土說此經之法主也俱來下同文殊傳法一類之衆也法主云坐千葉蓮華法衆云坐寶蓮華亦優曇鉢訓大寶青蓮華義從於下主伴所來之方也詣靈鷲下諸佛會集之所也問序品文殊答彌勒後未見云往龍宮今奚從彼涌出答汝謂龍宮在婆婆本界耶在餘世界耶曰固在本界曰龍宮既在娑婆靈山至於龍宮如人前堂行至裏室總在家中奚用先示往相華嚴十通品菩薩第六無體性無動作往一切佛剎智神通云菩薩聞極遠無數不可說世界中佛名即自見身在彼佛所禮敬求法經於多劫不曾動其本處況在娑婆之龍宮可執往來相乎又問龍雖八部之一亦畜道所攝三變土中既云無有三途今奚又有龍畜况天人可移龍奚不移答三變土中唯後二變云無地獄鬼畜初變土中曾無其說業已訓之何得忘耶況經既云唯留此會衆聞一偈一句一念隨喜者皆與其記豈娑竭龍王十地菩薩位中人不如一念隨喜者反不留而移置實報莊嚴土外耶即移置三變土外以文殊之神通不能自彼而來於此耶迦葉盡神力白推欲擯文殊便現百千萬億文殊豈直在鷲峯不遍在龍宮及一切處耶以上照此有菩薩名文殊師利案修敬下照可與相見案智積菩薩問下謂龍宮卑濕非說法之地龍性憍慢非受教之機其被化者難多也故曰仁往龍宮等文殊師利言下謂善說法者不擇其地善度生者不問其機故地愈卑而法化愈廣機愈憍而得道愈速故曰其數無量等且待下謂心口既難稱記少待自當證知也文殊來儀自海而空自空而山自山而至佛前自修敬二佛後而與智積相慰問何等次第哉所言未竟下事符其言也此諸菩薩下證知文殊之化也具菩薩下謂機雖分於小大人皆歸於一實故菩薩之大機皆各論說其六度之行本聲聞之小機亦各說其本行也今皆下謂今經既會權歸實聲聞雖是小機皆修行大乘之法空義也文殊師利謂智積下謂前云自當證知者其事如是也智積菩薩以偈下晉譯偈止四句云至仁慧無量化海衆寶數唯為露聖旨分別說其意前二句當本譯前一行後二句當本譯後一行今會彼釋此則本譯後一行是讚前起後之辭謂大智文殊其智勇故敢入龍宮而說法其德健故說法久而所化之衆多今我固及見也演暢下謂衆多我見法尚未知惟露其聖旨為我分別之仁在龍宮所演暢法還是唯闡一乘實相廣導衆生不假久修而立地速成菩提耶抑小大分別先開三乘為聲聞之本後暢一乘以漸而修大乘之空義乎故文殊答云我於海中等謂即先三後一正是我常說妙法也智積問文殊師利言至却住一面以偈讚曰深達罪福相至我闡大乘教度脫苦衆生此節下節并應上節論說妙法一句智積下承上我於海中唯常宣說妙法蓮華經為問以法而求人也此經甚深下法也頗有衆生下求人也文殊師利言下引己所常化為答是以人而證法也娑竭羅云鹹海女謂非男子也年始八歲齒幼也智慧利根德長也善知衆生下釋成智慧於剎那頃下釋成利根能至菩提一句結足答義智積菩薩言我見下以餘經權漸校此經頓成菩提為不信也謂以妙法之希有得善說與能行成佛固當生信以積德之能仁校初心之幼女遲速不能無疑故云不信此女等方便品所謂不退諸菩薩亦復不能知是也注謂遲速不能無疑者若信速則疑釋迦為無智慧利根矣若信遲則疑龍女剎那時發心惡能頓超釋迦多剎哉其實文殊敘龍女文中亦且有釋迦之積德在何也知衆生根行下得機生熟之總持諸佛下得法深祕之授受深入禪定為觀機生熟也了達諸法謂了三即達一也剎那發心始覺也得不退轉等始覺即同於本覺所以四辨具而四無量心滿也赤子詩云如保赤子心誠求之謂慈念十二類生如自己所生之孩提功德具足謂凡佛果位中六度四攝四無畏十八不共法等皆具足所謂大圓滿覺也三覺既滿故心中念口中演都是一乘微妙廣大之法無二三乘也慈悲仁讓約與人交接言志意和雅約資稟標緻言此雖述龍女之德其實明持經者之儀軌也見龍女年雖幼而亦同釋尊無量劫積功纍德不異矣然智積不信非不信其具德但不信其彼此長幼遲速也殊不知為菩薩之妙用為懈怠衆生故示久遠成佛為精進衆生故說頓成其佛若然者安知釋迦於他方世界遇精進者不同龍女示頓成乎又安知龍女不是為激發諸新得記者畏娑婆世界弊惡不肯發願持經而示現乎觀三千大千世界如芥子許者報恩經謂迦葉佛為比丘時釋迦佛為蝨提婆達多為蚤在比丘衣中擾害比丘約曰凡我作務時任汝跳嚙入定時俱願止息蝨即奉教蚤獨違約比丘因不得定將衣火焚蚤蝨俱斃以蚤蝨身此芥子小大恰相類也佛劫海中為化一類蚤蝨衆生捨其身命如此言論未訖下文殊不答者以有龍女為證也偈云深達等者龍女畜道罪相也菩提果覺福相也能信龍女成佛是深達罪福同一實相而光明之性遍照於十方也此約能證以顯般若之德微妙下約所證以顯法身之德法身無相故曰微不妨具相好莊嚴故曰妙淨天人下即法身明報化身顯解脫德謂由法身微故天人所以戴仰報身妙故龍神所以恭敬化身淨故一切衆生所以無不宗奉此龍女以己深達遍照之般若讚佛三德而破執權漸者之滯迹應上所謂智慧利根也又聞下請佛證明已知成佛應上得至菩提具三寶三覺義成菩提佛寶闡大乘法寶脫苦衆生僧寶佛寶自覺法寶覺他僧寶則滿覺也度脫苦衆生一句有諷刺義謂凡不信自心成佛專疑他人者是苦衆生也時舍利弗語龍女言至一切衆會默然信受時舍利弗下智積不信由文殊之言身子不信由龍女又聞成菩提之自言也故云汝謂不久等不久即速義對下懸曠看所以下徵釋謂所以汝云成道我云難信者何也以汝女身垢穢校釋梵等清淨非是法器故也況佛道懸遠廣大經劫之多積行之全然後乃成乎此以以佛道懸曠等言足成云何能得無上菩提又女人下覆明女身垢穢非是法器超日月三昧經上度比丘不信長者女慧施成佛云淨修四等四禪乃升梵天淫恣無節故為女人勇猛少欲乃得帝釋雜惡多能故為女人十善具足尊敬三寶孝奉二親謙順長年乃得魔王輕慢不順毀失正教故為女人行菩薩道慈愍羣萌供養三尊先聖師父乃作轉輪聖王慝態不淨故為女人具無量德五處本無無三趣想乃得成佛性著色欲情淖態慝身口意異故為女人等又大寶積三十八經云舍利子若有女人為轉輪王帝釋梵王自在天無有是處轉女身已出世作佛斯有是處然身子不信龍女上度不信慧施元有所聞於佛非自己臆見也注引超日月三昧經俾見五障所以為障引大寶積經俾見身子不信非不信女身可轉男身作佛第不信龍女以女身而當體速成佛也故結云云何女身速得成佛以故二經皆以轉女身成男子為言然三時經但受記慧施等五百女人過十劫後成佛同名慧見如來此經則立地速成佛也爾時龍女下獻珠以示成破遲速相校之滯迹也故曰觀我成佛復速於此當時衆會下變身以示法器破男女相校之滯迹也故曰忽然之間變成男子問菩薩處胎經火焰世界無欲佛彼土人民盡受女身一時七十二萬億女人不轉男身咸得成佛此經既屬頓教大乘反欲女轉男身作佛何也答彼一世界此一世界化法化儀各隨佛之願耳且彼世界全無男子女可作佛不用言轉此既男女各形成佛故用轉也具菩薩行者因行滿也即往南方等者果德圓也此證讚中又聞成菩提二句普為十方等者證讚中我闡大乘法一句爾時娑婆等者證讚中度脫苦衆生一句事待其言娑婆無垢各獲果證菩薩尊者不由不信故曰智積舍利等默然信受良以龍女由一寶珠之愛積於心故遭許多之排難智積身子由一大智積於心故枉許多之議論佛前四衆苟能於未來世仰學龍女恆順智積身子而恆順衆生以持經則娑婆之弊惡可化成三變之淨土矣何則智積計著修行劫量遲速之不信龍女即恆順獻寶珠於佛以表修因布施在得其人故一念之檀即滿六度何必無量劫積功纍德然後為苦行哉文殊謂龍女為智慧者見矣以寶珠表法愛龍女最心重者今捨之則處胎經所謂法性如大海不說有是非凡夫賢聖人平等無高下惟在心垢滅取證如反掌龍女獻珠則心垢滅矣身子難以女身龍女即恆順變為男子難以垢穢即恆順往于南方無垢世界以表證果在善處於變化則五障即等於法器何必釋梵然後始成菩提文殊謂龍女為利根者見矣問龍女成佛何不通名答經有三義故不言名一准起信論信極真如者離三種相智積以劫歷久近為難文殊不辨示此經離言說相身子以男女垢淨為難龍女但獻珠而不辨示此經離心緣相成佛不云某甲示此經離名字相大般若第五百七十六經龍吉祥菩薩云頗有能證菩提者不妙吉祥曰若無名姓施設語言彼則能證又超日月三昧經云無取無捨乃號為佛亦無名號假有字耳二顯經中前後授記者皆碌碌輩因人成事言佛語故非己智分恐劫長果遠仍舊忘而不信故不可不記其名號及至成佛則丈夫自有冲天志即釋迦亦說然燈佛實無有法於我矣三顯佛姨母及耶輸等六千比丘尼苟如龍女智慧利根則不憂色視佛謂佛於授記中不記己名蚤已成訖佛矣有茲三義故龍女但云往無垢世界成佛不說名也以名與相皆是垢故妙法蓮華經持品第十三持謂受持攝六種法師三處分別六種詳見法師品三處分別者此方他方周旋往返十方也爾時藥王菩薩摩訶薩至種種供養不惜身命爾時下發願此方持者藥王法師品當機大樂說寶塔品當機作是下安佛心也我等下遵佛命也後惡世下他人所畏也一畏善少二畏慢多三畏貪利養四畏增不善五畏遠解脫六畏不信教我等當起下人畏而己能忍也讀誦下一讀二誦三持四說五書寫六供養皆不惜身命而為之者以見涌塔變土集佛記調達佛龍女皆由此經而出生也問動云持經還是持前三周之法以為經乎抑通持七卷乎曰如斯則有何失曰若但持前三周法直須法師一品作囑纍足矣又奚用見寶塔以來許多事乎若通持全部則其所教受持之言及奉命願持之語豈盡應持乎若持則不過以言語重持言語似亦贅疣矣曰世典帝王大小臣工百姓一動一語猶在史記言右史記事不謂之書則謂之詩皆可稱經皆俾人覽古知今有益識見況出世上上至尊典誥一言一動不可皆稱其經而受持者乎應知不唯持此一部名妙法即一大藏經論一句一偈皆可持也所以然者以得此經會權歸實無往不是妙法無往不是說吾人本具日用尋常心之性相事理體用之妙故爾時衆中五百阿羅漢至即於佛前而說偈言世尊導師安隱天人我等聞記心安具足說是偈已白佛言至亦能於他方國土廣宣此經爾時衆中下諸新得記者發願他方持者問如何不見舍利弗等發願答富那記中皆已暢明本迹諸大弟子內祕外現此方持經其來久矣故不明發願大般若第五百八十經舍利子告滿慈于言若聲聞獨覺乘相應作意皆能間雜大菩提心俱名非理作意乃至云是故菩薩應作是念貪嗔癡等於大菩提雖為障礙而能隨順菩提資糧於菩提心非極間雜如二乘等以貪嗔癡等能令生死諸有相續助諸菩薩引一切智謂諸菩薩方便善巧起諸煩惱受後有身作大饒益依之修學六度等准此則何方持經更妙於此方復有學無學下第二三果人發願亦往他方持者問授阿難記中止得二千人今何云八千答法師品中廣記者附焉爾時佛姨母下波闍婆提云大愛道憍曇彌云尼衆主耶輸陀羅云蓮華色佛在俗后也女僧將欲發願持經故先希記問如何至此始與其記答一則八敬法女衆不許越男僧分一則非龍女成佛後不唯女衆不自信作佛即智積等諸菩薩亦會生疑也是以在後與記悲華經佛姨母元為水神愛佛願大生生願為佛保母耶輸元為須彌山神名善樂華愛佛願重生生願為佛婦俱求佛得道後各授記莂故今與記完昔願也其授記文顯可知爾時世尊視八十萬億至在於他方遙見守護此衆發願不計彼此隨十方皆能持經者也校上二節此願最大佛先曾對藥王歎賞此衆於諸佛所成就大願愍衆生故生此人間即是未來成佛之人故今不以言告唯以目視欲此衆忽忘己之本願勿負佛之所讚故云爾時世尊視八十萬等是諸下敘具其德即從座起下敘因佛以目視有進退兩難之意謂進則須佛有告敕之命我當遵命而廣宣然佛默然無告退則又蒙佛目視則我當云何也時諸菩薩下謂佛雖無告敕之語我當敬順佛目視之意并自滿其本願可也便於下敬順佛意也世尊我等下自滿其願也周旋十方則無處不到也往返十方則去而復來也如是則土不定淨穢人不辨於善惡皆能令書寫讀誦解說修行此經則是無人不可教也皆是下謂我等願雖如此皆是佛之威力加庇故願佛在他方遙見守護也此要佛踐法師品中之約耳雖然設佛在他方不護此願亦難行故佛亦不便付囑也即時諸菩薩俱同發聲而說偈言惟願不為慮於佛滅度後至我等皆當忍偈謂佛待機四十年而說此經可謂慮之熟矣三周法後知涅槃時到又慮滅後人畏世惡不肯廣說蒙蔽衆生佛之知見故自法師品以來拳拳然直勸後世能持經者發願可謂慮之長而且遠也而藥王樂說願此遺彼諸新得記者願彼遺此一得一失果如其佛聖慮焉今既有我等不問土之彼此皆願周旋不問機之利鈍皆願教令則佛之慮可以釋矣故曰惟願不為慮等初行頌長文後行申惡義謂世惡由于人人惡在于三業有諸無智意惡惡口罵詈口惡加刀杖身惡也惡世中比丘邪智心諂曲至好出我等過此申明上節有諸無智人一句而形容意業之惡惡世下動中意惡或有下靜中意惡是人下結明靜中所以為惡上云無智此云邪智謂無正智頗有邪智故其心不直而諂曲道未得而云得增大我慢也阿練若云無喧諍山間林下之謂謂邪智惡增或有時居山林著衲衣形服似是空閒而心則喧諍以故自謂己是修行真道而輕賤持經者在於人間為貪著利養與白衣說法為世恭敬如六通羅漢也由此而知是人心常懷惡口常念俗假名為阿練若使人偏信己言便於好出我等之過失豈真正無喧雜哉而作如是言此諸比丘等至皆當忍受之此申明初節惡口罵詈等一句形容口業之惡而釋成好出我等過之義而作下出其持經者貪利之過彼自貪利養反輕持經者貪利自作下出其持經者求名之過常在下好出過之方所毀謂背有後言國王大臣有權位能生殺人之方所婆羅門居士有操行能臧否人之方所餘比丘衆能隨世人易生炎涼之方所誹謗下謂于上之三方其人皆誹謗持經菩薩之惡誣為邪見人說外道論也我等下謂彼不知我等敬順佛意悉忍彼惡口而反為斯輕褻之言云汝等能忍想是佛耶我等亦不辨而皆忍之也濁劫惡世中多有諸恐怖至皆當忍是事濁劫等者上二節釋訖初節惡世義此節釋初節恐怖義照及如刀杖者我等皆當忍二句形容其身業之惡謂濁惡世中國王大臣等皆受佛付囑應為持經者金湯當無恐怖而反令我等多有恐怖者以膚受假名阿練若諸惡鬼入彼身心故不呵護而反加罵詈毀辱也辱字含有加刀杖義我等敬信下謂彼雖持罵毀利兵無能破我堅甲而忍此難事也我不愛下轉釋為說是經等二句我等下轉釋我等敬信佛等二句世尊下謂凡我等所言佛自當知濁世惡僧所以滅我等者以彼未開悟佛知見故不知佛四十年前所說三乘皆佛方便隨宜以故見我等直說一乘不說有三犯彼所忌故口則惡罵眉則顰蹙我等身則被彼數數見擯離於塔寺矣如是下結初節我等皆當忍一句謂如上衆惡我等下念衆生上念佛敕皆當忍而不校也諸聚落城邑其有求法者至佛自知我心此結初節我等當廣說一句諸聚落下躡上文言謂彼惡僧雖假聲勢擯我等出離寺塔我不以彼生退息凡山野之聚落市朝之城邑有求法者皆到其所說佛所囑法也我是下照法師品如來所遣使等文我於下照寶塔品多寶如來及與我身所集化佛當知此義等文
