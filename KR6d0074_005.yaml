body:
  text: 姚秦三藏法師鳩摩羅什譯明護國金剛寺住持如愚著妙法蓮華經安樂行品第十四安樂對上品恐怖惡世危苦言行謂修行該身語意及大悲以修四行始能應上品我等當廣說之願也准法師品諸持經者當得佛所護念及天寶奉獻之安樂而持品中發願者此方他方周旋往返十方皆以世界恐怖弊惡為辭敬順佛命忍難為心是持經者本以好心開示衆生佛之知見使離苦得樂而反自致意嫉口毀身加刀杖之不安樂佛滅度後諸持經者寧不畏哉此文殊所以乘機而請也佛答以修身等四行者蓋美其諸菩薩雖能敬順佛意忍難持經而尚未獲所以持經之善道在己之先不以道與世亢而正其三業加以大悲為人說法則無往而不安且樂矣何有弊惡危苦之難忍哉故曰安樂行品大義不出法師品大慈悲為室等四行彼中略明此乃詳悉也爾時文殊師利至是名菩薩摩訶薩第二親近處爾時下當機牒起八十萬億那由他衆發願之辭為請說此品之端甚為難有者謂甚難得周旋往返十方世界持經不膠柱彼此善惡之難易也以膠住者但順己情不順佛命故以佛元命持經者在廣大十方娑婆世界故世尊菩薩下能善也應前我當善說法之善字謂據諸菩薩所陳佛滅度後世既弊惡教諸大士云何能得說經之善道不遭橫害而安樂也佛告下暗然總標正身等四法為答一者下別標身業之正安住謂持經者先要安住己心於行止二處行止正不正身等安危所係在說法者善圖之行處照方便品盡行諸佛無量道法親近照方便品佛曾親近百千萬億無數諸佛此可見佛元說親近諸佛不曾教但親近國王王子大臣等元說盡行諸佛無量道法不曾教但忍苦行文子語言禪也故下文二處俱分事理二行文殊師利云何下徵釋行處事行住忍辱地者以忍辱心比於世間之地柔和下形容忍心為地之義謂持經者身業柔和善順如地任物履踐種割而不剛強杵逆語業如地坦率而不倉卒暴橫意業如地安靜而不驚惶怖畏也問此明身行奚兼語意答身無語意其行莫顯故經有心亦不驚之心字則知舉一行而語意皆兼況相宗云八識身豈但指形言以上行處之事行又復下行處之理行法謂妙法無誡辭所謂能所謂持經者於心中所得妙法行則任其行但勿得自是彼非以道與世元形其能所致刀杖加於身數見擯於塔寺而不安樂也而觀下教修於法無所行之觀門諸法即蘊處界等世間出世間法頌云上中下法有為無為實不實法是也如實相者謂要得於法無所行須觀外之蘊處界等諸法如內心所證之實相空空無相而不行其上下有無虗實也亦不行者謂即觀諸法如實相之心亦不行也不分別者謂即亦不行之心亦不分別也此同圓覺經遠離為幻亦復遠離離遠離幻亦復遠離之文又通乎般若之無四相於法無所行是無我相而觀諸法如實相是無人相亦不行是內不見有不生不滅之壽者相不分別是外不見有是男是女之衆生相也故下頌應此有云亦不分別是男是女句也以上雖分行處事理總明持經者當行人之所不能行也故云是名菩薩等云何下徵釋親近處事理明持經者當止人之所不能止攝戒定慧三無漏學戒有八種皆對持品偈言菩薩摩訶薩下初戒無近勢位謂濁惡比丘等所以向國王大臣等誹謗說我惡者以我親近國王等故也今不近彼則彼之謗自息矣不親近諸外下次戒無近邪智名義集云學乖諦理不返內覺稱為外道其人有九十五種故曰諸即持品所說婆羅門居士有在家出家之別梵志即婆羅門異名在家外道也名義集云婆羅門云淨行即諸經中梵志正翻淨裔稱是梵天苗裔是也尼犍子名義云此翻離繫乃外道出家之總名如佛法出家名沙門同等者等其六師及造下謂造四韋陀典五明論如此方擅諸子百家小說叢談謗佛法者之類也路伽耶陀云惡論義逆路伽耶陀云問難謂濁惡比丘所以謗我為邪見人說外道論義者以我親近諸外道等故也今戒不近彼亦難誣衊矣亦不親近諸有下三戒無近凶戲相扠相撲凶戲之狀那羅云上伎戲變現謂異乎扠撲者又不親近下四戒無近殺捕旃陀羅云殺者名義云正云旃荼羅此翻嚴幟行時搖鈴持竹為幖幟以惡業自嚴人皆怖畏畜猪羊雞狗豢之以待殺者畋獵漁捕野取水陸殺者三四兩科一以戲取利一以殺取利皆殺莫近者遠彼便於加刀杖也如是下謂彼雖戲惡亦具佛性不來則已來則為說戒殺之法或從而化也又不親近求聲聞下五戒無近小乘持品所謂邪智諂曲未得謂得我慢納衣空間假名阿練若者也不問訊大小乘元無交道也房中之靜攝經行處之散步講堂之聞法皆不許共住止者大小乘道不同不相為謀共住恐起諍端也或時下謂我遠彼彼或時來但隨彼機宜說其小乘法無所希求彼利養也此因上品濁世惡比丘不知佛方便隨宜所說法而致戒以順機也文殊師利又菩薩下六戒無近淫端不於女身生欲想相則淨說法之端也亦不樂見下則絶其生欲想之瑞也小女謂年幼未知守節者處女謂以女道自處不妄婚嫁者寡女謂或無父母兄嫂所拘或已婚媾夫死稱未亡人而寡居者又不樂見則眼淨老子云不見可欲使心不亂也不共語則口業淨皆戒絶淫端也亦復不近下七戒無近邪染五種不男謂生劇妬變半也四分律云扇搋此云生謂生來男根不滿留拏云劇謂以刀去勢伊梨沙等拏云妬見人淫生妬半擇迦云變遇男變女值女變男博叉云半半月男半月不能男不獨入他家謂須結伴而入若有下謂有不獲已事必獨入者以念佛自持也若為女人下此句應譯置不應於女人身取能生欲想相下以露齒笑現胸臆女見皆動淫想故不樂畜下八戒煩撥年少弟子約十六七歲之僧言沙彌小兒約四五六歲之童言謂畜養此輩年既少小多不省事嚴訓之為乏慈寬待之為失教是皆煩於心有師資分者應戒也亦不樂下謂與少小者同共一師成兄弟行也處之和則致為師者疑其狎妮防之切則致為師者惡其猜狠是皆擾於念尤應戒者也凡此皆末世持經者杜譏毀免煩擾成安樂行也常好下定也承上文言謂由不親近八處則常好坐禪親近於定也此因持品或有阿練若納衣在空間等言謂彼納衣在空間所以輕賤我在人間者以我異彼所好也今既同彼常好坐禪間處修攝其心則彼雖假名無喧諍或亦可轉假而成真也以上戒定皆親近處之事行故曰文殊師利是名等復次菩薩下慧也釋成修攝其心之修法觀即能觀之慧心一切法空即所觀之理境謂菩薩因於間處修攝其心觀得蘊界處等一切法當體全空也如實相者謂一切法空非斷滅之空乃如實相空而不無也惟其一切法如實相空而不無故菩薩心於一切法不顛倒不散動不退轉也此以內之實相喻外之一切法空而不無成色不異空空不異色之空假二觀也如虗空者謂一切法如實相之空雖曰有體然實如虗空廣大而無性亦不同遍計執空而為有故云無所有性惟其實相如虗空而不有故菩薩心於實相無所有性中一切語言道斷不生不出不起也惟其不生所以無名無相實無所有也惟其不出所以無量無邊也性其不起所以然礙無障也此以外之虗空喻內之實相實而不有成色即是空空即是色之中觀也但以下謂陰處界等一切法及如空之實相既皆不有今現言有者但以因緣有非本來有也既皆不無今現言無者從顛倒生故說無非本來無也不有不無為真實法身之相為持經者所應恆觀而親近者故云常樂觀如是法相等爾時世尊欲重宣此義而說偈言若有菩薩於後惡世至以此二處能安樂說此通頌二處事行若有下六句頌其標文常離下五十四句頌其釋與結文也又復不行上中下法至是則名為菩薩行處別頌行處理行又復下謂今經既會三為一凡菩薩之上法辟支佛之中法聲聞乘之下法皆為一乘實相妙法故復不行矣此頌長文又復於法無所行一句有為下謂既不行上中下小大三一之法又豈行世間蘊處界等之有為法出世間虗空擇滅非擇滅等之無為法有為無為既不行又豈行出世為實法世間為不實法耶以世出世間有無虗實皆如實相故此頌長文而觀諸法如實相亦不行二句亦不分別等者謂內心所證實相既亦不行又豈分別外之是男是女之相耶以上明即有而空之空觀不得下明即空而有之假觀謂雖內不分別實相外不分別男女然不得於上中下有為無為實不實男女等法不知不見而成斷滅去也此頌長文不分別一句菩薩於理行處如此故云是則等一切諸法空無所有至是名智者所親近處別頌近處理行一切下頌長行觀一切法空如實相及如虗空無所有性問長文有如實相頌中胡不應答實相即是蘊處界等一切法之空相故頌空無所有一句則實相及虗空相皆攝盡矣以凡夫見蘊等一切法為實不見本有實相為空聖人證入一切法空理名實相則蘊等一切法皆空幻矣此聖凡真俗理事所以一體而異用也無有常住長行無文亦無起滅頌長行不起長行無不滅頌文補之是名智者下頌結文顛倒分別諸法有無至安住不動如須彌山再頌行處理行顛倒下是近處從顛倒生故說之句今云再頌行處理行者以二處事行有異二處理行皆同故譯師即近處理行頌行處理行見理一而事萬殊也行處理行有亦不行不分別句故頌謂無顛倒者固不分別而有顛倒者則分別諸法有無是非虗實生滅也在於下謂持經者既知有顛倒者分別諸法則當於山林空間之處修攝無顛倒不分別之心使安住於一乘實相中如須彌山王之不動也僧問云門下一念不起時如何門云須彌山此也觀一切法皆無所有至常住一相是名近處三頌行處理行觀一切下謂不唯近處理行觀一切法空無所有即行處理行亦觀一切法皆無所有如虗空也無有堅固下謂不唯近處理行無有常住即行處理行一切法亦無有堅固也應知無堅固即無常住言別義同不生下謂不唯近處道理無起滅即行處道理亦不生出動退也常住一相者謂不唯行處道理安住不動如須彌山即近處道理亦因觀一切法不生出動退而內心所證實相亦常住一相也應知上云不動如須彌山此云常住一相法喻各明若有比丘於我滅後至能於後世說法華經此結答文殊也若有下謂未來世持經者當依經入行行所當行近所當近則心不怯而神不弱也菩薩有時下上云比丘此云菩薩謂末世持經比丘即菩薩也故或有時入靜以正其憶想分別之念而隨經中所詮義理觀於蘊等世出世間之法先得其本而自利也從禪定下謂既得自利又當利他而為國王等開暢佛之知見也文殊下身之行近為四行之一法既先戒勿親近國王王子等今復云為國王等者以除自不親近彼彼為法來則可近也又文殊師利如來滅後至而為解說令得一切種智又文殊下標起安樂行在佛滅後說經者正其語口宣說是對衆之語若讀經時是自課之語下謂或說或讀俱不可說人與經典過則語而安樂也亦不輕慢下正出可說過之人諸餘法師謂宣說餘經典者他人不說餘經典者聲聞又異乎餘法師及他人者稱名說惡則其人畏難而不進於大稱名歎美則其人安卑而不捨於小也故皆不可說彼之過又亦不生下謂不唯不形美惡之言於口亦不措怨嫌之事於心以畜諸心必發諸口故善修下結應住安樂行一句發明正語業之益謂由不生怨嫌於心故致聽者不逆其意由不形美惡於言故雖問以小而不妨答以大使問者聽者皆得一切種智也爾時世尊欲重宣此義而說偈言菩薩常樂安隱說法至算數譬喻說不能盡菩薩常樂下謂菩薩要安樂說法先須安樂之具具有四一地二床座三澡身四新淨衣身為內地等為外故曰內外俱淨等若有比丘下謂由有安樂具故得安樂衆也衆有九比丘等為四國王等為五以微妙下謂由具衆安樂故成安樂益也益有三一義妙顏和以益觀聽二隨難而答以益咨請三以權演實以益漸頓謂以因緣等分別小中大三乘之權而答問難者使發大心由漸而頓權而實增益入於一乘佛道也除懶情下謂欲成就安樂之益須除不安樂心從于安樂心也懶惰等心是所除慈心是所從晝夜下謂由慈心說法獲其大利大樂也安樂有五一晝夜無間說二緣喻無量說三咸令歡喜說四不望四事說五願己與衆同成佛道說此句最重故曰是則大利等問上云因緣譬喻此又云以諸因緣譬喻豈不贅耶答上為三乘故以方便漸漸言此為一乘故以無上道言緣喻名同而義別也我滅度下結答當機謂末世說法者能如上說不唯不招危害方且具功德不盡也心無下謂說法者安樂不致外侮有五一無憂愁二無罵詈三無怖畏四無刀杖五無擯出凡此皆由說法者心無嫉惱安住無生法忍所致故曰安住等以上不招危害智者下具功德也又文殊師利至供養經卷恭敬尊重讚嘆又文殊下標起持經者於法欲滅時而己不欲滅在先正其意也意業不正處雖多然嫉妬諂誑四法為重故曰無懷嫉妬等唯識論云嫉謂殉自名利不耐他榮妬忌為性諂謂罔他曲順時宜矯現方便為取他意誑謂詭詐為性邪命為業論中嫉妬直一法經作二法訓以經為持經菩薩人說論述凡夫心所故略不同亦無下雖似另說其實是釋成之語以嫉則多輕罵故妬則求其長短故若比丘下正是具長短小中大三乘之人無得下釋成其諂故誡勉無得因惱其人而諂言汝等去道甚遠終不能得一切種智令生疑悔也以小乘人元畏佛道長遠久受勤苦乃可得成故今雖曲順彼宜似諂其實是惱彼之辭所以下雖徵釋其諂其實是寓輕罵之義故云汝是放逸等又亦不應下釋成其誑以誑則多戲論起諍競故以上是勸誡勿致不安樂義當於下是教誨得安樂義一一翻於上文謂因不嫉故於一切衆生起大悲想而愍之不妬故於諸如來起慈父想而尊敬之不諂故於地前三賢位諸菩薩起大師想而從學之於十方地上諸大菩薩常應深心而恭禮之問孰敢妬佛而於如來起慈父想訓為不妬答彼土六師提婆此方唐宋諸儒等皆是也曰彼皆示現曰凡菩薩有隔陰無明未開悟時實生嫉妬逮開悟後名示現也不誑故於一切衆生平等說法不為愛者多說否者少說也故曰以順法故等謂順法性本無多少愛憎故文殊師利下結其上文成四法中之第三行謂由我不侮人而人自不來惱亂我也得好下謂不唯不惱亂我而反得為同學兄弟行也亦得下又得其師資也聽已下謂今日為弟子者他日又以妙法為人師所謂象王行而象子隨一燈滅而一燈續正法久住於世三寶種所以為不斷滅矣爾時世尊欲重宣此義而說偈言若欲說是經當捨嫉恚慢至無量衆所敬若欲下四句頌標文不輕下十六句頌釋文不輕幭於人頌不嫉亦不戲論法頌不誑不令他疑下頌不諂是佛子下頌不妬慈悲下頌三想破於下頌平等說法第三下頌結文上二節及此節詳明著如來衣坐如來座下節詳明入如來室也又文殊師利菩薩摩訶薩至諸佛神力所護故又文殊下後末世者謂非法末之初中乃最後末世佛法欲盡滅之時也於在家下標起第四行在家謂優婆塞等出家謂比丘等僧俗四衆雖備佛法內護尚未得常樂我淨之大涅槃故於此等生大慈心思與其樂也非菩薩即親近處戒勿親近八種之人雖有佛性未備佛法外護尚多貪欲不信三寶必墮三途者故於此輩生大悲心思拔其苦也應作下釋成其慈悲之大謂應念僧俗四衆及非菩薩之人或多邪智或持高位終身行止有大過失失於十方三世一切諸佛如來方便隨宜所說妙法而不聞不知不覺缺其自性宗通也又失於愩高我慢不問不信不解缺其稟受師承也此失者所以為有大苦而念者所以為有大悲心也宗門耆宿問禪者云世間何物最苦答云阿鼻地獄宿拈禪者衣云不也向此衣線下不明大事是為大苦此也其人雖不下謂僧俗四衆及非菩薩之人雖以無心失於聞問此經然持經者不可以有心而不度彼因中縱不能度必發願至於果上得阿耨菩提時隨其人在四生九類之何地我當以神力智力普現色身隨類而化務引彼令得住是妙法之中聞而知問而解也是現前大失者異日必大得也此得者所以為有大樂而引者所以成大慈心也故云引之令得等文殊師利下結前起後謂末世說經者能行此第四大慈悲行不唯無過失猶得內外護供養敬禮也虗空下謂不唯人恭敬而三界諸天亦因法而來侍從也若在下謂諸天不唯說時隨侍即不說經時恐人來難問亦晝夜恆不離左右也所以然者以說時默時皆與妙法相應故所以下徵釋謂所以說默皆得天龍護衛者以此經是三世佛神力所護故經在佛在佛在天等不得不來佛天既護念其經則不得不護念說經之人也此為下節張本照應法師品此經是諸佛祕要之藏不可分布妄授與人諸佛世尊之所守護從昔以來未曾顯說等文應知行處云住忍辱地等者是照著如來衣也近處觀一切法空如實相等者是照坐如來座及佛為現清淨光明身也此節大慈悲是照入如來室也四行結文凡言得人天聽受是照精進心所感佛道化之文也文殊師利是法華經至乃與汝等而敷演之文殊師利下申明上節為說喻之本謂此經無量國中名字難聞者為三世諸佛神力所護也今得親見而持誦者為佛四無量心所使也此所謂我得阿耨菩提隨在何地以神力智力引之令得住是法中也文殊師利譬如下喻無量國中名字不可得聞一句有三科初王具威力能討小國不順命者二王見兵衆下王喜討伐者有功隨功賞賜其賞賜有六項一田宅二城邑三衣具四珍寶五象馬車乘六奴輩人民此喻佛四十年前隨機所宜而說諸經也三唯髻中明珠下王有至寶置在頂上不在賞例以是傳國之寶一賞則致王眷屬驚怪此喻四十年前雖身子等疑以小乘法見濟佛亦不說此經也文殊師利如來下法合喻中初科以佛合聖王禪智合威力得法性土王三界合降伏諸國諸魔不伏合小王不順賢聖諸將與戰合起種種兵而往討伐王種種兵謂象馬車步佛賢聖諸將小乘須陀洹等為賢阿羅漢為聖大乘信住行向為賢十地則為聖其有功下法合喻中次科謂四十年前佛喜小大三乘人修行有功而說九部之經也若合王之賞賜一禪定合田宅二解脫合衣具三無漏五根合珍寶四無漏五力合象馬車乘五諸法之財如念勤意定七覺支八正道合奴輩人民六賜與涅槃合城邑也而不為說下法合喻中第三科謂佛四十年前畏機小不說此經如王恐致眷屬驚怪不與傳國至寶之髻珠也文殊師利如轉輪王下喻何況得見受持讀誦一句謂王先不以髻珠賞者以兵衆功小不足以當之也後見兵衆有功大者心喜之甚雖難捨髻中之至寶一向不妄與人而今亦與之也此喻佛四十年後見身子等嗚呼自責故說此經而授與劫國莊嚴十號等成佛之顯記也故法合云如來亦復如是等於三下謂佛以大法稱王非世間輪王同也以法下謂佛以法化衆生非人王強力威勢等也見賢下謂佛弟子都是聖賢雖喻之曰軍非象馬車步諸兵奴類也與五下謂賢聖之戰乃戰自己身心所具之魔非戰他小國例也有大下謂功大乃滅三毒之苦曰出三界之苦果破衆魔之孽網非奪人性命害人家國貪瞋癡之惡也爾時下謂佛之賞賜說此妙法能令人離苦得樂至成佛一切智之彼岸非輪王髻珠可喻也一切世間下謂借人王為喻使見說此經有勝於被伐諸小國多怨於輪王也難信此經尤勝於難信賞髻珠也先所下結謂有此多怨難信故四十年前不說今四十年後佛涅槃時至衆又清淨故佛不暇顧怨亦直得說之也文殊師利此法華經下法喻雙結謂此經名字先不可得聞見有愈於王珠而今得見聞受持讀誦又有勝於王之賞大功也是以為諸佛第一之說然有四種第一此明甚深第一故引喻而結如王髻珠深居九重之內也故曰如彼強力等二祕密第一如王髻珠唯王自知一切內外小大臣工皆不得而知故曰文殊師利此法華經諸佛如來祕密之藏於諸下三最上第一如王髻珠唯置於王之頂上也長夜下四不妄說而說第一如王髻珠日夜自護自非功蓋天下可以繼紹寶位者不賞故佛一向不妄宣說而今始說以法會應成佛之時至也爾時世尊欲重宣此義而說偈言常行忍辱哀愍一切至是人得大利如上諸功德頌文共計一百五十句初爾時下十六句頌前節第四大慈悲行之文可解次譬如下四十二句頌法喻交明之文可解三我滅度後下六十八句四諸佛身金色下五字成文者二十四句共九十二句為發起下品而總頌安住四行者之功德也我滅下求自覺也欲得下覺他也應當下謂欲自覺覺他得安隱須親近前所談之四行也讀是下謂能親近四行讀經則意恆無憂惱身恆無病痛由是顏色鮮白可謂有中形外現生三業安樂也不生下來世三業安樂也衆生慕如賢聖天童以給使用正意行之所感也刀杖不加下正身行之所感也若人惡罵下正語行之所感也遊行下謂內德既盛外侮滋消故行如師子王慧如日光照皆大慈悲行之所感也以上現生後世晝分之功德若於夢中下現生後世夜分之功德故妙事以夢見言初見諸下夢見諸佛先說三乘法之妙事次又見下夢見自身亦說三乘法之妙事三又見諸佛下夢見諸佛後說一乘法之妙事四見身下夢見自身因聞一乘法得總持門證不退地具足因行之妙事五佛知下夢見諸佛因知己得總持證不退入道之深故與授劫國莊嚴之顯記成就果德之妙事以上五事約三世言六又見自身下約十方言謂夢見自身因佛與記後即入山林證實相以禪定而會集十方分身諸佛之妙事也諸佛身金色下釋成其夢見諸佛相好皆由聞法說法自利利他故感得常有是好夢也又夢下以國王而捨家出家之好夢行詣下詣道樹之好夢求道下得果之好夢成無下轉法輪之好夢為四衆下小乘法輪說無下大乘之法輪後當下涅槃之好夢六種妙事明三阿僧祇劫之功德唯一夢五種好夢明一生補處唯一夢既皆一夢末世住安樂行持經者有何弊惡之難忍哉若後惡世下四句結前起後伏為下品張本妙法蓮華經從地涌出品第十五從地之地即菩薩摩訶薩住忍辱地之地涌出者明無量菩薩皆由先安住柔和善順堪忍地所涌出也此品解釋上品伏疑發其下品壽量而應至囑纍品完寶塔中佛欲以此妙法華經付囑有在之案解釋伏疑者上品既教諸菩薩安住四行則得廣說之善道致聽受者多而衛護者衆末後又說長夜守護不妄宣說恐疑者謂佛既自己長夜守護不妄宣說何以獨教法會發願而廣說佛既因中安住四行廣說此經則果上應得無量無數大乘菩薩為弟子何乃靈山許大法會寥寥然僅得有數聲聞受記豈佛於四行尚不足乎有此展轉伏疑諸菩薩頷之而未及措諸口故假地方國土諸來之衆請願此方受持為發端而從地涌出六萬恆沙等衆見佛因中三無數劫發願之大住行之深說此經之廣致所教化弟子有如是無量無數之多且盛也然後諸懷疑者始知靈山一會雖法說三周記授萬衆莫過示佛與衆生共有之智慧力涌塔變土按衆處空莫過示佛與衆生共有之神通力雖然如是總顯吾佛世尊一生補處最後身所具之壽命功德耳若夫三大阿僧祇劫持此經所得智慧神通壽命功德眷屬為十方三世諸佛所獨有者苟非遇其人則長夜守護不妄宣說矣故六萬恆沙等衆涌出後之必假一生補處若彌勒菩薩者為當機問答其本末因緣發起我佛久遠劫業已成佛之壽命功德便末世持經者不可但通近跡廢忘遠本以蹈文殊之責棄捨所習誦廢忘不通利也故曰從地涌出品爾時他方國土諸來菩薩至護持讀誦廣說此經爾時謂說訖安樂行品之時他方者三變淨土外之他方也過八下一恆河長四十里其中沙已無數而復過八恆河沙數以沙派人多不可量也後起疑中云八千恆沙則千倍於此而白下他方之衆聞佛說四行訖知末世說經之善道在求諸己不求諸人遂知此土未必盡如持品諸畏難發願他方持經者之言故請願捨他方來此土廣說也故云世尊若聽我等等爾時佛告下他方之衆雖是好心然亦小看娑婆世界無人物矣故云止等所以下徵釋謂所以先求其人發願及得人而復止者何也非佛有拒絶不相容之意以我此土新得記者固畏難尚有佛舊所化不畏難者在故云我娑婆世界自有等佛說是時娑婆世界至此界虗空中住佛說下謂佛才對他方菩薩說此土有衆持經之時果然娑婆世界大千地裂佛舊所化無量之衆從下而涌出也是諸下謂涌出之衆雖名菩薩其實都具佛之相好光明也先盡下謂涌出之衆雖居地下其實大千地下尚有虗空世界也晉書天文志云日晝行地上夜行地下苟地下不空日何行焉此表諸法空為座之空見末世持經者外雖忍辱同地而內則空空如也是諸菩薩聞釋迦牟尼佛至算數譬喻所不能知是諸下謂諸菩薩非無因而至乃由聞佛音故從地下虗空而發來於地上之虗空也一一下師也頭領也故曰皆是大衆等各將下弟子也散衆也謂一一為師者名帶來弟子有六萬恆沙之數也況將五萬下從多至少次第敘至千萬億那由他分之一皆以恆河沙計數也況復千萬億下亦從多至少次第敘至五四三二一弟子者則以垓數計衆也那由他云萬億在俱舍論五十二數中為第五之垓數故況復單己下敘單丁不領衆之人反多於領沙數垓數者無量無邊算譬不能知也初多寶釋迦同坐寶塔示佛知見不生不滅次龍女身垢往南方無垢世界成佛示佛知見不垢不淨此中領衆者固多不領衆者為尤多示佛知見不增不減然後謂佛壽命無量無邊無非俾人知己與諸佛法身總是諸法空為相真不可思議也是諸菩薩從地出已至不令世尊生疲勞耶爾時四大菩薩而說偈言世尊安樂少病少惱至不令世尊生疲勞耶爾時世尊於菩薩大衆中至得聞是經入於佛慧爾時諸大菩薩而說偈言善哉善哉大雄世尊至聞已信行我等隨喜於時世尊讚嘆上首諸大菩薩至發隨喜心是諸下結上文故曰從地出已各詣下謂一齊出後而各詣虗空至多寶釋迦二佛前也到已下先致禮二尊者本師也及至下次致禮十方佛者本師之分身也故以種種讚法而讚嘆之住在下謂讚訖十方佛而各住在一面復瞻仰於本師及多寶也問奚不讚二世尊答於十方云讚嘆於二尊云瞻仰文互見也是諸下牒自涌出之始至禮讚十方三世之終雖在一時實經多劫也此所謂攝長劫於短劫不覺有其延促矣是時下謂當此延促一際之時佛及四衆即動而靜可謂默時說也五十下敘由佛即動而靜神力所持故令四衆謂修如短也問劫名何義答婆沙論云分別時分故名為劫問五十小劫該多少時分答准論劫有三種一中劫二成壞劫三大劫中劫復有三種一減劫二增劫三增減劫減者從人壽無量歲減至十歲增者從人壽十歲增至八萬歲增減者從人壽十歲增至八萬歲復從八萬歲減至十歲此中一減一增有十八增減名二十中劫經二十中劫世間成二十中劫成已住此合名成劫經二十中劫世間壞二十中劫壞已空此合名壞劫俱舍論云如是所說成住壞空各二十中積成八十總此八十成大劫量纍大劫量為十百千積成三無數劫准論中大劫可知未見小劫之說故依論覆折小劫亦可見以論既總各八十中劫成一大劫則覆折一大劫為八十中劫覆析一中劫為二十小劫則五十小劫是析兩個半中劫所成然每一小劫該人壽十歲增至八萬歲復從八萬歲減至十歲則五十小劫經過如上五十番之增減攝在一時佛之神力可思議乎而文句云劫是時節數耳非三災外物為小劫也若然則授記諸聲聞成佛壽命不合止得三十二二十四等時節之短壽婆沙比丘問劫義佛言劫量長遠非百千等歲數可知如是則小劫非是尋常時節小數明矣以上明十世古今始終不離於當念爾時四衆下明無邊剎海自他不隔於毫端四衆雖俱悟入佛之知見得此劫剎修短無礙然尚未至究竟覺故兩皆歸功於佛之神力也是菩薩下徑應四安樂行為名大慈悲為室名上行以慈悲為諸行之上故諸法空為座名無邊行以法空無邊故不懈怠無希望名淨行住忍辱地名安立行以忍始能安立佛法故上標六萬恆沙等衆表師資或具六度此以四攝法為六度之綱領故曰於其衆中最為上首等以上敘師資相見之義師有三世十方之分資有三業殷勤之禮著約多寶及十方分身言在大衆下敘問訊本師盡契濶之情故不及多寶唯曰各共合掌觀釋迦佛也問訊以少病少惱為辭者娑婆世界堪忍之體如是故故前集分身佛後妙音菩薩皆以此為言也敘涌出之衆數延促之劫量何等難思及敘問訊不異世能此又見娑婆世界堪忍之相用也少病約身言少惱約心言照安樂行讀是經者常無憂惱又無病痛約自利問所應度下約利他問偈中世尊安樂下問教化大乘機不致病惱又諸下問教化小乘機不致病惱爾時世尊下總答不致病惱諸衆生下別答所以不致之義所以下徵明教化大乘機不致病惱除先下申明教化小乘機不生疲勞爾時諸大菩薩下上明多衆初見寒溫儀不可亂故但敘四衆為唱導首此寒暄既敘禮宜俱讚故不問師資沙數垓數單數同聲讚和佛德故以諸大菩薩為言善哉下七句即佛答辭述讚我等隨喜一句謂己咸樂隨喜除先修學小乘者今亦得聞是經成其大機見佛將大就小會小成大之妙用也故佛亦善諸大菩薩不以先後小大新舊久近為礙也故云於時世尊讚嘆等爾時彌勒菩薩及八千至合掌供養問訊如來爾時等者准華嚴疏彌勒具云彌帝𨽻此云慈氏姓也有三緣一緣過去劫值大慈如來願同其號二緣得慈心三昧三緣其母懷時有慈心故名阿逸多云無能勝以生具相好功德人無能勝故乃釋尊授記當來成佛補處慈尊及八千下皆補處位菩薩有如是之多而同作念也我等下釋成作念上明遠本能隨喜近迹此明近迹頓廢忘遠本爾時彌勒菩薩摩訶薩至合掌向佛以偈問曰無量千萬億大衆諸菩薩至為從何所來爾時下敘當機具他心通知衆同己疑并欲下謂苟衆疑己不疑己可為決苟己疑衆不疑衆可以咨今人己皆疑故說偈問佛此照前第二節為問無量下指其來衆昔所下謂素不相知故求佛說其來處及來之因緣此二句重問第二節既云先盡在娑婆下界虗空中住當機奚不見知而更問答一則第二節是經家敘置非佛之語一則娑婆有三千大千之別未知居若箇娑婆下界故示其廢忘章句而求說其通利也巨身下報身智慧下法身其志下應身此頌見諸菩薩身皆金色等文具此三身三德衆生所以樂見而問其來之方也一一諸菩薩所將諸眷屬至猶不能盡知此照長行第三節問一一下總頌師資之數無量故恆沙不以數明或有大菩薩下十六句別頌師資之沙數千萬那由他下八句別頌師資之垓數單己無眷屬下四句別頌無眷屬之單數亦無量無邊無數之多長行沙數垓數皆從多至少唯單數反多於沙數垓數頌中即沙數垓數領衆少者亦反多於領衆者之多也如是下結多少皆難籌量是諸大威德精進菩薩衆至皆從中涌出此照長行第四節問准下頌是問本末因緣四義是諸下圓牒指上數有威德而具精進之衆也精進六度之一乃成就佛道之因誰為下誰何也謂此精進威德之衆是何佛為其師傳說法教化成就於佛道也說法教化四辨之總故為精進者之緣從誰下問從誰佛發心得成佛之本約自覺言稱揚何等佛法受行何等經典修行何等佛道通約自覺覺他言為成佛之末如是下結謂如此因緣本末諸大菩薩神也智也不從他處來乃從四方裂地而出是事大奇也問何處見諸菩薩具神智之力與精進也答如是時間經五十小劫遍禮讚三世十方諸佛問訊本師非精進神智而何世尊我昔來未曾見是事至惟願決衆疑此頌長行第五節世尊下當機謂己從佛以來未嘗見有多衆從地出之事也願說下申請是從何所來一句及請來之國土名號也我常下謂所以請國土者以己遊諸國未曾見是衆故於大衆中不識一人也忽然下申請以何因緣集一句謂我既不識彼一人今忽從地而出願說其來之因緣也此所謂棄捨所習誦廢忘不通利號之為求名也何則法師品佛既許末世持經者佛與同宿衣覆又許遣化四衆八部為聽衆使不逆說法者之心而寶塔品會三世十方諸佛證其與釋迦同宿之護念以彼例此則知今地涌之衆亦是證明佛於三無數劫持經自證清淨光明法身佛所遣化為不逆其心之聽衆也奚更求說國土與名號哉彌勒所謂忘失章句矣以上請決當機一人之疑今此下代八千恆沙衆請決其疑結證序品光中所見第五事諸菩薩摩訶薩種種因緣種種信解等文寶塔品變土但變八方而上下二方未曾云變今諸菩薩從下方涌出後神力品虗空諸天高聲唱言則屬上方十方具矣此中本末之因緣一句結證方便品如是因如是緣如是本末究竟等故知音以因緣本末為訓也自非一生補處慈尊示疑而佛壽量章句何得通利此又慈氏為末世持經者建大慈悲之室也爾時釋迦牟尼分身諸佛至汝等自當因是得聞爾時下牒起分身其佛下分身佛侍者亦同彌勒等動疑問此所謂主伴重重極十方而齊唱也證上頌今此之大會皆欲知此事爾時諸佛下謂既有當來現在佛問答須俟而聞之吁分身諸佛該多小數三變土該多少大佛一音而遍令法會得聞所謂圓音落落該十剎而頓周矣何玄哉思之令成其觀彌勒授記事出北藏中阿含經第十三卷聖字函爾時釋迦牟尼佛至欲重宣此義而說偈言當精進一心我欲說此事至汝等一心聽爾時下佛善當機能問大事上頌云本末因緣此云大事則分明談諸佛為一大事因緣出現於世之正宗詎遑蚤判入流通分哉汝等下鎧甲胄也曲禮疏云謂鎧為甲者言如龜之有甲也胄兜鍪也謂彌勒等問事既大須得精進波羅蜜為其甲胄則發意如堅牢穩固無所撓動也以彌勒在日月燈明佛法中心常懷懈怠故以此勉之如來今欲下指通部言以此經凡所顯示皆諸佛智慧故諸佛自在下伏指壽量及分別功德兩品言以壽量品即遠即近在此即在彼示己即示他分別功德品聞佛壽量得功德者皆是諸佛自在神通之力故諸佛師子下伏指神力囑纍兩品言以出廣長舌上至梵世放毛孔光遍照塵剎滿百千歲始收彈指謦咳之聲伸一臂手遍摩無量菩薩衆頂囑纍其經如是迅速之狀皆是諸佛師子奮迅之神力故諸佛威猛下伏指法師功德及常不輕二品言以法師品用常精進菩薩為當機示為法師者常於此經精進勇猛故常不輕品以得大勢菩薩為當機示為法師者能不輕於增上慢人則為得大勢力故此中苟不伏指前後諸品則諸佛智慧神力皆無所據縱多配合咸屬牽強也偈中當精進下頌諸佛智慧汝今下頌諸佛自在神通此經二乘非信力不能實知十地非忍惡不能廣說今慈氏等位居補處出於二乘地在等覺越乎十地故云出信力住忍善中也我今下頌諸佛師子奮迅所得下頌諸佛威猛問奚不伏指隨喜功德品答法師功德品攝故此節因所問事大故特加勉勵下節會通本跡如問而答爾時世尊說此偈已至欲重宣此義而說偈言阿逸汝當知至我從久遠來教化是等衆爾時下許答當機阿逸多下對牒問中是諸大威德句以領其因我於下對前誰為其說法二句以答其緣調伏下對前從誰初發心以答自覺之本此中我字對問中誰字言是我釋迦佛調伏此衆發心也此諸菩薩下對前願說其所從二句以答其來處於諸經典下對前稱揚何佛法三句以答覺他之末謂此衆大小乘諸經皆通利也思惟下釋成通利以上答是從何所來以何因緣集二問已阿逸多下申明住下界虗空義謂汝問常遊諸國未見是衆者以此衆不樂在衆多有所說常樂靜處精進無息是以汝未曾得見也亦不下謂汝問於此衆中不識一人者以此衆初不依人天而住是以汝不能識也良由此衆精進彌勒懈怠此衆讀誦通利彌勒棄捨廢忘此衆不依人天彌勒好族姓一一背馳安得見而識哉常樂下申明不依止人天者以人天智淺障深此衆樂深智無障也亦常下申明稱揚何佛法修習何佛道義調此衆不唯樂我釋迦一佛法道亦常樂習十方三世諸佛法道也一心精進下申明以何因緣集義謂此衆為求成佛無上之慧有此因緣而來集也偈中阿逸汝當下頌牒答其因也悉是我所化頌答其緣也令發大道心頌答自覺之本也此等下頌答誰為其說法二句也依止下頌答其來處也寶塔品集分身佛照信解品並會親族國王大臣等言此中照此是我子我之所生之言後囑纍品照凡我所有舍宅人民悉以付之之言常行下頌答申明未曾見是衆也如是下頌答稱揚何佛法修行何佛道長文答樂諸佛之法頌答修行我道法佛與諸佛互言也晝夜下頌答以何因緣集之言在娑婆下頌答申明於衆不識一人長文答以不依止人天頌答住下方空中義錯綜也志念下頌答申明此衆所以願住下方者以自利則便於堅固勤智二度利他則便於說法無所畏也我於下為下節張本長文云我於娑婆成菩提一娑婆該三千大千之廣大佛以遍法界身化從地涌出之衆本迹相當似無可礙故頌復以伽耶成正覺為言伽耶乃閻浮提之一城其地最近而人可到轉法輪之時最少而人可知而涌出之衆德盛人多彌勒等曾未見未識今云是其教化發心住不退地悉當成佛則本迹實不相逮也此彌勒等於下節所以生父少子老之疑也故長行與頌不同有以也我今下誡信謂以上酬答汝問皆佛實語彌勒等當信也我從下照方便品我從久遠來生死苦永盡等文為壽量品伏案前云伽耶成佛近地所化此云從久遠教化以近迹不異遠本久衆即為新化彌勒等益難信也非謂佛法身壽量之長示現報化身之短人惡乎能知奇哉聖經豈容易知耶爾時彌勒菩薩摩訶薩至聞此事己亦不生疑爾時下當機領上文起疑怪之念云何少時領上頌我於伽耶城等四句教化下領上頌爾乃教化之等四句為案也即白下述疑怪之念質於佛謂佛為太子時出釋宮去伽城不遠捨俗出家得果之地甚近也從是下謂自從得道已至今日始過四十餘年其時又甚少也云何下謂云何於此近地少時能大作佛事云以佛勢力功德教化如是從地涌出無量之衆當得阿耨菩提耶此誠可疑也佛勢力領前諸佛威猛大勢之力佛功德領前諸佛智慧自在神通世尊此大下申明事大謂此大衆算數無邊非伽耶城之近地可藏也斯等下申明德盛謂此沙衆實久遠劫來於他無量諸佛之所植德非釋尊四十年少時可化也今以他諸佛所久遠植德之沙衆云是佛得菩提已來所化自非獵取他有乃即成誑言故尤可怪也世孰能信哉故曰世尊如此之事等世所難信對上我今說實語汝等一心信譬如下喻近地少時能成大事固可疑其百歲下喻衆多德盛成於近地少時為尤可怪老人指少年為父世有從父之子似不足疑第云生育我等則是適親非從父之子比故難信也佛亦如是下法合其喻得道未久合色美髮黑年二十五而此大衆下合其人已於無量下合其歲喻中但云具歲法中多具德為佛下具勤德善人下具定德得大下具通及戒德善能下十力四無所畏等德皆具巧於下具智慧辨才德也今日世尊下牒上指百歲人言是我子謂以彼久遠劫具德人中之寶世所希有之衆今日指是佛得道已來所化發心得果實本迹不相逮故我彌勒等言世尊得道未久乃能作此大功德事如父小兒子老世所難信也我等雖復下謂我等是佛弟子雖信佛隨宣方便言實智通亦但能取信於現在諸新發意者既居佛滅後恐未必信而反謗也唯然下謂佛能解我現前大衆之疑不慮未來世人之不信也問喻中有少父指老子老子指少父法中但合少指老不合老亦指少何也答究文應有乃譯人忽略然義直重父少子老一邊故不合老指少也問經文何處見老認少為父答前初涌出時禮讚三世十方訖然後獨問訊釋迦是老認小處爾時彌勒菩薩欲重宣此義而說偈言佛昔從釋種至教化令發心而住不退地佛昔下二十句頌爾時彌勒起至世所難信止之文譬如下八句頌喻可知世尊亦如下十六句頌以法合喻之文我等從佛下十二句頌但能取信現在等文求會通本迹發起下品也妙法蓮華經如來壽量品第十六如來是諸佛獨得十號第一之尊稱壽量是諸佛與衆生共有涅槃四德之實相初身子等諸分別解說此實相時而佛告以諸佛世尊唯以一大事因緣故出現於世是諸佛之有生也有生則壽在後樂說等諸會證此實相時而佛告以如來不久當入涅槃是諸佛之有滅也有滅則壽之量盡矣今欲顯諸佛出現於世特報化身佛之近迹為衆生作開示緣示有生法身如來之遠本實不生也如來不久當入涅槃亦報化身佛之近迹為衆生作悟入緣示有滅法身如來之遠本實不滅也不滅不生故云如來壽量品方等第六經云壽命無盡名不共法何以故得法身故且以免法會之疑萬二千聲聞成佛壽命或云二十小劫或云無量阿僧祇劫其壽數如彼之長而釋迦壽命反如此之短殊不知諸佛壽命各隨願力及衆生善根所感皆約報化身說若諸佛衆生同體法性身之壽命非世間延促修短所可量也然必先涌沙衆以發端者明會新權以歸舊實不問報化身佛聲聞菩薩久近之機總成究竟不滅不生一清淨法身佛矣然後唯佛與佛之諸法實相始為究盡而如來是諸法之王若有所說皆不虗矣一經所談佛之知見至此為極涌塔變土集分身出地衆一大事本末因緣至此為暢前云如是大果報種種性相義等此也寶積第一百之十六經佛問文殊汝謂如來出現於世耶文殊云若有如來出現於世一切法界亦應出現佛言汝謂恆沙諸佛入涅槃耶文殊云諸佛一相不可思議不思議相無生無滅不思議中無過去未來現在相但衆生取著謂諸佛有出世滅度耳吁先得我心哉爾時佛告諸菩薩至惟願說之我等當信受佛語爾時下承上品三番是事難信而亦三度誡勉共信解也如來誠諦完藥草喻如來是諸法之王若有所說皆不虗也之義照上品我今說實語汝等一心信之文是時菩薩下謂依上品必不能信須佛解說其本末因緣方能信解故三白已復四番請惟願說之為下節知諸菩薩三請不止之案應知自方便品已來是明大事因緣相性體力果報之如是自此至經經終是明大事因緣本究竟之如是故佛必再三勸而諸菩薩必再四請也爾時世尊為諸菩薩三請不止至那由他阿僧祇劫爾時下受上第四番請解說前頌我今說實語汝等一心聽我從久遠來教化是等衆之案故曰知諸菩薩三請不止等如來祕密下徑應上品諸佛自在神通之力惟其久近祕密始見自在此句實一品之大義也祕謂大事應不淺露密謂本迹固不易知神謂諸佛無漏精神命脉通謂在此即示在彼示己即是示他相貫通而不相妨礙力謂雖示此彼自他皆能令人有開示悟入佛知見之力用也一切世間下牒起當機如來為太子時等可疑之言即神通以標其近迹然善男子下釋明云何世尊於此少時大作佛事等可怪之義即祕密以標其遠本謂一切世間天人等皆與汝彌勒同但知佛捨俗出家得果說法神通中近少之迹而不知佛有祕密無量劫來已成佛訖神通中久遠之本也今既釋明則彌勒等所云得道甚近成就甚多父少子老之疑怪可化而為信解誠諦矣譬如下喻明遠本使見其無量假使下以抹塵所點國土使見其無邊諸善男子下教當機自審其邊量使見無數大般若第五百十六經云無量者量不可得不可量在過去未來法中故無邊者邊不可得不可測度彼法邊際故無數者數不可得不可數在一切有為法中故爾時佛告下以塵校劫明佛成道已來祕密遠本壽命更多于上譬良由一成等正覺得證法身實不可以世界微塵多寡邊量計其壽數也此與化城喻不同彼直以一箇三千大千世界為言此以五百千萬億等三千大千世界為言是能喻之數不同也彼喻佛之知見力無礙此喻佛成道已來之喜命無窮是所喻之事不同也自從是來我常在此娑婆至令入佛道作如是說此節明諸佛出現於世由祕密神通之方雖示現有生而實不生自從下謂佛自過無量塵點劫來娑婆本界無數餘國剎海固有此彼法身遍在教導此所以成祕密遠本也諸善下謂從塵劫以至今日之中間或說得然燈記為發心之始或言入涅槃為究竟之終報化非無生滅皆方便權智之分別此所以為神通近迹也故曰如是皆以等然燈等者准本行經等其勝一切佛蓮華上佛最上行佛上名稱佛釋迦年尼佛帝沙佛弗沙佛言真理佛乃至毗婆尸等七佛皆與釋迦授記也諸善男子若有下申明謂佛所以祕本示迹皆以方便分別者以佛用五眼中最明之佛眼觀衆生信等五根之利鈍而隨方應度於十方處自說名異年殊亦復現於寶塔中以大音聲言當入涅槃無非方便說微妙法令衆生發歡喜心也諸善男子如來下謂示近迹成道者為衆生樂小垢重德薄也然我下結前自從是來等文申昔祕遠本今不祕而開顯者以茲法會機熟彌勒等樂大不小德不薄而垢不重下品所以有分別功德之說也但以下結如是皆以方便分別一句諸善男子如來所演經典至雖不實滅而言滅度此節明諸佛不久涅槃由祕密神通之力雖示現有滅而實不滅諸善男子下申明下節又以種種方便說微妙法能令衆生發歡喜心成此中能詮之教所度之機或說下釋成如來所演等文說謂載於言者即能詮也己身他身有其迹者即所詮也如化城品佛為己身大通智佛及餘十五王子等為他身餘可類推示謂現於形者己身他身如寶塔品多寶佛為他身佛與分身諸佛皆己身事謂事業己事他事如常不輕以忍增慢持經為事己事也藥王以燒身燃臂持經為事他事也諸所下謂經典所詮自他身事皆佛與諸佛本具一法身所示現故皆為實而不為虗也所以下徵釋謂凡言說之虗謬出於知見之不如實今佛既皆法身如實之知見故或說己身他身皆實也以上為能知見三界下為所知見謂凡形相之虗謬緣於三界生死有若退出在滅之不如實今佛既皆法身如實之知見故見三界之相本無生死退出在滅故或示己身他身亦皆實也非實非虗下謂凡事業之虗謬成於執著或實或虗或如或異之不如實今佛既皆法身如實之知見故見自他事業非實非虗非如非異此或示己事他事盡皆實而不虗也不如下如同也謂佛所以說示自他身事皆實而不虗者以不同三界天人等知見有錯謬而佛明見無有錯謬也以諸下謂三界天人知見所以有錯謬者為有種種性情好欲行業憶想之分別也欲令下謂佛欲令三界有錯謬者種諸善根亦如佛明見無謬故隨彼性欲行想分別以若干緣喻說種種法由是所作佛事無暫時廢息成佛有過塵點劫甚大久遠之壽命實常住不滅也如是則無怪乎所成就涌出之衆甚多初非伽耶城近迹之可疑也已上明佛祕密法身遠本之不滅諸善下明佛所修報身壽命亦不應滅本行下因行廣也所成下果壽應長有倍上塵點劫之數也然今下指寶塔中唱滅言謂據佛所修報壽猶不當滅今便唱言滅者欲以滅度為度生之方便也所以下謂所以以滅度為教化方便者以若佛常久不滅而薄德者素不種善根之因感貧賤貪欲之果墮入憶見網中以己方人謂佛不滅亦同己貪欲住世視之為沒要緊起憍懷怠不生諸好心也由是之故佛不以法報身所具所感壽命之實告而以方便向諸比丘說諸佛出世之難值者以薄德者經多劫於佛或見或不是皆就應化身言也故曰以此事故等斯衆下謂斯薄德衆生不見法身之理一聞報化難遇之說先不生難想今則生之先懷憍恣今懷戀慕先懷厭怠今生渴仰先不種善根今始種之祕密遠本示現神道近迹有如此益故佛於法身實不滅中而言報化身之有滅也故云是故如來等又善男子諸佛如來法皆如是為度衆生皆實不虗此結上文兩節之義以為下文譬本又善等者謂不生示生不滅示滅非釋迦一佛創式乃十方三世一切諸佛度生方便之程法故皆為實而不為虗皆實不虗近應品首誠諦遠照方便譬喻藥草諸品言無虗妄之文應知要有此節三變土中多寶佛及諸分身佛之事皆完譬如良醫智慧聰達至於此好色香藥而謂不美此節喻諸佛出現於世由祕密神通之力雖生而實不生也譬如下良醫喻佛智慧聰達為良練藥治病為醫以上喻佛之在娑婆也以有下喻即遍餘國前節所謂自從是來我常在此娑婆世界亦於餘處等是也諸子於後下喻佛應緣他土此土衆生即依外道學執我然我執為生死毒根輪回無已故曰飲他毒藥等是時下喻佛他土緣畢出現於本土也諸子下喻受我毒有深淺也深者失其本心為下不肯服藥案淺者不失本心為下服藥者案遙見下喻佛首出庶物無論失心與不皆知喜敬拜跪身業問訊口業善安隱歸問訊之辭我等下述我病由癡誤也願見下喻求修證也父見下喻佛愍衆生因毒果苦也依諸經方喻佛遵十方三世諸佛即實開權之方便也求好藥草喻佛說諦緣六度等法也色香下喻諦緣等法初中後善具足清白梵行之相也搗篩和合喻十二部經互有大小乘見修證之對治也以上喻佛說法得法自在與子下喻教衆生如說而行必致出苦得樂故曰汝等可服等其諸下喻利根精進者如身子等千二百人昔除我執證羅漢今得受記作佛也餘失下喻鈍根懈怠者如五千退席初於序品未嘗不同衆禮讚及三請許說後各禮佛而退也故先曰見其父來等後又曰然與其藥等所以下謂所以先同禮訊求治後不服藥者何也以入毒深失心久故謂好藥而不美也父作是念此子可愍至尋便來歸咸使見之此節喻諸佛不久涅槃由祕密神通之力雖滅而實不滅也父作下躡上節餘失心者等而言喻佛愍薄德之人於佛起憍怠為貪等三毒所中傷成顛倒也雖見下發揮顛倒見父求療業屬其顛與藥不服尤為其倒我今下喻佛以滅度為教化衆生之方便也以上敘父念即作下敘父言喻寶塔中以大音聲普告四衆誰能於此娑婆國土廣說妙法華經今正是時如來不久當入涅槃也故曰我今衰老等是好下喻佛欲以此妙法華經付囑有在故曰今留在此等作是教以下喻又復言其入於涅槃是時諸子下有六義喻滅度化生之妙一聞父喪心憂二念父在能救三惟孤露無恃四悲感有悟五知藥色味美好六服藥病愈喻斯等衆生聞如是語生難想懷戀慕渴仰於佛便種授持讀誦此經得開示悟入佛知見之善根也其父下喻既得此經開悟佛之知見則見自己法身常住不滅是其父來歸也故曰咸使等諸善男子於意云何至如法說我虗妄過者諸善下問答喻無虗妄例法無虗妄故曰佛言我亦等此約法身祕密遠本結其不滅為衆生下約應化身神通近迹不滅示滅結其不生亦無下結完諸佛如來法皆如是等一節初彌勒等云如斯之事世所難信又慮佛滅後諸新發意菩薩起破法罪業因緣故此重重校量使知誠諦不虗下品所以分別聞此品者之功德也爾時世尊欲重宣此義而說偈言自我得佛來所經諸劫數至乃出為說法爾時下長文八節初節是誠信請說之辭例無頌故但從第二節頌起然頌第二節止得一行以長文唯重我實成佛已來無量無邊百千萬億那由他劫其塵點多之譬不過喻其上文故不頌也故曰自我得佛來等常說下即上文以頌第三節自從是來我常在此娑婆世界說法之文為度下頌於其中間我說然燈佛等文而實下頌然我成佛已來久遠若斯等文我常下申明謂佛既常不滅初未降王宮時何緣不見一是佛之神通使不得見二衆生顛倒障不能見也故曰雖近等衆見下謂衆生因不見與佛同體法身近而不滅但見應化佛身有滅故供舍利懷渴慕質直意軟唯願見佛不惜身命故感佛及僧俱出靈山說法身常住而不滅也此頌為是人故說我少出家等文大集經謂過去旃檀窟佛將涅槃時以天眼見非非想有一天人應度但遲八萬四千劫下生人間始合其時由是旃檀窟佛雖方便示滅而以定力隱密其身俟其人劫滿下世始為說法授記爾時唯其人見佛聞法餘皆不聞不見等此也以方便下雙結現生現滅皆方便也餘國下頌亦於餘處百千等文汝等下謂佛本在餘國說法汝等不聞便謂佛滅殊不知佛為苦惱深者不現應化之身逮生渴仰則法身又出說法矣此節頌諸佛出現於世由祕密神通之力雖生不生之文神通力如是於阿僧祇劫至久修業所得此頌第四節諸佛不久涅槃由祕密神通之力雖滅不滅之文神通下一行是結上節以諸神通力等之文今判頌第四節者以第四節長文如來所演經典說示自他身事皆屬神通力也故以如是為指法之辭然常在靈山及餘住處是頌第四節如來如實知見等文以如實知見即佛法身真如實知見故惟法身遍在一切處故常在靈山及餘住處此長文所以云三界之相無有生死若退若出等故舊刻云佛本不滅從略訓也今廣釋者見頌文應長行也衆生下謂佛雖不滅自衆生見有滅頌長文以諸衆生有種種性等文惟衆生有種種性欲行想分別錯謬故於不滅法身中見劫盡火燒也我此下依報不滅頌長文如來明見無有種種性欲行想分別錯謬故得寂光淨土之安隱也天人下正報不滅也園林下申明依報不滅之光景衆生下申明正報不滅之光景我淨下結明佛土依正不滅衆生依正燒盡而具憂苦者是有罪衆生惡業因緣所感致故多劫不聞三寶名也此頌長文薄德之人不種善根等諸有下結明隨佛居淨土之天人或寶樹以遊樂或擊鼓而散華於劫燒盡中見不滅者乃三有中修功德者之所感致故心和質直見其佛而聞其法永與薄德之人多劫不聞三寶名者異也或時下申明在此而說法有長短之不等謂為善根極深舊所化衆說法身之遠本故曰說佛壽無量長文所謂如是我成佛已來甚大久遠等是也久乃下謂為善根梢淺新得記者說應化之近迹故曰為說佛難值長文所謂或有見佛或不見者等是也我智下初云神通力此云智力慧光以神則示自他身事智則說自他身事故以上頌法身壽量不淺壽命下頌報應身壽量不滅長文所謂我本行菩薩道所成壽命今猶未盡是也故曰久修等汝等有智者至得入無上慧速成就佛身汝等下頌長文第五節謂汝彌勒等皆是有智之人既聞佛之法報化三身壽量遠本近迹皆是神通方便勿於此涌出衆生父小子老之疑將得道甚近成就甚多之不信當斷令永盡無餘則知佛語之誠諦不虗也如醫下雖總頌第六第七第八三節喻法之文其實申明初一行也謂所以教汝等信佛語實而不虗者以如醫善方便欲救狂子生而言死佛救諸苦患在而言滅也以常下謂佛何故實在而言滅也以衆生見佛常住而懷憍逸生則著欲死則墮惡故佛不滅而示現有滅耳以上頌完當品已我常下為下品張本謂所以我生而言滅滅而復言生者以我尋常知其衆生於道有行與否不能齊悟故於行道者說佛遠本壽長不行道者說佛近迹壽短此乃隨其衆生應可度者說種種法也每自下謂我雖四十年前說生滅不定種種之法然亦每自作意我以何法令此於道有行否衆生得一槩同入佛無上慧以成大因速成就佛身以成大果哉今說此經至佛壽量則無論彌勒身子等之新迹從地涌出之舊衆皆得速成就佛身及無上慧矣機無三根法無三乘佛無三身至此益明矣妙法蓮華經分別功德品第十七分別功德者謂大會聞佛法身壽命長遠各分證佛功德於自心所謂得入無上慧速成就佛身也如有得無生法忍者有得陀羅尼門等者而佛各與其分而別之使知生佛法身雖共一體隨機深淺證入而受用有萬殊也如一月當天隨水各分其形影故曰分別功德品此亦諸佛自在神通力所加庇也不然何談壽量於少時而力德遍於大會豈不速成就哉正照藥草喻品如來無量無邊阿僧祇之功德也爾時大會聞佛說壽命至三藐三菩提心爾時下經家敘置敘得佛無上慧速成就佛身也於時下佛召當機分別其功德總牒起上品所說之法也六百下別敘得功德者之數目也此中得功德之人身有六根之通別位有三覺三賢十地多生之等級一恆河長四十里沙無數量況六百八十萬億那由他之恆河沙佛皆知其數一沙一人有如是衆聞佛壽量得無生法忍之功德也准楞嚴經是得乾慧地及十信位之功德者以楞嚴無生法忍列在三漸次後乾慧地前故准仁王般若經是得第七遠行第八不動兩地之功德者以仁王五忍無生法忍居伏忍信忍順忍後寂滅忍前故彼經云無生忍菩薩所謂遠不動觀慧等准本經以衆生為言衆生雖九法界之通稱然實約一向未成佛者而得名若據上頌得入無上慧速成就佛身為言則此六百八十萬等恆沙衆生皆圓頓機一證一切證雖在乾慧十信不妨即攝十地等覺於二經俱無悖矣但約位次第而訓楞嚴為正若約六根而說此無生法忍該通六根以根根塵塵皆法身之無生將此無生之理忍可於心故復有千倍下謂有千倍於六百八十萬億那由他恆河沙之菩薩也菩薩是將成佛未佛成之名為能得功德之人得聞持下明所得也聞謂耳根持謂住持陀羅尼云總持謂耳根中聞法身無生法忍之理能總一切法持無量義有聞與合故曰門楞嚴經云則汝法身同於斷滅其誰修證無生法忍是也准位是得十住位之功德者以持字中有住義故以上兩項為三覺中之自覺皆約沙計數也自下十種約塵計數初復有下一世界即四大洲中一閻浮提之世界也然世界成於微塵以塵派衆數又愈於千倍六百八十萬等之沙衆也得樂說下謂此塵衆聞佛壽命長遠得四無礙辨才中之樂說無礙辨也約六根是舌根以辨才屬舌根故約位次是得十行位之功德者以辨才唯舌能行故次復有下六根則約意根位次是得十回向及四加行之功德者以旋是回向義意能周旋十方默容三世其疾俯仰之間遍行四海故此三覺中分證法身之自覺覺他也三復有下須彌日月四洲乃至梵世各一千謂之小千千倍小千謂之中千千倍中千謂之三千大千世界以大千世界折塵派衆則又愈上兩個一世界之塵衆矣能轉下謂此多衆聞佛壽命得十地中歡喜地之功德也以不退是永不退墮於二乘地生歡喜故云轉者謂自得不退復轉不退地法輪於人也唯下八生此中應十生當得阿耨菩提者以上敘次皆由少至多明增數不可思議四復有下二千即所謂中千世界乃從多至少明滅數不可思議見得果大者其衆差小也能轉下謂此多衆聞佛壽命得十地中離垢地之功德也以第二地中於己則戒度特圓破戒垢始能清淨故於人則能轉清淨之法輪也此中應九生當得阿耨菩提皆不言者恐文繁而不奇也五復有下所謂一千個須彌日月四洲梵世為小千世界者也八生當得下謂有此塵衆聞佛壽命於十地中得第三發光地之功德也以第三發光地望究竟妙覺地猶差八位故此下於果應有七生六生五生當得菩提於位應攝四地五地六地於世界微塵亦應曰多少接下四四天下等文始成次第而佛不說者一或前有八生後有四生中自具七六五生四五六地也一或當時得功得者人不合其生其地之數故前後超略也一或佛語巧妙欲一隅三反也一或譯人省文見其錯綜而文言不板也六復有下謂有四個四天下之塵衆也四生當得下謂此塵衆聞佛壽命得十地中遠行地之功德也七復有下謂三箇四天下之塵衆也三生當得下謂有此多衆聞佛壽命得十地中第八不動地之功德也八復有下謂兩箇四天下之塵衆也三生當得下謂有此塵衆聞佛壽命得十地中第九善慧地之功德也九復有下謂一箇四天下之塵衆也東勝神洲西牛貨洲北俱盧洲南贍部洲共一須彌一日月謂一四天下一生當得下謂有此塵衆聞佛壽命得十地中第十法雲地之功德也以法雲地尚隔等覺地之一生故十復有下不曰天下曰八世界者謂有八箇閻浮提世界微塵數之衆生也問八箇閻浮世界豈不同二四天下答四洲寬狹不等故值以八箇閻浮世界言佛眼所見佛心所知非忽略可多少者比乃毫𨤲不爽真知真見之語也皆發下謂有此塵衆聞佛壽命以初發心即得十地以上等妙覺地之功德也經云初發心時即攝五位成等正覺是也此見大機衆生直下頓證始覺合乎本覺符上頌得佛無上慧速成就佛身也注初依經約行布訓似有漸次無非明此經為圓教圓其餘經之所漸在聞佛壽量之一時而圓融也末發心一種依經約圓融訓無非明此經為圓融中有頓證義不負佛我每作是意也又見功德之言雖同而各各證入非𢤱憧也以經觀之敘得功德之文似有參差其實義自攸貫何哉初由聞壽量得無生法忍而後始能聞持由聞持而後能行四辨由行辨而後能百千萬億而回旋由回旋而後能轉不退及清淨之法輪由轉二種法輪而後始能漸漸至於一生補處之究竟由至究竟覺而後始知釋迦今日於伽耶城得菩提所得法身壽命有過五百千萬億等三千大千世界塵點劫之多者總未離乎三大阿僧祇劫已前為衆生時最初所發菩心之一念也以故將得無生法忍者敘其始將發菩提心者敘其終使明一切衆生不發成佛之心則已若發心則三無數劫修因證果在諸佛法身中直一念耳故經云佛子住於此是則佛受用常住於其中經行及坐臥是知若無過去住無生法忍之衆生則無今日現在說壽量之釋迦若無現在發菩提心之衆生則無未來說壽命派功德之諸佛故經云願我於來世長壽度衆生如今日世尊說壽亦如是經文初後以衆生言中十以菩薩言人數則河沙界塵為計地位則八生乃至一生為名文似夾雜旨實有在思之佛說是諸菩薩摩訶薩至歌無量頌讚歎諸佛佛說下牒上文也乃經家敘置大會聞法得利之慶瑞瑞有七一於虗下華瑞散十方三世因果聖衆二又雨下香瑞三於虗下天鼓自鳴瑞四又雨下天衣瓔珞瑞五遍於下寶鼎燒香瑞六一一下菩薩持幡上行瑞七是諸下歌讚慶佛瑞皆從虗空雨者佛真法身猶如虗空故也爾時彌勒菩薩從座而起偏袒右肩至而說偈言佛說希有法昔所未曾聞至皆發無上心爾時下佛說長文彌勒說偈可謂父作之子述之也又佛果覺彌勒因地上品既明因果同一法身則彌勒頌即佛頌也初八句頌敘置之文有大力即祕密神通之力或住不退地一句頌得無生法忍者之功德以得無生法忍始能於地不退故其餘次第以照長文更簡淨也問或住不退地與轉不退法輪豈不混也答一住一轉自利利他各為一義元不濫也世尊說無量不可思議法至以助無上心上頌聞法得利此頌興供養而呈慶瑞也世尊下頌佛所說法身壽命饒益甚多如虗空之無邊地雨天下第一華瑞釋梵下謂此華瑞來自三變淨土外恆沙佛土之釋梵諸天所散也雨旃下第二香瑞如鳥下謂華香皆如鳥飛虗空以供佛也天鼓下第三樂瑞天衣下第四衣瑞衆寶下第五燒香瑞其大下第六菩薩瑞一一下第七寶幢勝幡瑞亦以下謂幡幢無情物亦會歌詠佛德此所以為瑞也如是下結法與瑞希有故令大會歡喜諸天雨華香如鳥自上而下菩薩持幡蓋歌詠自下而上靈山法會勝哉佛名下一行雖頌當節其實申請佛分別未來世人聞佛壽命長遠所得其功德也又為下兩節張本照至神力品止以彼品諸天於虗空中唱名是應此中佛名聞十方廣饒益衆生義彼諸衆生聞名散寶是應此中一切具善根以助無上心義故彌勒頌完佛受請復說下二節文初節為分別一念信解者之功德應廣饒益衆生一句次節為分別深心信解者之功德應一切具善根一句爾時佛告彌勒菩薩至欲重宣此義而說偈言若人求佛慧於八十萬億至於此無有疑又阿逸多若有聞佛至無量無邊能生一切種智爾時下標起一念信解壽量一品者之功德無有限量若有下因功德無量故以求無上菩提行前五度者相校彼以八十萬億等劫此直一念彼為佛果廣行前五度此直一品略生信解功德不啻天淵者良由此一念即無念也無念乃當體全空之謂信為十善法之首解為五別境之一總為般若正因以般若之正因聞契佛與衆生等有不生不滅之正果則行人無處無時不分證阿耨菩提之法身矣故其所得功德不可以算數譬喻校也若有善男子下既云為阿耨菩提則知其人尚未徹見佛與己之法身在故雖多劫行檀等前五度除其般若正因不免尚有我法二執故其功德雖多乃不及於一念之信解也況彼前五度但為果海莊嚴無般若正因則終成散滅此一念信解既為般若正因直貫至究竟妙覺得此正信莊嚴自具故故曰以是功德等若善男子善女人有如是下謂一念信解佛壽命長遠者功德所以多於彼者以彼於阿耨菩提法身遇逆緣或有退墮此則永不退墮也偈中若人下頌長行總標五度之文於是下十二句別頌檀度前四句頌所施三寶後八句頌能施四事若復持禁下四句別頌戒度若復行忍下八句別頌忍度前四句頌能忍外侮而不動後四句頌能忍內慢而不惱若復勤下四句別頌勤度又於無數下十二句別頌禪度前四句明修禪之法以空間處行坐為緣除睡攝心為因中四句明由因緣而得諸定故安住多劫心不散亂後四句明由定心生福由福發願由願求無上菩提得一切智而盡定之邊際是人下十二句結上起下頌長行以是功德比前功德至所不能知相校量之文其有下頌長行若善男子至無有是處之結文計二十二句展轉詳悉一念信解者所得功德多而且廣之不容易也初四句謂若菩薩人多劫行道者始能聞而信受也次十二句謂頂戴信受者始能發願於未來世如佛得長壽以度生如佛坐道場說法無所畏如佛為一切天人所尊敬亦說其法身不生不滅之壽量也末六句結上起下謂如上所說菩薩須具五種心始能隨文義解佛語無其疑而有信也一深心二清淨心三質直心四多聞心五總持心又阿逸多下躡頌多聞能總持隨義解佛語而申明之謂壽量品一品不唯解其義趣為多聞總持即解其言趣亦起如來無上之慧得無限量之功德也何況深心廣聞全部自他俱利為書持等六種法師其功德更為無有限量也略聞壽量一品起無上慧約得佛涅槃心言廣聞全部生一切種智約得佛差別智言阿逸多若善男子善女人至皆應供養如佛之塔上節但分別佛現在一念信解者之功德能成大因故末慧與智皆以能生能起為言此節兼分別佛現在滅後深心信解者之功德能成大果故末以趨道場起塔為言阿逸多下牒起現在聞說壽量一品者即見三寶正報之相以見佛佛寶共大菩薩僧寶說法法寶也又見下亦見此界依報之相有五種莊嚴一地如寶平二上金界道三寶樹四寶樓臺五菩薩處中若有下結明謂見依正如上者始成其深心信解之觀相也又復如來下謂佛滅後未來世人既不得見佛現在依正經則不必定於壽量一品但若聞此經直口不毀訾心起隨喜者亦即與佛現在深心信解者功德同也以聞經即具佛寶法寶心口與佛法和合成僧寶故故云當知己為等此中起隨喜心為下隨喜品之伏案以上明略持者為深信何況下明廣持者為深信謂佛滅後之人直口不毀訾心起隨喜便具一體三寶依正觀相何況以口全部而讀誦用心全部而受持則此人三業已為頂戴於如來矣阿逸多是善男子下謂未來廣信解者既已具一體三寶之正報而住相三寶之依報可以不須復造也所以下徵釋不須復起之義謂但持誦此經雖不起塔而塔已高至四禪莊嚴供養已備極華香等之十種也以上但校持誦阿逸多若我下又校書寫謂或自或他書持此經者雖不起僧坊而僧坊已成赤旃檀三十有二間四事已充足千萬億之無數矣故總結云是故我說等凡此皆因經文詮顯理勝事奇故簡其事行而校也況復有人下又明經雖理勝持經者不嫌理事兼行則功德為尤勝故譬以虗空之無邊量疾至一切智也應知此校上節五波羅蜜彼除其般若此不除也若人讀誦下校本節不須復起塔寺僧坊四事供養此仍起塔寺等并讚三寶行六度故其人之功德即為坐道樹近菩提四威儀處皆應起塔供養一切天人皆視如佛塔也所謂簡則全簡收則全收一切其善根廣饒益衆生見矣爾時世尊欲重宣此義而說偈言若我滅度後能奉持此經至經行及坐臥頌計七十八句若我滅度下四十六句頌但持經不須復起塔寺等文況復持此下三十二句頌持經者不妨事理兼行之文照常行可消須曼具云須曼那又云蘇摩那此翻善攝意華薝蔔此云黃華阿提目多伽此云無龍䑛三華皆香薰麻取油然燈不毒人眼
