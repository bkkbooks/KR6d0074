body:
  text: 姚秦三藏法師鳩摩羅什譯明護國金剛寺住持如愚著妙法蓮華經妙音菩薩品第二十四妙音者准經是因中供雷音王佛十萬種伎樂并八萬四千七寶鉢果上感得能周旋往返十方世界以妙法而隨類普現一切色身三昧以持經者得名也故曰妙音菩薩品爾時釋迦牟尼佛放大人相至白毫光明遍照其國爾時下將敘妙音本所事之佛先敘釋尊能照之光從肉髮眉間二處出也光表法身在諸佛報化身先為無見頂相不可以彼國佛乃菩薩之大身而輕此土佛及菩薩之小身生下劣想何則若以諸佛報身有相而觀彼國菩薩之身長四萬二千由旬固已大過我土丈六佛身況彼國之佛身長六百八十萬由旬乎是亦難彼此相見矣若以諸佛法身無相而觀彼土佛及菩薩雖長且大都照在我土之佛光中故放光必曰大人相等有以也肉髻相者觀佛三昧海經云如來頂骨團圓如合蓋拳其色正白有五大梵相生時摩耶及姨母皆悉不見其五梵相開現光照梵世復過上方無量世界化成雲臺諸佛境界十地菩薩之所不見髮長一丈二尺五寸如紺琉璃宛轉於頂皆成螺文故又謂之螺髻華嚴經云荷載衆生首成就頂上肉髻故及放下觀佛三昧海經謂佛眉間白毛有諸輪郭足滿五尺如琉璃筒玻瓈珠顯現無量百千萬色初生納妃出家成道各現長短不同遍照下經初光照東方但曰萬八千世界今曰遍照百八萬億那由他恆沙等世界則法會始終遠近有異總不離生佛等有一常寂心光隨事顯理實無小大也過是數下謂淨光莊嚴佛國猶在百八萬等世界外見我佛之光遠大不可思議也國與佛皆以淨名者約依正皆為淨法身也華嚴十身相海品云次有大人相名安住一切世界海普照雲放寶光明充滿一切虗空法界於中普現淨妙道場及佛菩薩莊嚴身相令其見者得無所見此之謂也釋迦下謂彼佛之國雖大且多我佛之光皆照遍也爾時一切淨光莊嚴國中至如來功德智慧莊嚴爾時下敘淨光莊嚴之佛國無數故曰一切有一下謂彼一切國中皆有一妙音身為當機也久已下福足而悉下慧足得妙幢下福慧兩足所致三昧計一十六種下經文自有一十六節而解俾見三昧之實不然此中徒訓字面於義無涉也如是下謂此十六三昧為首其餘三昧尚多故以等字言以法身大士凡所動息云為無非三昧無非名持法華經故釋迦牟尼佛光照下謂妙音知我佛放光初意即白彼佛欲來此土供佛及見文殊等衆為請也爾時淨華下彼佛總誠妙音莫輕此土依正生下劣想以順此土之形妙音須改現小身先作下劣觀想故善男子下別釋莫輕此土依報佛身下別釋莫輕此土正報而汝身下用彼顯此俾見十方國土佛及菩薩之身正大福德光明皆超越此土也經云為人短小輕蔑人故豈我土依報穢惡正報卑小佛及菩薩皆種輕蔑因耶無非順機示現可生下劣想乎故曰是故汝往等晉譯云佛土本空衆生罪福現有不同是也妙音下當機謂已捨淨詣穢元仗佛力何彼此小大之不相融攝肯改形異質生輕劣想哉故曰我今詣娑婆世界皆是等於是妙音菩薩不起於座至甄叔迦寶以為其臺此節敘妙音來儀釋第一妙幢相三昧也以妙即妙心幢有摧邪輔正功能而以蓮華表其相故於是下標起入三昧之式明妙音以法身與我釋迦相見宗門所謂不許夜行投明早到是也華嚴經云菩薩在一佛國聞法受持其身不動以三昧力於不可說佛會中在在現身亦不分身亦不起定各各出生不可說不可說三昧身如是次第一切諸劫不可窮盡是也以三昧下謂妙幢相三昧之力能即遠而近故隔彼百八萬億那由他恆沙等世界外去其靈鷲法座不遠現寶蓮華也蓮華以八萬四千言者一則擴一心之量合法門及煩惱之數一則預示妙音同來法衆有如許之多閻浮下敘其華相閻浮檀樹其大蔭蓋南閻浮提滴水人地土成赤金他金無以為比甄叔迦云鸚鵡嘴其寶紅色似之此經名妙法蓮華故妙音將來先現此相見經題蓮華非目世間常所有紅白蓮華乃其瑞應寶蓮華也故下節文殊以是何因緣而現此瑞為問佛以為聽法華經為答有以也爾時文殊師利法王子至亦欲供養聽法華經此節雖問答上節義其實是即妙幢相三昧示第二法華三昧也文殊諸佛之師示不知而問者明法華三昧要其根本智者始能究竟文殊師利白佛言至彼菩薩來令我得見此節即法華三昧致申問答示第三淨德三昧也以淨即清淨法身德即淨法身中具報化身色相大小威儀進止之功德故文殊下問種善本者欲顯淨法身為諸善根本也問修功德者欲顯由淨法身起行始成功德也而能下欲顯由淨法身為諸善本德始能即遠而近即無而有現若干千萬蓮華為大神通力也行何三昧下文殊問三昧名字示己欲從淨德之名入淨德之實而修行之庶同聲相應同氣相求乃能見妙音之報化身也以色相大小威儀進止屬報化身故惟願下謂妙音報化法身自非佛力加被己不能見也古德頌云彩雲影裡仙人現手把紅羅扇遮面丞須著眼看仙人莫看仙人手中扇今文殊求見妙音色相大似要看仙人手中之扇者也爾時釋迦牟尼佛至文殊師利法王子欲見汝身爾時下文殊求佛示相佛不親命而推重多寶佛者示第四宿王戲三昧也以多寶為過去古尊宿之法王來遊戲此土故時多寶下一切淨光莊嚴佛國去此娑婆世界有百八萬億那由他恆河沙數世界之遙妙音既入定於彼此以一音相召而來何其易且近哉非宿王戲三昧之神力豈能如是其義奇哉于時妙音菩薩於彼國沒于時下示第五無緣三昧也謂於彼國沒是彼國佛法之緣暫無而至此土建無緣之慈力故與八萬四千菩薩俱共發來至頭面禮足奉上瓔珞此節示第六智印三昧以智即妙音成所作智及佛妙觀察智印謂佛菩薩智兩相印證而不可改易也與八萬下印定所來人數與前所現華數不易所經下敘來儀三瑞一地六震二天雨寶華三天樂自鳴是菩薩下印定色相大小有八種一目青如蓮二面圓逾多月三身金色四具莊嚴五威德盛六光明七相具足八身堅固入七下印定威儀進也詣此下印定威儀止也以價下印定供養親近禮拜於我之言凡此智印類同世法皆不期然而然故曰三昧而白佛言世尊至安隱少惱堪忍久住不而白下雖妙音傳彼土之佛問訊我佛其實示第七解一切衆生語言三昧也以問訊之辭皆此土一切衆生之語言而妙音能解故少病約身問少惱約心問起居下申問身之少病世事下申問心之少惱以上問能教化主無多下問所化機宜能不具大小隨眠煩惑不無不孝下問衆生俗諦事不敬下問衆生出俗事能降伏下問衆生真俗修行魔障有無事皆問現在生佛也久滅度下問過去佛往來事又問訊下亦問過去佛身心事彼土之佛豈不知此土佛與多寶身心等事莫過主賓之分世界之儀妙法不異世間法也問妙音前辭彼土之佛彼佛會無此問今奚曰彼佛問訊答以文理求前合有此譯者恐繁故前影略今獨彰顯也問妙音問訊佛奚不酬答理合有之亦譯師缺詳潤也世尊我今欲見多寶佛身至故來至此世尊下妙音初意到此土元為供養現在三寶禮佛後見寶塔已閉故託佛請見示己所得第八集一切功德三昧也及示周旋往返持經義也以求見多佛是集一切功德合人情之周旋故時多寶佛不啓塔但讚善者謂但完初意則一切功德已集不必更欲見我身也故曰汝能為供養等爾時華德菩薩白佛言至百千萬億那由他佛爾時下前文殊見蓮華興起三問一問種何德本有大神通二問行何三昧己欲效修三求佛加神力得見色相大小威儀進止逮妙音來直完第三請而初二兩請尚未結案故華德復請示妙音所得第九清淨三昧也以昔供雲雷音王佛伎樂寶鉢為清淨之因緣今生淨華宿王智佛國得現華等神通為清淨之果報故華德汝但見妙音菩薩至變為女身而說是經此節示第十神通遊戲三昧也以種種現身皆神通遊戲故華德汝但下謂華德唯見妙音能現菩薩身而不知彼於種種類中皆能現身說法也或現下釋成現種種身梵王色界不敘空界者無色質故說現色亦攝空故帝釋欲界自在欲界第五天大自在欲界第六天中攝夜摩兜率兩天天大將軍者名義云天台釋散脂修摩為天將大軍其形八臂騎孔擎雞持鐸捉赤幡統轄三十八部巡遊世間賞善罰惡故稱天大將軍毗沙門智論謂福德之名多聞四方乃北方天王也攝東方等三天轉輪王有金銀銅鐵之分諸小王者謂除四輪王餘皆為小國王菩薩皆能現身也長者風俗通云年耆德艾事長於人居士楞嚴經云愛談名言清淨自居宰官大則宰相小則縣官婆羅門云淨行亦云毛道凡夫以上皆約現男子身或現比丘下約男女並現說以比丘尼優婆夷是四衆中之女身故或現長者婦女下梵語婆利邪此云婦婦對夫言女對男言童男童女未有夫婦道者或現天龍下八部也問前敘諸天此奚復贅答前三界天主故各各列名此八部無天則無統屬故不言某天以上現樂地身諸有下三途苦地故不言現身但云皆能救濟乃至於王下應譯著現長者婦女身前置之末者以王宮後妃等名位雖貴夫婦之樂或乏其苦亞於三途故不敘妙音說何法而兩敘說是經典是經即指此經也以法身大士於十法界一動一靜皆妙法故華德是妙音菩薩至大神通智慧之力其事如是此節示第十一慧炬三昧也以若干智慧明照娑婆世界等是慧炬義故華德是妙音下承上節言謂華嚴等止知妙音能救護娑婆世界梵王等諸衆生現種種身說其妙法而未知彼於一切淨光莊嚴國中其神智變化亦如此土同時各在而無所損滅也是菩薩以若干下若干有數多少已知之義謂華德縱知妙音以現梵王等若干智慧明照此彼兩土令梵王等各得所知而尚不知彼神智變化同時遍應於十方恆沙世界亦然也良由妙音菩薩得法華經力證得法身而法身遍在一切處故能同時各應而人難測也華嚴經十無礙品云菩薩於一身示現一切世界身以一音現一切世界差別言音令諸衆生各得解了此也若應以下前敘現六凡身重所應機說世間人天乘五戒十善之妙法此敘現四聖身重能應教說出世間小中大頓圓之妙法也以為欲得小乘者即法身應機現作聲聞形說四諦法欲得中乘者即法身應機現作辟支佛形說十二因緣法欲得大乘者即法身應機現作三賢十地菩薩形說六波羅蜜法欲得最上一乘不涉階漸頓作佛者即法身應機現作報化佛形說十力四無所畏等法也此土彼土十方恆河沙土同時遍應無不皆然故曰如是種種等以上明妙音證獲法身般若德乃至下明證獲解脫德謂不唯現身在世即應以涅槃得度者菩薩亦於不生不滅法身中而示現有生必有滅也華德妙音下總結前文爾時華德菩薩白佛言至能如是饒益無量衆生此節示第十二莊嚴王三昧一切色身為所現上六凡四聖身是也法身為能現前不起於座身不動搖處是也法身為一切色身之王一切色身為法身之莊嚴故此問答名莊嚴王三昧雖酬華德亦答文殊行何三昧願為我等說其三昧名字說是妙音菩薩品時至亦得是三昧及陀羅尼此雖敘兩土大衆聞法得益其實示第十三淨光明三昧自住法身曰淨普照於人曰光明今一說妙音神智即令人同得豈非三昧及總持乎並結訖文殊我等亦欲勤修行之之案爾時妙音菩薩摩訶薩至作百千萬億種種伎樂此示第十四淨藏三昧也以還歸本土表一切色身神智變現皆藏於淨法界身之藏海故問妙音既此彼土及十方恆河數世界皆同時遍在又奚重煩來往答凡大菩薩必具三身應化身則隨十法界應現有大有小報應身則見有往來法身則遍在一切處而無往無不往無來無不來也妙音此土他土十方恆沙土隨類現者應化身也彼此往來者報身也既到本國與八萬四千菩薩至得現一切色身三昧此雖敘復命之辭其實示第十五不共三昧以復命之辭不敘共二乘人得益故所以然者一則二乘人皆已受大乘記無非菩薩也一則明妙音來往智慧神通皆是教菩薩法不與一切二乘人共也經文其深玄哉說是妙音菩薩來往品時至華德菩薩得法華三昧此雖通結一品之文其實示第十六日旋三昧也以娑婆去一切淨光莊嚴佛國有百八萬億那由他恆河沙等諸佛世界之遙遠而妙音周旋往返直一日故吾人能得此品妙義則亦如日一日一周天有目有趾者待是而後成功也故敘得益以四萬二千天子得無生法忍言明菩薩報應身之日雖有往來而法身之天曾無生滅也法華三昧其體相如是故華德問此而亦證此問前已敘得益此奚復敘答前敘兩土菩薩此敘天子及當機欲顯三昧名異妙法蓮華經觀世音菩薩普門品第二十五觀世音菩薩亦名觀自在菩薩慈恩傳云梵語阿嚩盧植此云觀伊濕伐囉此云自在其實觀即能緣見分真觀清淨觀廣大智慧觀悲觀及慈觀是也世音即所緣相分七難二求等世間苦惱之音聲是也此以人名品普門者以法名品即一身心普應三十二法門也人名品明菩薩得此經悲能拔苦法名品明菩薩得此經慈能與樂總不出首嚴經二種殊勝功德彼自陳圓通此佛述圓通常三種真實以答當機慈悲先後經各為義爾時無盡意菩薩至即時觀其音聲皆得解脫爾時下問觀音必無盡意當機者表妙音菩薩周旋往返身根持經意尚有盡故以來此彼土意盡旋彼此土意盡故上品佛讚妙音但云神通智慧無所損減不云色身無損也若夫觀音耳根持經不費周旋往返而耳門圓照三昧上合下應則彼此之意皆無盡也故淨華宿王智佛誡妙音莫輕此土生下劣想者以佛及菩薩順世現身雖曰卑小而神通智慧變化自在有逾於十方世界故以無盡意當機准楞嚴經六根功德優劣唯意根圓通與耳根倣佛但意待前五塵而有生滅不及耳根生滅二圓離之常真實所以無盡意猶請問於觀世音也而作下承上品為問謂妙音菩薩既以供樂及鉢之因緣得名則觀世音菩薩是以何因緣而得名也良以世間根塵各有所對觀屬眼根宜對色塵音是聲塵宜對耳根今觀世音菩薩以耳根云觀則與世間根境似相違矣故曰以何因緣等佛告下謂菩薩所以名觀世音者非同世間根塵黏妄發光根各對境得名乃以脫出根塵生佛本具之菩提心為觀故令若有無量地獄等三途受苦衆生一時聞名一齊稱號菩薩得圓觀稱名者之音聲不遺時而齊得其解脫也楞嚴經云一者由我不自觀音謂由菩薩不以自己能觀之觀智觀彼無量受苦衆生所稱名號之音聲也以一觀其音塵菩薩自己且黏妄發光焉能度脫人哉況以觀觀音但觀其一難觀於二惡能圓脫其苦惱耶以觀觀者謂能觀之智既不觀彼所稱名之音聲則觀何物以回能觀之觀智返觀己之不自觀音之觀則能所皆空矣令彼十方苦惱衆生觀其音聲悉得解脫謂由菩薩能所觀智皆空故令受苦者觀其聖名之音聲皆得解脫三途之苦惱也此如王之有德為民所恃母之有慈為子所怗王母雖無偏私於子民而子民有苦能稱念王母則一切患難自然解矣楞嚴觀字在機上說此經觀字在應上說彼如說方藥此如說效驗苟不並解義難消會此以能脫地獄等三途之苦顯圓真實而答也若有持是觀世音名者至以是因緣名觀世音此節以脫三災苦顯圓真實也以一人稱名諸人脫難為圓義故若有下謂若或有人一向持聖名似必無火災也設偶遇之火亦不能燒也凡物與人值火必焚今曰不燒則見菩薩之威力也故曰由是菩薩等楞嚴經云二者知見旋復云云溫陵解曰內外四大常相交感見覺屬火故見業交則見猛火准彼釋此謂由菩薩具德故令念者持者脫苦非無故也下諸節引釋俱可例知但上節是證一根既返源義故但以本根之聞言此節是證六根成解脫義故以知見言以知屬身等四根見屬眼根故也若為大水下承上文言謂由菩薩威力不獨能免火難若遇水難一稱聖名即漂入淺處易救也楞嚴經云三者觀聽旋復云云溫陵解曰聞聽屬水故聞業交則見波濤若有百千下謂人多也為求下謂因求七寶而入海也然求寶者衆未必盡遇風難故曰假使水本黑色故海水深大其風為黑兩船并行曰舫羅剎乃食人之女鬼鬼多故成其國其中若有下謂多人中但一人稱聖名俱見免害益見菩薩之威力大也以是下兼上節以答當機之問楞嚴經云四者斷滅妄想心無殺害令諸衆生入諸鬼國不敢為害彼經但云入諸鬼國未知因甚事而入此明因求寶被黑風吹入其義重在風成三災也不然下節言羅剎言衆商人賫持衆寶於此為贅矣若復有人臨當被害至威神之力巍巍如是若復下楞嚴經云五者熏聞成聞六根銷復同於聲聽能令衆生云云熏聞謂初以言教熏習聞根也即經彼佛教我從聞思修入三摩地之言是也成聞謂究竟果海實成於聞根也即經初於聞中入流亡所至寂滅現前等文是也此所謂隨拔一根脫黏內伏者也六根銷復等者謂餘眼等五根銷落餘色等五塵復歸元真亦同於聲塵之於耳聽也此所謂諸餘五黏應拔圓脫等者也准彼令當形者刀壞得脫由菩薩六根銷復同於聲聽所致也准偈此遇王難得脫者若三千下楞嚴經云六者聞熏精明明遍法界則諸幽暗性不能全云云上節熏聞六根但約一身言此云明遍法界則該乎十法界也准彼是由菩薩聞熏明遍故令廣大三千諸托幽暗為性之惡鬼不能以惡眼視稱名者況敢害乎准偈惡獸玩蛇等是頌此者以肇師云夜叉有三種一在地即虎狼猫貍等二在空即諸鷙鳥鷹等也三在天即諸殺鬼等羅剎云可畏鬼設復下楞嚴經云七者音性圓銷謂六塵同脫也觀聽返入六根逆流也離諸塵妄能令衆生云云准彼是由菩薩離塵故令有罪者應受杻械等無罪者橫彼檢繫等一稱名皆脫苦也若三千大千國土滿中冤賊下冤謂冤家賊謂盜賊滿中言無處避也商主謂能引導衆商者故曰一曰將寶與命連故曰重路多冤賊故曰險其中下衆商中一人勸稱聖名也衆商下衆商人遵教同脫苦也上風難一稱衆脫此衆稱同脫楞嚴經云八者滅音圓聞遍生慈力云云滅音謂寂滅其音塵非斷滅也圓聞謂音聲一塵既得寂滅則色香等六塵俱得如聞而圓故能遍生慈力也准彼是由菩薩慈遍故令衆商冤賊圓脫也無盡意下以通真實得名為答以王刑鬼害禁械冤賊皆世間所通有而菩薩通能度脫故讚其威力高大巍巍高大貌語云巍巍乎唯天為大若有衆生多於淫欲至無量無邊福德之利若有衆生晉譯作若有學人其譯是也以出家者研真斷惑謂之學人其人始厭欲多若夫在家方恨淫少豈厭多乎楞嚴經云九者熏聞離塵色所不劫云云謂以戒香熏其聞根雖見好色不被色劫准彼則是菩薩自能離淫故令念敬者得離其色欲也若多瞋恚下楞嚴經云十者純音無塵根圓故純音境空故無塵根境圓融由無塵故根圓由純音故境融無對所對云云由根圓故無能對境融故無所對也蓋瞋恚起於能所抗對菩薩自既能所無對故令念敬者便離瞋恚也若多愚癡下楞嚴經云十一者銷塵旋明旋倒聞機故銷塵返聞自性故旋明法界身心猶如琉璃朗徹無礙云云謂由銷塵旋明故十法界身心皆現在菩薩所證法身中如琉璃寶內外明徹而無礙也良由愚癡起於根塵固結之曖昧菩薩自既朗徹無礙故令念敬者便離愚癡性障也以上謂之三毒名相具載唯識論乃根本惑之三無盡意下以常真實功德得名而答故四以常言若有女人下凡女身以夫貴而貴然色難常好夫愛莫恆唯生有男乃可永賴故女人必欲求男也若生男無福家不足興無德名不足盛無智則身不足貴無慧則道不能行故求菩薩即生福德智慧之男也楞嚴經云十二者融形復聞融謂六根融通無開見觸臭之形礙復謂眼根等皆如耳根復還元覺也不動道場由復聞也涉入世間由融形也不壞世界由不動道場之所致能遍十方供養微塵諸佛如來由涉入世間之所致各各佛邊為法王子云云十方微塵數諸佛於為菩薩者有父道焉菩薩各與供養具子道焉菩薩於佛既具子道故令求者便生男子也設欲求女下世俗雖皆好女色然求生女者或少故以設言女不端正色雖美而內政莫立不有相貌心雖端而外見罔貴不宿植德本則不知敬重三寶多會作孽令公始等衆不生愛敬故須求菩薩便生端正有相福德可愛敬之女子也楞嚴經云十三者六根圓通謂一根能作諸根事業也明照無二雖六根互用直一體性也含十方界由六根圓通故立大圓鏡由明照無二得名故以立云也空如來藏由含十方界得名准勝鬘經如來藏有二一者空二者不空今云空者惟空能含故承順十方微塵如來祕密法門受領無失云云夫如來藏不空不唯不能承順及受領即勉強承受亦不能無失也易云至哉坤元乃順承天今菩薩以圓通妙體既能明照又能承受有坤道焉坤厚載物故令求者便生含弘光大端正有相之女也淫恚癡三毒衆生所常有之正性多則為害也深男女二求衆生所常有之正情少則為嗣也絶故或惡其多或慮其絶一念敬聖名供禮聖像皆響應者常真實功德之力所加庇也故曰無盡意觀音菩薩有如是力等唐虗也捐棄也福不虗棄則常真實見矣是故衆生下結起下文無盡意若有人受持下所持菩薩之名多也復盡形下時及供養尤多也於汝意下使知持者得福之多以校勝也佛言若復下別有一人但持觀音一名數不敵於前也乃至下時及供養尤不敵於前也是二人下謂以持一名與持多名者相校獲福雅相等也於百千下謂不唯相等且勝也晉譯云計此二福億百千劫不可盡極終不相此是也楞嚴經云十四者由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二恆河沙諸法王子二人福德正等無異准彼觀音由得耳根常真實功德所以勝也必以六十二恆河沙數菩薩為校量者擴六根而言也以上下四無畏屬楞嚴同一悲仰人名品止此下三十二應屬楞嚴同一慈力乃以法名品但彼先者此經後之無盡意菩薩白佛言至皆號之為施無畏者無盡意下承上節問謂一盡形盡供持多名一但一時供持一名而兩人福等且勝者則觀世音菩薩得何勝法遊此忍界遊問身業說問語業意業在其中矣方便下謂據法身實智無乎不遍似不用問但三業應機屬於方便權智則方便權力事相果云何也佛告下約圓真實成方便而答以十九說法隨地而在一時圓應故若有下答身業之方便即現下答語業之方便意業答在應以即現中矣國土衆生約三千大千依正報總言機也應當也謂大千土中有一圓教頓機衆生欲又涉階漸直下成佛者此人應當以佛身得度者觀音即時現其佛身為說圓滿果法也楞嚴經云若諸菩薩入三摩地進修無漏勝解現圓故應以辟支下梵語辟支迦羅孤山云此翻緣覺觀十二緣謂無明緣行等而悟道故亦翻獨覺出無佛世無師自悟故楞嚴經云若諸有學寂靜妙明勝妙現圓等准彼則觀音現緣獨身說法乃寂靜妙明等法也應以聲聞下准名義集有四種聲聞一決定聲聞定入無餘故無餘應作有餘二增上慢聲聞未證謂證故三退菩提聲聞退大取小故四應化聲聞內祕外現故經云以佛道聲令一切聞楞嚴經云若諸有學得四諦空修道入滅等准彼則觀音現聲聞身說法乃四諦之法也以上答即法身應機而現四聖身之方便楞嚴及本經於四身中俱不云現菩薩身者以觀音即菩薩故既能現佛身則現菩薩易矣應以梵王下即法身應機現六凡身也梵王為色界主或云離欲或云淨行序品云娑婆世界主梵天王尸棄大梵此云火或又名頂髻光明大梵等楞嚴經云若諸衆生欲心明悟不犯欲塵等准彼現身說法是說不犯欲塵之法也應以帝釋下帝釋云能作謂能作三十三天之主故楞嚴經云若諸衆生欲為天主統領諸天等准彼現身是說統天五戒十善等法也應以自在下梵語婆舍跋提秦言自在謂假他化樂而取自在故別行疏云是欲界頂魔王天也楞嚴經云若諸衆生欲身自在等准彼是說遊行十方之法也應以大自在下梵語摩醯首羅此云大自在八臂三目騎白牛疏云樓炭稱阿迦尼吒華嚴名色究竟是色界頂天釋論云過淨居天有十住菩薩十住即十地也號大自在為大千界主灌頂云字威靈帝楞嚴經云若諸衆生欲身自在飛行虗空等准彼是說飛行虗空之法也應以天大下訓見妙音品楞嚴經云若諸衆生愛統鬼神救護國土等准彼是說統鬼神救國土之法也應以毗沙門下楞嚴經云若諸衆生愛統世界保護衆生等准彼是現說統世救生法也然楞嚴云現四天王及現四天太子驅使鬼神身此唯說現毗沙門該之以上敘現六凡中天上君臣應以小王下敘現人間王臣等身也小王對四輪王言楞嚴經云若諸衆生樂為人王等溫陵曰自金輪至粟散皆人王也那國小王散于天下如粟之多故應以長者下具德位之人也准楞嚴說主族姓世間推讓之法也應以居士下修德位之人也准楞嚴說名言清淨自居法也應以宰官下當路之顯達也准楞嚴說愛治國家剖斷那邑治也應以婆羅下同此方儒生及處士也准楞嚴說術數攝位自居法也溫陵曰長者具十德謂姓貴位高大富威猛智深年耆行淨禮備上嘆下歸為族姓主隱居求志行義達道名居士三台輔相州牧縣長悉號宰官婆羅門此云淨行四姓之一數術即和合占相推步盈虗五明術也應以比丘下楞嚴為四准彼是說出家持二百五十戒及在家五戒之法也應以長者等婦女下與楞嚴少異彼一現女主君也二現國夫人次婦女身三現命婦臣也謂以夫職而受語命者也四現大家為女主夫人命婦之師者也孤山曰女主即天子后國夫人如論語邦君之妻曰君夫人命婦謂妻因夫榮大家如後漢扶風曹世叔妻同郡班彪之女名昭字慧姬和帝召人官令皇后貴人師事焉號曰大家是也此中長者宰官婦女合彼命婦不云現女主國夫人身者以妙音品于王後宮變為女身而說是經已敘之矣既能現顯達婦女其居士婆羅門通隱顯之婦女能現可知矣然則說法是說內政立身以修國家之法也應以童男童女下准楞嚴不壞男根名為童男處女不求侵暴名為童女諺云不破身者是也彼開為二此合為一說法可知應以天龍下此現八部身隨類說八部法也楞嚴開敘為九科說法是說樂脫出其倫之法也長水曰有形如休咎精明無形如空散銷沈有想如鬼神精靈無想如精神化為土木金石等皆非人也餘詳於他處應以執金剛下楞嚴少此一科名義云梵語跋闍羅此云金剛執者梵語波膩此云手手有執義無盡意是觀世音下結答其方便之力楞嚴經云是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就准彼無作自在妙淨之言則此中十九說法皆在機感上於菩薩法身如鏡應像月現水也是故汝等下勸興供養以啓下節是觀世音下楞嚴云十方微塵國土皆名我為施無畏者准彼則十九應身攝盡四不思議以彼施無畏之名在四不思議之文中故凡吾人怖畏皆生意地故勸無盡意菩薩興供養以除怖畏得自在有以也夫無盡意菩薩白佛言至自在神力遊於娑婆世界無盡意下當機聞觀音能施無畏即解所服瓔珞興供養者明欲無怖畏先須無罣礙也以瓔珞雖衆寶所成價直十萬金然掛于項而礙於胸臆故而以下瓔珞本常之有財施云法施者意明常有即真實也時觀音不受者謂瓔珞固常真實但一入意分別則為不常不真實也況供養出乎佛命意興由乎耳聞既無誠求愍內之辭又不回施上下是乃財施非法施故不肯受有以也無盡意復白下既去愍我等故我無盡意自我等謂等於衆部則意有回向言有誠求於禮為通於福為圓瓔珞常有之物可成圓通常三種真實功德矣故佛代當機而申勸表果能成因財施始成法施也故云爾時佛告等即時觀世音下遵佛命愍四衆八部者表受法施下合十方六道衆生同一悲仰也分瓔珞作二分供佛及寶塔者表上合十方三世同一慈力也不曰愍無盡意者明當機與己皆同等菩薩修法垂範耳根意根圓通功德相類不用愍也畢竟得佛命而受瓔珞者明因常在果法施不外財施即已愍無盡意不用言也二大士持妙法蓮華經為普門自在之神力如此故總結云無盡意觀世音菩薩有如是等會楞嚴缺四不思議然具於四番結答文中初云威神之力巍巍如是次云有如是等大威神力多所饒益三云是故娑婆世界皆名施無畏者四云有如是自在神力所以然者以八萬四千爍迦羅首八萬四千清淨寶目八萬四千母陀羅臂慈威定慧之妙容現一一形誦一一呪皆自在大威神力攝盡故爾時無盡意菩薩以偈問曰世尊妙相具我今重問彼至能滅諸有苦爾時下晉譯元無偈文本譯有者梵本增損譯人傳持不同故世尊下當機既蒙觀音愍受瓔珞感其聖德神力將申問其十四無畏功德以人名品之義故先讚佛具相好以引啓也具足下為經家敘置汝聽下總頌下合六道之願深謂聖行能應諸方雖是神道亦由深大之願所使然深大之願即經多劫亦難心思口議侍多下總頌上合諸佛之願淨謂多劫願大難思議者由菩薩侍佛多曾無染著也我為下謂佛於觀音深淨難思議願中許說少分俾聞聖名見聖身念聖號者皆不空過歲月而獲消滅三有中諸苦惱也應知偈文是補長文所未盡文句藻麗莊重假使興害意推落大火坑至以漸悉令滅假使下申頌略說火坑瞋所變起人以瞋害聖以慈忍故念聖力火坑化而為池也或漂下巨海貪所成就貪財似龍貪淫似魚貪殺似鬼一念聖力五欲頓息則貪波不能沒也或在下自高大之我慢踰千須彌我慢人人尤慢我是我為人所推墮也菩薩謙光照物故念得力如杲日之住於虗空也或被下癡惡逐人如墮金剛山無有不損傷全軀者菩薩聞思修三慧除絶癡惡故令念者得力雖或墮落不能損一毛也或值冤賊等者冤賊纏於疑暗是各執刀加害也菩薩視冤同親毫無疑害故念得力咸起慈心也或遭王難等者王難生於身見有此身生必有彼身死是為臨刑欲壽終也菩薩身見既空故念得力彼身見之刀即段段壞也或囚禁等者譬邊見為桎梏也生此有無斷常等邊見為財産所囚禁妻子所枷鎖六親伎倆所杻械也菩薩邊見頓空故令念者得釋脫也咒詛毒藥邪見所發也害人而反自害聖無邪見故令念者得力不遭其毒橫也或遇惡羅剎等者諸見取所興也菩薩無見取故令念者得力不取諸無想外道天為涅槃故無想斷見諸龍鬼不敢害也若惡獸等者譬戒禁取為惡獸具利牙爪可怖也菩薩無戒禁之取著故令念者得力而持牛狗等之惡獸疾走無邊方也蚖蛇等者具忿恨惱覆慳之氣毒如烟火之燒然觸誤即痛殺也菩薩無忿恨等毒故令念者得力諸惡蟲自回避也雲雷等者雲況諂也諂媚如雲之覆日也雷況憍也憍慠如雷之震驚也掣電況嫉妬也嫉妬人之所長求索人之所短如掣電之快駛毫不容隱蔽也降雹況害也好害人之善如雹之摧害物也澍大雨譬誑𧮂也狂大言讚毀於人如澍雨之傾覆物而浸潤也菩薩無諂憍等雲電故念者得力凡遇嫉害應時得消散也衆生被困下謂六道衆生被上大小中隨眠煩惱所困厄為因為惑為業受其無量苦果苦報逼迫身心不獲自在菩薩以妙妙聞心智力而能救護者以具足神通力廣修實智與方便權智故於十方國土無剎不圓現其法身也由是種種惡趣如地獄道鬼道畜生道三途中之生苦老苦病苦死苦凡有念聖名者無不以漸次消滅得涅槃樂也此所以為聞名及現身心念不空過為汝略說者也真觀清淨觀廣大智慧觀至是故應頂禮此頌三十二應以法明品一節釋總頌上合十方之願淨義菩薩所以能上合十方三世諸佛本妙覺心者具此真觀等五觀妙音等五音之觀音法也真觀下從俗入真之空觀合佛法身直一空觀曰真曰清淨明法身之真淨也廣大下從真涉俗之假觀合佛般若俗諦不出色等三科七大然而色大般若大故曰廣大智慧也悲觀下真俗不二之中觀合佛解脫以至中觀始能慈能與衆生樂悲能拔衆生苦得至涅槃解脫故合佛法身成圓真實合佛般若成通真實合佛解脫成常真實元止三觀衍成五觀名也常願下謂菩薩既合佛三德成三真實九法界衆生所以常願瞻仰不敢頃久怠離也以上但明合三德之體也無垢下合法身之相法身清淨故曰無垢無垢故光生故曰清淨光慧日下合般若之相般若證理曰智照物曰慧慧相如空中之日能破諸暗也能伏下合解脫之相也以解脫之為解脫者不過解脫三災中之風火相故普明下謂菩薩由合佛三德之相故能以普光明門照九法界衆生成自在之業得自在之名也悲體下合佛三德之用謂菩薩法身雖以慈悲為體非混濫不律故從體起用其戒律如雷之震驚蠢動得生其慈意如雲之妙大普含滋潤也此合法身用也澍甘露下合般若之用梵語甘露此云不死藥般若為相故喻以日月能照燭般若為用喻以甘露法雨雨能滋潤世間雲雨滅除㷬魃之𦦨出世甘露法雨滅除煩惱十四無畏中若雷若雨皆喻隨眠業苦此中雷雨仍喻法身般若同事異譬故云慈云妙諍訟下合解脫之用諍訟小者經於官處諍訟大者經於軍陳皆多怖畏一念聖名得其力庇無論訟陳衆怨悉退且散豈非解脫之用乎此一行似是十四無畏中文而譯置此者實為顯解脫用也問解脫之用實大而以訟陳言何也答地獄等冤對亦名諍訟忉利天與修羅共戰亦名軍陳以言似小而義則該廣也以上皆有德之實發揮觀字義竟妙音下有實之名發揮音字義此句以法身圓真實得名問觀音品何為帶妙音頌答一則妙音品無偈一則妙音觀音名異音同故於此品兼頌妙音俾見二大士俱是法身菩薩以法身無乎不在不礙圓應不染於塵故曰妙音觀世救苦自在成就曰觀世音梵音下以般若通真實得名清淨曰梵音應不失時曰海潮音也勝彼下以解脫常真實得名謂妙謂觀謂梵謂潮皆世間之音聲也或約實道或取譬言皆使衆生知一切處一切時一切物俱是法身三德境界難以相取音得故曰勝彼世間音也是故下謂菩薩既名實稱德故九法界衆生常應心念而勿生疑慮也觀世音下申明謂所以教衆生勿生疑者以菩薩雖曰超越世出世間名清淨聖性然悲深願重偏於一切衆生苦惱死厄能作依憑怙恃令念敬者得出苦獲樂也具一下謂菩薩約如來藏之法身則具一切功德所以用慈眼視一切衆生也約報身則所修之福聚如海之無涯量是故一切衆生應當頂禮也應知於苦惱下結十四無畏下合之文具一切下結三十二應上合之文并結頌中弘誓深如海等文也爾時持地菩薩即從座起至三藐三菩提心爾時下品首以無盡意當機明耳普圓通持經其意無盡也品末以持地為結證明圓通無盡之意不離一切衆生常住之心地也故曰若有衆生等楞嚴經持地自陳圓通云我於法性悟無生忍戒阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證盟此經授阿羅漢成佛顯記故說訖普門品而持地以阿羅漢為菩薩者作證良非無故也佛說下經家敘置印證持地功德不少之文阿耨多羅云無上即無等宗門云不是目前法三藐三菩提云正等覺即等宗門云亦不離目前初諸聲聞人聞發菩提心皆云非我傭力得物之處以發心者必欲度脫十二類生故故四大弟子說喻我本無罪喻己無見思惑罪矣而被囚執喻無惑而復入三界為四生囚執也此必定死轉更惶怖喻復入三界不得滅盡定無生之生反受分段生之死也今聞菩薩耳門圓照三昧緣心自在之業皆知發菩提心者如月隨水現鏡逐像明終日度生皆神通示現毫無留滯故先云自在之業普門示現神通之力末云皆發無等等阿耨菩提之心是知六品流通為教聲聞學菩薩法佛子所應得者萬二千受記阿羅漢皆已得之矣妙法蓮華經陀羅尼品第二十六陀羅尼晉譯云總持大論云能持集種種善法令不失故此前三品明顯持此經至普門自在為因該果海此後三品明顯密持此經顯謂妙莊嚴王密謂本品及普賢勸發為果徹因源也因果皆一真心為總持故爾時藥王菩薩即從座起至如說修行功德其多爾時下前既纍校持經者功德此復問者為發心說呪之端也照隨喜功德品轉身得與陀羅尼菩薩共生一處此品藥王勇施毗沙門護國天王十羅剎女鬼子母皆是能與持經者陀羅尼之菩薩也爾時藥王菩薩白佛言世尊至即說呪曰安爾一曼爾二至阿摩若那多夜四十六晉譯呪字作祝梵語譯為華言録附於茲以備會通云奇異所思意念無意永久所行奉修寂然憺怕志默解脫濟度平等無邪安和普平滅盡無盡莫勝玄默憺然總持觀察光耀有所依倚恃怙於內究竟清淨無有坑坎亦無高下無有回旋所周旋處其目清淨等無所等覺已越度而察於法令衆無音所說鮮明而懷止足盡除節恨宣暢音響曉了衆聲而了文字無有窮盡永無力勢無所思念准四例五不翻此不容録附第古德既翻不嫌令人受持開悟佛之知見不拘乎華梵也世尊是陀羅尼神呪至於諸衆生所饒益世尊下當機初領佛答受持此經者得福之多恐諸妬者面侵背毀故以己所親近六十二億恆河沙等諸佛所得神呪施與持經者為衛護也一則愍念末世持經之人一則見己親近之佛多耳爾時勇施菩薩白佛言至即於佛前而說呪曰痤隸一摩訶痤隸二至涅犁墀婆底三晉譯勇施曰妙勇呪作華言云晃耀大明𦦨光演暉順來富章悅喜欣然住此玄制永住無合無集世尊是陀羅尼神呪至則為侵毀是諸佛已爾時毗沙門天王護世者至說是陀羅尼即說呪曰阿黎一那黎二至那履五拘那履六晉譯云富有調戲無戲無量無富何富世尊以是神呪擁護法師至令百由旬內無諸衰患毗沙門云多聞富有之名多聞於四方居須彌山半腰北水精埵署夜叉羅剎二部爾時持國天王在此會中至即說呪曰阿伽禰一伽禰二至浮樓莎柅八頞底九持國晉譯云順怨天王呪曰無數有數曜黑持香𣧑祝大體於氣順述暴言至有𣧑音凶世尊是陀羅尼神呪至則為侵毀是諸佛已持國梵語提頭賴吒此云安民以安護國民故居須彌山東半腰黃金埵署乾闥婆毗舍闍二部先北後東西南二天王在其中也皆說呪護持經者以法師品嘗蒙授記故爾時有羅剎女等一名藍婆晉譯云有結縛二名毗藍婆離結三名曲齒施積四名華齒施華五名黑齒施黑六名多髮被髮七名無厭足無著八名持瓔珞特華九名臯帝何所十名奪一切衆生精氣取一切精是十羅剎女與鬼子母并其子及眷屬俱詣佛所同聲白佛言世尊等我亦欲擁護讀誦受持法華經者除其衰患若有伺求法師短者令不得便即於佛前而說呪曰伊提履一伊提泯二至兜醯十八菟醯十九晉譯云於是於斯於爾於氏極甚無我無吾無身無所俱同已興已生已成而住而立亦住嗟歎亦非消頭大疾無得加害寧上我頭上莫惱於法師晉譯云是等之類是我眷屬令無所犯擁護法師准彼則呪語皆是指名諸鬼約束不得興害持經者之義若夜叉若羅剎至即於佛前而說偈言若不順我呪惱亂法師者至當獲如是殃諸羅剎女說此偈已至六萬八千人得無生法忍爾時下標列女鬼之名一二以婆彰名如今稱女人為婆娘也藍毗藍謂面如藍靛色也三四五以齒名見食人之具凶也六以多髮名女美在其髮盛也七以無厭足名謂貪淫無厭也八以持瓔珞名謂嚴飾具也九准晉譯何所是以無所不具為名故佛於十羅剎女中獨呼皋帝有以也十以奪一切衆生精氣名乃女鬼以淫害人為政事也或梵或華名從形出俾人聞名見像知其惡不善之狀者也鬼子母為大千世界諸鬼魅之母專取世間嬰兒養其子名愛奴者故曰并其子等俱詣下前東北二方天王是此輩之主見部王發心說呪護持經人故部落亦發護持之善心也故曰我等亦欲等呪語五不翻中為祕密不翻四不翻中為翻字不翻音今法護譯本音字既俱翻引附其間俾知呪語亦不外長文所敘也寧上等者凡女人鍾愛最在頭面無敢略犯今曰寧犯己頭面莫惱於法師則是愛持經者有甚愛己頭面也夜叉云暴惡羅剎云可畏皆食人鬼也餓鬼謂不得食者也富單那云臭餓鬼此鬼能主人間熱病吉蔗云起尸鬼毗陀羅云赤色鬼名義集作韋陀羅云妙善主厭禱鬼晉譯云蠱道符祝者是也犍䭾云黃色鬼烏摩勒伽云黑色鬼阿跋摩羅云青臉鬼若夜叉吉蔗等者謂鬼與人皆能為起尸鬼以上皆鬼之名及鬼之本像也若熱下謂鬼之害一日至七日有間之害若常熱病無間之害若男下又鬼之變像也乃至下謂持經者得其呪力不唯晝安夜亦安也即於下向佛述犯呪不順命之鬼得五逆之罪狀也故曰若不順我等阿梨樹云蘭香蕱晉譯云猶如華菜剖其樹枝墮地必剖為七段敢犯法師者頭破如之如殺下弒父害母二逆也亦如下晉譯云如合衆麻油火然盡無餘謂搗麻生蟲蟲肥壓油殺命之甚三逆也晉譯殊未盡斗稱欺誑謂小出大入也晉譯云猶如稱戴峻羅垢之所聚此方率常西域甚戒嚴故成第四逆也調達妄自羯磨分佛五百新衆而行是為破僧第五逆也諸羅剎下謂不但說呪護亦當以身護持也觀此持經者晝夜鬼神隨從不可畏乎佛告下善其但護持經題之名具功德且無量也何況下教其如護持全經之文及六種法師也說是下敘置得益可知妙法蓮華經妙莊嚴王本事品第二十七妙莊嚴王晉譯名淨復淨王乃華德菩薩前身不曰華德菩薩本事者以因名成果德彰持此經者因該果海也由華德曾問妙音因地故說其本事爾時佛告諸大衆至國名光明莊嚴劫名喜見爾時下將敘華德因行先敘本所事佛劫國見過去諸佛皆說此經現在諸菩薩皆由過去持此經種善根也多陀阿伽度名義云亦云怛闥阿竭翻如來法身名也阿羅訶翻應供解脫名也三藐三佛陀亦云三耶三菩翻正遍知般若名也妙音因中事佛名雲雷音果上事佛名宿王華智此佛之兼兩也彼佛法中有王名妙莊嚴至於此三昧亦悉通達彼佛下具大事因之人前之王即今之華德菩薩其王下成大事緣之人前之夫人二子即今之光照莊嚴相及藥王藥上三菩薩也作大事因緣訓者准後文善知識者是大因緣故是二子下敘所以能成大事緣者以具神力及福智故所謂下釋福智十波羅蜜此中具七前五度福德後二度權實二智慈悲喜捨為四無量心三十七品助道謂四念處四正勤四如意足五根五力七覺支八正道皆是助成無上菩提之道又得下釋成神力以凡神力皆由三昧而成神力即下身上出水等一十八變也三昧七種下文次第自訓於此三昧者此指佛知見法華三昧也當下指示故曰於此爾時彼佛欲引導妙莊嚴王至說法華經宜應聽受爾時下謂雲雷音佛以宿命通知妙莊王久困邪見然正因當熟故說正法而度脫之也時淨藏下淨藏謂淨如來藏之三性淨眼謂淨如來之五眼經以二淨釋成二王子得菩薩淨三昧之名也不先白父而白母者維摩經云智度菩薩母方便以為父善根誠實男今妙莊王既以方便為二菩薩父示墮邪見然非先智度則邪見莫能除淨德夫人雖為二菩薩母然非先善根誠實則智慧不能興故經上節敘六度訖復敘方便波羅蜜此節敘二王子得菩薩淨三昧先白其母意有在也勸母往聽照隨喜品勸人往聽得與陀羅尼菩薩共生一處等功德也母告子言汝父信受外道至而生此邪見家母告下西域九十六種除佛一種為正道餘皆名邪見婆羅門云淨行有治世出世之別出世者或修遷修佛治世者即同此方之儒其法無故男女不得溷雜況國母為世儀刑不先奏准詎敢檀便故云汝父信受等此可見末世持經者雖有善根智慧苟無方便亦不能改邪歸正也淨藏下雖為白母嘆傷之辭其實明二菩薩得日星宿三昧也以佛喻日外道喻星宿今以法王佛子必准婆羅門法而行是如日光而限乎星宿此二菩薩嘆出世人為世法所拘礙之如此母告子言汝等當憂念汝父至令其父王心淨信解母告下謂徒自憂念於事無益當憂念父現其神變使得見而心淨有補於行也於是下雖敘二子奉慈旨以現神變照前文有大神力其實明二菩薩得淨光淨色二種三昧也以所現神變總不出地水火風空見識七大所變之光色故高七多羅者名義集云舊名貝多羅翻云岸形如此方棕櫚樹高直極高者八九十尺華如黃米有云一多羅樹高七仞字學云八尺曰仞西域記云南印土建那國北有多羅樹林三十餘里其葉長廣光潤諸國書寫莫不采用一多羅樹高七仞七多羅樹高四十九仞一仞八尺十仞八丈四十九仞則總計去地高三十九丈二尺也現種種下舊訓一十八變今考經文止得一十四變以虗空中行住坐臥為四身上出水下為四或現大身下為六共計一十四種故或者就現如等之等字等其地上行住坐臥則為一十八種耶令其下結其果如母言也時父見子神力如是至亦欲見汝等師可共俱往時父下謂方便為父者不出智度之母之所料則權符其實也故問師弟子之為誰二子白下雖是敘答父王之辭其實明二菩薩得淨照明三昧也以佛名法名淨照明其父王之信心故寶積第三經云菩薩成就三法得不退轉於阿耨多羅三藐三菩提父母不信令其信心一也父母毀戒令其住戒二也父母慳貪勸令住捨讚嘆菩提三也今二菩薩是其人也問品中曾未敘二子先以佛為師今奚云是我等師答經雖未敘其義暗含以前文云二子久修菩薩之道故既云久修焉知不為彼佛弟子問二子既有如上神道奚不即以神力度王必為子耶答二菩薩於王有為子之緣故也於是二子從空中下至諸佛難值時亦難遇於是下謂前現神力涌在虗空今現神力訖而從空下地也到其下復母之命謂父王既因神通生信堪發大心己之化父能事已訖但求母之放己出家也爾時下述義成偈以申白謂己不圖紹寶位願母於出家作僧者以諸佛難值冀常隨佛學道出生死難也如優曇下喻其佛之難值校值優曇為尤難也脫諸下謂縱值優曇得遇金輪王不能免二死之難值佛則免二死之苦難也母即下智度之母願遂善根誠實之男也故聽許出家於是二子白父下先獨求母者母慈愛重也此因母聽許故雙求父母踐前言更向父母求出家也所以下申偈諸佛甚難值一句又如下申脫諸難亦難一句阿含經云須彌山下有一眼之龜大海之中有一孔之木以一眼之龜求值一孔之木渡彼岸免沉溺然一投有失必待浮木繞山三千年而復值木一孔喻佛法一乘龜一眼喻衆生偏見以偏見值一乘一投有失萬劫難逢此雖請父母踐前言申求出家其實明二菩薩得第六長莊嚴三昧也以王及夫人二子先世為僧莊嚴佛法今生復求出家長莊嚴義故此節結文先云如優曇鉢訓瑞應者後長文云如優曇鉢羅既多一羅字應訓為青蓮也瑞應即青蓮足證矣彼時妙莊嚴王後宮至令心信解好樂佛法此節為下節先容敘次先小後大有四科彼時下謂王合宮無小大皆願詣佛者元各有所資也一後宮皆堪受持妙法二淨眼久已通達法華三昧法華三昧即於一切法開悟佛知見之謂三淨藏於多劫通達離惡趣三昧惡趣謂地獄等三途已離人亦離故云欲令一切等四王夫人得諸佛集三昧集謂文集故云能知諸佛等後宮但任受持經之文言淨眼則於經文得定皆自覺也淨藏又以定力離一切衆生惡趣是自覺覺他也皆下化也王夫人則於自覺覺他中能知諸佛祕藏是上合也覺行圓滿也故為二菩薩母經文四層次第先小而後大也二子如是下雖結上文其實明二菩薩得第七大威德藏三昧也以廣大威德皆藏於子道中如觀世音應以童男得度而現身夫人如妙音於王後宮變為女身是也於是妙莊嚴王至成就第一微妙之色此節敘王等受二子化導踐見佛聞法之言以明二子具足菩薩所行之道故令父母證得檀波羅蜜也於是下君臣夫婦父子尊卑一時詣佛致禮也爾時彼佛下王以禮進佛以法酬也爾時妙莊嚴下王夫婦因聞法喜捨身莊嚴行檀度也於虗空等者瓔珞化成四種寶臺表王即檀度具四無量心兆王他日得佛之依報也以床為坐臥依衣為行住依故其上有佛乃雲雷音之化身坐於臺上為後王升空之案兆王他日得佛之正報也爾時王作念下為後贊佛相好之案為下捨位出家之兆時雲雷音宿王華智佛至其國平正功德如是時雲雷音下謂王因見化佛相好有念出家而四衆不知故雲雷音佛告衆使知而授王成佛之顯記也此明二子具足菩薩所行之道故令父王得尸羅波羅蜜之戒度以作比丘必受二百五十戒故當得作佛下雖授成佛之佛名國名劫名大小乘衆名皆由精進於戒而始得至波羅蜜之彼岸故此照前第三節爾時彼佛欲引導妙莊嚴王及愍念衆生故說是法華經之案以授王成佛果記是說妙法蓮華故其王即時以國付弟至於佛法中出家修道此雖敘王得記捨家出家其實明二子具足菩薩所行之道故令父母眷屬證得羼提波羅蜜之忍度也以非忍不能捨位出家非出家修道不能證忍之彼岸故王出家已於八萬四千歲常勤精進修行妙法華經此敘王為僧修道明二子具足菩薩所行之道故令父證得毗利耶之精進波羅蜜也過是已後得一切淨功德至饒益我故來生我家過是下謂精進修行此經過八萬四千歲之後由經而得定由定而得通故能升空也此雖敘王為僧之修經其實明二子具足菩薩所行之道故令父證得禪波羅蜜也以三昧即禪定之異名故由前文未曾敘空中化臺多少高故此中敘王升虗空有七多羅樹之高也而白下雖敘王向臺中化佛以感二子其實明二子具足菩薩所行之道故令父王證得智波羅蜜也以白佛之言皆知己知彼之智慧言故自此我起至得見世尊止是敘己始信外邪終歸正覺由二子也自此二起至節竟是敘己過去善根現生聖果由二子也故二子非子是王善知識為勸王受持妙法華經示現子道此知恩報恩之言非證般若波羅蜜者孰能與此宿世善根天台科注謂王及夫人二子昔嘗為道結契住山後因乏食一人願充莫化入市朝見王者富貴動心遂命終託生為王名妙莊嚴專信邪外不神佛法三友憫迷無法可度謂非先以欲鈎牽不可遂一人願為端正有像之女淨德夫人是也二人願為福德智慧之男淨藏淨眼二王子是也故云發起饒益來生我家准此則吾人六親相引為佛事者無非宿世因緣論云差別緣有二種或為冤家或為親友是也爾時雲雷音宿王華智佛至令住正見爾時下述彼佛印可王得智度之言故曰如是等若善男子下由印可於王而推廣之謂凡他善男子女人皆以一世種善根為因世世得善知識為緣也其善知識下申明謂其善知識所以能作緣者以能作成佛之大事初則示其佛知見約自己力行為榜樣如開張鋪店者將物事鋪設也次則教其得佛知見之方如對上店售物者言其價值高下也又次令得佛知見者受利益末則令得佛知見者生歡喜有是四端故能令人入阿耨菩提之佛果也大王當知下束成謂王當知善知識由上能作佛事是善男子等之大因緣故化導人令得見佛發心也王既出家為僧譯人應於王字下置比丘言始順大王汝見下約歸二菩薩以結之謂王但見二子是己一生之善知識而尚未知二子纍劫所事之佛多授持其法妙乃當證果之人但因愍邪見令歸正覺故示居因地以子道而化親眷也知音一往以妙莊嚴王所行之事俱訓歸二子所行菩薩道者准上及此兩節經文也此雖敘彼佛印答王言其實明二菩薩於此三昧悉亦通達故結以受持法華經也妙莊嚴王即從虗空中下至說是語已禮佛而出妙莊嚴下王比丘先因作念空中雲雷音佛化身相好始得出家受記獲通後承通力以升虗空述其因緣既蒙化佛印可故今從空下地而致贊於雲雷佛之報身相好以發願也其讚具一體三寶如來甚希下讚佛法身頂上肉髻下讚佛報身略明三十二相之五一頂髻光明二目長紺三眉間白毫四齒齊密五唇色好爾時下總讚八十種好及諸功德也以上讚佛寶於如下讚法寶明由二子具足菩薩所行之道故令己證得慈悲喜捨乃至三十七品道法皆悉明了通達也故云如來之法等我從今日下歎己由見佛聞法而成僧寶發願永斷大小隨眠煩惱也故曰不復自隨心行等經文敘事古今在目其嚴乎佛告大衆於意云何至於諸法中得法眼淨佛告下會通今昔前王今菩薩見華德之問妙音因果彼此雖殊夫婦父子所受持之妙法則同也是藥王下見與持妙法者之陀羅尼為六十二億恆河沙等諸佛所說之不虗也故曰已於無量等若有人下識二大士名字者一切天人尚應致禮況學二大士之持經豈不蒙諸佛與呪而獲念哉佛說下敘置聞當品者之獲益佛五眼中法眼淨為十地菩薩所具妙法蓮華經普賢菩薩勸發品第二十八別行疏云梵語三曼多跋捺囉此云普賢准本經自在神通曰普威德名聞曰賢乃十方三世一切諸佛之長子也故經云一切如來有長子彼名號曰普賢尊若准彼疏有人法五訓法有二一體性周遍曰普隨緣成德曰賢二一即一切曰普一切即一曰賢此二正同此經之妙法也人有三一位前信住行向菩薩曲濟無遺曰普鄰極亞聖曰賢正同此經諸新得記菩薩二當位十地等覺菩薩德周法界曰普至順調善曰賢正同此經八十萬億那由他發願持經菩薩三位後謂已成佛竟行德周備障纍永袪上無所求唯不捨悲願務在度生隱實現權果無不極曰普不捨因門曰賢正同此經八品流通分當機諸大菩薩也故以普賢為流通之終彼疏尚有十法訓普恐繁不録勸謂勸佛重宣四法發謂發心說呪護持成就四法得此經之人故曰普賢勸發品此經以彌勒文殊為開章觀音普賢為奉行明妙法慈智為始悲行為終然真悲無終真慈無始以慈勸人發心持經何有盡極哉爾時普賢菩薩至於如來滅後云何能得是法華經爾時下敘當機之德之名與大下敘同名同德之盛從東下敘其來處申明自在神通之力又與下敘其擁從申明威德名聞到娑婆下准從東方來之言則娑婆為西方也頭面下敘見佛三業恭敬之儀白佛下陳所事佛與世界之名初開法會白毫相光自西以照東今法會畢普賢菩薩從東以至西示一大事因緣相首尾也遙聞下所謂心聞洞十方不為形隔業聞序正二分經已惟願下承流通分中五品言謂現在過去持經者既如藥王等或以苦行或以妙音或以陀羅尼或以妙莊嚴無非普門自在之業是為極難之事教如來滅後未來世之人云何能得極省力易簡之法以持經是我普賢與衆菩薩共來聽受之意也故云若善男子等華嚴會終普賢為善財說十大願此經會畢普賢請佛說其四行二經始終一貫哉佛告普賢菩薩至於如來滅後必得是經佛告下答當機佛滅後末世諸善男子等須成就四法始能得此經也問所謂得經者是得此七卷文言耶抑得開悟佛知見耶答謂得七卷文言受持讀誦即得開悟佛知見也以經云若有聞法者無一不成佛故又無論佛現前滅後聞一偈一句者皆得與記故一者下列釋四法問末世之人去佛既遠安能得其護念答所謂得諸佛護念者謂行人發阿耨菩提心則得法身佛護念也以法身佛即吾人本有之心性既見心性時刻照管是謂護念然修此行須以大慈悲為室以大慈與衆生樂大悲拔衆生苦惟見證法身佛者能故二者下問吾人既得法身自己即是活佛何須更植衆德之本又衆德以何法為本答但得法身不植衆德譬如有地而不種穀地為無用是以吾人心性雖具苟不廣修六度而無莊嚴亦不得圓滿報化即度生有限矣是故見法身後更須培植萬行也然涉行既深魔障滋多故須以柔和忍辱衣而為植德之本則魔孽無能礙矣三者下問既培植六度禪定在中又奚云入正定聚答非謂六度外別有正定但修德本於忍辱苟不達諸法空為座則忍難持久是故見得一切法空以為正定則忍而無忍諸度聚矣四者下問既定聚法空則己與衆生皆空又奚用發救一切衆生之心答約性而觀人己實空約相而言衆生界無盡苟不發救度心則懈怠為業願力不充果海莫圓由是等覺地菩薩尚用發心經云然後以不懈怠心為諸菩薩及四衆廣說是經也應知具前三法始能發後一心發後一心始能成前三行是四法具載法師品之末今為普賢等改題重說冥顯其能持經法師即今之普賢行也為末世菩薩者欲得其此經行是四法如目足相資缺一不可故結云善男子等爾時普賢菩薩白佛言至與共讀誦還令通利爾時下當機聞得經之人一者為諸佛護念故於其人亦發其心護念也然護念有四一護念除衰患衰約形貌枯悴生計蕭條言患約身心病苦事端侵害言惟其無此所以令得安隱也二護念使無魔鬼伺求其便魔云殺者又云極惡有父子君臣及魔著者之別故云若魔若魔子等鬼有七類詳見陀羅尼品俱便於惱害善良得經者雖開悟佛之知見既在有形似多滲漏一得菩薩護念諸鬼雖惡皆不便於行凶故云皆不得便是人若行下三護念得經者行住得菩薩現身安慰六牙表六度白象表無上涅槃純潔真淨王表自在義亦為下謂菩薩現身不唯但護持經之人亦為供養其法也是人若坐下四護念思惟經者有所忘失教其口讀心通也爾時受持讀誦法華經者至得如是等陀羅尼爾時下承上節明因菩薩現身與共受持讀誦此經生其歡喜增其精進故得三者入正定聚及得二者植衆德本四者發救一切衆生之心也以即得三昧是正定聚故及陀羅尼之總持有根本義故有本始能一旋二旋乃至百千萬億周旋往返十方世界持經為後發救一切衆生之心以法音方便為衆生說陀羅之總持法故問普賢初問云何能得此經佛以四法為答是已得此經矣如何普賢又重令得四法哉其訓豈不紐曲作直乎答佛答普賢以修四法得經約其人最初未得此經為言也普賢現身復令得經者重修四法是約重加精進𤼭證果海為言也故經以轉復精進言古宿大悟一十八遍小悟無數是亦重耶故訓不錯世尊若後世后五百歲至即於佛前而說呪曰阿檀地一檀陀婆地二至辛阿毗吉利地帝二十晉本云願聽總持其辭祝曰無我除我回我方便賓仁和除甚柔軟柔弱句見諸佛因諸總持行衆諸說蓋回轉盡集會除衆趣無央數計諸句三世數等越有為學諸法曉衆生音師子娛樂世尊若後世下通申前諸節故前云善男子善女人此以比丘等四衆申之前云受持此於受持前加求索者申之謂已得者受持未得者當求索也前云讀誦此於讀誦後加書寫者申之前云行住坐中思惟轉復精進此以欲修習是經必結三七日制一心精進申之前云現身此以滿三七日制後始現一切衆生所喜見身申之一切衆生謂九法界衆生也所喜見身即十身相海妙色身也論云身有無量色色有無量相相有無量好等是也前云魔鬼不便此以非人無能破壞女人不能惑亂申之前云忘失句偈與共讀誦此以示教利喜身常擁護申之前云得陀羅尼此即於佛前說其陀羅尼呪申之如此申明者謂已修四法已得此經者固如前諸節其未得四法未護此經者又須先准此節結制修習使必得其經也晉譯呪語難解此節亦可為別申三者入正定聚以三七日一心精進是修習正定故若有受持讀誦正憶念至廣令流布使不斷絶若有下通節申敘修習四法能得此經者之功德其功德即前六種法師義一受持二讀誦三正憶念謂因讀誦熟而正心默憶念也四解其義趣謂因默憶其文而解得義理旨趣也五如說而行謂依義趣之說而修行也以上六種之功當知下顯德其德有四一因如說而行即知其人成普賢之行於無量下二因具行即知其人在無邊佛所深種善根為諸下三由種有善根之大因故感具大果之諸佛手摩其頭以慰其心也以上約五種法即感現生功德若但下明不能全具五種但能具書寫一種法師其人命終感未來功德當生欲界第二天以受樂其樂有三一天女伎樂相迎二著七寶冠三於采女中共相娛樂也何況下復以劣校勝謂但具書寫一種其功德如此則全具六種者其功德復三一命終千佛授手勝多天女相迎二身心無有怖墮反顯忉利天樂樂盡尚有怖墮三由千佛接引得生欲界第四天彌勒內院親近當來下生補處慈尊故曰即往兜率等彌勒菩薩有下慈氏如來同行菩薩也有百千下慈氏示受天福之侍從非同忉利淫娛也有如是下總結廣略功德以勸人也世尊我今下發心以神力而護法也云閻浮提內等者南瞻部洲是佛發心修因得果之本土故雖濁惡利根衆生多故此節亦別申四者發救一切衆生之心以文皆詮發救一切衆生義故爾時釋迦牟尼佛讚言至為釋迦牟尼佛衣之所覆爾時下經家敘佛敬當機故特標其姓名也讚言下讚當機善護此經也令多下讚當機善助持此經之人也汝已下謂凡菩薩護法或為自己未成就佛果不思議功德汝普賢業成就具深大慈悲矣助持經之人或因自己始發阿耨菩提之意汝普賢已從久遠劫來發心矣如此亦似不須護經助人也而汝猶能以神通願守護其人與法則我釋迦尤當以神通力守護能受持汝普賢之名者以報汝不思議之功德也普賢若有下牒起為當機所護助六種法師當知是人下申明六種法師雖居濁惡末法能得普賢護助即同佛之現在也有六科一親見佛二親聞法三親供養佛四親蒙佛讚歎五親承佛摩頂六親受佛衣覆此印證當機遵一者為諸佛護念也如是之人不復貪著世樂至能修普賢之行此節承上節明末世六種法師得如佛現在護念故能成二者植衆德本以結文修普賢之行是衆德根本故有六科一如是下植不貪世樂德世樂謂財色名食睡五欲二不好外道人法德法即經書手筆人即外道六師三不親惡者德惡有三一畜豬等二獵師三者衒賣女色四是人下植正直福力德五是人不為下植不為根本大小隨眠所惱德三毒謂貪瞋癡根本惑也鈍使也嫉妬小隨也我慢等大隨利使也六是人少欲下植知足德謂因居末世不免於五欲中少求但得即止故曰知足能修下總結謂末世六種法師具上六德即名能修普賢之行也普賢若如來滅後至當坐天人大衆中師子法座上普賢下通節印證末世六種法師得當機護助使人信其不久成佛冥照三者入正是聚也以詣道場等是正定聚處故亦結法說一周之文以轉法輪等是序品方便品文殊答彌勒之文故上節修普賢行六種法師具大因也此節得阿耨多羅等六種法師具大果也普賢若於後世受持讀誦至當起遠迎當如敬佛普賢若於下通節印證末世六種法師得當機護助直應供敬獲福不宜輕毀致罪以成四者發救一切衆生之心也故其人雖不貪著衣服等四事然於資生之物有所求願亦必不虗而現世得其福報也設若有人不知其意而輕毀之言六種法師是其狂人空作持經之行於衣服等四事終無所獲如此之人既盲蔽佛之知見故生生世世當得無眼之報也若有供養下謂復一人見持經者不復貪著四事愈興其供養讚歎則其人亦當同持經者得其現世如意果報也以上一毀一敬罪福昭然矣若復見受下謂復有見持經者不唯當面輕毀且背地出其法師實不實過惡此人當得白癩病也若輕下謂不唯出過尤加其輕笑則其報世世有十一種也一牙齒疏缺二唇醜三鼻平四手繚五腳戾六眼目角睞睞邪視貌七身體臭穢八惡瘡膿血九水腹所謂鼓脹病也十短氣癆瘵病也十一諸惡重病應知持經者意本發救一切衆生值此輩則亦難救也是故下謂直應見而遠迎敬而如佛冀得罪滅福生可也此結喻說一周之文以譬喻品後多說羅報故佛說是普賢勸發品時至微塵等諸菩薩具普賢道此節經家敘置聞一品得益之衆結因緣說一周以恆河沙衆及大千微塵等衆各具佛知見之周遇佛說普賢說為緣故或證旋總持或具普賢道各隨機也佛說是經時普賢等諸菩薩至受持佛語作禮而去此節結全部之流通分也身子等尚名聲聞者約迹言也
