body:
  text: 姚秦三藏法師鳩摩羅什譯明護國金剛寺住持如愚著妙法蓮華經藥草喻品第五品中有三草二木通喻聲聞緣覺菩薩三等人獨以藥草名者重聲聞也以聲聞即菩薩故後文云今為汝等說最實事諸聲聞眾皆非滅度汝等所行是菩薩道是也四大弟子聞譬品先以三乘引導後以一乘度脫遂說信解品信得今獲一乘是實昔獲三乘是虗而未達夫三一皆無虗妄之義故偈云我等長夜持佛淨戒始於今日得某果報意謂若非今日得大乘果報則昔所持淨戒所得小果皆勞而無功虗而不實矣殊未知上中下三乘眾生如草木佛所說法如雲雨眾生草木雖從小以至大佛法雲雨無權實先後直一味也豈可以草木昔小而今大遂謂雲雨先虗而後實耶故知雲雨無今昔之殊而草木自有先小後大之別此佛所以重為四大弟子等述成其信解所未盡者故云藥草喻品爾時世尊告摩訶迦葉至無量億劫說不能盡爾時下善其所已言者信解品是也以信解品敘事有條敘理按時如敘其子始而捨父繼而向父疑父懼豪貴而去父甘客作而就父及終得父之家業非異人非異財也然經許多之勤苦敘其父始而失子繼而求子見子知下劣而放子設方便而得子及終付子之家業無異心無異地也然費許多之慈悲斯皆以喻明法按五時之教理為迦葉等善說如來真實功德處故云誠汝所言如來復有下述其所未能言者此品至囑累一十八品是也何哉如化城品以王子為沙彌提婆品以國王事僊人此猶佛因中為菩薩時無量無邊無數之功德說不能盡者至於果上三變淨土集十方分身諸佛於頃刻半坐寶塔置五十小劫聽眾於虗空地獄道五逆之調達遠記天王畜生道八歲之龍女速成正覺安樂四行從地出六萬恒沙等之菩薩醫師一喻據實談那由他劫等之壽命常不輕之因緣著於威音那畔廣長舌之神力現於此界他方皆果上無量無邊無數之功德說不能盡者故說壽量品訖即說分別隨喜法師三品之功德也彼三品功德之言正應于此據此一經一時尚爾況四十年前所說諸經其智力神力無量無邊之功德豈惟迦葉等於無量億劫說不能盡即十方三世一切諸佛以廣長舌塵說剎說亦不能盡偈云佛以此喻方便開示於佛智慧如海一渧大經云虗空可量風可繫無能盡說佛功德故此品為略述成化城品去為廣述成佛功德也迦葉當知如來是諸法之王至示諸眾生一切智慧此正略為當機述成億劫說不盡之功德為下喻文三節立本迦葉當知下標起說不盡之義為方便品汝等當信佛之所說言不虗妄及譬品法喻兩處無有虗妄咎等之結案由此火宅法喻長行文各五節而頌文止得四節及窮子法喻亦各四節者以先三後一皆無虗妄之義非佛自說莫能盡其肯綮故佛以此為四大弟子述成其信解所未及為此一品之大意及為後十八品之正案也於一切下釋成如來是諸法之王等文一切法者三乘九部法也智方便者智即佛自證一乘之實智方便即佛持此一乘實智用方法而便於人演說為三乘九部之權智也此句為下第一節喻文立本明始則以實開權也其所說法者躡上權智為言也皆悉到於一切智地者應上實智而言也謂雖說小果皆有大益此句為下第二節喻文立本明終則會權成實也如來觀知等者申明上二句義謂佛所以必欲終則會權為實者以佛元觀知雖有三乘九部一切諸法無非以成佛為歸趣如後文所謂究竟涅槃常寂滅相終歸於空者是也亦知一切等者謂佛既知法一又知機異所以始則必欲以實開權也如後文所謂唯有如來知此眾生種相體性念何事思何事等文是也通達無礙者束上知法知機二句結明如來所以為諸法之王謂佛若但知諸法歸趣則通於一而礙於三若但知眾生深心所行則達於權而礙於實皆不得稱佛為諸法之王惟其三一通達權實無礙而自在此佛所以稱為諸法之王也又於諸法等者結盡若有所說皆不虗也之義謂佛以法自處固三一小大通達而無礙以法與人則又皆究盡明了而略無紊亂必使各得其一切種智以為究竟如小機不妨以實通權而權有究盡大機不妨即權達實而實有明了大小既皆究盡明了四大弟子安可謂今之所得者為實而昔之所證者為虗哉此法王所以為若有所說皆不虗也而迦葉等所以於無量億劫說不能盡矣此數句為下第三節喻文立本迦葉譬如三千大千世界至一時等澍其澤普洽迦葉下大千世界土地以況一切眾生心地卉木叢林況菩薩及諸藥草況聲聞種類況三乘人各有種族形類名色謂由種類多而三乘人名字形色亦不同也草木名色種類不同由山川谿谷土地高早沃瘠所致三乘人名色不同由眾生心地善惡業緣所致密雲況佛身雲無剎不現故云彌布一時等澍況佛法雨一音圓注無物不霑慧澤故云普洽此譬於一切法以智方便而演說之一句以佛真智法身猶若虗空隨三乘人草木時節因緣所感而現方便報化身雲說權實一味之法雨也卉木叢林及諸藥草至而得生長華果敷實此節譬其所說法皆悉到於一切智地一句卉木下牒定上節所生卉木叢林及諸藥草而釋成種類若干名色各異也諸樹下束成草木雖有小中大皆各隨器量以受雲雨喻大小乘人根器受法亦然一雲下牒定上節密雲等二句釋成一時等澍其澤普洽喻佛法雨雖一身雲所致而稱其三乘草木種性使各得其根葉生長華果敷實也大意謂三乘草木不以佛身雲法雨一而華果皆同佛身雲法雨不因三乘草木異而潤澤有殊耳雖一地所生一雨所潤而諸草木各有差別此結上文兩節之義而譬如來觀知一切諸法之所歸趣等數句一地譬歸趣一雨譬示諸眾生一切智慧而諸下譬眾生深心所行以上法喻各單明此下法喻合明也迦葉當知如來亦復如是至來至佛所而聽法迦葉當知下法喻合標以大音聲下法喻合釋謂佛以大音聲普遍天人阿修羅即如天以大雲遍覆大千國土也於大眾下以佛十號釋成有大之名未度者令度下以三德釋成有大之實十號解見譬喻品三德者未度等四句解脫德也未度令度約教其發心言未解令解約教其見道言未安令安約教其安於苦行修道言未涅槃令得涅槃約教以證果言然發心轄乎見修證見修證總為得佛涅槃涅槃即解脫異名故訓四句為解脫德也今世等者法身德也法身徧乎三世三世總一真如實知我是一切等者般若德也一切知非分知一切見非徧邪見又一切知現量知非比知一切見佛眼見非天肉眼見知道知無上菩提道及世間出世間道開道謂開一乘及三乘道又創始曰開疏通曰開說道謂說其道之通塞險夷苦樂去就非般若奚能哉汝等天人下謂佛既名稱其實以大音而招眾一切眾生合當聽命而求法也此法喻合明佛現身若雲而申明於一切法以智方便而演說之一句如來于時觀是眾生至具足蒙潤各得生長此法喻合明說法如雨而申明其所說法皆悉到於一切智地一句如來于時下舉法承上文言謂佛于出大音聲之時以佛眼觀其聞命而來雲集之眾有根之利鈍性之進怠皆隨其根性所堪量材授職計工與價而說種種三一小大之法俾無量億眾皆得法喜及善利也是諸眾生下正明得利利有漸頓三世因果聖凡之分謂諸眾生一往由不聞法造五逆十惡人得而誅之現世不安隱矣死墮三途鬼得而誅之後不生善處矣今一聞佛法因果不昧生不作惡現世安隱矣死生人天則後生善處矣此小根莖枝葉眾生聞法得人天福報之善利有如此者以道受樂等者謂有等中根莖枝葉眾生在人天中以四諦十二緣之道而受三明八解寂滅之樂果不昧因又值諸佛亦得聞菩薩六度萬行之妙法樹大乘之因也此二乘眾生聞法得善利有如此者既聞法己等者謂二乘人既得聞大乘法已即遠離事障不續諸生死及遠離理障不礙正知見應身於無量諸法之中任己自在力之所能而得漸入佛無餘涅槃之大道也此大根莖枝葉眾生聞法得其善利有如此者雖有人天小果大道之不同然同得佛法雲雨之力故能盈科而進成章而達豈非其所說法皆悉到於一切智地耶如是則安可謂昔得小果為虗今得一乘始為實耶如彼大雲下合喻初二句喻隨其所堪等文卉木叢林下喻皆令歡喜等文如來說法一相一味至隨宜說法難解難知如來下法喻合明第三節承上文言謂上文雖云昔者隨其所堪而為說三一小大之法不妨即是今日如來所說一相一味之法也一相者生佛共有一涅槃妙心真如實相也此中一相合前法如來觀知一切諸法之所歸趣合前喻雖一地所生以大千世界雖有山川谿谷形色不同同一地相故論云心真如者即是一法界大總相法門體是也一味者謂佛所說三乘九部之言教同一甘露法味也此中一味合前法又於諸法究盡明了示諸眾生一切智慧合前喻一雨所潤如大千世界草木雖有辛酸鹹苦之味不同而所受靈雨初直一甘味也故論云本來平等同一覺故所謂下以昔所說大小乘三解脫門釋今最上一乘之一相謂今云如來說法一相者乃即昔所謂解脫等之三相非除昔之三相外別更有一相也此由信解品四大弟子云但念空無相無作於菩薩法心不喜樂今明空無相無作即是菩薩遊戲神通等法故此為言良由解脫即離離即寂滅名則有三義實一相究竟下以一切種智釋成一味究竟最後義對始初言謂始初佛因機小不堪大法故以一乘實相隨宜權說為三相三味今機緣既增長成大佛亦究竟涅槃最後時至不得不稱佛之本懷故會始初四十年前所說解脫等三相三味之法都成今究竟一切種智之一味也前經云世尊法久後要當說真實大般若第五百七十五云曼殊室利如我所說種種法門皆同一味謂遠離味解脫味寂滅味無所乖違此也華嚴疏云一切眾生同有佛性皆同一乘一解脫一因一果同一甘露一切當得常樂我淨是名一味勝鬘經謂二乘人於無明住地不斷不究竟故不得一味今經欲二乘人於無明住地斷至究竟得一味也其有下謂佛之法雖是一相一味奈其有眾生聞佛法者若心持口誦若如說而行三業所得功德皆不自覺知為一相一味此佛法在機所以為一而異也所以下徵明謂所以佛法一而眾生得聞思修三慧之功德不自知其一而異者何也以惟有如來最初成道三七日中用妙觀察智思惟知此眾生法惟雖一而所薰習種相體性不一致念思修等所得功德各有異也種謂種子相謂相狀體謂體製性謂性情瑜伽論可詳念為五十一心所中別境之一法思為五十一心所中徧行之一法約三業明之且屬乎意業其實通乎八識也修字則通屬三業此機心所以在佛為異而一也以佛一人既轉八識成四智證得八識證自證分惟一故眾生皆同有此證自證分之一乘性故何事者小大五乘諦緣等事也如小根眾生念思修人天之事中根眾生念思修聲聞緣覺之事大根眾生念思脩菩薩之事是也云何念等者云何更深進推詳義謂佛於初七日中既知眾生所念思修之事於第二七日中又用妙智思惟此等眾生有云何因緣而念思修如是之不同哉如念思修人天乘事者有福報之因緣也念思修二乘事者有懼苦求樂之因緣也念思修菩薩乘事者有自利利他之因緣也以何法念等者謂佛於第三七日中又用妙智思惟此等眾生既有如是念思修之因緣我當以何等之法與此眾生念而思思而修修而得其何等之法以為果也眾生住於下正明修而得果如念思修福報之因緣者佛即以一乘實相隨宜究盡明了示作五戒十善與其念思修眾生得遂其深心所行究竟住於轉輪聖王釋梵諸王之果地也如有念思修離苦得樂之因緣者佛即以一乘實相隨宜究盡明了示作四諦十二緣與其念思修眾生遂其深心所行究竟住於聲聞辟支佛之果地也如有念思修自利利他之因緣者佛即以一乘實相隨宜究盡明了示作六度四攝等法與其念思修眾生遂其深心所行究竟住於三賢十聖一乘佛果之地也唯有如來下謂眾生雖得佛與其法念思修住在五乘種種之地然各不自知皆是佛以一乘實相所分出而各自執以為異故惟有佛真如實智知見各地眾生所得功德元真是一而三三而一明了無礙之法也此中如實見簡非凡夫天肉眼見及非二乘慧眼見以諸眼雖分得明了皆有礙故如彼卉木下舉喻結其有眾生聞如來法等文謂五乘眾生住在各地各不自知佛一乘功德即如卉木等各不自知受天一味雲雨而各自居其上中下性也此合前法亦知一切眾生深心所行通達無礙合前喻而諸草木各有差別也如來知是下舉法結其惟有如來知此眾生種相體性等文謂眾生雖如草木各不自知其所得功德為上中下性而佛則知其初無上中下五等之別惟直一乘實相一味甘露之法也所謂下前以三相釋一相者是明菩提果覺也故以究竟至於一切種智為言以種智即菩提故此復以三相釋一相者是明涅槃斷德也故以究竟涅槃常寂滅相終歸於空為言以涅槃即斷德故然始末皆以究竟言者顯非二乘菩提有餘涅槃皆非究竟也九法界眾生不成佛則已若成佛則不過成菩提涅槃而已故前後互言之問初小乘豈不證空乎何至今明大乘才言終歸於空耶答佛初因機小故以一相演為三相云空無相無作為解脫相離相滅相是但以人空言也今佛說法到四十年後二乘人授記時至佛涅槃時又至是謂究竟之終時也故即三相歸於一相乃明法空也雖人法無我初終有異而所證空理則一耳故以終歸於空常寂滅相為言也此可見會三歸一會權為實之的旨矣佛知是己等者是字指上空寂相言謂佛知初後人法總是一空寂相固得其歸趣已但彼時不說只待到四十年後而說者以佛雖知諸法歸趣又知一切眾生深心之所行故觀其眾生心王心所欲樂不同而將之護之是故起初不即為二乘人說應得佛一切種智也將謂將法就機護謂護法即所以護機非佛有初恡而終與之成虗妄咎也汝等迦葉下結完初節汝即迦葉等則等其餘三大弟子希鮮少也謂我稱讚汝四人為人中鮮少人者以汝等能知我釋迦如來四十年前隨宜所說三一小大之法即今四十年後所說惟一無三之法而又能信能受也所以下徵明謂所以前說汝等於佛功德億劫說不能盡今復稱讚汝等為人中希有者何也以十方諸佛及我釋迦世尊始終隨宜說法難解難知故也應知通品一往以佛言以如來言指釋尊一佛也徵後以諸佛世尊言者是指十方三世一切諸佛也隨宜說法難解難知者如初以一乘隨小機所宜說作三乘眾生但解為三不知是一此隨小之宜難解難知也今終則會三乘隨大機所宜說作一乘眾生但解今一是實昔三為虗此隨大之宜又難解難知也爾時世尊欲重宣此義而說偈言破有法王出現世間至以種種緣令得正見破有下頌如來是諸法之王至而演說之有謂無明愛取有世間之因世間謂生老病死三有之果佛既破有不應受生今復出現者為隨順眾生心欲以種種因緣譬喻說三乘法也應知破有是根本實智出現是方便權智有實智故為一乘法王之不虗有權智故為三乘法王之不虗也如來尊重下頌其所說法皆悉到於一切智地謂雖以實為權說種種法然其所說法皆能到於如來尊重實智深遠之地非小乘淺智之人所知也久默斯要下頌如來觀知一切諸法之所歸趣謂既所說法皆悉能到深遠智地何不蚤說以斯要妙是諸法之所歸趣諸佛所尊重故久默以竢時至不圖速成也有智若聞下頌亦知一切眾生深心之所行而通達無礙義在其中矣謂佛既不惜說法是急於救人反不務速說者以眾生深心所行智信者少而愚疑者多一速說非惟不達而且永失致受苦無窮焉是務速則利眾生也少而害眾生也多故曰無智疑悔等是故迦葉下謂有是畏速說害眾生之故法王所以將教從人隨眾生力之所堪用種種因緣說作小大三一之乘也雖曰用權其實皆令得到究竟一切種智也故云令得正見此又頌於諸法究盡明了等文長行云究盡明了此云隨力為說惟其隨力眾生方得究了長行云一切智慧此云種種正見種種即一切正見即智慧也迦葉當知譬如大雲至乾地普洽藥木並茂此頌單喻第一節長行先世界草木而後雲雨頌中反是其雲雨景象文字損益足長行所未盡其雲所出一味之水至根莖枝葉華果光色此頌長行單喻第二節一雨所及皆得鮮澤至所潤是一而各滋茂此頌長文單喻第三節佛亦如是出現於世至皆應到此覲無上尊此頌法喻合明第一節佛亦下先頌有大之實大聖下後頌有大之名我為如來者十號第一也兩足之尊者十號之第二三四也以福慧為兩足故福足則應供慧足則正徧知又慧足是明福足是行故又攝明行足也出于世間下頌善逝世間解十號之第五也猶如大雲下頌無上士調御丈夫之二稱十號之第六七也諸天人眾下頌天人師佛世尊之三稱為十號之第八九十也長行先名後以實釋頌中先標其實後以名釋我為世尊無能及者至如彼草木所稟各異此節七十四句頌長文法喻合明第二節初三十六句頌如來于時起至快得善利止之文我為等者佛本無我順世而稱為我謂九法界三世間主皆稱佛為尊曰無能及者無他也為能安隱眾生不當出世而現於世為大眾說不生不滅甘露淨法也其法一味下謂甘露淨法止得一味乃解脫涅槃之味也以一妙音下謂雖是一味之音不妨隨類而各解也故曰妙音斯義指解脫涅槃言應知妙音為能演解脫為所演也常為大乘下申明謂佛非惟一時演暢斯義而已乃於四十年中雖說三乘九部之法無非時常為大乘解脫涅槃而作因緣不為小乘解脫涅槃而作因緣也我觀一切下謂佛所以直為大乘作因緣者以佛觀九法界一切眾生普皆平等具足有此一乘法體所以不存彼此愛憎之心也我無貪著者謂佛不貪愛執著大乘而自居也亦無限礙者謂佛不限此大機為之廣說礙彼小機為之略說以故四十年中恒為一切眾生平等而說一乘法也如為一人下驗明平等謂如佛凡為當機者一人盡義而說其實何甞眾多之人不聞哉故曰眾多亦然以上明佛為眾之心普也常演說法下又明佛為眾之心與時無間也謂佛出世常以說法為事曾無他餘之事也去來下謂佛既但以說法為事故去來坐立四威儀中無往不是說法曾不見有疲厭也充足下謂所以無疲厭者無非欲以一乘之法充足三世間眾生如天之雲雨普潤於三草二木也此佛無貪著無限礙之意見矣貴賤下申明法平等中機自有不平等者於人則有貴賤於位則有上下於戒則有持毀於威儀則有具否於見諦則有邪正於根行則有利鈍佛則無有彼此愛憎但等雨法雨心無懈而身無倦也是機雖有不平等而佛心則一向未嘗不平等也此由信解品四大弟子言一切諸佛秘藏之法但為菩薩演其實事而不為我說斯真要等文故此諄諄以解其疑也然此中有五平等其法一味下法體平等我觀一切下佛心平等恒為一切下佛說平等如為一人下一多平等常演說法下久近平等末以貴賤上下諸不平等者一反照之愈見佛無往而不平等矣次三十二句頌長行是諸眾生起至漸得入道止之文一切眾生下承上文言謂由佛法如雲雨之無倦故令一切眾生聞佛法者隨力所受得各住於種種諸地也地分五等故曰諸或處人天下初人天福報地轉輪聖王人中至貴釋梵諸王天上極尊此釋成貴賤上下等四句以釋天為欲界主在輪王上在梵王下梵王色界主在釋天上在空天下故凡在上者貴在下者賤故其因皆由持五戒十善具足威儀而致也諸王則下該四天王天上該色究竟天等及人間諸粟散小王等也是小藥草者合前喻小根小莖小枝小葉之文以人王天王雖三界中尊貴猶屬生死有漏故然皆可以救人苦與人樂故稱為藥非佛法棟梁故比之為草也知無漏法者知苦斷集之法也簡別天人釋梵有所不知也能得涅槃者謂小乘人既知苦斷集故能得有餘涅槃也此句含其慕滅修道簡別人天釋梵猶屬輪迴生死不得涅槃也起六神通下六通即天眼天耳他心宿命神境漏盡也三明即六通中天眼明宿命明漏盡明也問曰三明既即六通之半奚用重開答曰通約自證明約利人廣如法數詳之以上頌聲聞乘地也下辟支佛乘地辟支有二種一獨覺二緣覺獨處山林為獨覺自了之地常行禪定為獨覺自悟之工此中標以獨處結以緣覺故知兼二種人也問經奚不明言出聲聞耶答聲聞有迴心向大分緣覺出無佛世多不迴心故言知無漏法則知是聲聞乘也以無漏法該盡大小乘故以上總明中下機皆屬小乘之數皆具三明六通耳是中藥草者合前喻中根中莖等文求世尊下謂有等迴心向大聲聞欲求補佛處云我雖現世不作佛當當來世畢竟作佛故雖同二乘入定乃行菩薩六度中精進之定非滅盡定此等之機為藥草中之上等藥草也又諸佛子下佛子即菩薩也菩提薩埵為佛所鍾愛故稱之為子有三賢四加行之別故曰諸位雖涉乎地前而心則專乎佛道佛道雖多四無量心為本故曰常行慈悲佛雖未記作佛而自知作佛決定不為魔外小乘所疑惑也尚居地前校二乘人雖大校地上及等覺地尚小非藥草可喻故曰是名小樹也安住神通下地上及等覺地之菩薩也云安住神通則知愈於常行慈悲矣云轉不退輪度無量億眾則知超乎自知作佛決定無疑者而已應知校前藥草則名為樹校上小樹則名為大樹矣此合前喻大根大莖等文問神通與慈悲何分答慈但與樂悲但拔苦神通則不止慈悲即殺盜婬五逆十惡可以度眾生處菩薩亦安心住於其中此非地上等覺菩薩不能淨名云十方大力魔王皆是住不可思議解脫菩薩是也前喻文缺上藥草及小樹二種此頌有者顯藥草及樹木各具上中下三種也佛平等下六句頌長文如彼大雲雨於一切等文結完法喻明平等在佛不平等在機故佛法如雲雨直一味機稟根莖受用則各異也佛以此喻方便開示至漸漸修學悉當成佛此頌長文法喻合明第三節初十四句頌如來說法一相一味起至以何法得何法止之文直明釋迦一佛以實為權之義佛以此喻下此喻藥草喻也方便開示權智也演說屬上權智一法即一乘實智謂佛以此品喻明四十年前方便開示種種三乘九部言辭諸權智之法雖多無非演說實相一乘法也於佛智慧下謂自昔至今佛所說法在汝等二乘人分上若曰甚多然在於佛自證實智海中才一滴耳此恐四大弟子以此一品遂當如來無量無邊功德故此為言我雨法雨下謂佛前云如來功德說不能盡今止說一滴者以佛法雲雨雖曰一渧然不妨即此一滴能充滿於三世間也以一為無量故一味之法下謂雖充滿三世間却真是一味之法但隨眾生力所修行眾生力大如彼叢林藥草大者其所霑潤亦大眾生力小如彼叢林草木小者其所受澤亦小雖有小大皆得法雨而漸增茂好也豈可謂昔之法雨異乎今之法雨今之大樹為實昔之小樹為虗耶次三十二句頌眾生住於種種之地起至終歸於空止之文乃詳明十方三世一切諸佛會權歸實之義諸佛之法下謂釋迦一佛所以直以一味法雨充滿世間隨其大小漸增茂好者非特意故為乃遵十方三世一切諸佛之常規也諸佛既常以一味之法令諸世間普得具足漸次修行皆得道果釋迦豈不然乎聲聞緣覺下約法則以常規釋成漸次修行皆得道果二句約喻則申明隨其大小漸增茂好之義應知上節列三種藥草一小喻人天乘二中喻聲聞緣覺乘三上喻聲聞中有發大心者之大乘然有聲聞義無聲聞名此節合前小中上三種藥草總為一種兼有聲聞名也處於山林者顯二乘人元不在廟堂也住最後身者果縛未斷曰住子縛已滅不續後有對無始受身此生則為最後身也聞法得果者謂轉王釋梵先在人天道中聞佛諦緣之法居于廟堂牽於世樂雖知其苦不獲處於山林而斷其集今既得為聲聞緣覺處于山林知苦並斷其集不受後有之苦得證涅槃之樂則昔之聞法今獲其果矣是昔之名輪王釋梵等諸小藥草今各得增長為中上之藥草也若諸菩薩下明前小樹今增長為中樹義云智慧堅固則知不止如上文但云專心佛道常行慈悲而已云了達三界求最上乘則知不止如上文但云自知作佛決定無疑而已以今之了達三界之廣大校昔之自知作佛為陿小故所以此中法則云求最上乘喻則合為小樹而得增長為中樹也准仁王經此由習忍前十善菩薩增長入三賢位也復有住禪者謂由智慧堅固復住於禪定也得神通力者謂校前安住神通者更得其力也以安住約才入其手言得力約久成其用言聞諸法空心大歡喜則知異乎聞人空之喜矣放無數先度諸眾生則知異乎轉不退輪之度生也以轉尚費言說光則照而知之不容聲故也所以此中校上節喻名中樹而得增長為其大樹異乎求最上乘之求者也以彼才求此已增長究竟得故應知此由三賢位增長至十地位也以上喻機之小大增長各有階漸也如是迦葉下喻佛身雲法雨元無小大先後只一味也潤於人華者人是法華是喻各得成實者實果也通法喻言謂佛法雲雨雖曰不異而小大三乘之機末不由之開心華結道果各自成其小大也迦葉當知下六句頌佛知是已起至一切種智止之文而兩結上文佛與諸佛皆用權顯實之義以諸因緣者照前應一大事因緣照後為化城伏案照諸經該乎四十年前所說也種種譬喻者如優曇鉢火宅藥草等皆權智也開示佛道由權而入實也是我方便者勝鬘經云阿羅漢辟支佛得功德斷五住煩惱脫二種生死皆不及佛言得涅槃者皆佛方便也此結上佛以此喻下十四句也諸佛亦然者結諸佛之法下三十二句也今為汝等下八句頌汝等迦葉甚為希有等文而結前起後謂因迦葉等甚為希有能信佛隨宜說法故佛今為迦葉等說其最後實事明諸聲聞眾先所證有餘涅槃皆非佛之無餘涅槃故曰皆非滅度汝等下謂既非佛之滅度是何法也乃汝等所行涅槃小果是菩薩道之大因也依此大因漸漸修學盡得成佛之大果不止成阿羅漢小果而已也勝鬘經云得少分涅槃者名向涅槃界又云聲聞緣覺乘皆入大乘大乘者即是佛乘是故三乘即是一乘一乘者得阿耨多羅三藐三菩提菩提即是涅槃涅槃即是佛之法身等如下品授記者是矣問此節法喻文字重疊何異上節答約文而言上節重隨力所受所稟各異此節重漸增茂好各得成實此文不同也約義而言上節明雖一而異昔權未實三乘雖各有所得皆適己分小不得濫大此節明雖異而一今實即權三乘乃一乘之階小可增長而為大故法喻三疊皆以增長言此義不同也妙法蓮華經授記品第六梵語和伽羅此云授記聖言說與曰授果與心期曰記初身子請說因緣佛演以譬喻無非總為千二百人得解與記然直四人得解故今獨先記四大弟子以四大弟子俱已開悟佛知見故餘俟因緣說周始與其記也四大弟子先記迦葉者佛法門中不出智之與行身子智慧第一飲光頭陀此云抖擻為行第一而僧臘又最長也然此授記正是為諸聲聞說大乘經名妙法蓮華教菩薩法佛所獲念義也應知爾時世尊說是偈已至雖有魔及魔民皆護佛法爾時世尊欲重宣此義而說偈言告諸比丘我以佛眼至光明世尊其事如是爾時下結前也告諸下正授飲光之記上頌言汝等所行是菩薩道此奉敬三百萬億諸佛植福廣宣大法植慧正是漸漸修學菩薩道第一之因行記也上頌言悉當成佛此云當得成佛名光明佛授第二之果記上正等于諸佛也如來等十號為諸佛所護念未發大心者不與已發心者有此必為佛所護念也國名下授第三第四依報記依報不出兩儀國屬地理劫屬天時云光德者常寂光淨土也云大莊嚴者實報莊嚴土也佛壽下授第五正報記也正法下授第六正像法住世久近記下正覺于眾生也國界下釋成國劫之名無諸下明嚴琉璃下明飾其國菩薩下授第七法眷記無有魔下授第八護法記謂魔天臣民為三界必有之數但在光明佛法中不為害佛法之魔事以光明佛因行抖擻故果上不惹魔魔亦護法也身子記中有轉授堅滿記無魔護佛法記各隨願行彼此互攝也飲光未來成佛一大事因緣佛則一一授之飲光則一一記之矣聲聞得佛果記誠如優曇鉢大寶青蓮華又時一現耳下三段記文准是不另訓也頌校長行缺國名光德劫名大莊嚴三四兩科餘照可知爾時大目犍連須菩提至即共同聲而說偈言大雄猛世尊諸釋之法王至如饑須教食爾時下目犍連等皆悉悚慄者敘信解空生居首迦葉第三迨述藥草與記皆獨先迦葉三人恐佛舉一隅而欲己以三隅反所以心不自安而惶悚戰慄故同聲說偈欲佛親唱其名而各親與其記也大雄下謂佛一大英雄勇猛為三世間所尊而于諸釋種中破有為諸法中王故能哀愍我等于方便品云千二百羅漢悉亦當作佛乃至于上品云漸漸修學悉當成佛如此則是賜其我等作佛之音聲也若知下謂我等雖得聞此作佛之聲而尚未得如身子飲光親唱其名親與其記若佛知我等要佛親與其記之深心能見愍而授其記者則如灑以甘露除其熱惱而得其清涼也甘露照上品甘露淨法而言熱即悚慄之心良以二乘人不同三界火宅之所燒煑故但以除熱言如從下復以喻申求其記饑國來餓殍極矣喻小乘也遇王膳喜樂甚矣喻作佛音聲也心疑懼未敢便食者喻雖賜佛音未敢自信也得王教乃敢食者喻須佛記然後乃敢承當也已上喻文也我等下法合以小乘人合饑國也不知下申明小乘人有過過在不知云何當得佛也雖聞下以小乘人得佛合飢人遇王膳心疑懼未敢食也若蒙下以得佛記合王教而後敢食快且樂也小乘人不信自心作佛信佛語故如此吁爾時世尊知諸大弟子至度脫無量菩薩及聲聞眾爾時世尊欲重宣此義而說偈言諸比丘眾今告汝等至像法亦住二十小劫爾時世尊復告諸比丘眾至像法亦住二十小劫爾時世尊欲重宣此義而說偈言諸比丘眾皆一心聽至無量無數莊嚴其國爾時世尊復告大眾至像法亦住四十小劫爾時世尊欲重宣此義而說偈言我此弟子大目犍連至吾今當說汝等善聽凡諸大弟子得記雖劫國莊嚴各有不同無非因行授名因名記果如迦葉因中然燈續明以紫金光塗佛形像為羅漢則名飲光成佛則號光明須菩提因中心得無礙憶受生如恒沙在母胎知空寂為羅漢則名善見又名空生由善見故成佛則號名相由空生故說法常處虗空旃延因中勤掃佛地為羅漢則名文飾成佛則號閻浮金光目連因中聞因緣而出家為羅漢則得神通第一成佛則號多摩旃香香不離此而已至彼通不捨因而已成緣皆果不違因名稱其實雖是聲聞所行皆是菩薩但不自知耳故前偈中佛先與說破其因行則曰汝等所行是菩薩道後將與其果記則曰漸漸修學悉當成佛若其國之大小劫之修短法住之久近眷屬之多寡皆各隨其本願功德則無增減也我諸弟子下六句為五百弟子受記品伏案我及下四句為下因緣說周張本而廣說如來復有無量無邊阿僧祇之功德也謂五百弟子佛皆欲記成佛者以佛曾與五百人宿世有成佛之因緣故也妙法蓮華經化城喻品第七化城對寶所而言化謂變化城謂城府初佛說火宅喻本欲千二百人同開悟佛知見然唯四大弟子信解其餘如不聞見故佛又說藥草喻雖是為四大弟子述成其說不能盡之功德其意實欲千二百人同開悟佛知見同與其記耳而千二百人不開悟者以聞如來是諸法之王若有所說三一權實之法皆實不虗意謂三一權實既皆不虗則我等昔之所證小果未嘗不為今之大乘故安於化城以當寶所而不肯前進以希授記所以上品授過迦葉記餘三大弟子必求佛記者亦為千二百人有所引發也今既引發不動故佛不得已而說宿世因緣以明佛昔於塵點劫前為沙彌時曾化千二百人作佛如導師所將眾人過五百險惡由旬至寶所也沙彌各各既已成佛而反度千二百人以小果者如因所將眾人畏難求息乃不得已而過三百由旬外置化城也今千二百人既得阿羅漢果仍欲度脫以大乘者如滅化城而引過二百由旬至寶所以完其佛為沙彌時之本願也是知昔之三乘不虗者如由化城止息可以為進寶所之地名不虗非謂化城即是一乘實相寶所之不虗也如是則昔之教以一乘為因今由二乘而得受成佛之記為緣昔因今緣事不容己詎可執二乘城府之不化生滅度想安隱想而不往前進哉故曰化城喻品此宿世因緣所以當說而佛之功德所以說不能盡也經文通品分為二大章初自品首佛告諸比丘乃往過去起至第十六我釋迦牟尼佛於娑婆國土成阿耨多羅三藐三菩提止明佛為千二百人曾植宿世大乘之因顯如來實智功德無量無邊次自諸比丘我等為沙彌時各各教化無量百千萬億恒河沙等眾生起至此城非實我化作耳止明佛為千二百人以聲聞法為化城成今世大乘之緣顯如來權智功德無量無邊也佛告諸比丘乃往過去至觀彼久遠猶若今日佛告下標起過去之劫總明宿世之多不可思議爾時下標起智佛為釋迦宿世嚴親具十號劫國莊嚴之實迹約現在言諸比丘彼佛下約涅槃後言以起譬別明宿世之多不可思議故曰甚大久遠譬如下以非喻為喻釋成彼佛滅度甚大久遠之文以大千世界之地種盡磨為墨則其墨之數無量也過於下謂其墨又不隨地便下乃過於東方千國土才下一點其點又不甚大但大如微塵也又過下謂如上再過千國土復下地種墨之第二點也如是下謂如是第二仍過千國土復下第三點地種墨展轉以至千萬點等直下盡地種墨用計其國土之數則墨所點之國土無邊也於汝下問辭明無數也謂將上地種墨點所計國土俾能算數之師及算師之弟子共算之可得其邊而知其數否答不也世尊者謂誠哉不得其邊而莫知其數也諸比丘是人下謂將是人所經點墨及不點墨之國土盡以手指撚抹為塵以塵校劫復過上數則其劫數之多不啻倍屣之無量無邊百千萬億阿僧祇不可思議矣我以如來下結完標釋成如來實智功德無量無邊不可思議之無數也而佛以如來知見實智之力視茲久遠宛若一日信乎迦葉等於無量億劫說不能盡也過去多劫佛既明見若此益顯授諸大弟子未來果記劫長果遠為不虗矣爾時世尊欲重宣此義而說偈言我念過去世無量無邊劫至通達無量劫我念下頌總標如人下頌明別釋無量過於下釋無邊如是下頌以塵校劫釋無數如來無礙下頌結以顯德譬品所謂捨於方便讚如來知見者也佛告諸比丘大通智勝佛至一心合掌瞻仰世尊佛告諸比丘下通敘智佛始成佛終滅度壽命之數也其佛本坐下別敘其始謂以大通一佛自證一乘實相而言則威音那畔業已成訖佛矣故云本云已垂得下謂以十方三世一切諸佛開實為權而言則今時門頭尚思惟未得其方便在故云而諸佛法等云諸佛法顯非一佛之法也此即如我釋尊始成正覺最初七日之思惟也如是一小劫下謂通佛初以一小劫思惟與諸眾生說已坐道場所得之法恐機之不達乃至思惟十小劫亦未得其十方三世一切諸佛開實為權之方便也故再曰而諸佛法等此即如我釋尊第二七日之思惟也良以釋尊住壽八十歲故思惟時但以三七日為言智佛既住壽五百四十萬億那由他劫故思惟時以一小劫至十小劫為言也爾時忉利下申釋本坐道場之儀制謂智佛本生道場其道場是何人所置辦也乃忉利諸天於未坐道場前敷其師子座於菩提樹下高一由旬也故曰先為等佛於此座下謂忉利諸天既敷座已而呪願曰佛當坐於我所敷之座而成道以凡一切諸佛成道之場必皆忉利諸天預設此常例也適坐此座下謂智佛正坐其座之時而色界諸梵天王于坐道場之始及滅度之終惟以雨華為供職四王諸天惟以擊天皷為供職其餘夜摩等六天惟以作天伎樂為供職也以上敘智佛本坐道場之儀式如此諸比丘大通下謂智佛思惟過十小劫已後始得十方三世一切諸佛以法就機開實為權之方便也故得十方三世一切諸佛現身其前而慰喻之此即如我釋尊第三七日思惟尋念過去佛所行方便力我今所得道亦應說三乘作是思惟時十方佛皆現梵音慰喻我之文故曰諸佛之法乃現在前等此雖敘過去大通智佛之事其實申明方便品偈中釋尊自己最初三七日思惟之義可見我釋尊尋念過去佛正尋念此大通智勝佛也以智佛既為釋尊宿世嚴親則三七思惟亦世傳之家法也以上敘智佛成佛之始滅度之終義其佛未出家下追敘智佛未下家時之事明我釋尊宿世為千二百人求大法植大因之源本也十六子唯名其第一者舉一以該眾也父曰智勝子曰智積因地覺與果位名目相應也智積即後文東方歡喜國作佛名阿閦者是也方便品謂釋迦曾親近過百千萬億無數諸佛此正是佛之所親近處也諸子捨所珍而詣佛者所謂善繼其志善述其事達孝者也諸母泣送者愛子而兼得覲夫君以成道也曰諸母者明十六王子非一母所生也其祖轉輪聖王及大小臣工皆詣佛者見舉國無尊卑貴賤其重道一也此即如我釋尊耶輸皇后淨飯聖王同送羅睺太子出家之儀式也到已頭面下正明恭敬之儀其讚歎之言備乎偈中以偈頌曰大威德世尊至是故咸稽首歸命無上尊大威德下六句頌本坐道場等文初七日思惟也世尊甚希有下八句頌如是一小劫等文第二七日思惟也今者見世尊下四句頌過十小劫等文最後第三七日思惟也眾生常苦下十四句頌其佛未出家時等文不識苦盡道等者釋成盲暝無導師之義長夜增惡趣等者釋成眾生常苦惱之義今佛得最上等文申明我等得善利稱慶大歡喜之義爾時十六王子偈讚佛已至諸天人民重說偈言世雄無等倫百福自莊嚴至當轉無上輪爾時下上捨所珍而詣佛者意在于茲世雄下八句明佛具兩足二利三覺也若我下二句明己之所以求法亦欲同佛得兩足二利也世尊下八句釋成世雄無等倫之文而申明為分別顯示令得是智慧之義知眾生所念所行則心事有不等也即如藥草喻中亦知眾生深心所行知智力福業則因果有不同也即如藥草喻中又於諸法究盡明了示諸眾生一切智慧世尊悉知已者結足得是無上慧也當轉無上輪者結足願為世間說也佛告諸比丘大通智勝佛至徧滿世界勝諸天光爾時東方五百萬億諸國土中至而說偈言我等諸宮殿至而此大光明徧照于十方爾時五百萬億國土至一心同聲以偈頌曰世尊甚希有難可得值遇至惟願哀納受爾時諸梵天王偈讚佛已至一心同聲而說偈言世雄兩足尊惟願演說法以大慈悲力度苦惱眾生爾時大通智勝如來默然許之佛告等者總明智佛初成道時地動十方其國中間下光照下方幽冥之處鐵圍山間也日月光不能照惡孽所障蔽也而皆大明者因佛光而明也其中眾生相見咸云忽生者地獄眾生受極苦如長夜雖同在一處各不相知一旦蒙佛慈光停其酸楚方得眼開彼此相見疑眾生為鼎新生也又其國界下光照上方梵天雖不用日月光而身光亦各有分限為佛光大而且徧故云勝諸天光爾時東方等者別明瑞動東方佛光勝而諸天疑也是時諸梵天下會而議之偈中為大德天生等者正出其疑與宮殿俱者諸天行止各有隨身宮殿也各以衣裓等者將欲循光見相先備其供儀也共詣西方等者東方梵天故向西方尋相也見大通智勝等者解其先疑知是佛出世間非大德天生也即以天華散如須彌者應上五百萬億國土而言見梵天之多也并以供養菩提樹者不唯供佛且供其樹所謂愛其人而及其物也華供養已奉上宮殿者捨其輕更捨其重見敬心無已也偈中世尊甚希有下讚其悲心故云能救等天人之大師下讚其慈心故云普皆等我等所從來等者明來意之誠不躭其定樂也我等先世福等者求鑒其誠以內其供也爾時諸梵天王偈讚佛已而求轉法輪者申明所以遠來供養之意成兩足二利也爾時智佛默許之者合佛所以放光說法時至之心口不言而心允其請也世說云世尊以默然為許可初佛本坐道場已成佛矣但由一乘實相杷住太緊不唯諸佛不現即親生十六王子亦不親近況十方各五百萬億國土諸梵天王而皆來乎所以謂之垂得菩提也及思惟過十小劫已放開一線以實開權得其諸佛度生方便則王子來而梵天亦來始謂之得成菩提可見得成菩提之言亦只使眾生見相作佛耳方便權智有如此之妙故諸佛成道必欲先說三乘也以娑婆世界教體如是眾生利於耳根從聞思脩入故是以下文智佛受十方梵天請訖初亦先轉四諦十二緣法輪然後乃為十六王子說一乘實相也此雖敘智佛成道來十方梵天之事其實發明方便品我釋迦始坐道場觀樹經行諸梵天王請轉法輪之儀下九方文雖有增損然不外於此可以例通又諸比丘東南方五百萬億國土至而說偈言是事何因緣至多是佛出世度脫苦眾生爾時五百萬億諸梵天王至所獻宮殿願垂納受爾時諸梵天王即於佛前一心同聲以偈頌曰聖主天中王至我等宿福慶今得值世尊迦陵頻伽妙音鳥也其鳥未出㲉時即發聲微妙以壓眾鳥一切天人聲皆不及唯佛音愈之故以取況爾時諸梵天王偈讚佛已至一心同聲而說偈言大聖轉法輪顯示諸法相至忍善者增益爾時大通智勝如來默然許之又諸比丘南方五百萬億國土至而說偈言我等諸宮殿至為大德天生為佛出世間爾時五百萬億諸梵天王至一心同聲以偈頌曰世尊甚難見至世尊大慈愍惟願垂納受爾時諸梵天王偈讚佛已至一心同聲以偈頌曰惟願天人尊轉無上法輪至當演深遠音爾時大通智勝如來默然許之西南方乃至下方亦復如是乃至等者超略之辭謂超過其西南方西方西北方北方東北方等六方而略其來儀之文也爾時上方五百萬億國土至為諸梵眾而說偈言今以何因緣至為大德天生為佛出世間爾時五百萬億諸梵天王至一心同聲以偈頌曰善哉見諸佛救世之聖尊至皆共成佛道爾時五百萬億諸梵天王至時諸梵天王而說偈言世尊轉法輪擊甘露法皷至無量劫習法十方來儀文式皆同惟敘天龍八部俱缺夜叉阿修羅迦樓羅三部偈中善哉下頌喜得見佛之大悲也普智下頌喜得聞佛之大慈也於昔下前東南方謂一百八十劫空過無有佛南方謂過百三十劫今乃得一見至此乃云於昔無量劫則各隨十方國土善根深淺而見佛之劫數有多少遲速之不等也世尊未出下申明由不見佛有如此之惡果也不從佛聞下申明由不聞法有如此之惡因所以善滅而惡增也佛為世間下結回善哉見諸佛之文而喜反邪歸正改惡從善諸天增而惡道減也我等諸宮殿下求納其敬儀而回向自利利他不願人天小果皆願成佛道也以上頌見佛致供之喜慶爾時五百下亦效十六王子請轉法輪世尊轉法輪下結回普智天人尊之文以明須慧以資福成兩足也惟願受我請下求俯順機宜說佛多劫習學之法使效脩者得果逮起下文也爾時大通智勝如來至無量無邊不可稱數爾時下敘牒所請之佛受十方下敘牒能請之機即時下正敘應機說法三轉者示相勸脩作證之三轉也十二行者由示相轉得知四諦有世間出世門之因果名見道行由勸脩轉得苦集應斷道滅應脩之行法名脩道行由作證轉得有學研真斷惑為賢無學真窮惑盡為聖之階級名證果行故四諦每三轉成一十二行也法輪者佛法如車輪運入眾生心中轉生死成涅槃也若沙門下謂此四諦雖是小果乃智佛以十小劫思惟始得諸佛現前就實開權之法故沙門等皆所不能轉也以沙門雖出家佛子非佛說且不知故婆羅門乃在家凡夫苟不信佛尚不聞名故諸天正樂魔破法梵嗜禪寂故雖各少有福慧通屬有漏故及餘世間者餘謂阿羅漢辟支佛菩薩名智正覺世間也此等雖皆屬無漏但奉佛命行持俱不敢以轉為言如云禮樂征伐自天子出諸候不敢專也此可見唯佛與佛乃能究盡之義矣謂是苦者苦逼迫性此指身言示有身則有生老病死等苦逼迫身心非樂也是苦集者集招感性示苦果因貪嗔癡慢等見思惑所招感也此所謂知苦則應斷集也以上世間因果是苦滅者滅謂法性寂滅可證性也亦連苦言者示此逼迫苦惱身心中即具諸佛菩薩不生不滅等之性也是苦滅道者道謂八忍八智三十七品可脩性也連苦滅二諦言者示此逼迫苦惱身心中雖具有諸佛菩薩寂滅正性須脩道品而得也此所謂慕滅脩道為出世間之因果也此三轉中最初示相轉業已具勸脩作證二轉故四諦皆以是苦為言以集滅道後三諦皆先由知苦而得故及廣說下謂廣其小乘聲聞之法為中乘辟支佛說為十二因緣也以廣苦集為流轉門無明緣行至生緣老死等是也廣滅道為還滅門無明滅至憂悲苦惱滅是也無明緣行者過去二支因也無不也明智慧也行妄動也謂一切眾生因無智慧於一真如性海中不知不覺隨六塵境界風所擊而一念妄動也識了別義緣妄動故而了別也此所謂無明不覺生三細也名即受想行識四法寶無形質但有名目色即父母赤白二滴會成四大有其色相緣識為主四大為依則名色者固是最初托胎凝滑之相而胎中細五陰具矣名色緣六入者謂五陰既具眼等六根分界而識心藉以出入其間也六入緣觸者謂根成出胎與六塵相角觸也觸緣受者謂根觸境領納臧否而生苦樂平等三受也自識至受為現在五支果所謂境界為緣長六麤也受緣愛者謂根心領受前境起貪愛也愛緣取者謂心既愛樂必欲取著也取緣有者謂既生取著惑業重結善惡因果必受後有也此三復為現在三支因有緣生者謂現在有此善惡因果未來必定三界受生身也生緣老死等者謂有生必有老死等苦也此二復為未來二支果如是十二有支於一念頃三世因果互相緣起彼此由藉引發而生流轉三途故謂之緣然略則不出苦與集也謂之中乘者以聲聞人智淺要先知生死等之苦果然後方斷見思惑之集因乃從跡而言至本也辟支佛機智慧校深故追廣集因中最細之無明乃從本說至末所以人為中乘法為十二因緣也無明滅則行滅等者謂既相緣引而生還緣相引而滅因亡果喪如皮不存而毛無所附也以上敘智佛受請說三乘小果之法佛於天人下明得法之機有如此之多誠不負十六王子及梵天之請也以不受一切下謂不受色等六根塵所迷惑成苦集流轉法也而於諸漏下謂得道滅常寂之果其果具三明八解脫等也以上敘第一會說法之益第二第三下敘多會說法之益明說法既久而所化之人甚多不可稱數也故云從是已後等此雖敘智佛說法之事其實申明方便品偈中我釋迦趣波羅柰為五比丘說是名轉法輪等文也爾時十六王子至三藐三菩提如來之慧爾時十六下謂十六王子一聞諦緣之法即幼年捨寶位而為僧也准前請轉法輪偈云度脫於我等及諸眾生類為分別顯示令得是智慧之文則知上節是度脫諸眾生為分別顯示諦緣之法令得二乘智慧已此節是申請度脫於我等為分別顯示阿耨菩提之法令得大乘智慧也童子未冠婚之稱沙彌簡非比丘名義云沙彌云息慈謂息世染慈群生也又云勤䇿男寄歸傳云受十戒已名室羅末尼云求寂也七歲至十三為驅烏沙彌十四至十九為應法沙彌二十已上為名字沙彌今准下文當是應法沙彌諸根下敘夙植慧因也已曾下敘夙植福因也求阿耨下敘由夙植福慧故才出家即求大果也以上經家敘置俱白佛下正王子求大果之言謂彼無量聲聞志願小果既遂亦當遂我志願大乘者說阿耨菩提法也我等聞已者希聞慧也皆共脩學者冀脩慧也學字含其思慧我等志願下謂我等聞諦緣之法不求而求阿耨菩提者以我等立志發願皆欲開示悟入佛如來之知見也深心所念者論云一者直心正念真如法故即所求阿耨菩提是也以菩提即真如故二者深心樂集一切諸善行故此句是也以集一切善行即深心所念六度四攝等法故三者大悲心願度一切眾生苦故即攝在我等志願之願字以四弘誓願有眾生無邊誓願度故佛自證知者謂我等上求下化之深心佛以五眼六通現量證知非比量知所謂知子莫若父也此為下文伏案爾時轉輪下謂王子至貴尚捨出家不留以紹寶位八萬億人乃侍從之流既高尚其志寧不遂所求乎故王皆聽許出家也爾時彼佛下佛既受請務過二萬劫已而說者亦如釋迦久默斯要以待機熟不務速說義也釋迦減劫故待止四十年智佛增劫故待以二萬劫言說是經已下照上我等聞已皆共脩學之文見行顧其言也說是經時下謂聞機生熟有三等差別一沙彌悉信二聲聞亦信上根也熟機也三其餘不信生疑者下根也機未熟也坐是智佛受熟上根機者請說八千劫而不休廢廢置義止也莊子云廢一于堂廢一于室彼註訓廢置也為下根機生者須過二萬劫而說說已即入靜室禪定也此見智佛說法時少而入定時多由不信所致也是十六下謂沙彌知不信者機緣在己而不在佛故代佛揚化各升法座覆講各化多眾令發大心使昔之生機疑而不信者皆信下根成上根矣十六沙彌可謂善繼其志善述其事上求下化不負其所學矣大通下照上深心所念佛自證知之文故從定起詣座普告眾也諸根下證知夙植慧因已曾下證知夙植福因於諸下證知學大法以自利開示下證知行大法以利他此數句六度四攝具矣善學者審之汝等皆當下勉其聽眾亦當學沙彌植福因也所以下雖是徵辭其實勉其聽眾學沙彌植慧因也是人皆當下為其聽眾授廣記亦當如沙彌成兩足尊之果也此眾初不信佛即入定如醫師見子不服藥前往他國以示寂也今一信即與其記亦如醫師見子肯服藥仍舊還歸也此雖述智佛證知十六沙彌深心本願其實申明方便品我釋迦從三昧安詳而起因身子為諸聲聞說妙法授廣記義也是知智佛前受請說妙法如釋迦說華嚴般若方等之時也以華嚴般若方等皆妙法故十六沙彌為眾廣說如須菩提等四大弟子轉教付財之時也智佛過于多劫後從定起證沙彌授眾記亦如釋迦末後說此經之時也故此品訖富那亦有唯佛能知我等深心本願之說然後法師品首即受其廣記宛相符也思之問此授廣記訖便即唱滅奚智佛不然答前敘坐道場時已兩出乃至滅度之言故不用復贅也佛告諸比丘至成阿耨多羅三藐三菩提佛告等者謂十六沙彌因智佛對眾證讚其德得其法喜故常樂說妙法也一一下謂其聽眾亦因智佛勸勉故常隨沙彌學植二因也從其下學植慧因以此下學植福因于今不盡者謂其多眾尚有學植二因之未盡者下節所謂有住聲聞地者是也此結完釋迦宿世曾為千二百人植大乘之因為下節成大乘緣牒文之伏案諸比丘我今下謂十六沙彌由昔因中同求大乘同說大法故今同於十方成大果也上方缺上下以上下是八方之上下故此雖述十六菩薩果不昧因有願必成之義其實申明方便品十方佛皆現正是此中十方佛也而結完前請轉法輪偈若我等作佛一句故云其二沙彌東方作佛等下節諸比丘我等為沙彌時起至長行之終是結完眾生亦復然一句故此品後千二百無學阿羅漢及有學聲聞親如羅睺宛如提婆乃至聞一字一句皆得與記乃是完我釋尊為沙彌時之本願也方便品偈云我本立誓願欲令一切眾如我等無異如我昔所願今者已滿足化一切眾生皆令入佛道是也如其十方佛之名號國土皆各隨願力因行所成舊解既有配屬依違可也方便品三世十方一切諸佛法亦如是至此益明矣諸比丘我等為沙彌時至如來智慧難信難解諸比丘下牒上節宿植大因之伏案謂佛與十方諸佛為沙彌時尚能教化多眾從己聞妙法植成佛阿耨菩提之大因也此為後喻譬如五百由旬至欲過此難之文張本此諸眾生下謂此諸植阿耨菩提大因之眾生于今不盡成佛尚有住于聲聞地者佛仍常教化阿耨菩提者以是諸人等應以是聲聞之法為漸入阿耨菩提成佛道之緣也上品偈云諸聲聞眾皆非滅度汝等所行是菩薩道漸漸脩學悉當成佛至此益解矣此為後喻所將眾人中路懈退至生安隱想之文張本所以下徵明謂所以昔既頓植大因今復以漸入大果者何也以一切眾生自心本有如來智慧實難信難解故也此為後喻爾時導師知此人眾至為止息耳之文張本此佛權智功德亦無量無邊說不能盡者見矣爾時所化無量恒河沙等至是人若聞則便信受上節明由過去植大因成現在之大緣此節明由現在植大因又成未來之大緣也爾時所化下指出過去所化之人即是佛前已得記諸比丘及佛滅度後未得記之聲聞也此以現在照明過去應上節諸比丘我等為沙彌時至為阿耨菩提之文我滅度後下又以未來例現在證上節此諸眾生于今不盡有住聲聞地者我常教化阿耨菩提之常義使見現在不盡得記成佛者佛又於未來世度脫成佛也不聞是經者乏佛知見之開示也不覺不知菩薩所行者乏佛知見之悟入也自於所得等者執於小果迷其大因也我於餘國等者謂佛為迷大因者不惜再現身餘國更易名姓以教化之務使即小而成大也更有異名者如法華經佛有三阿僧祇百千名號是也是人雖生下牒上執小迷大之文而於彼土下釋上餘國作佛更以異名即小成大之義上云不聞是經此云得聞是經上云自於小乘所得功德生滅度想此云唯以佛之大乘而得滅度皆小大相翻也除諸下謂既無餘乘而復有時說餘乘者以除諸如來為一乘作方便則說有餘乘也諸比丘若如下申明唯以佛乘得滅度義重以未來結完現在照上節是諸人等應以是法漸入佛道等文自知涅槃時到者開示之緣至也眾又清淨者語入之因成也信解下發揮眾清淨義以眾清淨是戒具足信解堅固了達空法是慧具足深入禪定是定具足三學既具足所以為說一乘之時至也以故便集大小乘人說此經明無二乘得度唯一佛乘得滅度耳應知上文餘國作佛約世界言此中涅槃時至約時節言照方便品時乃說之之時既知佛於未來時更方易名亦以時至用小成大尤當知佛現在時即權成實也以上申明更無餘乘義比丘當知下申明除為一乘作方便說有餘乘義謂佛所以說餘乘與一乘作方便者以佛證得方便權智之妙深入眾生之性出世則智樂聲聞辟支佛之小果處世則深著財色名食睡等之五欲故佛為此輩以二乘之小果易彼五欲之志樂說其化城有餘涅槃也是人若聞下謂此樂五欲之人一聞佛說出世有餘乘之樂甚於世樂如渴鹿奔泉餓夫望食則易於信受也此佛所以於更無餘乘中而以方便說餘乘也此節雖敘三世因緣為後合譬之文張本然實結完方便品十方國土中唯有一乘法無二亦無三但以假名字引導於眾生之義譬如五百由旬至向者大城我所化作為止息耳譬如五百由旬起至欲過此難止喻前節諸比丘我等為沙彌時至從我聞法為阿耨菩提之文所將眾人起至生安隱想止喻前節此諸眾生于今有住聲聞地者我常教化阿耨菩提之文爾時導師起至為止息耳止喻前節是諸人等應以是法至難信難解之文五百由旬等者五百喻三界及二乘也曠絕無人所以為險二乘偏空是也怖畏之處所以為惡三界生死是也若有多眾等者喻千二百人先於大通佛時發心欲出三界及二乘道至成佛菩提之珍寶處也有一導師等者聰慧明達所以為師善知通塞所以能導通喻釋迦為沙彌至成佛時皆為千二百人之導師也所將人眾等者喻千二百人於三界中不能精進度生欲退其大心也白導師下正述退義疲極故身不能復進怖畏故見路猶遠導師多諸下喻佛見千二百人畏大於三界外示以小乘涅槃也此等可愍下釋成作念於險道下釋成多諸方便以上喻佛以神通力為方便告眾人下喻佛以智慧力為方便有餘涅槃我空之理三界無對故名為大防非止邪不受後有故喻為城為二乘人所當止之地故曰可於中止等若入下正明隨意所作謂一涅槃小可快得安隱大可前至寶所也是時疲極下喻千二百人不知權為實地小是大緣便得少為足故喜歎末有生安隱想也以上完若入是城快得安隱案爾時導師下完若能前至寶所亦可得去案知眾得息無疲者喻佛知二乘人不被見思惑所苦也即滅化城者喻今為汝等說最實事諸聲聞眾皆非滅度也語眾人下喻汝等所行是菩薩道漸漸脩學悉當成佛也汝等去來者謂去化城來寶所也亦時人方語也小果即是大緣故曰寶處在近諸比丘如來亦復如是至此城非實我化作耳諸比丘下合上喻譬如五百由旬起至欲過此難止之文結完前節爾時所化無量恒河沙等眾生起至未來世中聲聞弟子是也止之伏案謂喻中導師善知險惡通塞法中諸佛亦然也故曰亦復如是等生死有分段變易故曰諸乃苦果也煩惱有見思無明之別乃苦因也惡道地獄等三途受苦因果之處也險難二乘所證空理一得而不迴心於無上菩提為險難故然未來根境休息不同分段生死有其限齊故曰長遠應去應度者謂佛知此生死煩惱等有應當去者去之應當度者度之也若眾生但聞下正明應去應度義合上喻所將人眾起至生安隱想之文結完前節我滅度後起至除諸如來方便說法止之伏案眾生但聞一佛乘即不欲見佛近佛者以畏道長苦久乃成也佛知下謂佛因此怯劣之機於一乘佛相中說知苦斷集之法應去其苦也為止息下謂佛為此求止息其苦者又說脩道證滅第二有餘依涅槃應度之以樂也以上明為凡夫人說應去三界之苦應度二乘之樂若眾生住於二地下說應去二乘之苦應度一乘之樂合上喻爾時導師起至為止息耳之文結完前節諸比丘如來自知涅槃時到起至則便信受之伏案也承上文言謂若聲聞辟支佛眾生依佛教住於有餘依第二地中佛即為說汝所作未辦等是應去其無明及變生死之苦也汝所住下是應度以一乘之樂也未辦謂未辦六度四攝等因三十二相八十種好等果也汝所住下謂有餘依地但近於佛慧不可便執同佛慧也故教其觀察籌量所得涅槃非實乃佛方便於一乘中分別為三之說也如彼下引上喻為況以結之於一佛乘等二句三周法訖皆用為結爾時世尊欲重宣此義而說偈言大通智勝佛十劫坐道場至震動於一切此頌長文佛告諸比丘乃往過去起至世尊悉知已當轉無上輪止五節之文五節各有長文偈頌此中亦然二十二句頌長文六句頌偈文也長行敘八部無阿脩羅迦樓那二部今頌補之東方諸世界五百萬億國至轉無上法輪此頌佛告諸比丘大通智勝佛得阿耨多羅三藐三菩提時起至哀憫而敷演無量劫習法止四節之文十二句頌東方四句頌餘九方四句頌諸節之偈文也無量慧世尊受彼眾人請至不能得其邊此頌爾時大通智勝如來受十方諸梵天王及十六王子請起至不可稱數止第十節長文風俗通云十萬曰億十億曰兆十兆曰京十京曰秭十秭曰咳咳大數也八句頌受請說小乘法十二句頌聞法多眾之得果時十六王子出家作沙彌至各得成正覺此頌爾時十六王子皆以童子出家起至第十六我釋迦牟尼佛於娑婆國土成阿耨多羅三藐三菩提止第十一第十二兩節之文通計四十二句初四句頌才出家小僧即求大乘法次四句頌發大願願人己同得作佛似本師次十句頌智佛順請說大知心行則法器應受大乘以因緣譬喻說度通各有區別為能分別總不出分別一真實心相為所分別能所雖分菩薩道一故曰菩薩所行道准今佛一大時教以上八句是說華嚴方等般若為大乘也說是下二句是會昔華嚴方等般若為今之妙法偈有沙數多也次四句頌智佛入定知不信者緣有在也次十二句頌釋尊為千二百人說妙法華經之文次四句頌大機常與大師同生之文次四句頌說大乘者各於十方俱成大果以完本願之文以上四節頌文總頌一十二節長文明釋迦為千二百人植宿世大乘之因也問前判通品總為二大節此復一節又分為十二節何也答通品大義直重宿世因緣四字故大段判為二大節一大節敘因一大節敘緣經文昭然也然文勢攸長人難細解故以一大節復判數段使易解也爾時聞法者各在諸佛所至慎勿懷驚懼此頌長行諸比丘我等為沙彌時起至是人若聞則便信受止第十三第十四兩節之文爾時下自過去頌至現在果不昧因也其有下自現在頌至未來由權入實也我在下勉勿忘其本因是故下勉及現在入實勿更俟未來由權也以是下謂既有本昔因緣非無知而妄作也今汝下謂有心者皆當作佛非分外事也譬如險惡道逈絕多毒獸至當共至寶所此頌長行譬如五百由旬起至我所化作止之文長文一節義分三段初師資同希寶所以度險惡二因眾畏師設化城三師知眾安滅化勸歸於寶頌計四十二句頌彼三段初十二句頌初段譬如下謂道之險惡在毒獸多水草無喻三界內惑苦多二乘人功德智慧乏也無數下謂能度險惡之人眾及所度險惡之途遠也時有下謂導師具定慧能拔濟眾之險難也次二十四句頌第二段眾人下謂眾因頓乏思退導師下謂導師愍眾退失珍寶尋時下謂導師有方便神通化作城郭莊嚴依正宛然逼真即作下謂化作城已勸眾入城息苦得樂喻三界外我空之理具三明六通禪定解脫可遊戲也諸人下謂眾不知非真安於化城作已度生死想也後十句頌第三段導師下謂導師知眾少安勸其前進勿株守化城也我見下申明化為眾疲欲退故權設也汝今下謂既得粗安當順精詣以完初至寶所之念也我亦復如是為一切導師至引入於佛慧此頌長行諸比丘如來亦復如是今為汝等作大導師等最後合譬結法一節我亦下合時有一導師四句佛為世出世間導師故云一切見諸下合無數千萬眾四句中路下合眾人皆疲倦四句不能下申明謂佛見諸求菩提道者半途而癈云佛道長遠久受勤苦乃可得成故不能於劫海中度生成佛甘懈怠而廢墮其初心也故以下合導師作是念十二句言汝下合即作是化已四句既知下合諸人既入城四句爾乃下合導師知息已四句諸佛下合我見汝疲極四句今為下合汝今勤精進二句此節頌計三十句初云我我即釋迦佛後云諸佛指十方三世一切諸佛見先三後一即權為實釋迦與諸佛皆然非創式也問曰佛與諸佛奚為眾生心則都證一切種智身則都具三十二相始為真實滅哉答曰為一切眾生具有故不可少故
